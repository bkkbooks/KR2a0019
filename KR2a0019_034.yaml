body:
  text: 陳書卷三十四列傳第二十八文學杜之偉顏晃江德藻庾持許亨褚玠岑之敬陸琰弟瑜何之元徐伯陽張正見蔡凝阮卓易曰觀乎人文以化成天下孔子曰煥乎其有文章也自楚漢以降辭人世出洛汭江左其流彌暢莫不思侔造化明並日月大則憲章典謨裨贊王道小則文理清正申紓性靈至於經禮樂綜人倫通古今述美惡莫尚乎此後主嗣業雅尚文詞傍求學藝煥乎俱集每臣下表疏及獻上賦頌者躬自省覽其有辭工則神筆賞激加其爵位是以搢紳之徒咸知自勵矣若名位文學晃著者別以功迹論今綴杜之偉等學既兼文備于此篇云爾杜之偉字子大吳郡錢塘人也家世儒學以三禮專門父規梁奉朝請與光祿大夫濟陽江革都官尚書會稽孔休源友善之偉幼精敏有逸才七歲受尚書稍習詩禮略通其學十五遍觀文史及儀禮故事時輩稱其早成僕射徐勉嘗見其文重其有筆力中大同通元年梁武帝幸同泰寺捨身勑勉撰定儀注勉以臺閣先無此禮召之偉草具其儀乃啓補東宮學士與學士劉陟等鈔撰羣書各為題目所撰富教政道二篇皆之偉為序及湘陰侯蕭昂為江州刺史以之偉掌記室昂卒廬陵王續代之又手教招引之偉固辭不應命乃送昂喪柩還京仍侍臨成城公讀尋除揚州議曹從事南康嗣王墨曹參軍兼太學限內博士大同七年梁皇太子釋奠於國學時樂府無孔子顏子登哥詞尚書參議令之偉製其文伶人傳習以為故事轉補安前邵陵王田曹參軍又轉刑獄參軍之偉年位甚卑特以強識俊才頗有名當世吏部尚書張纘深知之以為廊廟器也侯景反之偉逃竄山澤及高祖為丞相素聞其名召補記室參軍遷中書侍郎領大著作高祖受禪除鴻臚卿餘並如故之偉啓求解著作曰臣以紹泰元年忝中書侍郎掌國史于今四載臣本庸賤謬蒙盼識思報恩奬不敢廢官皇曆惟新驅馭軒昊記言記事未易其人著作之材更宜選衆御史中丞沈炯尚書左丞徐陵梁前兼大著作虞荔梁前黃門侍郎孔奐或清文贍筆或強識稽古遷董之任允屬羣才臣無容遽變市朝再妨賢路堯朝皆讓誠不可追陳力就列庶幾知免優勑不許尋轉大匠卿遷太中大夫仍勑撰梁史永定三年卒時年五十二高祖甚悼惜之詔贈通直散騎常侍賻錢五萬布五十匹棺一具剋日舉哀之偉為文不尚浮華而溫雅博贍所製多遺失存者十七卷顏晃字元明琅邪臨沂人也少孤貧好學有辭采解褐梁邵陵王兼記室參軍時東宮學士庾信嘗使于府中王使晃接對信輕其尚少曰此府兼記室幾人晃答曰猶當少於宮中學士當時以為善對侯景之亂西奔荊州承聖初除中書侍郎時杜龕為吳興太守專好勇力其所部多輕險少年元帝患之乃使晃管其書翰仍勑龕曰卿年時尚少習讀未晚顏晃文學之士使相毗佐造次之間必宜咨稟及龕誅晃歸世祖世祖委以書記親遇甚篤除宣毅府中録事兼記室參軍永定二年高祖幸大莊嚴寺其甘露降晃獻甘露頌詞義該典高祖甚奇之天嘉初遷員外散騎常侍兼中書舍人掌詔誥三年卒時年五十三詔贈司農卿諡曰貞子並賜墓地晃家世單門傍無戚援而介然修立為當世所知其表奏詔誥下筆立成便得事理而雅有氣質有集二十卷江德操藻字德藻濟陽考城人也祖柔之齊尚書倉部郎中父革梁度支尚書光祿大夫德藻好學善屬文美風儀身長七尺四寸性至孝事親盡禮與異産昆弟居恩惠甚篤起家梁南中郎武陵王行參軍大司馬南平王蕭偉聞其才召為東閣祭酒遷安西湘東王府外兵參軍尋除尚書比部郎以父憂去職服闋之後容貌毀瘠如居喪時除安西武陵王記室不就久之授廬陵王記室參軍除廷尉正尋出為南六允州治中及高祖為司空征北將軍引德藻為府咨議轉中書侍郎遷雲麾臨海王長史陳臺建拜尚書吏部侍郎高祖受禪授祕書監兼尚書左丞尋以本官兼中書舍人天嘉四年兼散騎常侍與中書郎劉師知使齊著北征道理記三卷還拜太子中庶子領步兵校尉頃之遷御史中丞坐公事免尋拜振遠將軍通直散騎常侍自求宰縣出補新喻令政尚恩惠頗有異績六年卒於官時年五十七世祖甚悼惜之詔贈散騎常侍所著文筆十五卷子椿亦善屬文歷太子庶子尚書左丞庾持字允德潁川鄢陵人也祖佩玉宋長沙內史父沙彌梁長城令持少孤性至孝居父憂過禮篤志好學尤善書記以才藝聞解褐梁南平王國左常侍輕車河東王府行參軍兼尚書郎尋而為真出為安吉令遷鎮東邵陵王府限外記室兼建康令天監初世祖與持有舊及世祖為吳興太守以持為郡丞兼掌書翰自是常依文帝文帝剋張彪鎮會稽又令持監臨海郡以貪縱失民和為山盜所劫幽執十旬世祖遣劉澄討平之持乃獲免高祖受禪授安東臨川王府咨議參軍天嘉初遷尚書左丞以預長城之功封崇德縣子邑三百戶拜封之日請令史為客受其餉遺世祖怒之因坐免尋為宣惠始興王府咨議參軍除臨安令坐杖殺縣民免封遷還為給事黃門侍郎除稜威將軍鹽官令光大元年遷祕書監知國史事又為少府卿領羽林監遷太中大夫領步兵校尉太建元年卒時年六十二詔贈光祿大夫持善字書每屬辭好為奇字文士亦以此譏之有集十卷許亨字亨道高陽新城人晉徵士詢之六世孫也曾祖圭歷給事中委桂陽太守高尚其志居永興之究山即詢之所隱也祖勇慧齊太子家令冗從僕射父懋梁始平天門二郡守太子中庶子散騎常侍以學藝聞撰毛詩風雅比興義類十五卷述行記四卷亨少傳家業孤介有節行博通羣書多識前代舊事名輩皆推許之甚為南陽劉之遴所重每相稱述解褐梁安東王行參軍兼太學博士尋除平西府記室參軍太清初為征西中記室兼太常丞侯景之亂避地郢州會梁邵陵王自東道至引為咨議參軍王僧辨之襲郢州也素聞其名召為儀同從事中郎遷太尉從事中郎與吳興沈炯對掌書記府朝政務一以委焉晉安王承制授給事黃門侍郎亨奉箋辭府僧辨答曰省告承有朝授良為德舉卿操尚惇深文藝該洽學優而官自致青紫況久羈駿足將成頓轡匡輔虛暗期寄實深既欣遊處用忘勞屈而枳棘栖鵷常以增歎夕郎之選雖為清顯位以才升差自無愧且卿始云知命方騁康衢未有執戟之疲便深夜行之慨循復來翰殊用憮然古人相思千里命駕素心不昧寧限城闉存顧之深荒慙無已高祖受禪授中散大夫領羽林監遷太中大夫領大著作知梁史事初僧辨之誅也所司收僧辨及其子頠尸於方山同坎埋瘞至是無敢言者亨以故吏抗表請葬之乃與故義徐陵張種孔奐等相率以家財營葬具凡七柩皆改窆焉光大初高宗入輔以亨貞正有古人之風甚相欽重常以師禮事之及到仲舉之謀出高宗也毛喜知其詐高宗問亨亨勸勿奉詔高宗即位拜衛尉卿太建二年卒時年五十四初撰齊書並志五十卷遇亂失亡後撰梁史成者五十八卷梁太清之後所製文筆六卷子善心早知名官至尚書度支侍郎褚玠字溫理河南陽翟人也曾祖炫宋升明初與謝朏江斆劉俁入侍殿中謂之四友官至侍中吏部尚書諡貞子祖澐梁御史中丞父蒙太子舍人玠九歲而孤為叔父驃騎從事中郎隨所養早有令譽先達多以才器許之及長美風儀善占對博學能屬文詞義典實不好豔靡起家王府法曹歷轉外兵記室天嘉中兼通直散騎常侍聘齊還為桂陽王友遷太子庶子中書侍郎太建中山陰縣多豪猾前後令皆以贓汙免高宗患之謂中書舍人蔡景歷曰稽陰大邑久無良宰卿文士之內試思其人景歷進曰褚玠廉儉有幹用未審堪其選不高宗曰甚善卿言與朕意同乃除戎昭將軍山陰令縣民張次的王休達等與諸猾吏賄賂通姦全丁大戶類多隱沒玠乃鎖次的等具狀啓臺高宗手勑慰勞并遣使助玠搜括所出軍民八百餘戶時舍人曹義達為高宗所寵縣民陳信家富於財諂事義達信父顯文恃勢橫暴玠乃遣使執顯文鞭之一百於是吏民股栗莫敢犯者信後因義達譖玠竟坐免官玠在任歲餘守祿俸而已去官之日不堪自致因留縣境種蔬菜以自給或嗤玠以非百里之才玠答曰吾委輸課最不後列城除殘去暴姦吏局蹐若謂其不能自潤脂膏則如來命以為不達從政吾未服也時人以為信然皇太子知玠無還裝手書賜粟米二百斛於是還都太子愛玠文辭令入直殿省十年除電威將軍仁威淮南王長史頃之以本官掌東宮管記十二年遷御史中丞卒于官時年五十二玠剛毅有膽決兼善騎射嘗從司空侯安都於徐州出獵遇有猛獸玠引弓射之再發皆中口入腹俄而獸斃及為御史中丞甚有直繩之稱自梁末喪亂朝章廢薥司憲因循守而勿革玠方欲改張大為條例綱維略舉而編次未訖故不列于後焉及卒太子親製志銘以表惟舊至德二年追贈祕書監所製章奏雜文二百餘篇皆切事理由是見重於時子亮有才學官至尚書殿中侍郎岑之敬字思禮南陽棘陽人也父善紆梁世以經學聞官至吳寧令司義郎之敬年五歲讀孝經每燒香正坐親戚咸加歎異年十六策春秋左氏制旨孝經義擢為高第御史奏曰皇朝多士例止明經若顏閔之流乃應高第梁武帝省其策曰何妨我復有顏閔邪因召入面試令之敬升講座勑中書舍人朱虉執孝經唱士章武帝親自論難之敬剖釋縱橫應對如響左右莫不嗟服乃除童子奉車郎賞賜優厚十八預重雲殿法會時武帝親行香熟視之敬曰未幾見兮突而辨兮即日除太學限內博士尋為壽光學士司義郎又除武陵王安西府刑獄參軍事太清元年表請試吏除南沙令侯景之亂之敬率領所部赴援京師至郡境聞臺城陷乃與衆辭訣歸鄉里承聖二年除晉安王宣惠府中記室參軍是時蕭勃據嶺表勑之敬宣旨慰喻會江陵陷仍留廣州太建初還朝授東宮義省學士太子素聞其名尤降賞接纍遷鄱陽王中衛府記室鎮北府中録事參軍南臺治書侍御史征南府咨議參軍之敬始以經業進而博涉文史雅有詞筆不為醇儒性謙謹未嘗以才學矜物接引後進恂恂如也每忌日營齋必躬自灑掃涕泣終日士君子以篤行稱之十一年卒時年六十一太子嗟惜賻贈甚厚有集十卷行於世子德潤有父風官至中軍吳興王記室陸琰字溫玉吏部尚書瓊之從父弟也父令公梁中軍宣城王記室參軍琰幼孤好學有志操州舉秀才解褐宣惠始興王行參軍纍遷法曹外兵參軍直嘉德殿學士世祖聽覽餘暇頗留心史籍以琰博學善占誦引置左右嘗使製刀銘琰援筆即成無所點竄世祖嗟賞久之賜衣一襲俄兼通直散騎常侍副琅邪王厚聘齊及至鄴下而厚病卒琰自為使主時年二十餘風神韶亮占對間敏齊士大夫甚傾心焉還為雲麾新安王主簿遷安成王長史寧遠府記室參軍太建初為武陵王明威府功曹史兼東宮管記丁母憂去官五年卒時年三十四太子甚傷悼之手令舉哀加其賻贈又自製志銘至德二年追贈司農卿琰寡嗜欲鮮矜競遊心經籍晏如也其所製文筆多不存本後主求其遺文撰成二卷有弟瑜瑜字幹玉少篤學美詞藻州舉秀才解褐驃騎安成王行參軍轉軍師晉安王外兵參軍東宮學士兄琰時為管記並以才學娛侍左右時人比之二應太建二年太子釋奠于太學宮臣並賦詩命瑜為序文甚贍麗遷尚書祠部郎中丁母憂去職服闋為桂陽王明威將軍功曹史兼東宮管記纍遷永陽王文學太子洗馬中舍人瑜幼長讀書晝夜不廢聰敏強記一覽無復遺失嘗受莊老於汝南周弘正學成實論於僧滔法師並通大旨時皇太子好學欲博覽羣書以子集繁多命瑜鈔撰未就而卒時年四十四太子為之流涕手令舉哀官給喪事并親製祭文遣使者弔祭仍與詹事江總書曰管記陸瑜奄然殂化悲傷悼惜此情何已吾生平愛好卿等所悉自以學涉儒雅不逮古人欽賢慕士是情尤篤梁室亂離天下糜沸書史殘缺禮樂崩淪晚生後學匪無牆面卓爾出羣斯人而已吾識覽雖局未曾以言議假人至於片善小才特用嗟賞況復洪識奇士此故忘言之地論其博綜子史諳究儒墨經耳無遺觸目成誦一褒一貶一激一揚語玄析理披文摘句未嘗不聞者心伏聽者解頤會意相得自以為布衣之賞吾監撫之暇事隙之辰頗用談笑娛情琴樽間作雅篇豔什迭互鋒起每清風朗月美景良辰對羣山之參差望巨波之滉漾或玩新花時觀落葉既聽春鳥又聆秋鴈未嘗不促膝舉觴連情發藻且代琢磨間以嘲謔俱怡耳目並留情致自謂百年為速朝露可傷豈謂玉折蘭摧遽從短運為悲為恨當復何言遺迹餘文觸目增泫絶絃投筆恆有酸恨以卿同志聊復懷涕之無從言不寫意其見重如此至德二年追贈光祿卿有集十卷瑜有從父兄玠從父弟琛玠字潤玉梁大匠卿晏子之子弘雅有識度好學能屬文舉秀才對策高第吏部尚書袁樞薦之於世祖超授衡陽王文學直天保殿學士太建初遷長沙王友領記室後主在東宮聞甚名徵為管記仍除中舍人管記如故甚見親待尋以疾失明將還鄉里太子解衣贈玠為之流涕八年卒時年三十七有令舉哀并加賵贈至德二年追贈少府卿有集十卷琛字潔玉宣毅臨川王長史丘公之子少警俊事後母以孝聞世祖為會稽太守琛年十八上善政頌甚有詞采由此知名舉秀才起家為衡陽王主簿兼東宮管記歷豫章王文學領記室司徒主簿直宣明殿學士尋遷尚書三公侍郎兼通直散騎常侍聘齊還為司徒左西掾又掌東宮管記太子愛琛才辨深禮遇之後主嗣位遷給事黃門侍郎中書舍人參掌機密琛性頗疏坐漏泄禁中語詔賜死時年四十二何之元廬江灊人也祖僧達齊南臺治書侍御史父法勝以行業聞之元幼好學有才思居喪過禮為梁司空袁昂所重天監末昂表薦之因得召見解褐梁太尉臨川王揚州議曹從事史尋轉主簿及昂為丹陽尹辟為丹陽五官掾總戶曹事尋除信義令之元宗人敬容者勢位隆重頻相顧訪之元終不造焉或問其故之元曰昔楚人得寵於觀起有馬者皆亡夫德薄任隆必近覆敗吾恐不獲其利而招其禍識者以是稱之會安西武陵王為益州刺史以之元為安西刑獄參軍侯景之亂武陵王以太尉承制授南梁州長刺史北巴西太守武陵王自成都舉兵東下之元與蜀中民庶抗表請無行王以為沮衆囚之元于艦中及武陵兵敗之元從邵陵太守劉恭之郡俄而江陵陷劉恭卒王琳召為記室參軍梁敬帝册琳為司空之元除司空府咨議參軍領記室王琳之立蕭莊也署為中書侍郎會齊文宣帝薨令之元赴弔還至壽春而王琳敗齊主以為揚州別駕所治即壽春也及衆軍北伐得淮南地湘州刺史始興王叔陵遣功曹史柳咸仭書召之元之元始與朝庭有隙及書至大惶恐讀書至孔璋無罪左車見用之元仰而歎曰辭旨若此豈欺我哉遂隨咸至湘州太建八年除中衛府功曹參軍事尋遷咨議參軍及叔陵誅之元乃屏絶人事鋭精著述以為梁氏肇自武皇終于敬帝其興亡之運盛衰之迹足以垂鑒戒定褒貶究其始終起齊永元元年迄于王琳遇獲七十五年行事草創為三十卷號曰梁典甚序曰記事之史其流不一編年之作無若春秋則魯史之書非帝皇之籍也案三皇之簡為三墳五帝之策為五典此典義所由生也至乃尚書述唐帝為堯典虞帝為舜典斯又經文明據是以典之為義久矣哉若夫馬史班漢述帝稱紀自茲厥後因相祖習及陳壽所撰名之曰志總其三國分路揚鑣唯何法盛晉書變帝紀為帝典既云師古在理為優故今之所作稱為梁典梁有天下自中大同以前區𧜛寧晏太清以後寇盜交侵首尾而言未為盡美故開此一書分為六意以高祖創基因乎齊末尋宗討本起自永元今以前如干卷為追述高祖生自布衣長於弊俗知風教之臧否識民黎之情偽爰逮君臨弘斯政術四紀之內實云殷阜今以如干卷為太平世不常夷時無恆治非自我後仍屬橫流今以如干卷為亂洎高祖晏駕之年太宗幽辱之歲謳歌獄訟向西陝不向東都不庭之民流逸之士征伐禮樂歸世祖不歸太宗撥亂反正厥庸斯在治定功成其勳有屬今以如干卷為世祖至於四海困窮五德升替則敬皇紹立仍以禪陳今以如干卷為敬帝驃騎王琳崇立後嗣雖不達天命然是其忠節今以如干卷為後嗣主至在太宗雖加美諡而大寶之號世所不遵蓋以拘於賊景故也承聖紀歷自接太清神筆詔書非宜輒改詳之後論蓋有理焉夫事有始終人有業行本末之間頗宜詮案臧榮緒稱史無裁斷猶起居注耳由此而言實資詳悉又編年而舉其歲次者蓋取分明而易尋也若夫獫狁孔熾鯁我中原始自一君終為二主事有相涉言成混漫今以未分之前為北魏既分之後高氏所輔為東魏宇文所挾為西魏所以相分別也重以蓋彰殊體繁省異文其間損益頗有凡例禎明三年京城陷乃移居常州之晉陵縣隋開皇十三年卒于家徐伯陽字隱忍東海人也祖度之齊南徐州議曹從事史父僧權梁東宮通事舍人領祕書以善書知名伯陽敏而好學善色養進止有節年十五以文筆稱學春秋左氏家有史書所讀者近三千餘卷試策高第尚書板補梁河東王國右常侍東宮學士臨川嗣王府墨曹參軍大同中出為候官令甚得民和侯景之亂伯陽浮海南至廣州依於蕭勃勃平還朝仍將家屬之吳郡天嘉二年詔侍晉安王讀尋除司空侯安都府記室參軍事安都素聞其名見之降席為禮甘露降樂遊苑詔賜安都令伯陽為謝表世祖覽而奇之太建初中記室李爽記室張正見左民郎賀徹學士阮卓黃門郎蕭詮三公郎王由禮處士馬樞記室祖孫登比部賀循長史劉刪等為文會之友後有蔡凝劉助陳暄孔範亦預焉皆一時之士也遊宴賦詩勒成卷軸伯陽為其集序盛傳於世及新安王為南徐州刺史除鎮北新安王府中記室參軍兼南徐州別駕帶東海郡丞鄱陽王為江州刺史伯陽嘗奉使造焉王率府僚與伯陽登匡嶺置宴酒酣命筆賦劇韻二十伯陽與祖孫登前成王賜以奴婢雜物及新安王還京除臨海嗣王府限外咨議參軍十一年春皇太子幸太學詔新安王於辟雍發論語題仍命伯陽為辟雍頌甚見佳賞除鎮右新安王府咨議參軍事十三年聞姊喪發疾而卒時年六十六張正見字見賾清河東武城人也祖蓋之魏散騎常侍勃海長樂二郡太守父修禮魏散騎侍郎歸梁仍拜本職遷懷方太守正見幼好學有清才梁簡文在東宮正見年十三獻頌簡文深贊賞之簡文雅尚學業每自升座説經正見嘗預講筵請決疑義吐納和順進退詳雅四座咸屬目焉太清初射策高第除邵陵王國左常侍梁元帝立拜通直散騎侍郎遷彭澤令屬梁季喪亂避地於匡俗山時焦僧度擁衆自保遣使請交正見懼之遜辭延納然以禮法自持僧度亦雅相敬憚高祖受禪詔正見還都除鎮東鄱陽王府墨曹行參軍兼衡陽王府長史歷宜都王限外記室撰史著士帶尋陽郡丞纍遷尚書度支郎通直散騎侍郎著士如故太建中卒時年四十九有集十四卷其五言詩尤善大行於世蔡凝字子居濟陽考城人也祖撙梁吏部尚書金紫光祿大夫父彥高梁給事黃門侍郎凝幼聰晤美容止既長博涉經傳有文辭尤工草隸天嘉四年釋褐授祕書郎轉廬陵王文學光大元年除太子洗馬司徒主簿太建元年遷太子中舍人以名公子選尚信義公主拜駙馬都尉中書侍郎遷晉陵太守及將之郡更令左右緝治中書廨宇謂賓友曰庶來者無勞不亦可乎尋授寧遠將軍尚書吏部侍郎凝年位未高而才地為時所重常端坐西齋自非素貴名流罕所交接趣時者多譏焉高宗常謂凝曰我欲用義興主壻錢肅為黃門郎卿意何如凝正色對曰帝鄉舊戚恩由聖旨則無所復問若格以僉議黃散之職故須人門兼美惟陛下裁之高宗默然而止肅聞而有憾令義興主日譖之於高宗尋免官遷交址頃之追還後主嗣位授晉安王咨議參軍轉給事黃門侍郎後主嘗置酒會羣臣歡甚將移宴於弘範宮衆人咸從唯凝與袁憲不行後主曰卿何為者凝對曰長樂尊嚴非酒後所過臣不敢奉詔衆人失色後主曰卿醉矣即令引出他日後主謂吏部尚書蔡徵曰蔡凝負地矜才無所用也尋遷信威晉熙王府長史鬱鬱不得志乃喟然歎曰天道有廢興夫子云樂天知命斯理庶幾可達因製小室賦以見志甚有辭理陳亡入隋道病卒時年四十七子君知頗知名阮卓陳留尉氏人祖詮梁散騎侍郎父問道梁寧遠嶽陽王府記室參軍卓幼而聰敏篤志經籍善談論尤工五言詩性至孝其父隨嶽陽王出鎮江州遇疾而卒卓時年十五自都奔赴水漿不入口者纍日屬侯景之亂道路阻絶卓冒履險艱載喪柩還都在路遇賊卓形容毀瘁號哭自陳賊哀而不殺之仍護送出境及渡彭蠡湖中流忽遇疾風船幾沒者數四卓仰天悲號俄而風息人皆以為孝感之至焉世祖即位除輕車鄱陽王府外兵參軍天康元年轉雲麾新安王府記室參軍仍隨府轉翊右記室帶撰史著士遷鄱陽王中衛府録事轉晉安王府記室著士如故及平歐陽紇交址夷獠往往相聚為寇抄卓奉使招慰交址通日南象郡多金翠珠貝珍怪之産前後使者皆致之唯卓挺身而還衣裝無他時論咸伏其廉遷衡陽王府中録事參軍入為尚書祠部郎遷始興王中衛府記室參軍叔陵之誅也後主謂朝臣曰阮卓素不同逆宜加旌異至德元年入為德教殿學士尋兼通直散騎常侍副王話聘隋隋主夙聞卓名乃遣河東薛道衡琅邪顏之推等與卓談宴賦詩賜遺加禮還除招遠將軍南海王府咨議參軍以目疾不之官退居里舍改構亭宇修山池卉木招致賓友以文酒自娛禎明三年入于隋行至江州追感其父所終因遘疾而卒時年五十九時有武威陰鏗字子堅梁左衛將軍子春之子幼聰慧五歲能誦詩賦日千言及長博涉史傳尤善五言詩為當時所重釋褐梁湘東王法曹參軍天寒鏗嘗與賓友宴飲見行觴者因回酒炙以授之衆坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者天嘉中為始興王府中録事參軍世祖嘗宴羣臣賦詩徐陵言之於世祖即日召鏗預宴使賦新成安樂宮鏗援筆便就世祖甚歎賞之纍遷招遠將軍晉陵太守員外散騎常侍頃之卒有集三卷行於世史臣曰夫文學者蓋人倫之所基歟是以君子異乎衆庶昔仲尼之論四科始乎德行終於文學斯則聖人亦所貴也至如杜之偉之徒值於休運各展才用之偉尤著美焉江德操字德藻或本江德藻字德藻疑
