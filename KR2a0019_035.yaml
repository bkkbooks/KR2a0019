body:
  text: 陳書卷三十五列傳第二十九熊曇朗周迪留異陳寶應熊曇朗豫章南昌人也世為郡著姓曇朗跅薥不羈有膂力容貌甚偉侯景之亂稍聚少年據豐城縣為柵桀黠劫盜多附之梁元帝以為巴山太守荊州陷曇朗兵力稍強劫掠鄰縣縛賣居民山谷之中最為巨患及侯瑱鎮豫章曇朗外示服從陰欲圖瑱侯方兒之反瑱也曇朗為之謀主瑱敗曇朗獲瑱馬仗子女甚多及蕭勃踰嶺歐陽頠為前軍曇朗紿頠共往巴山襲黃法又報法期共破頠約曰事捷與我馬仗及出軍與頠掎角而進又紿頠曰余孝頃欲相掩襲須分留奇兵甲仗既少恐不能濟頠乃送甲三百領助之及至城下將戰曇朗偽北法乘之頠失援狼狽退衄曇朗取其馬仗而歸時巴山陳定亦擁兵立寨曇朗偽以女妻定子又謂定曰周迪余孝頃並不願此婚必須以強兵來迎定乃遣精甲三百並土豪二十人往迎既至曇朗執之收其馬仗並論價責贖紹泰二年曇朗以南川豪帥隨例除遊騎將軍尋為持節飆猛將軍桂州刺史資領豐城令歷宜新豫章二郡太守王琳遣李孝欽等隨余孝頃於臨川攻周迪曇朗率所領赴援其年以功除持節通直散騎常侍寧遠將軍封永化縣侯邑一千戶給鼓吹一部又以抗禦王琳之功授平西將軍開府儀同三司餘並如故及周文育攻余孝勱於豫章曇朗出軍會之文育失利曇朗乃害文育以應王琳事見文育傳於是盡執文育所部諸將據新淦縣帶江為城王琳東下世祖徵南川兵江州刺史周迪高州刺史黃法欲沿流應赴曇朗乃據城列艦斷遏迪等與法因帥南中兵築城圍之絶其與琳信使及王琳敗走曇朗黨援離心迪攻陷其城虜其男女萬餘口曇朗走入村中村民斬之傳首京師懸于朱雀觀於是盡收其宗族無少長皆𠫓廾市周迪臨川南城人也少居山谷有膂力能挽強弩以弋獵為事侯景之亂迪宗人周續起兵於臨川梁始興王蕭毅以郡讓續迪召募鄉人從之每戰必勇冠衆軍續所部渠帥皆郡中豪族稍驕橫續頗禁之渠帥等並怨望乃相率殺續推迪為主迪乃據有臨川之地築城于工塘梁元帝授迪持節通直散騎常侍壯武將軍高州刺史封臨汝縣侯邑五百戶紹泰二年除臨川內史尋授使持節散騎常侍信威將軍衡州刺史領臨川內史周文育之討蕭勃也迪按甲保境以觀成敗文育使長史陸山才説迪迪乃大出糧餉以資文育勃平以功加振遠將軍遷江州刺史高祖受禪王琳東下迪欲自據南川乃總召所部八郡守宰結盟聲言入赴朝廷恐其為變因厚慰撫之琳至湓城新吳洞主余孝頃舉兵應琳琳以為南川諸郡可傳檄而定乃遣其將李孝欽樊猛等南徵糧餉猛等與余孝頃相合衆且二萬來趨工塘連八城以逼迪迪使周敷率衆頓臨川故郡截斷江口因出與戰大敗之屠其八城生擒李孝欽樊猛余孝頃送于京師收其軍實器械山積並虜其人馬迪並自納之永定二年以功加平南將軍開府儀同三司增邑一千五百戶給鼓吹一部世祖嗣位進號安南將軍熊曇朗之反也迪與周敷黃法等率兵共圍曇朗屠之盡有其衆王琳敗後世祖徵迪出鎮湓城又徵其子入朝迪趑趄顧望並不至豫章太守周敷本屬於迪至是與黃法率其所部詣闕世祖録其破熊曇朗之功並加官賞迪聞之甚不平乃陰與留異相結及王師討異迪疑懼不自安乃使其弟方興率兵襲周敷敷與戰破之又別使兵襲華皎於湓城事覺盡為皎所擒天嘉三年春世祖乃下詔赦南川士民為迪所詿誤者使江州刺史吳明徹都督衆軍與高州刺史黃法豫章太守周敷討迪於是尚書下符曰告臨川郡士庶昔西京為盛信越背誕東都中興萌寵違戾是以鷹鸇競逐草幣醢極誅自古有之其來尚矣逆賊周迪本出輿臺有梁喪亂暴掠山谷我高祖躬率百越師次九川濯其泥沙假以毛羽裁解豚佩仍剖獸符卵翼之恩方斯莫喻皇運肇基頗布誠款國步艱阻竟微效力龍節繡衣藉王爵而御下熊旗組甲因地險而陵上日者王琳始二蕭勃未夷西結三湘南通五嶺衡廣戡定既安反側江郢紛梗復生攜背擁據一郡苟且百心志貌常違言迹不副特以新吳未靜地遠兵強互相兼並成其形勢收獲器械俘虜士民並曰私財曾無獻捷時遣一介終持兩端朝廷光大含弘引納崇遇遂乃位等三槐任均四嶽富貴隆赫超絶功臣加以出師逾嶺遠相響援按甲斷江翻然猜拒故司空愍公敦以宗盟情同骨肉城池連接勢猶脣齒彭亡之禍坐觀難作階此舋故結其黨與于時北寇侵軼西賊憑陵屝屨糇糧悉以資寇爵號軍容一遵偽黨及王師凱振大定區中天網恢弘棄之度外璽書綸誥撫慰綢繆冠蓋縉紳敦授重疊至於熊曇朗勦滅豐城克定蓋由儀同法之元功安西周敷之效力司勳有典懋賞斯舊惡直醜正自為仇讎悖禮姦謀因此滋甚徵出湓城歷年不就求遣侍子纍載未朝外誘逋亡招集不逞中調京輦規冀非常擅斂征賦罕歸九府擁遏二賈害及四民潛結賊異共為表𩹉同惡相求密加應援謂我六軍薄伐三越未寧屠破述城虜縛妻息分襲湓鎮稱兵蠡邦拘逼酋豪攻圍城邑幸國有備應時衄殄假節通直散騎常侍仁武將軍尋陽太守懷仁縣伯華皎明威將軍廬陵太守益陽縣子陸子隆並破賊徒剋全郡境持節散騎常侍安西將軍定州刺史領豫章太守西豐縣侯周敷躬扞溝壘身當矢石率茲義勇以寡摧衆斬馘萬計俘虜千羣迪方收餘燼還固墉堞使持節安南將軍開府儀同三司高州刺史新建縣侯法雄績早宣忠誠夙著未奉王命前率義旅既援敷等又全子隆裹糧擐甲仍躡飛走批羆之旅驅馳越電振武之衆叱吒移山以此追奔理無遺類雖復朽株將拔非待尋斧落葉就殞無勞烈風但去草絶根在於未蔓撲火止燎貴乎速滅分命將帥實資英果今遣鎮南儀同司馬湘東公相劉廣德兼平西司馬孫曉北新蔡太守魯廣達持節安南將軍吳州刺史彭澤縣侯魯悉達甲士萬人步出興口又遣前吳興太守胡鑠樹功將軍前宣城太守錢法成天門義陽二郡太守樊毅雲麾將軍合州刺史南固縣侯焦僧度嚴武將軍建州刺史辰縣子張智達持節都督江吳二州諸軍事安南將軍江州刺史安吳縣侯吳明徹樓艦馬步直指臨川前安成內史劉士京巴山太守蔡僧貴南康內史劉峯廬陵太守陸子隆安成內史闕慎並受儀同法節度同會故郡又命尋陽太守華皎光烈將軍巴州刺史潘純平西將軍郢州刺史欣樂縣侯章昭達並率貔豹徑造賊城使持節散騎常侍鎮南將軍開府儀同三司湘州刺史湘東郡公度分遣偏裨相繼上道戈船蔽水彀騎彌山又詔鎮南將軍開府儀同三司歐陽頠率其子弟交州刺史盛新除太子右率邃衡州刺史侯曉等以徑越之兵踰嶺北邁千里同期百道俱集如脫稽誅更淹旬晦司空大都督安都已平賊異凱歸非久飲至禮畢乘勝長驅勦撲凶醜如燎毛髮已有明詔罪唯迪身黎民何辜一皆原宥其有因機立功賞如別格執迷不改刑茲罔赦吳明徹至臨川令衆軍作連城攻迪相拒不能剋世祖乃遣高宗總督討之迪衆潰妻子悉擒乃脫身踰嶺之晉安依于陳寶應寶應以兵資迪留異又遣第二子忠臣隨之明年秋復越東興嶺東興南城永成縣民皆迪故人復共應之世祖遣都督章昭達征迪迪又散于山谷初侯景之亂也百姓皆棄本業羣聚為盜唯迪所部獨不侵擾並分給田疇督其耕作民下肆業各有贏儲政教嚴明徵斂必至餘郡乏絶者皆仰以取給迪性質朴不事威儀冬則短身布袍夏則紫紗襪腹居常徒跣雖外列兵衛內有女伎挼繩破篾傍若無人然輕財好施凡所周贍毫釐必鈞訥於言語而襟懷信實臨川人皆德之至是並共藏匿雖加誅戮無肯言者昭達仍度嶺頓于建安與陳寶應相抗迪復收合出東興時宣城太守錢肅鎮東興以城降迪吳州刺史陳詳率師攻迪詳兵大敗虔化侯陳訬陳留太守張遂並戰死於是迪衆復振世祖遣都督程靈洗擊破之迪又與十餘人竄于山穴中日月轉久相隨者亦稍苦之後遣人潛出臨川郡市魚鮭足痛舍於邑子邑子告臨川太守駱牙牙執之令取迪自效因使腹心勇士隨入山中誘迪出獵伏兵於道傍斬之傳首京都梟于朱雀觀三日留異東陽長山人也世為郡著姓異善自居處言語醞藉為鄉里雄豪多聚惡少陵侮貧賤守宰皆患之梁代為蟹浦戍主歷晉安安固二縣令侯景之亂還鄉里召募士卒東陽郡丞與異有隙引兵誅之及其妻子太守沈巡援臺讓郡於異異使兄子超監知郡事率兵隨巡出都及京城陷異隨臨城公蕭大連大連板為司馬委以軍事異性殘暴無遠略督責大連軍主及以左右私樹威福衆並患之會景將軍宋子仙濟浙江異奔還鄉里尋以其衆降于子仙是時大連亦趣東陽之信安嶺欲之鄱陽異乃為子仙鄉導令執大連侯景署異為東陽太守收其妻子為質景行臺劉神茂建義拒景異外同神茂而密契於景及神茂敗績為景所誅異獨獲免侯景平後王僧辨使異慰勞東陽仍糾合鄉閭保據巖阻其徒甚盛州郡憚焉元帝以為信安令荊州陷王僧辨以異為東陽太守世祖平定會稽異雖轉輸糧饋而擁擅一郡威福在己紹泰二年以應接之功除持節通直散騎常侍信武將軍縉州刺史領東陽太守封永興縣侯邑五百戶其年遷散騎常侍信威將軍增邑三百戶餘並如故又以世祖長女豐安公主配異第三子貞臣永定二年徵異為使持節散騎常侍都督南徐州諸軍事平北將軍南徐州刺史異遷延不就世祖即位改授都督縉州諸軍事安南將軍縉州刺史領東陽太守異頻遣其長史王澌為使入朝澌每言朝廷虛弱異信之雖外示臣節恆懷兩端與王琳自鄱陽信安嶺潛通信使王琳又遣使往東陽署守宰及琳敗世祖遣左衛將軍沈恪代異為郡實以兵襲之異出下淮抗禦恪與戰敗績退還錢塘異乃表啓遜謝是時衆軍方事湘郢乃降詔書慰喻且羈縻之異亦知朝廷終討於己乃使兵戍下淮及建德以備江路湘州平世祖乃下詔曰昔四罪難弘大媯之所無赦九黎亂德少昊之所必誅自古皇王不貪征伐苟為時蠹事非獲已逆賊留異數應亡滅繕甲完聚由來積年進謝羣龍自躍於千里退懷首鼠恆持於百心中歲密契番禺既弘天網賜以名爵敦以國姻儻望懷音猶能革面王琳竊據中流翻相應接別引南川之嶺路專為東道之主人結附凶渠唯欣禍亂既祅氛蕩定氣沮心孤類傷鳥之驚弦等窮獸之謀觸雖復遣家入質子陽之態轉遒侍子還朝隗日丸之心方熾朕志相成養不計疵慝披襟解帶敦喻殷勤蜂目彌彰梟聲無改遂置軍江口嚴戍下淮顯然反叛非可容匿且縉邦膏腴稽南殷曠永割王賦長壅國民竹箭良材絶望京輦萑蒲小盜共肆貪殘念彼餘氓兼其慨息西戎屈膝自款重關秦國依風並輸侵地三邊已乂四表咸寧唯此微妖所宜清殄可遣使持節都督南徐州諸軍事征北將軍司空南徐州刺史桂陽郡開國公安都指往擒戮罪止異身餘無所問異本謂官軍自錢塘江而上安都乃由會稽諸暨步道襲之異聞兵至大恐棄郡奔于桃支嶺於嶺口立柵自固明年春安都大破其柵異與第二子忠臣奔于陳寶應於是虜其餘黨男女數千人天嘉五年陳寶應平並擒異送都斬于建康市子姪及同黨無少長皆伏誅唯第三子貞臣以尚主獲免陳寶應晉安候官人也世為閩中四姓父羽有材幹為郡雄豪寶應性反覆多變詐梁代晉安數反纍殺郡將羽初並扇惑合成其事後復為官軍鄉導破之由是一郡兵權皆自己出侯景之亂晉安太守賓化侯蕭雲以郡讓羽羽年老但治郡事令寶應典兵是時東境飢饉會稽尤甚死者十七八平民男女並皆自賣而晉安獨豐沃寶應自海道寇臨安永嘉及會稽餘姚諸暨又載米粟與之貿易多致玉帛子女其有能致舟乘者亦並奔歸之由是大致資産士衆強盛侯景平元帝因以羽為晉安太守高祖輔政羽請歸老求傳郡于寶應高祖許之紹泰元年授壯武將軍晉安太守尋加員外散騎常侍二年封候官縣侯邑五百戶時東西嶺路寇賊擁隔寶應自海道趨于會稽貢獻高祖受禪授持節散騎常侍信武將軍閩州刺史領會稽太守世祖嗣位進號宣毅將軍又加其父光祿大夫仍命宗正録其本系編為宗室並遣使條其子女無大小並加封爵寶應娶留異女為妻侯安都之討異也寶應遣兵助之又資周迪兵糧出寇臨川及都督章昭達於東興南城破迪世祖因命昭達都督衆軍由建安南道渡嶺又命益州刺史領信義太守余孝頃都督會稽東陽臨海永嘉諸軍自東道會之以討寶應並詔宗正絶其屬籍於是尚書下符曰告晉安士庶昔隴西旅拒漢不稽誅遼東叛換魏申宏略若夫無諸漢之策勳有扈夏之同姓至於納吳濞之子致橫海之師違姒啓之命有甘誓之討況乃族不繫於宗盟名無紀於庸器而顯成三叛舋深四罪者乎案閩寇陳寶應父子卉服支孽本迷愛敬梁季喪亂閩隅阻絶父既豪俠扇動蠻陬椎髻箕坐自為渠帥無聞訓義所資姦諂爰肆蜂豺俄而解印炎行方謝網漏吞舟日月居諸𠫓廾之度外自東南王氣實表聖基斗牛聚星允符王迹梯山航海雖若款誠擅割瓌珍竟微職貢朝廷遵養含弘寵靈隆赫起家臨郡兼晝繡之榮裂地置州假藩麾之盛即封戶牖仍邑櫟陽乘華轂者十人保弊廬而萬石又以盛漢君臨推恩婁敬隆周朝會乃長滕侯由是紫泥青紙遠賁恩澤鄉亭龜組頒及嬰孩自谷遷喬孰復為擬而苞藏鴆毒敢行狼戾連結留異表𩹉周迪盟歃婚姻自為脣齒屈強山谷推移歲時及我彀騎防山定秦望之西部戈船下瀨克匯澤之南川遂敢舉斧並助凶孽莫不應弦摧衄盡殪醜徒每以罪在酋渠憫茲驅逼所收俘馘並勒矜放仍遣中使爰降詔書天網恢弘猶許改思異既走險迪又逃刑誑侮王人為之川藪遂使袁熙請席遠歎頭行馬援觀蛙猶安井底至如遏絶九賦剽掠四民闔境資財盡室封奪凡厥倉頭皆略黔首蝥賊相扇叶契連蹤乃復踰超瀛溟寇擾浹口侵軼嶺嶠掩襲述城縛掠吏民焚燒官寺此而可縱孰不可容今遣沙州刺史俞文冏明威將軍程文季假節宣猛將軍成州刺史甘他假節雲旗將軍談瑱假節宣猛將軍前監臨海郡陳思慶前軍將軍徐智遠明毅將軍宜黃縣開國侯慧紀開遠將軍新除晉安太守趙彖持節通直散騎常侍壯武將軍定州刺史康樂縣開國侯林馮假節信威將軍都督東討諸軍事益州刺史余孝頃率羽林二萬蒙衝蓋海乘跨滄波掃蕩巢窟此皆明恥教戰濡須鞠旅纍從楊僕亟走孫恩斬蛟中流命馮夷而鳴鼓黿鼉為駕鯾方壺而建旗義安太守張紹賓忠誠款到纍使求軍南康內史裴忌新除輕車將軍劉峯東衡州刺史錢道戢並即遣人仗與紹賓同行故司空歐陽公昔有表奏請宣薄伐遙途意合若伏波之論兵長逝遺誠同子顏之勿赦征南薨謝上策無忘周南餘恨嗣子弗忝廣州刺史歐陽紇克符家聲聿遵廣略舟師步卒二萬分趨水扼長鯨陸掣封狶董率衡廣之師會我六軍潼州刺史李月者明州刺史戴晃新州刺史區白獸壯武將軍修行師陳留太守張遂前安成內史闕慎前廬陵太守陸子隆前豫寧太守任蠻奴巴山太守黃法慈戎昭將軍湘東公世子徐敬成吳州刺史魯廣達前吳州刺史遂興縣開國侯詳使持節都督征討諸軍事散騎常侍護軍將軍昭達率緹騎五千組甲二萬直渡邵武仍頓晉安按轡揚旌夷山堙谷指期掎角以制飛走前宣威城太守錢肅臨川太守駱牙太子左衛率孫詡尋陽太守莫景隆豫章太守劉廣德並隨機鎮遏絡驛在路使持節散騎常侍鎮南將軍開府儀同三司江州刺史新建縣開國侯法戒嚴中流以為後殿斧鉞所臨罪唯元惡及留異父子其黨主帥雖有請泥函谷相背淮陰若能翻然改圖因機立效非止肆眚乃仍加賞擢其建晉士民久被驅迫者大軍明加撫慰各安樂業流寓失鄉即還本土其餘立功立事已具賞格若執迷不改同惡趑趄斧鉞一臨罔知所赦昭達既剋周迪踰東興嶺頓于建安余孝頃又自臨海道襲于晉安寶應據建安之湖際逆拒王師水陸為柵昭達深溝高壘不與戰但命軍士伐木為簰俄而水盛乘流放之突其水柵仍水步薄之寶應衆潰身奔山草間窘而就執並其子弟二十人送都斬于建康市史臣曰梁末之災沴羣凶競起郡邑巖穴之長村屯塢壁之豪資剽掠以致強恣陵侮而為大高祖應期撥亂戡定安輯熊曇朗周迪留異陳寶應雖身逢興運猶志在亂常曇朗姦慝翻覆夷滅斯為幸矣寶應及異世祖或敦以婚姻或處其類族豈有不能威制蓋以德懷也遂乃背恩負義各立異圖地匪淮南有為帝之志勢非庸蜀啓自王之心嗚呼既其迷暗所致五宗屠勦宜哉陳寶應傳此皆明恥教戰濡須鞠旅恐有誤潼州刺史李月者或本作季臘或本作李睹疑
