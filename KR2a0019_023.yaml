body:
  text: 陳書卷二十三列傳第十七沈君理王瑒陸繕沈君理字仲倫吳興人也祖僧畟梁左民尚書父巡素與高祖相善梁太清中為東陽太守侯景平後元帝徵為少府卿荊州陷蕭詧署金紫光祿大夫君理美風儀博涉經史有識鑒起家湘東王法曹參軍高祖鎮南徐州巡遣君理自東陽謁于高祖高祖器之命尚會稽長公主辟為府西曹掾稍遷中衛豫章王從事中郎尋加明威將軍兼尚書吏部侍郎遷給事黃門侍郎監吳郡高祖受禪拜駙馬都尉封永安亭侯出為吳郡太守是時兵革未寧百姓荒弊軍國之用咸資東境君理招集士卒脩治器械民下悅附深以幹理見稱世祖嗣位徵為侍中遷守左民尚書未拜為明威將軍丹陽尹天嘉三年重授左民尚書領步兵校尉尋改前軍將軍四年侯安都徙鎮江州以本官監南徐州六年出為仁威將軍東陽太守天康元年以父憂去職君理因自請往荊州迎喪柩朝議以在位重臣難令出境乃遣長兄君嚴往焉及還將葬詔贈巡侍中領軍將軍諡曰敬子其年起君理為信威將軍左衛將軍又起為持節都督東衡衡二州諸軍事仁威將軍東衡州刺史領始興內史又起為明威將軍中書令前後奪情者三竝不就太建元年服闋除太子詹事行東宮事遷吏部尚書二年高宗以君理女為皇太子妃賜爵望蔡縣侯邑五百戶四年加侍中五年遷尚書右僕射領吏部侍中如故其年有疾輿駕親臨視九月卒時年四十九詔贈侍中太子少傅喪事所須隨由資給重贈翊左將軍開府儀同三司侍中如故諡曰貞憲君理子遵儉早卒以弟君高子遵禮為嗣君理第五叔邁亦方正有幹局仕梁為尚書金部郎永定中累遷中書侍郎天嘉中歷太僕廷尉出為鎮東始興王長史會稽郡丞行東揚州事光大元年除尚書吏部郎太建元年遷為通直散騎常侍侍東宮二年卒時年五十二贈散騎常侍君理第六弟君高字季高少知名性剛直有吏能以家門外戚早居清顯歷太子舍人洗馬中舍人高宗司空府從事中郎廷尉卿太建元年東境大水百姓飢弊乃以君高為貞威將軍吳令尋除太子中庶子尚書吏部郎衞尉卿出為宣遠將軍平南長沙王長史南海太守行廣州事以女為王妃固辭不行復為衛尉卿八年詔授持節都督廣等十八州諸軍事寧遠將軍平越中郎將廣州刺史嶺南俚獠相攻伐君高本文吏無武幹推心撫御甚得民和十年卒于官時年四十七贈散騎常侍諡曰祁子王瑒字子璵司空沖之第十二子也沈靜有器局美風儀舉止醞藉梁大同中起家祕書郎遷太子洗馬元帝承制徵為中書侍郎直殿省仍掌相府管記出為東宮內史遷太子中庶子丁所生母憂歸于丹陽江陵陷梁敬帝承制除仁威將軍尚書吏部郎中貞陽侯僭位以敬帝為太子授瑒散騎常侍侍東宮尋遷長史兼侍中高祖入輔以為司徒左長史永定元年遷守五兵尚書世祖嗣位授散騎常侍領太子庶子侍東宮遷領左驍騎將軍太子中庶子常侍侍中如故瑒為侍中六載父沖嘗為瑒辭領中庶子世祖顧謂沖曰所以久留瑒於承華政欲使太子微有瑒風法耳廢帝嗣位以侍中領左驍騎將軍光大元年以父憂去職高宗即位太建元年復除侍中領左驍騎將軍遷度支尚書領羽林監出為信威將軍雲麾始興王長史行州府事未行遷中書令尋加散騎常侍除吏部尚書常侍如故瑒性寬和及居選職務在清靜謹守文案無所抑揚尋授尚書右僕射未拜加侍中遷左僕射參掌選事侍中如故瑒兄弟三十餘人居家篤睦每歲時饋遺遍及近親敦誘諸弟竝稟其規訓太建八年卒時年五十四贈侍中特進護軍將軍喪事隨所資給諡曰光子瑒第十三弟瑜字子珪亦知名美容儀早歷清顯年三十官至侍中永定元年使於齊以陳郡袁憲為副齊以王琳之故執而囚之齊文宣帝每行載死囚以從齊人呼曰供御囚每有他怒則召殺之以快其意瑜及憲竝危殆者數矣齊僕射楊遵彥憫其無辜每救護之天嘉二年還朝詔復侍中頃之卒時年四十贈本官諡曰貞子陸繕字士繻吳郡吳人也祖惠曉齊太常卿父倕任梁御史中丞繕幼有志尚以雅正知名起家梁宣惠武陵王法曹參軍承聖中授中書侍郎掌東宮管記江陵陷繕微服遁還京師紹泰元年除司徒右長史御史中丞以父任所終固辭不就高祖引繕為司徒司馬遷給事黃門侍郎領步兵校尉通直散騎常侍兼侍中永定元年遷侍中時留異擁割東陽新安人向文政與異連結因據本郡朝廷以繕為貞威將軍新安太守世祖嗣位徵為太子中庶子領步兵校尉掌東宮管記繕儀表端麗進退閑雅世祖使太子諸王咸取則焉其趨步躡履皆令習繕規矩除尚書吏部郎中步兵如故仍侍東宮陳寶應平後出為貞毅將軍建安太守秩滿為散騎常侍御史中丞猶以父之所終固辭不許乃權換廨宇徙居之太建初遷度支尚書侍中太子詹事行東宮事領揚州大中正及太子親莅庶政解行事加散騎常侍改加侍中遷尚書右僕射尋遷左僕射參掌選事侍中如故更為尚書僕射領前將軍重授左僕射領揚州大中正別勑令與徐陵等七人參議政事十二年卒時年六十三贈侍中特進金紫光祿大夫諡曰安子太子以繕東宮舊臣特賜祖奠繕子辯惠年數歲詔引入殿內辯惠應對進止有父風高宗因賜名辯惠字敬仁云繕兄子見賢亦方雅高宗為揚州牧乃以為治中從事史深被知遇歷給事黃門侍郎長沙鄱陽二王長史帶尋陽太守少府卿太建十年卒時年五十贈廷尉卿諡曰平子史臣曰夫衣冠雅道廊廟嘉猷諒以操履敦脩局宇詳正經曰容止可觀詩言其儀罔忒彼三子者其有斯風焉
