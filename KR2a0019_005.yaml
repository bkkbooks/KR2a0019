守莅民廉平未洽年常租賦多致逋餘即此務農宜弘寬省可起太建已來訖八年流移叛戶所帶租調七年八年叛義丁五年訖八年叛軍丁六年七年逋租田米粟夏調綿絹絲布麥等五年訖七年逋貲絹皆悉原之秋七月乙亥以輕車將軍丹陽尹江夏王伯義為合州刺史己卯百濟國遣使獻方物庚辰大雨震萬安陵華表己丑震慧日寺剎及瓦官寺重門一女子於門下震死冬十月戊午司空吳明徹破周將梁士彥衆數萬于呂梁十二月戊申東宮成皇太子移于新宮十年春正月己巳朔以中領軍廬陵王伯仁為平北將軍南徐州刺史翊左將軍右光祿大夫領太子詹事徐陵為領軍將軍二月甲子北討衆軍敗績於呂梁司空吳明徹及將卒已下並為周軍所獲三月辛未震武庫景子分命衆軍以備周中軍大將軍開府儀同三司淳于量為大都督總水陸諸軍事明威將軍孫瑒都督荊郢水陸諸軍事進號鎮西將軍左衞將軍樊毅為大都督督朱沛清口上至荊山緣淮衆軍進號平北將軍武毅將軍任忠都督壽陽新蔡霍州等衆軍進號寧遠將軍乙酉大赦天下丁酉以中軍大將軍開府儀同三司護軍將軍淳于量為南六允州刺史進號車騎將軍夏四月庚戌詔曰懋賞之言明於訓誥挾纊之美著在撫巡近歲薄伐廓清淮泗摧鋒致果文武畢力櫛風沐雨寒暑亟離念功在茲無忘終食宜班榮賞用酬厥勞應在軍者可竝賜爵二級幷加賚卹付選即便量處又詔曰惟堯葛衣鹿裘則天為大伯禹弊衣菲食夫子曰無間然故儉德之恭約失者鮮朕君臨宇宙十變年籥旰日勿休乙夜忘寢跂予思治若濟巨川念茲在茲懍同馭朽非貪四海之富非念黃屋之尊導仁壽以寘羣生寧勞役以奉諸己但承梁季亂離斯瘼宮室禾黍有名亡處雖輪奐未覩頗事經營去泰去甚猶為勞費加以戎車屢出千金日損府帑未充民疲征賦百姓不足君孰與足興言靜念夕惕懷抱垂訓立法良所多慙斲雕為朴庶幾可慕雉頭之服既焚弋綈之衣方襲損撤之制前自朕躬草偃風行冀以變俗應御府堂署所營造禮樂儀服軍器之外其餘悉皆停息掖庭常供王侯妃主諸有俸卹竝各量減丁巳以新除鎮右將軍新安王伯固為護軍將軍戊午樊毅遣軍度淮北對清口築城庚申大雨雹壬戌清口城不守五月甲申太白晝見六月丁卯大雨震大皇寺剎莊嚴寺露盤重陽閣東樓千秋門內槐樹鴻臚府門秋七月戊戌新羅國遣使獻方物乙巳以散騎常侍兼吏部尚書袁憲為吏部尚書八月乙丑朔改秦郡為義州戊寅隕霜殺稻菽九月壬寅以平北將軍樊毅為中領軍乙巳立方明壇于婁湖戊申以中衞將軍揚州刺史始興王叔陵兼王官伯臨盟甲寅輿駕幸婁湖臨誓乙卯分遣大使以盟誓班下四方上下相警戒也壬戌以宣惠將軍江夏王伯義為東揚州刺史冬十月戊寅罷義州及琅邪彭城二郡立建興領建安同夏烏山江乘臨沂湖熟等六縣屬揚州戊子以尚書左僕射陸繕為尚書僕射十一月辛丑以鎮西將軍孫瑒為郢州刺史十二月乙亥合州廬江蠻田伯興出寇樅陽刺史魯廣達討平之十一年春正月丁酉龍見于南六允州永寧樓側池中二月癸亥輿駕親耕藉田三月丁未詔淮北義人率戶口歸國者建其本屬舊名置立郡縣即隸近州賦給田宅喚訂一無所預夏五月乙巳詔曰昔軒轅命于風后力牧放勛咨爾稷契朱武冕旒垂拱化致隆平爰逮漢列五曹周分六職設官理務各有攸司亦幾期刑措卜世彌永並賴羣才用康庶績朕日昃劬勞思弘治要而機事尚擁政道未凝夕惕于懷罔知攸濟方欲仗茲舟檝委成股肱徵名責實取寧多士自今應尚書曹府寺內省監司文案悉付局參議分判其軍國興造徵發選序三獄等事前須詳斷然後啟聞凡諸辯決務令清乂約法守制較若畫一不得前後舛互自相矛楯致有枉滯紆意舞文糾聽所知靡有攸赦甲寅詔曰舊律以枉法受財為坐雖重直法容賄其制甚輕豈不長彼貪殘生其舞弄事涉貨財寧不尤切今可改不枉法受財者科同正盜六月庚辰以鎮前將軍豫章王叔英為鎮南將軍江州刺史景戌以征南將軍江州刺史鄱陽王伯山為中權將軍護軍將軍秋七月辛卯初用大貨六銖錢八月甲子青州義主朱顯宗等率所領七百戶入附丁卯輿駕幸大壯觀閱武戊寅輿駕還宮冬十月甲戌以安前將軍祠部尚書晉安王伯恭為軍師將軍尚書僕射陸繕為尚書左僕射十一月辛卯詔曰畫冠弗犯革此澆風孥戮是蹈化於薄俗朕肅膺寶命迄將一紀思經邦濟治憂國愛民日仄劬勞夜分輟寢而還淳反朴其道靡階雍熙盛美莫云能致遂乃鞫訊之牒盈於聽覽舂釱之人煩於牢犴周成刑措漢文斷獄杼軸空勞邈焉既遠加以蕞爾醜徒軼我彭汴淮汝氓庶企踵王略治兵旅義存拯救飛芻挽粟征賦頗煩暑雨祁寒寧忘咨怨兼宿度乖舛次舍違方若曰之誡責歸元首愧心斯積馭朽非懼即建子令月微陽初動應此嘉辰宜播寬澤可大赦天下甲午周遣柱國梁士彥率衆至肥口戊戌周軍進圍壽陽辛丑以車騎將軍開府儀同三司南六允州刺史淳于量為上流水軍都督中領軍樊毅都督北討諸軍事加安北將軍散騎常侍左衞將軍任忠都督北討前軍事加平北將軍前豐州刺史皐文奏率步騎三千趣陽平郡癸卯任忠率步騎七千趣秦郡景午新除仁威將軍右衞將軍魯廣達率衆入淮是日樊毅領水軍二萬自東關入焦湖武毅將軍蕭摩訶率步騎趣歷陽戊申豫州陷辛亥霍州又陷癸丑以新除中衞大將軍揚州刺史始興王叔陵為大都督總督水步衆軍十二月乙丑南北六允晉三州及盱眙山陽陽平馬頭秦歷陽沛北譙南梁等九州郡並自拔還京師譙北徐州又陷自是淮南之地盡沒于周矣己巳詔曰昔堯舜在上茅屋土階湯禹為君藜杖韋帶至如甲帳珠絡華榱璧璫未能雍熙徒聞侈欲朕企仰前聖思求訟平正道多違澆風靡乂至今貴里豪家金鋪玉舄貧居陋巷彘食牛衣稱物平施何其遼遠爟烽未息役賦兼勞文吏姦貪妄動科格重以旗亭關市稅斂繁多不廣都內之錢非供水衡之費逼遏商賈營謀私蓄靖懷衆弊宜事改張弗弘王道安拯民蠹今可宣勒主衣尚方諸堂署等自非軍國資須不得繕造衆物後宮僚列若有游長掖庭啟奏即皆量遣大予祕戲非會禮經樂府倡優不合雅正竝可刪改市估津稅軍令國章更須詳定唯務平允別觀離宮郊閒野外非恆饗宴勿復脩治幷勒內外文武車馬宅舍皆循儉約勿尚奢華違我嚴規抑有刑憲所由具為條格標榜宣示令喻朕心焉癸酉遣平北將軍沈恪電威將軍裴子烈鎮南徐州開遠將軍徐道奴鎮柵口前信州刺史楊寶安鎮白下戊寅以中領軍樊毅為鎮西將軍都督荊郢巴武四州水陸諸軍事十二年春正月戊戌以散騎常侍左衞將軍任忠為平南將軍南豫州刺史督緣江軍防事三月壬辰以平北將軍廬陵王伯仁為翊左將軍中領軍夏四月癸亥尚書左僕射陸繕卒乙丑以宣毅將軍河東王叔獻為南徐州刺史己卯大雩壬午雨五月癸巳以軍師將軍尚書右僕射晉安王伯恭為尚書僕射六月壬戌大風壞皐門中闥秋八月己未周使持節上柱國鄖州總管滎陽郡公司馬消難以鄖隨溫應土順沔儇澴岳等九州魯山甑山沌陽應城平靖武陽上明溳水等八鎮內附詔以消難為使持節侍中大都督總督安隨等九州八鎮諸軍事車騎將軍司空封隨郡公給鼓吹女樂各一部庚申詔鎮西將軍樊毅進督沔漢諸軍事遣平南將軍南豫州刺史任忠率衆趣歷陽通直散騎常侍超武將軍陳慧紀為前軍都督趣南六允州戊辰以新除司空司馬消難為大都督水陸諸軍事庚午通直散騎常侍淳于陵克臨江郡癸酉智武將軍魯廣達克郭默城甲戌大雨霖景子淳于陵克祐州城九月癸未周臨江太守劉顯光率衆內附是夜天東南有聲如風水相擊三夜乃止景戌改安陸郡為南司州丁亥周將王延貴率衆援歷陽任忠擊破之生擒延貴等己酉周廣陵義主曹藥率衆入附冬十月癸丑大雨雹震十一月己丑詔曰朕君臨四海日旰劬勞思弘至治未臻斯道而兵車驟出軍費尤煩芻漕控引不能徵賦夏中亢旱傷農畿內為甚民天失所資歲取無託此則政刑未理陰陽舛度黎元阻饑君孰與足靖言興念余責在躬宜布惠澤溥沾氓庶其丹陽吳興晉陵建興義興東海信義陳留江陵等十郡幷謝諸署即年田稅祿秩竝各原半其丁租半申至來歲秋登十二月庚辰宣毅將軍南徐州刺史河東王叔獻薨十三年春正月壬午以車騎將軍開府儀同三司淳于量為左光祿大夫中權將軍護軍將軍鄱陽王伯山即本號開府儀同三司鎮右將軍國子祭酒新安王伯固為揚州刺史軍師將軍尚書僕射晉安王伯恭為尚書左僕射安右將軍丹陽尹徐陵為中書監領太子詹事吏部尚書袁憲為尚書右僕射庚寅以輕車將軍衞尉卿宜都王叔明為南徐州刺史二月甲寅詔賜司馬消難所部周大將軍田廣等封爵各有差乙亥輿駕親耕藉田夏四月乙巳分衡州始興郡為東衡州衡州為西衡州五月景辰以前鎮西將軍樊毅為中護軍六月辛卯以新除中護軍樊毅為護軍將軍秋九月癸亥夜大風至自西北發屋拔樹大雷震雹冬十月癸未以散騎常侍丹陽尹毛喜為吏部尚書護軍將軍樊毅為鎮西將軍荊州刺史改鄱陽郡為吳州壬寅丹丹國遣使獻方物十二月辛巳彗星見己亥以翊右將軍衞尉卿沈恪為軍將軍十四年春正月己酉高宗弗豫甲寅崩于宣福殿時年五十三遺詔曰朕爰自遘疾曾未浹旬醫藥不瘳便屬大漸終始定分夫復奚言但君臨寰宇十有四載誠則雖休勿休日慎一日知宗廟之負重識王業之艱難而邊鄙多虞生民未乂方欲蕩清四海包吞八荒有志莫從遺恨幽壤皇太子叔寶繼體正嫡年業韶茂纂統洪基社禝有主羣公卿士文武內外俱罄心力同竭股肱送往事居盡忠誠之節當官奉職引翼亮之功務在叶和無違朕意凡厥終制事從省約金銀之飾不須入壙明器之具皆令用瓦唯使儉而合禮勿得奢而乖度以日易月既有通規公除之制悉依舊准在位百司三日一臨四方州鎮五等諸侯各守所職並停奔赴二月辛卯上謚孝宣皇帝廟號高宗癸巳葬顯寧陵高宗在田之日有大度幹略及乎登庸寔允天人之望梁室喪亂淮南地並入齊高宗太建初志復舊境乃運神略授律出師至於戰勝攻取獻捷相繼遂獲反侵地功實懋焉及周滅齊乘勝略地還達江際矣史臣曰高宗器度弘厚亦有人君之量焉世祖知冢嗣仁弱弗可傳於寶位高宗地居姬旦世祖情存太伯及乎弗悆大事咸委焉至於纂業萬機平理命將出師克淮南之地開拓土宇靜謐封疆享國十餘年志大意逸呂梁覆車軍大喪師徒矣江左削弱抑此之由嗚呼蓋德不逮文智不及武雖得失自我無禦敵之略焉
