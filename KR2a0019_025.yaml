body:
  text: 陳書卷二十五列傳第十九裴忌孫瑒裴忌字無畏河東聞喜人也祖髦梁中散大夫父之平倜儻有志略召補文德主帥梁普通中衆軍北伐之平隨都督夏侯亶克定渦潼以功封費縣侯會衡州部民相聚寇抄詔以之平為假節超武將軍都督衡州五郡征討諸軍事及之平至即皆平殄梁武帝甚嘉賞之元帝承聖中纍遷散騎常侍右衛將軍晉陵太守世祖即位除光祿大夫慈訓宮衛尉竝不就乃築山穿池植以卉木居處其中有終焉之志天康元年卒贈仁威將軍光祿大夫諡曰僖子忌少聰敏有識量頗涉史傳為當時所稱解褐梁豫章王法曹參軍侯景之亂忌招集勇力隨高祖征討纍功為寧遠將軍及高祖誅王僧辨僧辨弟僧智舉兵據吳郡高祖遣黃他率衆攻之僧智出兵於西昌門拒戰他與相持不能克高祖謂忌曰三吳奧壤舊稱饒沃雖凶荒之餘猶為殷盛而今賊徒扇聚天下搖心非公無以定之宜善思其策忌乃勒部下精兵輕行倍道自錢塘直趣吳郡夜至城下鼓譟薄之僧智疑大軍至輕舟奔杜龕忌入據其郡高祖嘉之表授吳郡太守高祖受禪徵為左衛將軍天嘉初出為持節南康內史時義安太守張紹賓據郡反世祖以忌為持節都督嶺北諸軍事率衆討平之還除散騎常侍司徒左長史五年授雲麾將軍衛尉卿封東興縣侯邑六百戶及華皎稱兵上流高宗時為録尚書輔政盡命衆軍出討委忌總知中外城防諸軍事及皎平高宗即位太建元年授東陽太守改封樂安縣侯邑一千戶四年入為太府卿五年轉都官尚書吳明徹督衆軍北伐詔忌以本官監明徹軍淮南平授軍師將軍豫州刺史忌善於綏撫甚得民和改授使持節都督譙州諸軍事譙州刺史未及之官會明徹受詔進討彭汴以忌為都督與明徹掎角俱進呂梁軍敗陷于周周授上開府隋開皇十四年卒於長安時年七十三孫瑒字德璉吳郡吳人也祖文惠齊越騎校尉清遠太守父循道梁中散大夫以雅素知名瑒少倜儻好謀略博涉經史尤便書翰起家梁輕車臨川嗣王行參軍纍遷為安西邵陵王水曹中兵參軍事王出鎮郢州瑒盡室隨府甚被賞遇太清之難授假節宣猛將軍軍主王僧辨之討侯景也王琳為前軍琳與瑒同門乃表薦為戎昭將軍宜都太守仍從僧辨救徐文盛於武昌會郢州陷乃留軍鎮巴陵修戰守之備俄而侯景兵至日夜攻圍瑒督所部兵悉力拒戰賊衆奔退瑒從大軍沿流而下及克姑熟瑒力戰有功除員外散騎常侍封富陽縣侯邑一千戶尋授假節雄信將軍衡陽內史未及之官仍遷衡州平南府司馬破黃洞蠻賊有功除東莞太守行廣州刺史尋除智武將軍監湘州事敬帝嗣位授持節仁威將軍巴州刺史高祖受禪王琳立梁永嘉王蕭莊於郢州徵瑒為太府卿加通直散騎常侍及王琳入寇以瑒為使持節散騎常侍都督郢荊巴武湘五州諸軍事安西將軍郢州刺史總留府之任周遣大將史寧率衆四萬乘虛奄至瑒助防張世責貴舉外城以應之所失軍民男女三千餘口周軍又起土山高梯日夜攻逼因風縱火燒其內城南面五十餘樓時瑒兵不滿千人乘城拒守瑒親自撫巡行酒賦食士卒皆為之用命周人苦攻不能克乃矯授瑒柱國郢州刺史封萬戶郡公瑒僞許以緩之而潛修戰具樓雉器械一朝嚴設周人甚憚焉及聞大軍敗王琳乘勝而進周兵乃解瑒於是盡有中流之地集其將士而謂之曰吾與王公陳力協義同奬梁室亦已勤矣今時事如此天可違乎遂遣使奉表詣闕天嘉元年授使持節散騎常侍安南將軍湘州刺史封定襄縣侯邑一千戶瑒懷不自安乃固請入朝徵為散騎常侍中領軍未拜而世祖從容謂瑒曰昔朱買臣願為本郡卿豈有意乎仍改授持節安東將軍吳郡太守給鼓吹一部及將之鎮乘輿幸近畿餞送鄉里榮之秩滿徵拜散騎常侍中護軍鼓吹如故留異之反東陽詔瑒督舟師進討異平遷鎮右將軍常侍鼓吹竝如故頃之出為使持節安東將軍建安太守光大中以公事免尋起為通直散騎常侍高宗即位以瑒功名素著深委任焉太建四年授都督荊信二州諸軍事安西將軍荊州刺史出鎮公安瑒增修城池懷服邊遠為鄰境所憚居職六年又以事免更為通直散騎常侍及吳明徹軍敗呂梁授使持節督緣江水陸諸軍事鎮西將軍給鼓吹一部尋授散騎常侍都督荊郢巴武湘五州諸軍事郢州刺史持節將軍鼓吹竝如故十二年坐壃埸交通抵罪後主嗣位復除通直散騎常侍兼起部尚書尋除中護軍復爵邑入為度支尚書領步兵校尉俄加散騎常侍遷侍中祠部尚書後主頻幸其第及著詩賦述勳德之美展君臣之意焉又為五兵尚書領右軍將軍侍中如故以年老纍乞骸骨優詔不許禎明元年卒官時年七十二後主臨哭盡哀贈護軍將軍侍中如故給鼓吹一部朝服一具衣一襲喪事量加資給諡曰桓子瑒事親以孝聞於諸弟甚篤睦性通泰有財物散之親友其自居處頗失於奢豪庭院穿築極林泉之致歌鍾舞女當世罕儔賓客填門軒蓋不絶及出鎮郢州乃合十餘船為大舫於中立亭池植荷芰每良辰美景賓僚竝集泛長江而置酒亦一時之勝賞焉常於山齊設講肆集玄儒之士冬夏資奉為學者所稱而處己率易不以名位驕物時興皇寺朗法師該通釋典瑒每造講筵時有抗論法侶莫不傾心又巧思過人為起部尚書軍國器械多所創立有鑒識男女婚姻皆擇素貴及卒尚書令江總為其志銘後主又題銘後四十字遣左民尚書蔡徵宣敕就宅鐫之其詞曰秋風動竹煙水驚波幾人樵徑何處山阿今時日月宿昔綺羅天長路遠地久雲多功臣未勒此意如何時論以為榮瑒二十一子咸有父風世子讓早卒第二子訓頗知名歷臨湘令直閣將軍高唐太守陳亡入隋史臣曰在梁之季寇賊實繁高祖建義杖旗將寧區夏裴忌早識攀附每預戎麾推摧鋒却敵立功者數矣孫瑒有文武幹略見知時主及行軍用兵師司馬之法至於戰勝攻取屢著勳庸加以好施接物士咸慕向然性不循恆頻以罪免蓋亦陳湯之徒焉
