body:
  text: 陳書卷二十列傳第十四到仲舉韓子高華皎到仲舉字德言彭城武原人也祖坦齊中書侍郎父洽梁侍中仲舉無他藝業而立身耿正釋褐著作佐郎太子舍人王府主簿出為長城令政號廉平文帝居鄉里嘗詣仲舉時天陰雨仲舉獨坐齋內聞城外有簫鼓之聲俄而文帝至仲舉異之乃深自結託文帝又嘗因飲夜宿仲舉帳中忽有神光五采照于室內由是祇承益恭侯景之亂仲舉依文帝及景平文帝為吳興郡守以仲舉為郡丞與潁川庾持俱為文帝賓客文帝為宣毅將軍以仲舉為長史尋帶山陰令文帝嗣位授侍中參掌選事天嘉元年守都官尚書封寶安縣侯邑五百戶三年除都官尚書其年遷尚書右僕射丹陽尹參掌並如故尋改封建昌縣侯仲舉既無學術朝章非所長選舉引用皆出自袁樞性疏簡不干涉世務與朝士無所親狎但聚財酣飲而已六年秩滿解尹是時文帝積年寢疾不親御萬機尚書中事皆使仲舉斷決天康元年遷侍中尚書僕射參掌如故文帝疾甚入侍醫藥及文帝崩高宗受遺詔為尚書令入輔仲舉與左丞王暹中書舍人劉師知殷不佞等以朝望有歸乃遣不佞矯宣旨遣高宗還東府事發師知下北獄賜死暹不佞並付治乃以仲舉為貞毅將軍金紫光祿大夫初仲舉子郁尚文帝妹信義長公主官至中書侍郎出為宣城太守文帝配以士馬是年遷為南康內史以國哀未之任仲舉既廢居私宅與郁皆不自安時韓子高在都人馬素盛郁每乘小輿蒙婦人衣與子高謀子高軍主告言其事高宗收子高仲舉及郁並付廷尉詔曰到仲舉庸劣小才坐叨顯貴受任前朝榮寵隆赫父參王政子據大邦禮盛外姻勢均戚里而肆此驕暗凌百司遏密之初擅行國政排黜懿親欺蔑台衮韓子高蕞爾細微擢自卑末入參禁衛委以腹心蜂蠆有毒敢行反噬仲舉子高共為表𩹉陰構姦謀密為異計安成王朕之叔父親莫重焉受命導揚稟承顧託以朕沖弱屬當保祐家國安危事歸宰輔伊周之重物無異議將相舊臣咸知宗仰而率聚凶徒欲相掩襲屯據東城進逼崇禮規樹仲舉以執國權陵斥司徒意在專政潛結黨附方危社稷賴祖宗之靈姦謀顯露前上虞令陸昉等具告其事並有據驗并剋今月七日縱其凶謀領軍將軍明徹左衛將軍衛尉卿寶安及諸公等又並知其事二三舋迹彰於朝野反道背德事駭聞見今大憝克殲罪人斯得並可收付廷尉肅正刑書罪止仲舉父子及子高三人而已其餘一從曠蕩並所不問仲舉及郁並於獄賜死時年五十一郁諸男女以帝甥獲免韓子高會稽山陰人也家本微賤侯景之亂寓在京都景平文帝出守吳興子高年十六為總角容貌美麗狀似婦人於淮渚附部伍寄載欲還鄉文帝見而問之曰能事我乎子高許諾子高本名蠻子文帝改名之性恭謹勤於侍奉恆執備身刀及傳酒炙文帝性急子高恆會意旨及長稍習騎射頗有膽決願為將帥及平杜龕配以士卒文帝甚寵愛之未嘗離於左右文帝嘗夢見騎馬登山路危欲墮子高推捧而升文帝之討張彪也沈泰等先降文帝據有州城周文育鎮北郭香嚴巖寺張彪自剡縣夜還襲城文帝自北門出倉卒暗夕軍人擾亂文育亦未測文帝所在唯子高在側文帝乃遣子高自亂兵中往見文育反命酬答於暗中又往慰勞衆軍文帝散兵稍集子高引導入文育營因共立柵明日與彪戰彪將申縉復降彪奔松山浙東平文帝乃分麾下多配子高子高亦輕財禮士歸之者甚衆文帝嗣位除右軍將軍天嘉元年封文招縣子邑三百戶王琳至于柵口子高宿衛臺內及琳平子高所統益多將士依附之者子高盡力論進文帝皆任使焉二年遷員外散騎常侍壯武將軍成州刺史及征留異隨侯安都頓桃支嶺巖下時子高兵甲精鋭別御一營單馬入陳傷項之左一髻半落異平除假節貞毅將軍東陽太守五年章昭達等自臨川征晉安子高自安泉嶺會于建安諸將中人馬最為強盛晉安平以功遷通直散騎常侍進爵為伯增邑并前四百戶六年徵為右衛將軍至都鎮領軍府文帝不豫入侍醫藥廢帝即位遷散騎常侍右衛如故移頓于新安寺高宗入輔子高兵權過重深不自安好參訪臺閣又求出為衡廣諸鎮光大元年八月前上虞縣令陸昉及子高軍主告其謀反高宗在尚書省因召文武在位議立皇太子子高預焉平旦入省執之送廷尉其夕與到仲舉同賜死時年三十父延慶及子弟並原宥延慶因子高之寵官至給事中山陰令華皎晉陵暨陽人世為小吏皎梁代為尚書比部令史侯景之亂事景黨王偉高祖南下文帝為景所囚皎遇文帝甚厚景平文帝為吳興太守以皎為都録事軍府穀帛多以委之皎聰慧勤於簿領及文帝平杜龕仍配以人馬甲仗猶為都録事御下分明善於撫養時兵荒之後百姓飢饉皎解衣推食多少必均因稍擢為暨陽山陰二縣令文帝即位除開遠將車左軍將軍天嘉元年封懷仁縣伯邑四百戶王琳東下皎隨侯瑱拒之琳平鎮湓城知江州事時南州守宰多鄉里酋豪不遵朝憲文帝令皎以法馭之王琳奔散將卒多附於皎三年除假節通直散騎常侍仁武將軍新州刺史資監江州尋詔督尋陽太原高唐南北新蔡五郡諸軍事尋陽太守假節將軍州資監如故周迪謀反遣其兄子伏甲於船中偽稱賈人欲於湓城襲皎未發事覺皎遣人逆擊之盡獲其船仗其年皎隨都督吳明徹征迪迪平以功授散騎常侍平南將軍臨川太守進爵為侯增封并前五百戶未拜入朝仍授使持節都督湘巴等四州諸軍事湘州刺史常侍將軍如故皎起自下吏善營産業湘川地多所出所得並入朝廷糧運竹木委輸甚衆至于油蜜脯菜之屬莫不營辦又征伐川洞多致銅鼓生口並送于京師廢帝即位進號安南將軍改封重安縣侯食邑一千五百戶文帝以湘州出杉木舟使皎營造大艦金翅等二百餘艘并諸水戰之具欲以入漢及峽韓子高誅後皎內不自安繕甲聚徒厚禮所部守宰高宗頻命皎送大艦金翅等推遷不至光大元年密啓求廣州以觀時主意高宗偽許之而詔書未出皎亦遣使句引周兵又崇奉蕭巋為主士馬甚盛詔乃以吳明徹為湘州刺史實欲以輕兵襲之是時慮皎先發乃前遣明徹率衆三萬乘金翅直趨郢州又遣撫軍大將軍淳于量率衆五萬乘大艦以繼之又令假節冠武將軍楊文通別從安城成步道出茶陵又令巴山太守黃法慧別從宜陽出澧陵往掩襲出其不意并與江州刺史章昭達郢州刺史程靈洗等參謀討賊是時蕭巋遣水軍為皎聲援周武又遣其弟衛國公宇文直率衆屯魯山又遣其柱國長胡公拓跋定人馬三萬攻圍郢州蕭巋授皎司空巴州刺史戴僧朔衡陽內史任蠻奴巴陵內史潘智虔嶽陽太守章昭裕杜桂陽太守曹宣湘東太守錢明並隸於皎又長沙太守曹慶等本隸皎下因為之用帝恐上流宰守並為皎扇惑乃下詔曰賊皎輿皂微賤特逢奬擢任據藩牧屬當寵寄背斯造育興構姦謀樹立蕭氏盟約彰露鴆毒存心志危宗社扇結邊境驅逼士庶蟻聚巴湘豕突鄢郢逆天反地人神忿嫉征南將軍量安南將軍明徹郢州刺史靈洗受律專征備盡心力撫勞驍雄舟師俱進義烈爭奮凶惡奔殄獻捷相望重氛載廓言念泣罪思與惟新可曲赦湘巴二州凡厥為賊所逼制預在凶黨悉皆不問其賊主帥節相將並許開恩出首一同曠蕩先是詔又遣司空徐度與楊文通等自安成步出湘東以襲皎後時皎陳于巴州之白螺列舟艦與王師相持未決及聞徐度趨湘州乃率兵自巴郢因便風下戰淳于量吳明徹等募軍中小艦多賞金銀令先出當賊大艦受其拍賊艦發拍皆盡然後官軍以大艦拍之賊艦皆碎沒于中流賊又以大艦載薪因風放火俄而風轉自焚賊軍大敗皎乃與戴僧朔單舸走過巴陵不敢登城徑奔江陵拓跋定等無復船渡步趨巴陵巴陵城邑為官軍所據乃向湘州至水口不得濟食且盡詣軍請降俘獲萬餘人馬四千餘匹送于京師皎黨曹慶錢明潘智虔魯間席慧略等四十餘人並誅唯任蠻奴章昭裕曹宣劉廣業獲免戴僧朔吳郡錢塘人也有膂力勇健善戰族兄右將軍僧錫甚愛之僧錫年老征討恆使僧朔領衆平王琳有功僧錫卒仍代為南丹陽太守鎮採石從征留異侯安都於巖下出戰為賊斫傷僧朔單刀步援以功除壯武將軍北江州刺史領南陵太守又從征周迪有功遷巴州刺史假節將軍如故至是同皎為逆伏誅於江陵曹慶本王琳將蕭莊偽署左衛將軍吳州刺史部領亞於潘純琳敗文帝以配皎官至長沙太守錢明本高祖主帥後歷湘州諸郡守潘智虔純之子少有志氣年二十為巴陵內史魯間吳郡錢塘人席慧略安定人間本張彪主帥慧略王琳部下文帝皆配于皎官至郡守並伏誅章昭裕昭達之弟劉廣業廣德之弟曹宣高祖舊臣任蠻奴嘗有密啓於朝廷由是並獲宥史臣曰韓子高華皎雖復瓶筲小器輿臺末品文帝鑒往古之得人救當今之急弊達聰明目之術安黎和衆之宜寄以腹心不論胄閥皎早參近昵嘗預艱虞知其無隱賞以悉力有見信之誠非可疑之地皎據有上遊忠於文帝仲舉子高亦無爽於臣節者矣
