body:
  text: 陳書卷二十八列傳第二十二世祖九王高宗二十九王後主十一子世祖十三男沈皇后生廢帝始興王伯茂嚴淑媛生鄱陽王伯山晉安王伯恭潘容華生新安王伯固劉昭華生衡陽王伯信王充華生廬陵王伯仁張修容生江夏王伯義韓修華生武陵王伯禮江貴妃生永陽王伯智孔貴妃生桂陽王伯謀其伯固犯逆別有傳二男早卒本書無名始興王伯茂字鬱之世祖第二子也初高祖兄始興昭烈王道談仕於梁世為東宮直閣將軍侯景之亂領弩手二千援臺於城中中流矢卒紹泰太平二年追贈侍中使持節都督南六允州諸軍事南六允州刺史封義興郡公長城縣公諡曰昭烈高祖受禪重贈驃騎大將軍太傅揚州牧改封始興郡王邑二千戶王生世祖及高宗高宗以梁承聖末遷于關右至是高祖遙以高宗襲封始興嗣王以奉昭烈王祀永定三年六月高祖崩是月世祖入纂帝位時高宗在周未還世祖以本宗乏饗其年十月下詔曰日者皇基肇建封樹枝戚朕親地攸在特啓大邦弟頊嗣承門祀雖土宇開建薦饗莫由重以遭家不造閔凶夙遘儲二遐隔轊車未返猥以眇身膺茲景命式循龜鼎冰谷載懷今既入奉大宗事絶藩祼始興國廟蒸嘗無主瞻言霜露感尋慟絶其徙封嗣王頊為安成王封第二子伯茂為始興王以奉昭烈王祀賜天下為父後者爵一級庶申罔極之情永保山河之祚舊制諸王受封未加戎號者不置佐史於是尚書八座奏曰夫增崇徽號飾表車服所以闡彰厥德下變民望第二皇子新除始興王伯茂體自尊極神姿明穎玉映𧙳辰蘭芬綺歲清暉美譽日茂月升道鬱平河聲超袞植皇情追感聖性天深以本宗闕緒纂承藩嗣雖圭社是膺而戎章未襲豈所以光崇睿哲寵樹皇枝臣等參議宜加寧遠將軍置佐史詔曰可尋除使持節都督南琅邪彭城二郡諸軍事彭城太守天嘉二年進號宣惠將軍揚州刺史伯茂性聰敏好學謙恭下士又以太子母弟世祖深愛重之是時征北軍人於丹徒盜發晉郗曇墓大獲晉右將軍王羲之書及諸名賢遺跡事覺其書竝沒縣官藏于祕府世祖以伯茂好古多以賜之由是伯茂大工草隸甚得右軍之法三年除鎮東將軍開府儀同三司東揚州刺史廢帝即位時伯茂在都劉師知等矯詔出高宗也伯茂勸成之師知等誅後高宗恐伯茂扇動朝廷光大元年乃進號中衛將軍令入居禁中專與廢帝遊處是時四海之望咸歸高宗伯茂深不平日夕憤怨數肆惡言高宗以其無能不以為意及建安人蔣裕與韓子高等謀反伯茂竝陰豫其事二年十一月皇太后令黜廢帝為臨海王其日又下令曰伯茂輕薄爰自弱齡辜負嚴訓彌肆凶狡常以次居介弟宜秉國權不涯年德逾逞狂躁圖為禍亂扇動宮闈要招粗險觖望臺閣嗣君喪道由此亂階是諸凶德咸作謀主允宜罄彼司甸刑斯剭人言念皇支尚懷悲悶可特降為溫麻侯宜加禁止別遣就第不意如此言增泫歎時六門之外有別館以為諸王冠婚之所名為婚第至是命伯茂出居之於路遇盜殞于車中時年十八鄱陽王伯山字靜之世祖第三子也偉容儀舉止間雅喜慍不形於色世祖深器之初高祖時天下草創諸王受封儀注多闕及伯山受封世祖欲重其事天嘉元年七月丙辰尚書八座奏曰臣聞本枝惟允宗周之業以弘盤石既建皇漢之基斯遠故能協宣五運規範百王式固靈根克隆卜世第三皇子伯山發睿德於齠年表歧姿於丱日光昭丹掖暉映青闈而玉圭未秉金錫靡駕豈所以敦序維翰建樹藩戚臣等參議宜封鄱陽郡王詔曰可乃遣散騎常侍度支尚書蕭睿持節兼太宰告于太廟又遣五兵尚書王質持節兼太宰告于太社其年十月上臨軒策命之曰於戲夫建樹藩屏翼奬王室欽若前典咸必由之惟爾夙挺圭璋生知孝敬令德茂親僉譽所集啓建大邦實惟倫序是用敬遵民瞻錫此圭瑞往欽哉其勉樹聲業永保宗社可不慎歟策訖敕令王公已下竝宴於王第仍授東中郎將吳郡太守六年為緣江都督平北將軍南徐州刺史天康元年進號鎮北將軍高宗輔政不欲令伯山處邊光大元年徙為鎮東將軍東揚州刺史太建元年徵為中衛將軍中領軍六年又為征北將軍南徐州刺史尋為征南將軍江州刺史十一年入為護軍將軍加開府儀同三司仍給鼓吹並扶後主即位進號中權大將軍至德四年出為持節都督東揚豐二州諸軍事東揚州刺史加侍中餘竝如故禎明元年丁所生母憂去職明年起為鎮衛大將軍開府儀同三司給班劒十人三年正月薨時年四十伯山性寬厚美風儀又於諸王最長後主深敬重之每朝廷有冠婚饗宴之事恆使伯山為主及丁所生母憂居喪以孝聞後主嘗幸吏部尚書蔡徵宅因往弔之伯山號慟殆絶因起為鎮衛將軍仍謂羣臣曰鄱陽王至性可嘉又是西第之長豫章已兼司空其亦須遷太尉未及發詔而伯山薨尋值陳亡遂無贈諡長子君範太建中拜鄱陽國世子尋為貞威將軍晉陵太守未襲爵而隋師至是時宗室王侯在都者百餘人後主恐其為變乃竝召入令屯朝堂使豫章王叔英總督之而又陰為之備及六軍敗績相率出降因從後主入關至長安隋文帝竝配于隴右及河西諸州各給田業以處之初君範與尚書僕射江總友善至是總贈君範書五言詩以他鄉離別之意辭甚酸切當世文士咸諷誦之大業二年隋煬帝以後主第六女女婤為貴人絶愛幸因召陳氏子弟盡還京師隨才用由是竝為守宰遍於天下其年君範為溫令晉安王伯恭字肅之世祖第六子也天嘉六年立為晉安王尋為平東將軍吳郡太守置佐史時伯恭年十餘歲便留心政事官曹治理太建元年入為安前將軍中護軍遷中領軍尋為中衛將軍揚州刺史以公事免四年起為安左將軍尋為鎮右將軍特進給扶六年出為安南將軍南豫州刺史九年入為安前將軍祠部尚書十一年進號軍師將軍尚書右僕射十二年遷僕射十三年遷左僕射十四年出為安南將軍湘州刺史未拜至德元年為侍中中衛將軍光祿大夫丁所生母憂去職禎明元年起為中衛將軍右光祿大夫置佐史扶竝如故三年入關隋大業初為成州刺史太常卿衡陽王伯信字孚之世祖第七子也天嘉元年衡陽獻王昌自周還朝於道薨其年世祖立伯信為衡陽王奉獻王祀尋為宣惠將軍丹陽尹置佐史太建四年為中護軍六年為宣毅將軍揚州刺史尋加侍中散騎常侍十一年進號鎮前將軍太子詹事餘竝如故禎明元年出為鎮南將軍西衡州刺史三年隋軍濟江與臨汝侯方慶竝為東衡州刺史王勇所害事在方慶傳廬陵王伯仁字壽之世祖第八子也天嘉六年立為廬陵王太建初為輕車將軍置佐史七年遷冠軍將軍中領軍尋為平北將軍南徐州刺史十二年為翊左將軍中領軍禎明元年加侍中國子祭酒領太子中庶子三年入關卒于長安長子番先封湘濱侯隋大業中為資陽令江夏王伯義字堅之世祖第九子也天嘉六年立為江夏王太建初為宣惠將軍東揚州刺史置佐史尋為宣毅將軍持節散騎常侍都督合霍二州諸軍事合州刺史十四年徵為侍中忠武將軍金紫光祿大夫禎明三年入關遷于瓜州於道卒長子元基先封湘潭侯隋大業中為穀熟縣令武陵王伯禮字用之世祖第十子也天嘉六年立為武陵王太建初為雲旗將軍持節都督吳興諸軍事吳興太守在郡恣行暴掠驅録民下逼奪財貨前後委積百姓患之太建九年為有司所劾上曰王年少未達治道皆由佐史不能匡弼所致特降軍號後若更犯必致之以法有司不言與同罪十一年春被代徵還伯禮遂遷延不發其年十月散騎常侍御史中丞徐君敷奏曰臣聞車屨不俟君命之通規夙夜匪懈臣子之恆節謹案雲旗將軍持節都督吳興諸軍事吳興太守武陵王伯禮早擅英猷久馳令問惟良寄重枌鄉是屬聖上愛育黔黎留情政本共化求瘼早赴皇心遂復稽緩歸驂取移凉燠遲回去鷁空淹載路淑慎未彰違惰斯在繩愆檢迹以為懲誡臣等參議以見事免伯禮所居官以王還第謹以白簡奏聞詔曰可禎明三年入關隋大業中為散騎侍郎臨洮太守永陽王伯智字策之世祖第十二子也少敦厚有器局博涉經史太建中立為永陽王尋為侍中加明威將軍置佐史尋加散騎常侍纍遷尚書左僕射出為使持節都督東揚豐二州諸軍事平東將軍領會稽內史至德二年入為侍中翊左將軍加特進禎明三年入關隋大業中為岐州司馬遷國子司業桂陽王伯謀字深之世祖第十三子也太建中立為桂陽王七年為明威將軍置佐史尋為信威將軍丹陽尹十年加侍中出為持節都督吳興諸軍事東中郎將吳興太守十一年加散騎常侍至德元年薨子酆嗣大業中為番禾令高宗四十二男柳皇后生後主彭貴人生始興王叔陵曹淑華生豫章王叔英何淑儀生長沙王叔堅宜都王叔明魏昭容生建安王叔卿錢貴妃生河東王叔獻劉昭儀生新蔡王叔齊袁昭容生晉熙王叔文義陽王叔達新會王叔坦王姬生淮南王叔彪巴山王叔雄吳姬生始興王叔重徐姬生尋陽王叔儼淳于姬生嶽陽王叔慎王修華生武昌王叔虞韋修容生湘東王叔平施姬生臨賀王叔敖沅陵王叔興曾姬生陽山王叔宣楊姬生西陽王叔穆申婕妤生南安王叔儉南郡王叔澄嶽山王叔韶太原王叔匡袁姬生新興王叔純吳姬生巴東王叔謨劉姬生臨江王叔顯秦姬生新寧王叔隆新昌王叔榮其皇子叔睿叔忠叔引弘叔毅叔訓叔武叔處叔封等八人竝未及封叔陵犯逆別有傳三子早卒本書無名豫章王叔英字子烈高宗第三子也少寬厚仁愛天嘉元年封建安侯太建元年改封豫章王仍為宣惠將軍都督東揚州諸軍事東揚州刺史五年進號平北將軍南豫州刺史十一年為鎮前將軍江州刺史後主即位進號征南將軍尋加開府儀同三司中衛大將軍餘竝如故四年進號驃騎大將軍禎明元年給鼓吹一部班劒十人其年遷司空三年隋師濟江叔英知石頭軍戍事尋令入屯朝堂及六軍敗績降于隋將韓擒虎其年入關隋大業中為涪陵太守長子弘至德元年拜豫章國世子長沙王叔堅字子成高宗第四子也母本吳中酒家隸高宗微時嘗往飲遂與通及貴召拜淑儀叔堅少傑黠凶虐使酒尤好數術卜筮祝禁鎔金琢玉竝究其妙天嘉中封豐城侯太建元年立為長沙王仍為東中郎將吳郡太守四年為宣毅將軍江州刺史置佐史七年進號雲麾將軍郢州刺史未拜轉為平越中郎將廣州刺史尋為平北將軍合州刺史八年復為平西將軍郢州刺史十一年入為翊左將軍丹陽尹初叔堅與始興王叔陵竝招聚賓客各爭權寵甚不平每朝會鹵簿不肯為先後必分道而趨左右或爭道而鬬至有死者及高宗弗豫叔堅叔陵等竝從後主侍疾叔陵陰有異志乃命典藥吏曰切藥刀甚鈍可礪之及高宗崩倉卒之際又命其左右於外取劒左右弗悟乃取朝服所佩木劒以進叔陵怒叔堅在側聞之疑有變伺其所為及翌日小斂叔陵袖銼藥刀趨進斫後主中項後主悶絶于地皇太后與後主乳母樂安君吳氏俱以身捍之獲免叔堅自後扼叔陵擒之並奪其刀將殺之問後主曰即盡之為待也後主不能應叔陵舊多力須臾自奮得脫出雲龍門入于東府城召左右斷青溪橋道放東城囚以充戰士又遣人往新林追其所部兵馬仍自被甲著白布帽登城西門招募百姓是時衆軍竝緣江防守臺內空虛叔堅乃白太后使太子舍人司馬申以後主命召蕭摩訶令討之即日擒其將戴洫溫談騏驎等送臺斬于尚書閣下持其首徇于東城叔陵恇擾不知所為乃盡殺其妻妾率左右數百人走趨新林摩訶追之斬于丹陽郡餘黨悉擒其年以功進號驃騎將軍開府儀同三司揚州刺史尋遷司空將軍刺史如故是時後主患創不能視事政無小大悉委叔堅決之於是勢傾朝廷叔堅因肆驕縱事多不法後主由是疏而忌之孔範管斌施文慶之徒竝東宮舊臣日夜陰持其短至德元年乃詔令即本號用三司之儀出為江州刺史未發尋有詔又以為驃騎將軍重為司空實欲去其權勢叔堅不自安稍怨望乃為左道厭魅以求福助刻木為偶人衣以道士之服施機關能拜跪晝夜於日月下醮之祝詛於上其年冬有人上書告其事案驗竝實後主召叔堅囚于西省將殺之其夜令近侍宣敕數之以罪叔堅對曰臣之本心非有他故但欲求親媚耳臣既犯天憲罪當萬死臣死之日必見叔陵願宣明詔責於九泉之下後主感其前功乃赦之特免所居官以王還第尋起為侍中鎮左將軍二年又給鼓吹油幢車三年出為征西將軍荊州刺史四年進號中軍大將軍開府儀同三司禎明二年秩滿還都三年入關遷于瓜州更名叔賢叔賢素貴不知家人生産至是與妃沈氏酤酒以傭保為事隋大業中為遂寧郡太守建安王叔卿字子弼高宗第五子也性質直有材器容貌甚偉太建四年立為建安王授東中郎將東揚州刺史七年為雲麾將軍郢州刺史置佐史九年進號平南將軍湘州刺史後主即位進號安南將軍又為侍中鎮右將軍中書令遷中書監禎明三年入關隋大業中為都官郎上黨通守宜都王叔明字子昭高宗第六子也儀容美麗舉止和弱狀似婦人太建五年立為宜都王尋授宣惠將軍置佐史七年授東中郎將東揚州刺史尋為輕車將軍衛尉卿十三年出為使持節雲麾將軍南徐州刺史又為侍中翊右將軍至德四年進號安右將軍禎明三年入關隋大業中為鴻臚少卿河東王叔獻字子恭高宗第九子也性恭謹聰敏好學太建五年立為河東王七年授宣毅將軍置佐史尋為散騎常侍軍師將軍都督南徐州諸軍事南徐州刺史十二年薨年十三贈侍中中撫將軍司空諡曰康簡子孝寬嗣孝寬以至德元年襲爵河東王禎明三年入關隋大業中為汶城令新蔡王叔齊字子肅高宗第十一子也風彩明贍博涉經史善屬文太建七年立為新蔡王尋為智武將軍置佐史出為東中郎將東揚州刺史至德二年入為侍中將軍佐史如故禎明元年除國子祭酒侍中將軍佐史如故三年入關隋大業中為尚書主客郎晉熙王叔文字子才高宗第十二子也性輕險好虛譽頗涉書史太建七年立為晉熙王尋為侍中散騎常侍宣惠將軍置佐史進號輕車將軍揚州刺史至德元年授持節都督江州諸軍事江州刺史二年遷信威將軍督湘衡武桂四州諸軍事湘州刺史禎明二年秩滿徵為侍中宣毅將軍佐史如故未還而隋軍濟江破臺城隋漢東道行軍元帥秦王至于漢口時叔文自湘州還朝至巴州乃率巴州刺史畢寶等請降致書於秦王曰竊以天無二日晦明之序不差土無二王尊卑之位乃別今車書混一文軌大同敢披丹款申其屈膝秦王得書因遣行軍吏部柳莊與元帥府僚屬等往巴州迎勞叔文叔文於是與畢寶荊州刺史陳紀及文武將吏赴于漢口秦王竝厚待之置于賓館隋開皇九年三月衆軍凱旋文帝親幸溫湯勞之叔文與陳紀周羅荀法尚等並諸降人見于路次數日叔文從後主及諸王侯將相並乘輿服御天文圖籍等竝以次行列仍以鐵騎圍之隨晉王秦王等獻凱而入列于廟庭明日隋文帝坐于廣陽門觀叔文又從後主至朝堂南文帝使內史令李德林宣旨責其君臣不能相弼以致喪亡後主與其羣臣竝慙懼拜伏莫能仰視叔文獨欣然而有自得之志旬有六日乃上表曰昔在巴州已先送款乞知此情望異常例文帝雖嫌其不忠而方欲懷柔江表乃授開府拜宜州刺史淮南王叔彪字子華高宗第十三子也少聰惠善屬文太建八年立為淮南王尋位侍中仁威將軍置佐史禎明三年入關卒于長安始興王叔重字子厚高宗第十四子也性質朴無伎藝高宗崩始興王叔陵為逆誅死其年立叔重為始興王以奉昭烈王後至德元年為仁威將軍揚州刺史置佐史二年加使持節都督江州諸軍事江州刺史禎明三年入關隋大業中為太府少卿卒尋陽王叔儼字子思高宗第十五子也性凝重舉止方正後主即位立為尋陽王至德元年為侍中仁武將軍置佐史禎明三年入關尋卒嶽陽王叔慎字子敬高宗第十六子也少聰敏十歲能屬文太建十四年立為嶽陽王時年十一至德四年拜侍中智武將軍丹陽尹是時後主尤愛文章叔慎與衡陽王伯信新蔡王叔齊等日夕陪侍每應詔賦詩恆被嗟賞禎明元年出為使持節都督湘衡桂武四州諸軍事智武將軍湘州刺史三年隋師濟江破臺城前刺史晉熙王叔文還至巴州與巴州刺史畢寶荊州刺史陳紀竝降隋行軍元帥清河公楊素兵下荊門別遣其將龐暉將兵略地南至湘州城內將士莫有固志克日請降叔慎乃置酒會文武僚吏酒酣叔慎歎曰君臣之義盡於此乎長史謝基伏而流涕湘州助防遂興侯正理在坐乃起曰主辱臣死諸君獨非陳國之臣乎今天下有難實是致命之秋也縱其無成猶見臣節青門之外有死不能今日之機不可猶豫後應者斬衆咸許諾乃刑牲結盟仍遣人詐奉降書於龐暉暉信之克期而入叔慎伏甲待之暉令數百人屯于城門自將左右數十人入于廳事俄而伏兵發縛暉以徇盡擒其黨皆斬之叔慎坐于射堂招合士衆數日之中兵至五千人衡陽太守樊通武州刺史塢居業皆請赴難未至隋遣中牟公薛胄為湘州刺史聞龐暉死乃益請兵隋又遣行軍總管劉仁恩救之未至薛胄兵次鵝羊山叔慎遣正理及樊通等拒之因大合戰自旦至于日昃隋軍迭息迭戰而正理兵少不敵於是大敗胄乘勝入城生擒叔慎是時塢居業率其衆自武州來赴出橫橋江聞叔慎敗績乃頓于新康口隋總管劉仁恩兵亦至橫橋據水置營相持信宿因合戰居業又敗仁恩虜叔慎正理居業及其黨與十餘人秦王斬之于漢口叔慎時年十八義陽王叔達字子聰高宗第十七子也太建十四年立為義陽王尋拜仁武將軍置佐史禎明元年除丹陽尹三年入關隋大業中為內史至絳郡通守巴山王叔雄字子猛高宗第十八子也太建十四年立為巴山王禎明三年入關卒于長安武昌王叔虞字子安高宗第十九子也太建十四年立為武昌王尋為壯武將軍置佐史禎明三年入關隋大業中為高苑令湘東王叔平字子康高宗第二十子也至德元年立為湘東王禎明三年入關隋大業中為湖蘇令臨賀王叔敖字子仁高宗第二十一子也至德元年立為臨賀王尋為仁武將軍置佐史禎明三年入關隋大業初拜儀同三司陽山王叔宣字子通高宗第二十二子也至德元年立為陽山王禎明三年入關隋大業中為涇城令西陽王叔穆字子和高宗第二十三子也至德元年立為西陽王禎明三年入關卒于長安南安王叔儉字子約高宗第二十四子也至德元年立為南安王禎明三年入關卒于長安南郡王叔澄字子泉高宗第二十五子也至德元年立為南郡王禎明三年入關隋大業中為靈武令沅陵王叔興字子推高宗第二十六子也至德元年立為沅陵王禎明三年入關隋大業中為給事郎嶽山王叔韶字子欽高宗第二十七子也至德元年立為嶽山王尋為智武將軍置佐史四年除丹陽尹禎明三年入關卒于長安新興王叔純字子共高宗第二十八子也至德元年立為新興王禎明三年入關隋大業中為河北令巴東王叔謨字子軌高宗第二十九子也至德四年立為巴東王禎明三年入關隋大業中為岍陽令臨江王叔顯字子明高宗第三十子也至德四年立為臨江王禎明三年入關隋大業中為鶉觚令新會王叔坦字子開高宗第三十一子也至德四年立為新會王禎明三年入關隋大業中為涉令新寧王叔隆字子遠高宗第三十二子也至德四年立為新寧王禎明三年入關卒于長安新昌王叔榮字子徹高宗第三十三子也禎明二年立為新昌王三年入關隋大業中為內黃令太原王叔匡字子佐高宗第三十四子也禎明二年立為太原王三年入關隋大業中為壽光令後主二十二男張貴妃生皇太子深會稽王莊孫姬生吳興王胤高昭儀生南平王嶷呂淑媛生永嘉王彥邵陵王兢龔貴嬪生南海王虔錢塘王恬張淑華生信義王祗徐淑儀生東陽王恮孔貴人生吳郡王蕃其皇子總觀明綱統沖洽縚綽威辨十一人竝未及封皇太子深字承源後主第四子也少聰惠有志操容止儼然雖左右近侍未嘗見其喜慍以母張貴妃故特為後主所愛至德元年封始安王邑二千戶尋為軍師將軍揚州刺史置佐史禎明二年皇太子胤廢後主乃立深為皇太子三年隋師濟江六軍敗績隋將韓擒虎自南掖門入百僚逃散深時年十餘歲閉閣而坐舍人孔伯魚侍焉隋軍排閣而入深使宣令勞之曰軍旅在途不乃勞也軍人咸敬焉其年入關隋大業中為枹罕太守吳興王胤字承業後主長子也太建五年二月乙丑生于東宮母孫姬因産卒沈皇后哀而養之以為己子時後主年長未有胤嗣高宗因命以為嫡孫其日下詔曰皇孫初誕國祚方熙思與羣臣共同斯慶內外文武賜帛各有差為父後者賜爵一級十年封為永康公後主即位立為皇太子胤性聰敏好學執經肄業終日不倦博通大義兼善屬文至德三年躬出太學講孝經講畢又釋奠於先聖先師其日設金石之樂於太學王公卿士及太學生竝預宴是時張貴妃孔貴嬪竝愛幸沈皇后無寵而近侍左右數於東宮往來太子亦數使人至后所後主疑其怨望甚惡之而張孔二貴妃又日構成后及太子之短孔範之徒又於外合成其事禎明二年廢為吳興王仍加侍中中衛將軍三年入關卒于長安南平王嶷字承嶽後主第二子也方正有器局年數歲風采舉動有若成人至德元年立為南平王尋除信武將軍南琅邪彭城二郡太守置佐史遷揚州刺史進號鎮南將軍尋為使持節都督郢荊湘三州諸軍事征西將軍郢州刺史未行而隋軍濟江禎明三年入關卒于長安永嘉王彥字承懿後主第三子也至德元年立為永嘉王尋為忠武將軍南徐州刺史進號安南將軍授散騎常侍使持節都督江巴東衡三州諸軍事平南將軍江州刺史未行隋師濟江禎明三年入關隋大業中為襄武令南海王虔字承恪後主第五子也至德元年立為南海王尋為武毅將軍置佐史進號軍師將軍禎明二年出為平北將軍南徐州刺史三年入關隋大業中為涿令信義王祗字承敬後主第六子也至德元年立為信義王尋為壯武將軍置佐史授使持節都督智武將軍琅邪彭城二郡太守禎明三年入關隋大業中為通議郎邵陵王兢字承檢後主第七子也禎明元年立為邵陵王邑一千戶尋為仁武將軍置佐史三年入關隋大業中為國子監丞會稽王莊字承肅後主第八子也容貌蕞陋性嚴酷數歲左右有不如意輒剟刺其面或加燒爇以母張貴妃有寵後主甚愛之至德四年立為會稽王尋為翊前將軍置佐史除使持節都督揚州諸軍事揚州刺史禎明三年入關隋大業中為會昌隆令東陽王恮字承厚後主第九子也禎明二年立為東陽王邑一千戶未拜三年入關隋大業中為通議郎吳郡王蕃字承廣後主第十子也禎明二年封吳郡王三年入關隋大業中為涪城令錢塘王恬字承惔後主第十一子也禎明二年立為錢塘王邑一千戶三年入關卒于長安江左自西晉相承諸王開國竝以戶數相差為大小三品大國置上中下三將軍又置司馬一人次國置中下二將軍小國置將軍一人餘官亦准此為差高祖受命自永定訖于禎明唯衡陽王昌特加殊寵至五千戶自餘大國不過二千戶小國即千戶而舊史殘缺不能別知其國戶數故綴其遺事附于此史臣曰世祖高宗後主竝建藩屏以樹懿親固乃本根隆斯盤石鄱陽王伯山有風采德器亦一代令藩矣嶽陽王叔慎屬社稷傾危情哀家國竭誠赴敵志不圖生嗚呼古之忠烈致命斯之謂也
