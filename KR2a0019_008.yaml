body:
  text: 陳書卷八列傳第二杜僧明周文育子寶安侯安都杜僧明字弘照廣陵臨澤人也形眇小而膽氣過人有勇力善騎射梁大同中盧安興為廣州南江督護僧明與兄天合及周文育並為安興所啓請與俱行頻征俚獠有功為新州助防天合亦有材幹預在征伐安興死僧明復副其子子雄及交州土豪李賁反逐刺史蕭咨咨奔廣州臺遣子雄與高州刺史孫冏討賁時春草已生瘴癘方起子雄請待秋討之廣州刺史新渝侯蕭映不聽蕭咨又促之子雄等不得已遂行至合浦死者十六七衆並憚役潰散禁之不可乃引其餘兵退還蕭咨啓子雄及冏與賊交通逗留不進梁武帝勑於廣州賜死子雄弟子略子烈並雄豪任俠家屬在南江天合謀於衆曰盧公纍代待遇我等亦甚厚矣今見枉而死不能為報非丈夫也我弟僧明萬人之敵若圍州城召百姓誰敢不從城破斬二侯祭孫盧然後待臺使至束手詣廷尉死猶勝生縱其不捷亦無恨矣衆咸慷慨曰是願也唯足下命之乃與周文育等率衆結盟奉子雄弟子略為主以攻刺史蕭映子略頓城南天合頓城北僧明文育分據東西吏人並應之一日之中衆至數萬高祖時在高要聞事起率衆來討大破之殺天合生擒僧明及文育等高祖並釋之引為主帥高祖征交址及討元景仲僧明文育並有功侯景之亂俱隨高祖入援京師高祖於始興破蘭裕僧明為前鋒擒裕斬之又與蔡路養戰於南野僧明馬被傷高祖馳往救之以所乘馬授僧明僧明乘馬與數十人復進衆皆披靡因而乘之大敗路養高州刺史李遷仕又據大皋入贛石以逼高祖高祖遣周文育為前軍與僧明擊走之遷仕與寧都人劉孝尚併力將襲南康高祖又令僧明與文育等拒之相持連戰百餘日卒擒遷仕送于高祖軍及高祖下南康留僧明頓西昌督安成廬陵二郡軍事元帝承制授假節清野將軍新州刺史臨江縣子邑三百戶侯景遣于慶等寇南江高祖頓豫章會命僧明為前驅所向克捷高祖表僧明為長史仍隨東討軍至蔡州洲僧明率麾下燒賊水門大艦及景平以功除員外散騎常侍明威將軍南六允州刺史進爵為侯增邑並前五百戶仍領晉陵太守承聖二年從高祖北圍廣陵加使持節遷通直散騎常侍平北將軍餘如故荊州陷高祖使僧明率吳明徹等隨侯瑱西援於江州病卒時年四十六贈散騎常侍諡曰威世祖即位追贈開府儀同三司天嘉二年配享高祖廟庭子晉嗣周文育字景德義興陽羡人也少孤貧本居新安壽昌縣姓項氏名猛奴年十一能反覆遊水中數里跳高五六尺與羣兒聚戲衆莫能及義興人周薈為壽昌浦口戍主見而奇之因召與語文育對曰母老家貧兄姊並長大困於賦役薈哀之乃隨文育至家就其母請文育養為己子母遂與之及薈秩滿與文育還都見於太子詹事周捨請製名字捨因為立名文育字景德命兄子弘讓教之書計弘讓善隸書寫蔡雍勸學及古詩以遺文育文育不之省也謂弘讓曰誰能學此取富貴但有大槊耳弘讓壯之教之騎射文育大悅司州刺史陳慶之與薈同郡素相善啓薈為前軍軍主慶之使薈將五百人往新蔡懸瓠慰勞白水蠻蠻謀執薈以入魏事覺薈與文育拒之時賊徒甚盛一日之中戰數十合文育前鋒陷陳勇冠軍中薈於陳戰死文育馳取其尸賊不敢逼及夕各引去文育身被九創創愈辭請還葬慶之壯其節厚加賵遺而遣之葬訖會盧安興為南江督護啓文育同行纍征俚獠所在有功除南海令安興死後文育與杜僧明攻廣州為高祖所敗高祖赦之語在僧明傳後監州王勱以文育為長流令深被委任勱被代文育欲與勱俱下至大庾嶺詣卜者卜者曰君北下不過作令長南入則為公侯文育曰足錢便可誰望公侯卜人又曰君須臾當暴得銀至二千兩若不見信以此為驗其夕宿逆旅有賈人求與文育博文育勝之得銀二千兩旦日辭勱勱問其故文育以告勱乃遣之高祖在高要聞其還也大喜遣人迎之厚加賞賜分麾下配焉高祖之討侯景文育與杜僧明為前軍克蘭裕援歐陽頠皆有功高祖破蔡路養於南野文育為路養所圍四面數重矢石雨下所乘馬死文育右手搏戰左手解鞍潰圍而出因與杜僧明等相得並力復進遂大敗之高祖乃表文育為府司馬李遷仕之據大臯遣其將杜平虜入贛石魚梁作城高祖命文育擊之平虜棄城走文育據其城遷仕聞平虜敗留老弱於大臯悉選精兵自將以攻文育其鋒甚鋭軍人憚之文育與戰遷仕稍却相持未解會高祖遣杜僧明來援別破遷仕水軍遷仕衆潰不敢過大臯直走新淦梁元帝授文育假節雄信將軍義州刺史遷仕又與劉孝尚謀拒義軍高祖遣文育與侯安都杜僧明徐度杜稜築城於白口拒之文育頻出與戰遂擒遷仕高祖發自南康遣文育將兵五千開通江路侯景將王伯醜據豫章文育擊走之遂據其城纍前後功除遊騎將軍員外散騎常侍封東遷縣侯邑五百戶高祖軍至白茅灣命文育與杜僧明常為軍鋒平南陵鵲頭諸城及至姑熟與景將侯子鑒戰破之景平授通直散騎常侍改封南移縣侯邑一千戶拜信義太守纍遷南丹陽蘭陵晉陵太守智武將軍散騎常侍高祖誅王僧辨命文育督衆軍會世祖於吳興圍杜龕克之又濟江襲會稽太守張彪得其郡城及世祖為彪所襲文育時頓城北香巖寺世祖夜往趨之因共立柵頃之彪又來攻文育悉力苦戰彪不能克遂破平彪高祖以侯瑱擁據溫江州命文育討之仍除都督南豫州諸軍之事武威將軍南豫州刺史率兵襲湓城未克徐嗣徽引齊寇渡江據蕪湖詔徵文育還京嗣徽等列艦於青墩至於七磯以斷文育歸路及夕文育鼓噪而發嗣徽等不能制至旦反攻嗣徽嗣徽驍將鮑砰獨以小艦殿軍文育乘單舴艋與戰跳入艦斬砰仍牽其艦而還賊衆大駭因留船蕪湖自丹陽步上時高祖拒嗣徽於白城適與文育大會將戰風急高祖曰兵不逆風文育曰事急矣當決之何用古法抽槊上馬馳而進衆軍從之風亦尋轉殺傷數百人嗣徽等移營莫府山文育徙頓對之頻戰功最加平西將軍進爵壽昌縣公並給鼓吹一部廣州刺史蕭勃舉兵踰嶺詔文育督衆軍討之時新吳洞主余孝頃奉舉兵應勃遣其弟孝勱守郡城自出豫章據于石頭勃使其子孜將兵與孝頃相會又遣其別將歐陽頠頓軍苦竹灘傅泰據咵口城以拒官軍官軍船少孝頃有舴艋三百艘艦百餘乘在上牢文育遣軍主焦僧度羊柬潛軍襲之悉取而歸仍於豫章立柵時官軍食盡並欲退還文育不許乃使人間行遺周迪書約為兄弟並陳利害迪得書甚喜許饋糧餉於是文育分遣老小乘故船舫沿流俱下燒豫章郡所立柵偽退孝頃望之大喜因不設備文育由間道兼行信宿達芊韶芊韶上流則歐陽頠蕭勃下流則傅泰余孝頃文育據其中間築城饗士賊徒大駭歐陽頠乃退入泥溪作城自守文育遣嚴威將軍周鐵武與長史陸山才襲頠擒之於是盛陳兵甲與頠乘舟而宴以巡傅泰城下因而攻泰克之蕭勃在南康聞之衆皆股栗莫能自固其將談世遠斬勃欲降為人所害世遠軍主夏侯明徹持勃首以降蕭孜余孝頃猶據石頭高祖遣侯安都助文育攻之孜降文育孝頃退走新吳廣州平文育還頓豫章以功授鎮南將軍開府儀同三司都督江廣衡交等州諸軍事江州刺史王琳擁據上流詔命侯安都為西道都督文育為南道都督同會武昌與王琳戰於沌口為琳所執後得逃歸語在安都傳尋授使持節散騎常侍鎮南將軍開府儀同三司壽昌縣公給鼓吹一部及周迪破余孝頃孝頃子公揚弟孝勱猶據舊柵扇動南土高祖復遣文育及周迪黃法等討之豫章內史熊曇朗亦率軍來會衆且萬人文育遣吳明徹為水軍配周迪運糧自率衆軍入象牙江城於金口公揚領五百人偽降謀執文育事覺文育囚之送于京師以其部曲分隸衆軍乃捨舟為步軍進據三陂王琳遣將曹慶帥兵二千人以救孝勱慶分遣主帥常衆愛與文育相拒自帥所領徑攻周迪吳明徹軍迪等敗績文育退據金口熊曇朗因其失利謀害文育以應衆愛文育監軍孫白象頗知其事勸令先之文育曰不可我舊兵少客軍多若取曇朗人人驚懼亡立至矣不如推心以撫之初周迪之敗也棄船走莫知所在及得迪書文育喜仭示曇朗曇朗害之於座時年五十一高祖聞之即日舉哀贈侍中司空諡曰忠愍初文育之據三陂有流星墜地其聲如雷地陷方一丈中有碎炭數斗又軍市中忽聞小兒啼一市並驚聽之在土下軍人掘得棺長三尺文育惡之俄而迪敗文育見殺天嘉二年有詔配享高祖廟庭子寶安嗣文育本族兄景曜因文育官至新安太守寶安字安民年十餘歲便習騎射以貴公子驕蹇遊逸好狗馬樂馳騁靡衣偷食文育之為晉陵以征討不遑之郡令寶安監知郡事尤聚惡少年高祖患之及文育西征敗績縶於王琳寶安便折節讀書與士君子遊綏御文育士卒甚有威惠除員外散騎侍郎文育歸復除貞威將軍吳興太守文育為熊曇朗所害徵寶安還起為猛烈將軍領其舊兵仍令南討世祖即位深器重之寄以心膂精卒利兵多配焉及平王琳頗有功周迪之破熊曇朗寶安南入窮其餘燼天嘉二年重除雄信將軍吳興太守襲封壽昌縣公三年征留異為侯安都前軍異平除給事黃門侍郎衛尉卿四年授持節都督南徐州諸軍事貞毅將軍南徐州刺史徵為左衛將軍加信武將軍尋以本官領衛尉卿又進號仁威將軍天康元年卒時年二十九贈侍中左衛將軍諡曰成子祀嗣寶安卒後祀亦為偏將征歐陽紇平定淮南並有功封江安縣伯邑四百戶歷晉陵定遠二郡太守太建九年卒時年二十四贈電威將軍侯安都字成師始興曲江人也世為郡著姓父文捍少仕州郡以忠謹稱安都貴後官至光祿大夫始興內史秩中二千石安都工隸書能鼓琴涉獵書傳為五言詩亦頗清靡兼善騎射為邑里雄豪梁始興內史蕭子範辟為主簿侯景之亂招集兵甲至三千人高祖入援京邑安都引兵從高祖攻蔡路養破李遷仕克平侯景並力戰有功元帝授猛烈將軍通直散騎常侍富川縣子邑三百戶隨高祖鎮京口除蘭陵太守高祖謀襲王僧辨諸將莫有知者唯與安都定計仍使安都率水軍自京口趨石頭高祖自率馬步從江乘羅落會之安都至石頭北棄舟登岸僧辨弗之覺也石頭城北接岡阜雉堞不甚危峻安都被甲帶長刀軍人捧之投於女垣內衆隨而入進逼僧辨臥室高祖大軍亦至與僧辨戰于聽事前安都自內閣出腹背擊之遂擒僧辨紹泰元年以功授使持節散騎常侍都督南徐州諸軍事仁威將軍南徐州刺史高祖東討杜龕安都留臺居守徐嗣徽任約等引齊寇入據石頭遊騎至于闕下安都閉門偃旗幟示之以弱令城中曰登陴看賊者斬及夕賊收軍還石頭安都夜令士卒密營禦敵之具將旦賊騎又至安都率甲士三百人開東西掖門與戰大敗之賊乃退還石頭不敢復逼臺城及高祖至以安都為水軍於中流斷賊糧運又襲秦郡破嗣徽柵收其家口並馬驢輜重得嗣徽所彈琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等見之大懼尋而請和高祖聽其還北及嗣徽等濟江齊之餘軍猶據採石守備甚嚴又遣安都攻之多所俘獲明年春詔安都率兵鎮梁山以備齊徐嗣徽等復入丹陽至湖熟高祖追安都還率馬步拒之於高橋又戰於耕壇南安都率十二騎突其陳破之生擒齊儀同乞伏無勞又刺齊將東方老墮馬會賊騎至救老獲免賊北渡蔣山安都又與齊將王敬寶戰於龍尾使從弟曉軍主張纂前犯其陳曉被槍墜馬張纂死之安都馳往救曉斬其騎士十一人因取纂尸而還齊軍不敢逼高祖與齊軍戰於莫府山命安都領步騎千餘人自白下橫擊其後齊軍大敗安都又率所部追至攝山俘獲首虜不可勝計以功進爵為侯增邑五百戶給鼓吹一部又進號平南將軍改封西江縣公仍都督水軍出豫章助豫州刺史周文育討蕭勃安都未至文育已斬勃並擒其將歐陽頠傅泰等唯余孝頃與勃子孜猶據豫章之石頭作兩城孝頃與孜各據其一又多設船艦夾水而陳安都至乃銜枚夜燒其艦文育率水軍安都領步騎登岸結陳孝頃俄斷後路安都乃令軍士多伐松木竪柵列營漸進頻戰屢克孜乃降孝頃奔歸新吳請入子為質許之師還以功進號鎮北將軍加開府儀同三司仍率衆會於武昌與周文育西討王琳將發王公已下餞於新林安都躍馬渡橋人馬俱墮水中又坐咨內墜於櫓井時以為不祥至武昌琳將樊猛棄城走文育亦自豫章至時兩將俱行不相統攝因部下交爭稍不平軍至郢州琳將潘純於城中遙射官軍安都怒進軍圍之未能克而王琳至于弇口安都乃釋郢州悉衆往沌口以禦之遇風不得進琳據東岸官軍據西岸相持數日乃合戰安都等敗績安都與周文育徐敬成並為琳所囚琳總以一長鎖繫之置于咨下令所親宦者王子晉掌視之琳下至湓城白水浦安都等甘言許厚賂子晉子晉乃偽以小船依咨而釣夜載安都文育敬成上岸入深草中步投官軍還都自劾詔並赦之復其官爵尋為丹陽尹出為都督南豫州諸軍事鎮西將軍南豫州刺史令繼周文育攻余孝勱及王琳將曹慶常衆愛等安都自宮亭湖出松門躡衆愛後文育為熊曇朗所害安都回取大艦值琳將周炅周協南歸與戰破之生擒炅協孝勱弟孝猷率部下四千家欲就王琳遇炅協敗乃詣安都降安都又進軍於禽奇洲破曹慶常衆愛等焚其船艦衆愛奔于廬山為村人所殺餘衆悉平還軍至南皖而高祖崩安都隨世祖還朝仍與羣臣定議翼奉世祖時世祖謙讓弗敢當太后又以衡陽王故未肯下令羣臣猶豫不能決安都曰今四方未定何暇及遠臨川王有功天下須共立之今日之事後應者斬便按劒上殿白太后出璽又手解世祖髮推就喪次世祖即位遷司空仍為都督南徐州諸軍事征北將軍南徐州刺史給扶王琳下至柵口大軍出頓蕪湖時侯瑱為大都督而指麾經略多出安都天嘉元年增邑千戶及王琳敗走入齊安都進軍湓城討琳餘黨所向皆下仍別奉中旨迎衡陽獻王昌初昌之將入也致書於世祖辭甚不遜世祖不懌乃召安都從容而言曰太子將至須別求一蕃吾其老焉安都對曰自古豈有被代天子臣愚不敢奉詔因請自迎昌昌濟漢而薨以功進爵清遠郡公邑四千戶自是威名甚重羣臣無出其右安都父文捍為始興內史卒於官世祖徵安都還京師為發喪尋起復本官贈其父散騎常侍金紫光祿大夫拜其母為清遠國太夫人仍迎還都母固求停鄉里上乃下詔改桂陽之汝城縣為廬盧陽郡分衡州之始興安遠二郡合三郡為東衡州以安都從弟曉為刺史安都第三子祕年九歲上以為始興內史並令在鄉侍養其年改封安都桂陽郡公王琳敗後周兵入據巴湘安都奉詔西討及留異擁據東陽又奉詔東討異本謂臺軍由錢塘江而上安都乃步由會稽之諸暨出于永康異大恐奔桃枝嶺處嶺谷間於巖口豎柵以拒王師安都作連城收攻異躬自接戰為流矢所中血流至踝安都乘輿麾軍容止不變因其山壠之勢迮而為堰天嘉三年夏潦水漲滿安都引船入堰起樓艦與異城等放拍碎其樓雉異與第二子忠臣脫身奔晉安安都虜其妻子盡收其人馬甲仗振旅而歸以功加侍中征北大將軍增邑並前五千戶仍還本鎮其年使吏民詣闕表請立碑頌美安都功績詔許之自王琳平後安都勳庸轉大又自以功安社稷漸用驕矜數招聚文武之士或射馭馳騁或命以詩賦第其高下以差次賞賜之文士則褚介玠馬樞陰鏗張正見徐伯陽劉刪祖孫登武士則蕭摩訶裴子烈等並為之賓客齋內動至千人部下將帥多不遵法度檢問收攝則奔歸安都世祖性嚴察深銜之安都弗之改日益驕橫每有表啓封訖有事未盡乃開封自書之云又啓某事及侍宴酒酣或箕踞傾倚嘗陪樂遊禊飲乃白帝曰何如作臨川王時帝不應安都再三言之帝曰此雖天命抑亦明公之力宴訖又啓便借供帳水飾將載妻妾於御堂歡會世祖雖許其請甚不懌明日安都坐於御坐賓客居羣臣位稱觴上壽初重雲殿災安都率將士帶甲入殿帝甚惡之自是陰為之備又周迪之反朝望當使安都討之帝乃使吳明徹討迪又頻遣臺使案問安都部下檢括亡叛安都內不自安三年冬遣其別駕周弘實自託於舍人蔡景歷並問省中事景歷録其狀具奏之希旨稱安都謀反世祖慮其不受制明年春乃除安都為都督江吳二州諸軍事征南大將軍江州刺史自京口還都部伍入于石頭世祖引安都宴於嘉德殿又集其部下將帥會于尚書朝堂於坐收安都囚于嘉德西省又收其將帥盡奪馬仗而釋之因出舍人蔡景歷表以示於朝乃詔曰昔漢厚功臣韓彭肇亂晉倚蕃牧敦約稱兵託六尺於龐萌野心竊發寄股肱於霍禹凶謀潛構追惟往代挻逆一揆永言自古患難同規侯安都素乏遙圖本慙令德幸屬興運預奉經綸拔迹行間假之毛羽推於偏帥委以馳逐位極三槐任居四嶽名器隆赫禮數莫儔而志唯矜己氣在陵上招聚逋逃窮極輕狡無賴無行不畏不恭受脤專征剽掠一逞推轂所鎮裒斂無厭寄以徐蕃接鄰齊境遷禁貨鬻賣居民推椎埋發掘毒流泉壤睚眥僵尸罔顧彝憲朕以爰初締構頗著功績飛驂代邸預定嘉謀所以淹抑有司每懷遵養杜絶百辟日望自新發襟期於話言推丹赤於造次策馬甲第羽林息警置酒高堂陛無衛何嘗內隱片嫌去柏人而勿宿外協猜防入成皋而不留而勃戾不悛驕暴滋甚招誘文武密懷異圖去年十二月十一日獲中書舍人蔡景歷啓稱侯安都去月十日遣別駕周弘實來景歷私省宿訪問禁中具陳反計朕猶加隱忍待之如初爰自北門遷授南服受命經停姦謀益露今者欲因初鎮將行不軌此而可忍孰不可容賴社稷之靈近侍誠醜情彰暴逆節顯聞外可詳案舊典速正刑書止在同謀餘無所問明日於西省賜死時年四十四尋有詔宥其妻子家口葬以士禮喪事所須務加資給初高祖在京城嘗與諸將宴杜僧明周文育侯安都為壽各稱功伐高祖曰卿等悉良將也而並有所短杜公志大而識暗狎於下而驕於尊矜其功不收其拙周侯交不擇人而推心過差居危履險猜防不設侯郎誕而無輕佻而肆志並非全身之道卒皆如其言安都長子敦年十二為員外散騎侍郎天嘉二年墮馬卒追諡桂陽國愍世子太建三年高宗追封安都為陳集縣侯邑五百戶子亶為嗣安都從弟曉纍從安都征討有功官至員外散騎常侍明威將軍東衡州刺史懷化縣侯邑五百戶天嘉三年卒年四十一史臣曰杜僧明周文育並樹功業成於興運頗牧韓彭足可連類矣侯安都情異向時權踰曩日因之以侵暴加之以縱誕苟曰非夫逆亂奚用免於亡滅昔漢高醢之為賜宋武拉於坐右良有以而然也
