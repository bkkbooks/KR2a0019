body:
  text: 陳書卷六本紀第六後主後主諱叔寶字元秀小字黃奴高宗嫡長子也梁承聖二年十一月戊寅生于江陵明年江陵陷高宗遷關右留後主于穰城天嘉三年歸京師立為安成王世子天康元年授寧遠將軍置佐史光大二年為太子中庶子尋遷侍中餘如故太建元年正月甲午立為皇太子十四年正月甲寅高宗崩乙卯始興王叔陵作逆伏誅丁巳太子即皇帝位于太極前殿詔曰上天降禍大行皇帝奄棄萬國攀號擗踊無所迨及朕以哀煢嗣膺寶歷若涉巨川罔知攸濟方賴羣公用匡寡薄思播遺德覃被億兆凡厥遐邇咸與惟新可大赦天下在位文武及孝悌力田為父後者並賜爵一級孤老魚眾寡不能自存者賜穀人五斛帛二匹癸亥以侍中翊前將軍丹陽尹長沙王叔堅為驃騎將軍開府儀同三司揚州刺史右衞將軍蕭摩訶為車騎將軍南徐州刺史鎮西將軍荊州刺史樊毅進號征西將軍平南將軍豫州刺史任忠進號鎮南將軍護軍將軍沈恪為特進金紫光祿大夫平西將軍魯廣達進號安西將軍仁武將軍豐州刺史章大寶為中護軍乙丑尊皇后為皇太后宮曰弘範景寅以冠軍將軍晉熙王叔文為宣惠將軍丹陽尹丁卯立弟叔重為始興王奉昭烈王祀己巳立妃沈氏為皇后辛未立皇弟叔儼為尋陽王皇弟叔慎為岳陽王皇弟叔達為義陽王皇弟叔熊為巴山王皇弟叔虞為武昌王壬申侍中中權將軍開府儀同三司鄱陽王伯山進號中權大將軍軍師將軍尚書左僕射晉安王伯恭進號翊前將軍侍中翊右將軍中領軍廬陵王伯仁進號安前將軍鎮南將軍江州刺史豫章王叔英進號征南將軍平南將軍湘州刺史建安王叔卿進號安南將軍以侍中中書監安右將軍徐陵為左光祿大夫領太子少傅甲戌設無大會於太極前殿三月辛亥詔曰躬推為勸義顯前經力農見賞事昭往誥斯乃國儲是資民命攸屬豐儉隆替靡不由之夫入賦自古輸藁惟舊沃饒貴于十金磽确至於三易腴塉既異盈縮不同詐偽日興簿書歲改稻田使者著自西京不實峻刑聞諸東漢老農懼於祇應俗吏因以侮文輟耒成羣游手為伍永言妨蠹良可太息今陽和在節膏澤潤下宜展春耨以望秋坻其有新闢塍畎進墾蒿萊廣袤勿得度量征租悉皆停免私業久廢咸許占作公田荒縱亦隨肆勤儻良守教耕淳民載酒有茲督課議以賞擢外可為格班下稱朕意焉癸亥詔曰夫體國經野長世字氓雖因革儻殊弛張或異至於旁求俊乂爰逮側微用適和羹是隆大厦上智中主咸由此術朕以寡薄嗣膺景祚雖哀疚在躬情慮惽舛而宗社任重黎庶務殷無由自安拱默敢忘康濟思所以登顯髦彥式備周行但空勞宵夢屢勤史卜五就莫來八能不至是用甲申旦凝慮景夜損懷豈以食玉炊桂無因自達將懷寶迷邦咸思獨善應內外衆官九品已上可各薦一人以會彙征之旨且取備實難舉長或易小大之用明言所施勿得南箕北斗名而非實其有負能仗氣擯壓當時著賓戲以自憐草客嘲以慰志人生一世逢遇誠難亦宜去此幽谷翔茲天路趨銅以觀國望金馬而來庭便當隨彼方圓飭之矩矱又詔曰昔睿后宰民哲王御𧜛雖德稱汪濊明能普燭猶復紆己乞言降情訪道高咨岳牧下聽輿臺故能政若神明事無悔吝朕纂承丕緒思隆大業常懼九重已邃四聰未廣欲聽昌言不疲痺足若逢廷折無憚批鱗而口柔之辭儻聞於在位腹誹之意或隱於具僚非所以弘理至公緝熙帝載者也內外卿士文武衆司若有智周政術心練治體救民俗之疾苦辯禁網之疎密者各進忠讜無所隱諱朕將虛己聽受擇善而行庶深鑒物情匡我王度己巳以侍中尚書左僕射新除翊前將軍晉安王伯恭為安南將軍湘州刺史新除翊左將軍永陽王伯智為尚書僕射中護軍章大寶為豐州刺史夏四月景申立皇子永康公胤為皇太子賜天下為父後者爵一級王公已下賚帛各有差庚子詔曰朕臨御區宇撫育黔黎方欲康濟澆薄蠲省繁費奢僭乖衷實宜防斷應鏤金銀薄及庶物化生土木人綵花之屬及布帛幅尺短狹輕疎者竝傷財廢業尤成蠹患又僧尼道士挾邪左道不依經律民間淫祀祅書諸珍怪事詳為條制竝皆禁絕癸卯詔曰中歲克定淮泗爰涉青徐彼土酋豪竝輸罄誠款分遣親戚以為質任今舊土淪陷復成異域南北阻遠未得會同念其分乖殊有愛戀夷狄吾民斯事一也何獨譏禁使彼離析外可即檢任子館及東館並帶保任在外者竝賜衣糧頒之酒食遂其鄉路所之阻遠便發遣船仗衛送必令安達若已預仕宦及別有事義不欲去者亦隨其意六月癸酉朔以明威將軍通直散騎常侍孫瑒為中護軍秋七月辛未大赦天下是月江水色赤如血自京師至于荊州八月癸未夜天有聲如風水相撀乙酉夜亦如之景戌以使持節都督緣江諸軍事安西將軍魯廣達為安左將軍九月景午設無大會於太極殿捨身及乘輿御服大赦天下辛亥夜天東北有聲如蟲飛漸移西北乙卯太白晝見景寅以驃騎將軍開府儀同三司揚州刺史長沙王叔堅為司空征南將軍江州刺史豫章王叔英即本號開府儀同三司至德元年春正月壬寅詔曰朕以寡薄嗣守鴻基哀惸切慮疹恙纏織訓俗少方臨下靡筭懼甚踐冰慄同馭朽而四氣易流三光遄至纓紱列陛玉帛充庭具物匪新節序疑舊緬思前德永慕昔辰對軒闥而哽心顧扆筵而慓氣思所以仰遵遺構俯勵薄躬陶鑄九流休息百姓用弘寬簡取叶陽和可大赦天下改太建十五年為至德元年以征南將軍江州刺史新除開府儀同三司豫章王叔英為中衞大將軍驃騎將軍開府儀同三司揚州刺史長沙王叔堅為江州刺史征東將軍開府儀同三司東揚州刺史司馬消難進號車騎將軍宣惠將軍丹陽尹晉熙王叔文為揚州刺史鎮南將軍南豫州刺史任忠為領軍將軍安左將軍魯廣達為平南將軍南豫州刺史祠部尚書江總為吏部尚書癸卯立皇子深為始安王二月丁丑以始興王叔重為揚州刺史夏四月戊辰交州刺史李幼榮獻馴象己丑以前輕車將軍揚州刺史晉熙王叔文為江州刺史秋八月丁卯以驃騎將軍開府儀同三司長沙王叔堅為司空九月丁巳天東南有聲如蟲飛冬十月丁酉立皇弟叔平為湘東王叔敖為臨賀王叔宣為陽山王叔穆為西陽王戊戌侍中安右將軍左光祿大夫太子少傅徐陵卒癸丑立皇弟叔儉為南安王叔澄為南郡王叔興為沅陵王叔韶為岳山王叔純為新興王十二月景辰頭和國遣使獻方物司空長沙王叔堅有罪免戊午夜天開自西北至東南其內有青黃色隆隆若雷聲二年春正月丁卯分遣大使巡省風俗平南將軍豫州刺史魯廣達進號安南將軍癸巳大赦天下夏五月戊子以尚書僕射永陽王伯智為平東將軍東揚州刺史輕車將軍江州刺史晉熙王叔文為信威將軍湘州刺史仁威將軍揚州刺史始興王叔重為江州刺史信武將軍南琅邪彭城二郡太守南平王嶷為揚州刺史吏部尚書江總為尚書僕射秋七月戊辰以長沙王叔堅為侍中鎮左將軍壬午太子加元服在位文武賜帛各有差孝悌力田為父後者各賜一級魚眾寡癃老不能自存者人穀五斛九月癸未太白晝見冬十月己酉詔曰耕鑿自足乃曰淳風貢賦之興其來尚矣蓋由庚極務不獲已而行焉但法令滋章姦盜多有俗尚澆詐政鮮惟良朕日旰夜分矜一物之失所泣辜罪己愧三千之未措望訂初下使彊蔭兼出如聞貧富均起單弱重弊斯豈振窮扇暍之意歟是乃下吏箕斂之苛也故云百姓不足君孰與足自太建十四年望訂租調逋未入者並悉原除在事百僚辯斷庶務必去取平允無得便公害民為己聲績妨紊政道十一月景寅大赦天下壬申盤盤國遣使獻方物戊寅百濟國遣使獻方物三年春正月戊午朔日有蝕之庚午以鎮左將軍長沙王叔堅即本號開府儀同三司征西將軍荊州刺史樊毅為護軍將軍守吏部尚書領著作陸瓊為吏部尚書金紫光祿大夫袁敬加特進三月辛酉前豐州刺史章大寶舉兵反夏四月庚戌豐州義軍主陳景詳斬大寶傳首京師秋八月戊子夜老人星見己酉以左民尚書謝伸伷為吏部尚書九月甲戌特進金紫光祿大夫袁敬卒冬十月己丑丹丹國遣使獻方物十一月己未詔曰宣尼誕膺上哲體資至聖祖述憲章之典並天地而合德樂正雅頌之奧與日月而偕明垂後昆之訓範開生民之耳目梁季湮微靈寢忘處鞠為茂草三十餘年敬仰如在永惟愾息今雅道雍熙由庚得所斷琴故履零落不追閱笥開書無因循復外可詳之禮典改築舊廟蕙房桂棟咸使惟新芳蘩潔潦以時饗奠辛巳輿駕幸長干寺大赦天下十二月丙戌太白晝見辛卯皇太子出太學講孝經戊戌講畢辛丑釋奠于先師禮畢設金石之樂會宴王公卿士癸卯高麗國遣使獻方物是歲蕭巋死子琮代立四年春正月甲寅詔曰堯施諫鼓禹拜昌言求之異等久著前無舉以淹滯復聞昔典斯乃治道之深規帝王之切務朕以寡昧丕承鴻緒未明虛己日旰興懷萬機多紊四聰弗遠達思聞蹇諤採其謀計王公已下各薦所知旁詢管庫爰及輿皁一介有能片言可用朕親加聽覽佇於啟沃中權大將軍開府儀同三司鄱陽王伯山進號鎮衞將軍中衞大將軍開府儀同三司豫章王叔英進號驃騎大將軍鎮左將軍開府儀同三司長沙王叔堅進號中軍大將軍安南將軍晉安王伯恭進號鎮右將軍翊右將軍宜都王叔明進號安右將軍二月景戌以鎮右將軍晉安王伯恭為特進景申立皇弟叔謨為巴東王叔顯為臨江王叔坦為新會王叔隆為新寧王夏五月丁巳立皇子莊為會稽王秋九月甲午輿駕幸玄武湖肆艫艦閱武宴羣臣賦詩戊戌以鎮衞將軍開府儀同三司鄱陽王伯山為東揚州刺史智武將軍岳陽王叔慎為丹陽尹丁未百濟國遣使獻方物冬十月癸亥尚書僕射江總為尚書令吏部尚書謝伷為尚書僕射十一月己卯詔曰惟刑止暴惟德成物三才是資百王不改而世無抵角時鮮犯鱗渭橋驚馬弗聞廷爭桃林逸牛未見其旨雖剽悍輕侮理從鉗釱憃愚杜默宜肆矜弘政乏良哉明慙則哲求諸刑措安可得乎是用屬寤寐以軫懷負黼扆而於邑復茲合璧輪缺連珠緯舛黃鍾獻呂和氣始萌玄英告中履長在御因時宥過抑乃斯得可大赦天下禎明元年春正月景子以安前將軍衡陽王伯信進號鎮前將軍安東將軍吳興太守廬陵王伯仁為特進智武將軍丹陽尹岳陽王叔慎為湘州刺史仁武將軍義陽王叔達為丹陽尹戊寅詔曰柏皇大庭鼓淳和於曩日姬王嬴后被澆風於末載刑書已鑄善化匪融禮義既乖姦宄斯作何其淳朴不反浮華競扇者歟朕居中御物納隍在睠頻恢天網屢絕三邊元元黔庶終罹五辟蓋乃康哉寡薄抑焉法令滋章是用當宁弗怡矜此向隅之意今三元具序萬國朝辰靈芝獻於始陽膏露凝於聿歲從春施令仰乾布德思與九有惟新七政可大赦天下改至德五年為禎明元年乙未地震癸卯以鎮前將軍衡陽王伯信為鎮南將軍西衡州刺史二月丁未以特進鎮右將軍晉安王伯恭進號中衞將軍中書令建安王叔卿為中書監丁卯詔至德元年望訂租調逋未入者竝原之秋八月癸卯老人星見丁未以車騎將軍蕭摩訶為驃騎將軍九月乙亥以驃騎將軍開府儀同三司豫章王叔英為驃騎大將軍庚寅蕭琮所署尚書令太傅安平王蕭巖中軍將軍荊州刺史義興王蕭瓛遣其都官尚書沈君公詣荊州刺史陳紀請降辛卯巖等率文武男女十萬餘口濟江甲午大赦天下冬十一月乙亥割揚州吳郡置吳州割錢塘縣為郡屬焉景子以蕭巖為平東將軍開府儀同三司東揚州刺史蕭瓛為安東將軍吳州刺史丁亥以驃騎大將軍開府儀同三司豫章王叔英兼司徒十二月景辰以前鎮衞將軍開府儀同三司東揚州刺史鄱陽王伯山為鎮衞大將軍開府儀同三司前中衞將軍晉安王伯恭為中衞將軍右光祿大夫二年春正月辛巳立皇子恮為東陽王恬為錢塘王是月遣散騎常侍周羅帥兵屯峽口夏四月戊申有羣鼠無數自蔡洲岸入石頭渡淮至于青塘兩岸數日死隨流出江戊午以左民尚書蔡徵為吏部尚書是月郢州南浦水黑如墨五月壬午以安前將軍廬陵王伯仁為特進甲午東冶鑄鐵有物赤色如數斗自天墜鎔所有聲隆隆如雷鐵飛出牆外燒民家六月戊戌扶南國遣使獻方物庚子廢皇太子胤為吳興王立軍師將軍揚州刺史始安王深為皇太子辛丑平南將軍江州刺史南平王嶷進號鎮南將軍忠武將軍南徐州刺史永嘉王彥進號安北將軍會稽王莊為翊前將軍揚州刺史宣惠將軍尚書令江總進號中權將軍雲麾將軍太子詹事袁憲為尚書僕射尚書僕射謝伷為特進寧遠將軍新除吏部尚書蔡徵進號安右將軍甲辰以安右將軍魯廣達為中領軍丁巳大風至自西北激濤水入石頭城淮渚暴溢漂沒舟乘冬十月己亥立皇子蕃為吳郡王辛丑以度支尚書領大著作姚察為吏部尚書己酉輿駕幸莫府山大校獵十一月丁卯詔曰夫議獄緩刑皇王之所垂範勝殘去殺仁人之所用心自畫冠既息刻吏斯起法令滋章手足無措朕君臨區宇屬當澆末輕重之典在政未康小大之情興言多愧眷茲狴犴有軫哀矜可克日於大政殿訊獄壬申以鎮南將軍江州刺史南平王嶷為征西將軍郢州刺史安北將軍南徐州刺史永嘉王彥為安南將軍江州刺史軍師將軍南海王虔為安北將軍南徐州刺史景子立皇弟叔榮為新昌王叔匡為太原王是月隋遣晉王廣衆軍來伐自巴蜀沔漢下流至廣陵數十道俱入緣江鎮戍相繼奏聞時新除湘州刺史施文慶中書舍人沈客卿掌機密用事並抑而不言故無備禦三年春正月乙丑朔霧氣四塞是日隋總管賀若弼自北道廣陵濟京口總管韓擒虎趨橫江濟採石自南道將會弼軍景寅採石戍主徐子建馳啟告變丁卯召公卿入議軍旅戊辰內外戒嚴以驃騎將軍蕭摩訶護軍將軍樊毅中領軍魯廣達並為都督遣南豫州刺史樊猛帥舟師出白下散騎常侍皐文奏將兵鎮南豫州庚午賀若弼攻陷南徐州辛未韓擒虎又陷南豫州文奏敗還至是隋軍南北道竝進後主遣驃騎大將軍司徒豫章王叔英屯朝室堂蕭摩訶屯樂遊苑樊毅屯耆闍寺魯廣達屯白土岡忠武將軍孔範屯寶田寺己卯鎮東大將軍任忠自吳興入赴仍屯朱雀門辛巳賀若弼進據鍾山頓白土岡之東南甲申後主遣衆軍與弼合戰衆軍敗績弼乘勝至樂遊苑魯廣達猶督散兵力戰不能拒弼進攻宮城燒北掖門是時韓擒虎率衆自新林至于石子岡任忠出降於擒虎仍引擒虎經朱雀航趣宮城自南掖門而入於是城內文武百司皆遁出唯尚書僕射袁憲在殿內尚書令江總吏部尚書姚察度支尚書袁權前度支尚書王瑗侍中王寬居省中後主聞兵至從宮人十餘出後堂景陽殿將自投于井袁憲侍側苦諫不從後閤舍人夏侯公韻又以身蔽井後主與爭久之方得入焉及夜為隋軍所執景戌晉王廣入據京城三月己巳後主與王公百司發自建鄴入于長安隋仁壽四年十一月壬子薨於洛陽時年五十二追贈大將軍封長城縣公謚曰煬葬河南洛陽之芒山史臣侍中鄭國公魏徵曰高祖拔起壠畝有雄桀之姿始佐下藩奮英奇之略弭節南海職思靜亂援旗北邁義在勤王掃侯景於既成拯梁室於已墜天網絕而復續國步屯而更康百神有主不失舊物魏王之延漢鼎祚宋武之反晉乘輿懋績鴻勳無以尚也于時內難未弭外隣勍敵王琳作梗於上流周齊搖蕩於江漢畏首畏尾若存若亡此之不圖遽移天歷雖皇靈有睠何其速也然志度弘遠懷抱豁如或取士於仇讎或擢才於亡命掩其受金之過宥其吠堯之罪委以心腹爪牙咸能得其死力故乃決機百勝成此三分方諸鼎峙之雄足以無慙權備矣世祖天姿刀丶哲清明在躬早預經綸知民疾苦思擇令典庶幾至治德刑竝用戡濟艱虞羣兇授首彊隣震懾雖忠厚之化未能及遠恭儉之風足以垂訓若不尚明察則守文之良主也臨川年長於成王過微於太甲宣帝有周公之親無伊尹之志明辟不復桐宮遂往欲加之罪其無辭乎高宗爰自在田雅量宏廓登庸御極民歸其厚惠以使下寬以容衆智勇爭奮師出有名揚旆分麾風行電掃闢土千里奄有淮泗戰勝攻取之勢近古未之有也既而君侈民勞將驕卒墮帑藏空竭折衂師徒於是秦人方彊遂窺兵於江上矣李克以為吳之先亡由乎數戰數勝數戰則民疲數勝則主驕以驕主御疲民未有不亡者也信哉言乎高宗始以寬大得人終以驕侈致敗文武之業墜于茲矣後主生深宮之中長婦人之手既屬邦國殄瘁不知稼穡艱難初懼阽危屢有哀矜之詔後稍安集復扇淫侈之風賓禮諸公唯寄情於文酒昵近羣小皆委之以衡軸謀謨所及遂無骨鯁之臣權要所在莫匪侵漁之吏政刑日紊尸素盈朝躭荒為長夜之飲嬖寵同豔妻之孽危亡弗恤上下相蒙衆叛親離臨機不寤自投於井冀以苟生視其以此求全抑亦民斯下矣遐觀列辟纂武嗣興其始也皆欲齊明日月合德天地高視五帝俯協三王然而靡不有初克終蓋寡其故何哉竝以中庸之才懷可移之性口存於仁義心怵於嗜慾仁義利物而道遠嗜欲遂性而便身便身不可久違道遠難以固志佞諂之倫承顏候色因其所好以悅導之若下坂以走丸譬順流而決壅非夫感靈辰象降生明德孰能遺其所樂而以百姓為心哉此所以成康文景千載而罕遇癸辛幽厲靡代而不有毒被宗社身嬰戮辱為天下笑可不痛乎古人有言亡國之主多有才蓺考之梁陳及隋信非虛論然則不崇教義之本偏尚淫麗之文徒長澆偽之風無救亂亡之禍矣史臣曰後主昔在儲宮早標令德及南面繼業寔允天人之望矣至於禮樂刑政咸遵故典加以深弘六藝廣闢四門是以待詔之徒爭趨金馬稽古之秀雲集石渠且梯山航海朝貢者往往歲至矣自魏正始晉中朝以來貴臣雖有識治者皆以文學相處罕關庶務朝章大典方參議焉文案簿領咸委小吏浸以成俗迄至于陳後主因循未遑改革故施文慶沈客卿之徒專掌軍國要務姦黠左道以裒刻為功自取身榮不存國計是以朝經墮廢禍生隣國斯亦運鍾百六鼎玉遷變非唯人事不昌蓋天意然也
