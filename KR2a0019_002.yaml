body:
  text: 陳書卷二本紀第二高祖下永定元年冬十月乙亥高祖即皇帝位于南郊柴燎告天曰皇帝臣霸先敢用玄牡昭告于皇皇后帝梁氏以圮剝荐臻歷運有極欽若天應以命于霸先夫肇有㬪民乃樹司牧選賢與能未常厥姓放勛重華之世咸無意於受終當塗典午之君雖有心於揖讓皆以英才處萬乘高勳御四海故能大庇黔首光宅區縣有梁末運仍葉遘屯獯醜憑陵久移神器承聖在外非能祀夏天未悔禍復罹寇逆嫡嗣廢黜宗枝僭詐天地蕩覆紀綱泯絶霸先爰初投袂大拯橫流重舉義兵實戡多難廢王立帝實有厥功安國定社用盡其力是謂小康方期大道既而煙雲表色日月呈瑞緯聚東井龍見譙邦除舊布新既彰玄象遷虞事夏且協謳訟九域八荒同布衷款百神羣祀皆有誠願梁帝高謝萬邦授以大寶霸先自惟菲薄讓德不嗣至于再三辭弗獲許僉以百姓須主萬機難曠皇靈眷命非可謙拒畏天之威用膺嘉祚永言夙志能無慙德敬簡元辰升壇受禪告類上帝用答民心永保于我有陳惟明靈是饗先是氛霧晝夜晦冥至于是日景氣清晏識者知有天道焉禮畢輿駕還宮臨太極前殿詔曰五德更運帝王所以御天三正相因夏殷所以宰世雖色分辭翰時異文質揖讓征伐迄用參差而育德振民義歸一揆朕以寡昧時屬艱危國步屢屯天維三絶肆勤先后拯厥橫流藉將帥之功兼猛士之力一匡天下再造黔黎梁氏以天祿永終曆數攸在遵與能之典集大命于朕躬顧惟菲德辭不獲亮式從天眷俯協民心受終文祖升禋上帝繼迹百王君臨萬宇若涉川水罔知攸濟寶業初建皇祚惟新思俾惠澤覃被億兆可大赦天下改梁太平二年為永定元年賜民爵二級文武二等魚衆寡孤獨不能自存者人穀五斛逋租宿債皆勿復收其有犯鄉里清議贓汙淫盜者皆洗除先注與之更始長徒敕繫特皆原之亡官失爵禁錮奪勞一依舊典又詔曰禮陳嵵宋詩詠二客弗臣之重歷代斯敦梁氏欽若人祇憲章在昔濟河沈璧高謝萬邦茅賦所加宜遵舊典其以江陰郡奉梁主為江陰王行梁正朔車旗服色一依前準宮館資待務盡優隆又詔梁皇太后為江陰國太妃皇后為江陰國妃又詔百司依位攝職景子輿駕幸鍾山祠蔣帝廟戊寅輿駕幸華林園親覽詞訟臨赦囚徒己卯分遣大使宣勞四方下璽書勑州郡曰夫四王革代商周所以應天五勝相推軒羲所以當運梁德不造喪亂積年東夏崩騰西都蕩覆蕭勃干紀非唯趙倫侯景滔天踰於劉載貞陽反篡賊約連兵江左纍屬於鮮卑金陵久非於梁國有自氤氳混沌之世龍圖鳳紀之前東漢興平之初西朝永嘉之亂天下分崩未有若於梁朝者也朕以虛薄屬當興運自昔登庸首清諸越徐門浪泊靡不征行浮海乘山所在戡定冒訴風塵騁馳師旅六延梁祀十翦彊寇豈曰人謀皆由天啓梁氏以天祿斯改期運永終欽若唐虞推其鼎玉朕東西退讓拜手陳辭避舜子於箕山之陽求支伯於滄洲之野而公卿敦逼率土翹惶天命難稽遂享嘉祚今月乙亥升禮太壇言念遷坰桐但有慙德自梁氏將末頻月亢陽火運斯終秋霖奄降翌日成禮圓丘宿設埃雲晚霽星象夜張朝景重輪泫三危之膏露晨光合璧帶五色之卿雲顧惟寡薄彌慙休祉昧旦丕顯方思至治卿等擁旄方嶽相任股肱剖符名守方寄恤隱王曆惟新念有欣慶想深求民瘼務在廉平愛惠以撫孤貧威刑以禦彊猾若有萑蒲之盜或犯戎商山谷之酋擅彊幽險皆從肆赦咸使知聞如或迷途俾在無貸今遣使人具宣往旨念思善政副此虛懷庚辰詔出佛牙於杜姥宅集四部設無遮大會高祖親出闕前禮拜初齊故僧統法獻於烏纏國得之常在定林上寺梁天監末為攝山慶雲寺沙門慧興保藏慧興將終以屬弟慧志承聖末慧志密送于高祖至是乃出辛巳追尊皇考曰景皇帝廟號太祖皇妣董太夫人曰安皇后追諡前夫人錢氏號為昭皇后世子克為孝懷太子立夫人章氏為皇后癸未尊景帝陵曰瑞陵昭皇后陵曰嘉陵依梁初園陵故事立刪定郎治定律令戊子遷景皇帝神主祔于太廟辛卯以中權將軍開府儀同三司丹陽尹王沖為左光祿大夫癸巳追贈皇兄梁故散騎常侍平北將軍六允州刺史長城縣公道談驃騎大將軍太尉封始興郡王弟梁故侍中驃騎將軍南徐州刺史武康縣侯休先車騎大將軍司徒封南康郡王是月西討都督周文育侯安都於郢州敗績囚于王琳十一月景申詔曰東都齊國義乃親賢西漢城陽事兼功烈散騎常侍使持節都督會稽等十郡諸軍事宣毅將軍會稽太守長城縣侯蒨學尚清優神𧜛凝正文參禮樂武定妖氛心力謀猷為家治國擁旄作守朞月有成辟彼關河功踰蕭寇萑蒲之盜自反耕農篁竹之豪用稟聲朔朕以虛寡屬當興運提彼三尺賓于四門王業艱難賴乎此子宜隆上爵稱是元功可封臨川郡王邑二千戶兄子梁中書侍郎頊襲封始興王弟子梁中書侍郎曇朗襲封南康王禮秩一同正王己亥甘露降于鍾山松林彌滿巖谷庚子開善寺沙門採之以獻勑頒賜羣臣景辰以鎮西將軍南豫州刺史徐度為鎮右將軍領軍將軍庚申京師大火十二月庚辰皇后謁太廟二年春正月乙未詔曰夫設官分職因事重輕羽儀車馬隨時隆替晉之五校鳴笳啓途漢之九卿傳呼竝迾虞官夏禮豈曰同科殷朴周文固無恆格朕膺茲寶歷代是天工留念官方庶允時衷梁天監中左右驍騎領朱衣直閣竝給儀從北徐州刺史唱昌義之初首為此職亂離歲久朝典不存後生年少希聞舊則今去左右驍騎宜通文武文官則用腹心武官則用功臣所給儀從同太子二衛率此外衆官尚書詳為條制車騎將軍開府儀同三司侯瑱進位司空中權將軍開府儀同三司新除左光祿大夫王沖為太子少傅左衛將軍徐世譜為護軍將軍南六允州刺史吳明徹進號安南將軍衡州刺史歐陽頠進號鎮南將軍辛丑輿駕親祠南郊詔曰朕受命君臨初移星琯孟陬嘉月備禮泰壇景候昭華人祗允慶思令億兆咸與惟新且往代祅氛于今猶梗軍機未息徵賦咸繁事不獲已久知下弊言念黔黎無忘寢食夫罪無輕重已發覺未發覺在今昧爽以前皆赦除之西寇自王琳以下竝許返迷一無所問近所募義軍本擬西寇竝宜解遣留家附業晚訂軍資未送者竝停元年軍糧逋餘者原其半州郡縣軍戍竝不得輒遣使民閒務存優養若有侵擾嚴為法制乙巳輿駕親祠北郊甲辰振遠將軍梁州刺史張立表稱去乙亥歲八月丹徒蘭陵二縣界遺山側一旦因濤水涌生沙漲周旋千餘頃竝膏腴堪墾植戊午輿駕親祠明堂二月壬申南豫州刺史沈泰奔于齊辛卯詔車騎將軍司空侯瑱總督水步衆軍以遏齊寇三月甲午詔曰罰不及嗣自古通典罪疑惟輕布在方策沈泰反覆無行遐邇所知昔有微功仍荷朝寄剖符名郡推轂纍藩漢口班師還居方嶽良田有逾於四百食客不止於三千富貴顯榮政當如此鬼害其盈天奪之魄無故猖狂自投獯醜雖復知人則哲惟帝其難光武有蔽於龐萌魏武不知於于禁但令朝廷無我負人其部曲妻兒各令復業所在及軍人若有恐脅侵掠者皆以劫論若有男女口為人所藏竝許詣臺申訴若樂隨臨川王及節將立效者悉皆聽許乙卯高祖幸後堂聽訟還於橋上觀山水賦詩示羣臣是月王琳立梁永嘉王蕭莊于郢州夏四月甲子輿駕親祠太廟乙丑江陰王薨詔遣太宰弔祭司空監護喪事凶禮所須隨由備辦以梁武林侯蕭咨息季卿嗣為江陰王景寅輿駕幸石頭餞司空侯瑱戊辰重雲殿東鴟尾有紫煙屬天五月乙未京師地震癸丑齊廣陵南城主張顯和長史張僧那各率其所部入附辛酉輿駕幸大莊嚴寺捨身壬戌羣臣表請還宮六月己巳詔司空侯瑱領軍將軍徐度率舟師為前軍以討王琳秋七月戊戌輿駕幸石頭親送填等己亥江州刺史周迪擒王琳將李孝欽樊猛余孝頃于工塘甲辰遣吏部尚書謝哲諭王琳甲寅嘉禾一穗六岐生五城初侯景之平也火焚太極殿承聖中議欲營之獨闕一柱至是有樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子度以聞詔中書令沈衆兼起部尚書少府卿蔡儔兼將作大匠起太極殿八月景寅以廣梁郡為陳留郡辛未詔臨川王蒨西討以舟師五萬發自京師輿駕幸冶城寺親送焉前開府儀同三司南豫州刺史周文育前鎮北將軍南徐州刺史新除開府儀同三司侯安都等於王琳所逃歸自劾廷尉即日引見竝宥之戊寅詔復文育等本官壬午追封皇子立為豫章王諡曰獻權為長沙王諡曰思長女為永世公主諡曰懿謝哲反命王琳請還鎮湘川詔追衆軍緩其伐癸未西討衆軍至自大雷丁亥以信威將軍江州刺史周迪為開府儀同三司進號平南將軍改南徐州所領南蘭陵郡復為東海郡冬十月庚午遣鎮南將軍開府儀同三司周文育都督衆軍出豫章討余孝勱乙亥輿駕幸莊嚴寺發金光明經題丁酉以仁威將軍高州刺史黃法為開府儀同三司進號鎮南將軍甲寅太極殿成匠各給復十二月庚申侍中安東將軍臨川王蒨率百僚朝前殿拜上牛酒甲子輿駕幸大莊嚴寺設無大會捨乘輿法物羣臣備法駕奉迎即日輿駕還宮景寅高祖於太極殿東堂宴羣臣設金石之樂以路寢告成也壬申割吳郡鹽官海鹽前京三縣置海寧郡屬揚州以安成所部廣興六洞置安樂郡景戌以寧遠將軍北江州刺史熊曇朗為開府儀同三司進號平西將軍丁亥詔曰梁時舊仕亂離播越始還朝廷多未銓序又起兵已來軍勳甚衆選曹即條文武簿及節將應九流者量其所擬於是隨材擢用者五十餘人三年春正月己丑青龍見于東方丁酉以鎮南將軍廣州刺史歐陽頠即本號開府儀同三司是夜大雪及旦太極殿前有龍跡見甲午廣州刺史歐陽頠表稱白龍見于州江南岸長數十丈大可八九圍歷州城西道入天井岡仙人見于羅浮山寺小石樓長三丈所通身潔白衣服楚麗辛丑詔曰南康始興王諸妹已有封爵依禮止是藩主此二王者有殊恆情宜隆禮數諸主儀秩及尚主可竝同皇女戊申詔臨川王蒨省揚徐二州辭訟二月辛酉以平西將軍桂州刺史淳于量為開府儀同三司進號鎮西大將軍壬午司空侯瑱督衆軍自江入合州焚齊舟艦三月景申侯瑱至自合肥衆軍獻捷夏閏四月庚寅詔曰開廩賑絶育民之大惠巡方恤患前王之令典朕當斯季俗膺此樂推君德未孚民瘼猶甚重茲多壘彌疚納隍良由四聰弗達千里勿應博施之仁何其或爽殘弊之軌致此未康吳州縉州去歲蝗旱郢田雖呪鄭渠終涸室靡盈積之望家有填壑之嗟百姓不足兆民何賴近已遣中書舍人江德藻銜命東陽與令長二千石問民疾苦仍以入臺倉見米分恤雖德非既飽庶微慰阻飢甲午詔依前代置西省學士兼以伎術者預焉丁酉遣鎮北將軍徐度率衆城南皖口是時久不雨景午輿駕幸鍾山祠蔣帝廟是日降雨迄于月晦五月景辰朔日有食之有司奏舊儀御前殿服朱紗袍通天冠詔曰此乃前代承用意有未同合朔仰助太陽宜備袞冕之服自今已去永可為准景寅扶南國遣使獻方物乙酉北江州刺史熊曇朗殺都督周文育于軍舉兵反王琳遣其將常衆愛曹慶率兵援余孝勱六月戊子儀同侯安都敗衆愛等於左里獲琳從弟襲主帥羊暕等三十餘人衆愛遁走庚寅廬山民斬之傳首京師甲午衆師凱歸詔曰曇朗噬逆罪不容誅分命衆軍仍事掩討方加梟磔以明刑憲徵臨川王蒨往皖口置城柵以錢道戢守焉丁酉高祖不豫遣兼太宰尚書左僕射王通以疾告太廟兼太宰中書令謝哲告大社南北郊辛丑高祖疾小瘳故司空周文育之柩至自建昌壬寅高祖素服哭于東堂哀甚癸卯高祖臨訊獄省訟是夜熒惑在天尊高祖疾又甚景午崩于璿璣殿時年五十七遺詔追臨川王蒨入纂甲寅大行皇帝遷殯于太極殿西階秋八月甲午羣臣上諡曰武皇帝廟號高祖景申葬萬安陵高祖智以綏物武以寧亂英謀獨運人皆莫及故能征伐四克靜難夷凶至升大麓之日居阿衡之任恆崇寬政愛育為本有須發調軍儲皆出於事不可息加以儉素自率常膳不過數品私饗曲宴皆瓦器蚌盤肴核庶羞裁令充足而已不為虛費初平侯景及立紹泰子女玉帛皆班將士其充闈房者衣不重綵飾無金翠哥鍾女樂不列於前及乎踐祚彌厲恭儉故隆功茂德光有天下焉陳吏部尚書姚察曰高祖英略大度應變無方蓋漢高魏武之亞矣及西都蕩覆誠貫天人王僧辨闕伊尹之才空結桐宮之憤貞陽假秦兵之送不思穆嬴之泣高祖乃蹈玄機而撫末運乘勢隙而拯橫流王迹所基始自於此何至戡黎升陑之捷而已焉故於慎徽時序之世變聲改物之辰兆庶歸以謳歌炎靈去如釋負方之前代何其美乎
