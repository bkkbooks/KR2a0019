body:
  text: 陳書卷三十六列傳第三十始興王叔陵新安王伯固始興王叔陵字子嵩高宗之第二子也梁承聖中高宗在江陵為直閣將軍而叔陵生焉江陵陷高宗遷關右叔陵留于穰城高宗之還也以後主及叔陵為質天嘉三年隨後主還朝封康樂侯邑五百戶叔陵少機辨徇聲名彊梁無所推屈光大元年除中書侍郎二年出為持節都督江州諸軍事南中郎將江州刺史太建元年封始興郡王奉昭烈王祀進授使持節都督江郢晉三州諸軍事軍師將軍刺史如故叔陵時年十六政自己出僚佐莫預焉性嚴刻部下懾憚諸公子姪及罷縣令長皆逼令事己豫章內史錢法成詣府進謁即配其子季卿將領馬仗季卿慙恥不時至叔陵大怒侵辱法成法成憤怨自縊而死州縣非其部內亦徵攝案治之朝貴及下吏有乖忤者輒誣奏其罪陷以重辟尋進號雲麾將軍加散騎常侍三年加侍中四年遷都督湘衡桂武四州諸軍事平南將軍湘州刺史侍中使持節如故諸州鎮聞其至皆震恐股栗叔陵日益暴橫征伐夷獠所得皆入己絲毫不以賞賜徵求役使無有紀極夜常不臥燒燭達曉呼召賓客說民間細事戲謔無所不為性不飲酒唯多置肴胾晝夜食噉而已自旦至中方始寢寐其曹局文案非呼不得輒自呈笞罪者皆繫獄動數年不省視瀟湘以南皆逼為左右里殆無遺者其中脫有逃竄輒殺其妻子州縣無敢上言高宗弗之知也尋進號鎮南將軍給鼓吹一部遷中衛將軍九年除使持節都督揚徐東揚南豫四州諸軍事揚州刺史侍中將軍鼓吹如故十年至都加扶給油幢車叔陵治在東府事務多關治省閣執事之司承意順旨即諷上進用之微致違忤必抵以大罪重者至殊死道路籍籍皆言其有非常志叔陵修飾虛名每入朝常於車中馬上執卷讀書高聲長誦陽陽自若歸坐齊中或自執斧斤為沐猴百戲又好遊冢墓閒遇有塋表主名可知者輒令左右發掘取其石志古器並骸骨肘脛持為玩弄藏之庫中府內民閒少妻處女微有色貌者竝即逼納十一年丁所生母彭氏憂去職頃之起為中衛將軍使持節都督刺史如故晉世王公貴人多葬梅嶺及彭卒叔陵啓求於梅嶺葬之乃發故太傅謝安舊墓棄去安柩以葬其母初喪之日僞為哀毀自稱刺血寫涅槃經未及十日乃令庖廚擊鮮日進甘膳又私召左右妻女與之姦合所作尤不軌侵淫上聞高宗譴責御史中丞王政以不舉奏免政官又黜其典籤親事仍加鞭捶高宗素愛叔陵不繩之以法但責讓而已服闋又為侍中中軍大將軍及高宗不豫太子諸王竝入侍疾高宗崩于宣福殿翌日旦後主哀頓俯伏叔陵以銼藥刀斫後主中項太后馳來救焉叔陵又斫太后數下後主乳媼吳氏時在太后側自後掣其肘後主因得起叔陵仍持後主衣後主自奮得免長沙王叔堅手扼叔陵奪去其刀仍牽就柱以其褶袖縛之時吳媼已扶後主避賊叔堅求後主所在將受命焉叔陵因奮袖得脫突走出雲龍門馳車還東府呼其甲士散金銀以賞賜外召諸王將帥莫有應者唯新安王伯固聞而赴之叔陵聚兵僅千人初欲據城保守俄而右衛將軍蕭摩訶將兵至府西門叔陵事急惶恐乃遣記室韋諒送其鼓吹與摩訶仍謂之曰如其事捷必以公為台鼎摩訶紿報之曰須王心膂節將自來方敢從命叔陵即遣戴溫談騏驎二人詣摩訶所摩訶執以送臺斬於閣道下叔陵自知不濟遂入內沈其妃張氏及寵妾七人于井中叔陵有部下兵先在新林於是率人馬數百自小航渡欲趨新林以舟艦入北行至白楊路為臺軍所邀伯固見兵至旋避入巷叔陵馳騎拔刃追之伯固復還叔陵部下多棄甲潰散摩訶馬客容陳智深迎刺叔陵僵斃于地閹豎王飛禽抽刀斫之十數下馬客容陳仲華就斬其首送于臺自寅至巳乃定尚書八座奏曰逆賊故侍中中軍大將軍始興王叔陵幼而很戾長肆貪虐出撫湘南及鎮九水兩藩氓庶掃地無遺蜂目豺聲狎近輕薄不孝不仁阻兵安忍無禮無義唯戮是聞及居偏憂淫樂自恣産子就館日月相接晝伏夜遊恆習姦詭抄掠居民歷發丘墓謝太傅晉朝佐命草創江左斫棺露骸事驚聽視自大行皇帝寢疾翌日未瘳叔陵以貴介之地參侍醫藥外無戚容內懷逆弒大漸之後聖躬號劈遂因匍匐手犯乘輿皇太后奉臨又加鋒刃窮凶極逆曠古未儔賴長沙王叔堅誠孝懇至英果奮發手加挫拉身蔽聖躬叔陵仍奔東城招集凶黨餘毒方熾自害妻孥雖應時梟懸猶未攄憤怨臣等參議請依宋代故事流尸中江汙潴其室並毀其所生彭氏墳廟還謝氏之塋制曰凶逆梟獍反噬宮闈賴宗廟之靈時從仆滅撫情語事酸憤兼懷朝議有章宜從所奏也叔陵諸子即日竝賜死前衡陽內史彭皓咨議參軍兼記室鄭信中録事參軍兼記室韋諒典籤俞公喜竝伏誅皓叔陵舅也初隨高宗在關中頗有勤效因藉叔陵將領歷陽衡陽二郡信以便書記有寵謀謨皆預焉諒京兆人梁侍中護軍將軍粲之子也以學業為叔陵所引陳智深以誅叔陵之功為巴陵內史封游安縣子陳仲華為下嶲太守封新夷縣子王飛禽除伏波將軍賜金各有差新安王伯固字牢之世祖之第五子也生而龜胸目通精揚白形狀眇小而俊辨善言論天嘉六年立為新安郡王邑二千戶廢帝嗣立為使持節都督南琅邪彭城東海三郡諸軍事雲麾將軍彭城琅邪二郡太守尋入為丹陽尹將軍如故太建元年進號智武將軍尹如故秩滿進號翊右將軍尋授使持節都督吳興諸軍事平東將軍吳興太守四年入為侍中翊前將軍遷安前將軍中領軍七年出為使持節散騎常侍都督南徐南豫南北六允四州諸軍事鎮北將軍南徐州刺史伯固性嗜酒而不好積聚所得祿俸用度無節酣醉以後多所乞丐於諸王之中最為貧窶高宗每矜之特加賞賜伯固雅性輕率好行鞭捶在州不知政事日出田獵或乘眠輿至於草閒輒呼民下從遊動至旬日所捕麞鹿多使生致高宗頗知之遣使責讓者數矣十年入朝又為侍中鎮右將軍尋除護軍將軍其年為國子祭酒領左驍騎將軍侍中鎮右竝如故伯固頗知玄理而墮業無所通至於擲句問難往往有奇意為政嚴苛國學有墮遊不修習者重加檟楚生徒懼焉由是學業頗進十二年領宗正卿十三年為使持節都督揚南徐東揚南豫四州諸軍事揚州刺史侍中將軍如故後主初在東宮與伯固甚相親狎伯固又善謿謔高宗每宴集多引之叔陵在江州心害其寵陰求疵瑕將中之以法及叔陵入朝伯固懼罪諂求其意乃共訕毀朝賢歷詆文武雖耆年高位皆面折之無所畏忌伯固性好射雉叔陵又好開發冢墓出遊野外必與偕行於是情好大叶遂謀不軌伯固侍禁中每有密語必報叔陵及叔陵出奔東府遣使告之伯固單馬馳赴助叔陵指揮知事不捷便欲遁走會四門已閉不得出因同趣白楊道臺馬客容至為亂兵所殺尸於東昌館門時年二十八詔曰伯固同茲悖逆殞身途路今依外議意猶弗忍可特許以庶人禮葬又詔曰伯固隨同巨逆自絶于天俾無遺育抑有恆典但童孺靡識兼預葭莩置之甸人良以惻憫及伯固所生王氏可竝特宥為庶人國除史臣曰孔子稱富與貴是人之所欲非其道得之不處也上自帝王至于黎獻莫不嫡庶有差長幼攸序叔陵險躁奔競遂行悖逆轘磔形骸未臻其罪汙潴居處不足彰過悲哉始興王傳王飛禽除伏波將軍或本作仗後將軍疑
