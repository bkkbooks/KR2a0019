body:
  text: 陳書卷二十六列傳第二十徐陵子儉弟孝克徐陵字孝穆東海郯人也祖超之齊鬱林太守梁員外散騎常侍父摛梁戎昭將軍太子左衛率贈侍中太子詹事諡貞子母臧氏嘗夢五色雲化而為鳳集左肩上已而誕陵焉時寶誌上人者世稱其有道陵年數歲家人攜以候之寶誌手摩其頂曰天上石麒麟也光宅惠雲法師每嗟陵早成就謂之顏回八歲能屬文十二通莊老義既長博涉史籍縱橫有口辯梁普通二年晉安王為平西將軍寧蠻校尉父摛為王諮議王又引陵參寧蠻府軍事中大通三年王立為皇太子東宮置學士陵充其選稍遷尚書度支郎出為上虞令御史中丞劉孝儀與陵先有隙風聞劾陵在縣贓汙因坐免久之起為南平王府行參軍遷通直散騎侍郎梁簡文在東宮撰長春殿義記使陵為序又令於少傅府述所製莊子義尋遷鎮西湘東王中記室參軍太清二年兼通直散騎常侍使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當由徐常侍來陵即答曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慙及侯景寇京師陵父摛先在圍城之內陵不奉家信便蔬食布衣若居憂恤會齊受魏禪梁元帝承制於江陵復通使於齊陵累求復命終拘留不遣陵乃致書於僕射楊遵彥曰夫一言所感凝暉照於魯陽一志冥通飛泉涌於疏勒況復元首康哉股肱良哉隣國相聞風教相期者也天道窮剝鍾亂本朝情計馳惶公私哽懼而骸骨之請徒淹歲寒顛沛之祈空盈卷軸是所不圖也非所仰望也執事不聞之乎昔分鼇命之世觀河拜洛之年則有日鳥烏流災風禽騁暴天傾西北地東南盛旱坼三川長波含五嶽我大梁應金圖而有亢纂玉鏡而猶屯何則聖人不能為時斯固窮通之恆理也至如荊州刺史湘東王機神之本無寄名言陶鑄之餘猶為堯舜雖復六代之舞陳於總章九州之歌登於司樂虞夔拊石晉曠調鍾未足頌此英聲無以宣其盛德者也若使郊禋楚翼寧非祀夏之君戡定艱難便是匡周之霸豈徒豳王徙雍朞月為都姚帝遷河周年成邑方今越常藐藐馴雉北飛肅茫茫風牛南偃吾君之子含識知歸而答旨云何所投身斯其未喻一也又晉熙等郡皆入貴朝去我尋陽經塗何幾至於鐺鐺曉漏的的宵烽隔蝄浦而相聞臨高臺而可望泉流寶盌遙憶湓城峯號香鑪依然廬嶽日者鄱陽嗣王治兵匯派屯戍淪波朝夕牋書春秋方物吾無從以躡屩彼何路而齊鑣豈其然乎斯不然矣又近者邵陵王通和此國郢中上客雲聚魏都鄴下名卿風馳江浦豈盧龍之徑於彼新開銅之街於我長閉何彼途甚易非勞於五丁我路為難如登於九折地不私載何其爽歟而答旨云還路無從斯所未喻二也晉熙廬江義陽安陸皆云款附非復危邦計彼中途便當靜晏自斯以北桴鼓不鳴自此以南封疆未壹如其境外脫殞輕軀幸非邊吏之羞何在匹夫之命又此賓遊通無貨殖忝非韓起聘鄭私買玉環吳札過徐躬要寶劒由來宴錫凡厥囊裝行役淹留皆已虛罄散有限之微財供無期之久客斯可知矣且據圖刎首愚者不為運斧全身庸流所鑒何則生輕一髮自重千鈞不以賈盜明矣骨肉不任充鼎覔皮毛不足入貨財盜有道焉吾無憂矣又公家遣使脫有資須本朝非隆平之時遊客豈皇華之勢輕裝獨宿非勞聚月之儀微騎閒行寧望輶軒之禮歸人將從私具驢騾緣道亭郵唯希蔬粟若曰留之無煩於執事遣之有費於官司或以顛沛為言或云資裝可懼固非通論皆是外篇斯所未喻三也又若以吾徒應還侯景侯景凶逆殲我國家天下含靈人懷憤厲既不獲投身社稷衛難乘輿四冢磔蚩尤千刀剸王莽安所謂俛首頓膝歸奉寇讎珮弭腰鞬為其皂隸日者通和方敦曩睦凶人狙詐遂駭狼心頗疑宋萬之誅彌懼荀罃之請所以奔蹄勁角專恣憑陵凡我行人偏膺讎憾政復葅蝲醢骨抽舌探肝於彼凶情猶當未雪海內之所知也君侯之所具焉又聞本朝公主都人士女風行雨散東播西流京邑丘墟姦蓬蕭瑟偃師還望咸為草萊霸陵回首俱沾霜露此又君之所知也彼以何義爭免寇讎我以何親爭歸委質昔鉅平貴將懸重於陸公叔向名流深知於鬷篾吾雖不敏常慕前脩不圖明庶有懷翻其以此量物昔魏氏將亡羣凶挺爭諸賢戮力想得其朋為葛榮之黨邪為邢杲之徒邪如曰不然斯所未喻四也假使吾徒還為凶黨侯景生於趙代家自幽恆居則台司行為連率山川形勢軍國彝章不勞請箸為籌便當屈指能筭景以逋逃小醜羊豕同羣身寓江家留河朔舂舂井井如鬼如神其不然乎抑又君之所知也且夫宮闈祕事竝若雲霄英俊訏謨寧非帷幄或陽驚以定策或焚䤝而奏書朝廷之士猶難參預羇旅之人何階耳目至於禮樂沿革刑政寬猛則謳歌已遠萬舞成風不知手之舞之足之蹈之也安在搖其牙齒為閒諜者哉若謂復命西朝終奔東虜雖齊梁有隔尉候奚殊豈以河曲之難浮而曰江關之可濟河橋馬度寧非宋典之姦關路鷄鳴皆曰田文之客何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經儻同徇僕之尤追肆寒山之怒則凡諸元帥竝釋縲囚爰及偏裨同無翦馘乃至鍾儀見赦朋笑遵途襄老蒙歸虞哥引路吾等張旜拭玉脩好尋盟涉泗之與浮河郊勞至于贈賄公恩既被賓敬無違今者何攵翻蒙貶責若以此為言斯所未喻六也若曰祅氛永久喪亂悠然哀我奔波存其形魄固已銘茲厚德戴此洪恩譬渤澥而俱深方嵩華而猶重但山梁飲啄非有意於籠樊江海飛浮本無情於鍾鼓況吾等營魂已謝餘息空留悲默為生何能支久是則雖蒙養護更夭天年若以此為言斯所未喻七也若云逆竪殲夷當聽反命高軒繼路飛蓋相隨未解其言何能善謔夫屯亨治亂豈有意於前期謝常侍今年五十有一吾今年四十有四介已知命賓又杖鄉計彼侯生肩隨而已豈銀臺之要彼未從師金竈之方吾知其決政恐南陽菊水竟不延齡東海桑田無由可望若以此為言斯所未喻八也足下清襟勝託書囿文林凡自洪荒終乎幽厲如吾今日寧有其人爰至春秋微宜商略夫宗姬殄墜霸道昏凶或執政之多門或陪臣之凉德故臧孫有禮翻囚與國之賓周伯無攵空怒天王之使遷箕卿於兩館縶驥子於三年斯匪貪亂之風邪寧當今之高例也至於雙崤且帝四海爭雄或構趙而侵燕或連韓而謀魏身求盟於楚殿躬奪璧於秦庭輸寶鼎以託齊王馳安車而誘梁客其外膏脣販舌分路揚鑣無罪無辜如兄如弟逮乎中陽受命天下同規巡省諸華無聞幽辱及三方之霸也孫甘言以娬媚曹屈詐以羈縻旍軫歲到於句吳冠蓋年馳於庸蜀則客嘲殊險賓戲已深共盡遊談誰云猜忤若使搜求故實脫有前蹤恐是叔世之姦謀而非為邦之勝略也抑又聞之雲師火帝澆淳乃異其風龍躍麟驚王霸雖殊其道莫不崇君親以銘物敦敬養以治民預有邦司曾無隆替吾奉違溫凊仍屬亂離寇虜猖狂公私播越蕭軒靡御王舫誰持瞻望鄉關何心天地自非生憑廩竹源出空桑行路含情猶其相愍常謂擇官而仕非曰孝家擇事而趨非云忠國況乎欽承有道驂駕前王郎吏明經鴟鳶知禮巡省方化咸問高年東序西膠皆尊耆耋吾以圭璋玉帛通聘來朝屬世道之屯期鍾生民之否運兼年累載無申元直之祈銜泣吞聲長對公閭之怒情禮之訴將同逆鱗忠孝之言皆應舌是所不圖也非所仰望也且天倫之愛何得忘懷妻子之情誰能無累夫以清河公主之貴餘姚書佐之家莫限高卑皆被驅略自東南醜虜抄販饑民臺署郎官俱餒出方攵壁況吾生離死別多歷暄寒孀室嬰兒何可言念如得身還鄉土躬自推求猶冀提攜俱免凶虐夫四聰不達華陽君所謂亂臣百姓無寃孫叔敖稱為良相足下高才重譽參贊經綸非豹非貔聞詩聞禮而中朝大議曾未矜論清禁嘉謀安能相及諤諤非周舍容容類胡廣何其無諍臣哉歲月如流平生何幾晨看旅鴈心赴江淮昏望牽牛情馳揚越朝千悲而掩泣夜萬緒而回腸不自知其為生不自知其為死也足下素挺詞鋒兼長理窟匡丞相解頤之說樂令君清耳之談向所諮疑誰能曉喻若鄙言為謬來旨必通分請灰釘甘從斧鑊何但規規默默齰舌低頭而已哉若一理存焉猶希矜眷何必期令我等必死齊都足趙魏之黃塵加幽幷之片骨遂使東平拱樹長懷向漢之悲西洛孤墳恆表思鄉之夢干祈以屢哽慟增深遵彥竟不報書及江陵陷齊送貞陽侯蕭淵明為梁嗣乃遣陵隨還太尉王僧辯初拒境不納淵明往復致書皆陵詞也及淵明之入僧辯得陵大喜接待饋遺其禮甚優以陵為尚書吏部郎掌詔誥其年高祖率兵誅僧辯仍進討韋載時任約徐嗣徽乘虛襲石頭陵感僧辯舊恩乃往赴約及約等平高祖釋陵不問尋以為貞威將軍尚書左丞紹泰二年又使于齊還除給事黃門侍郎祕書監高祖受禪加散騎常侍左丞如故天嘉初除太府卿四年遷五兵尚書領大著作六年除散騎常侍御史中丞時安成王頊為司空以帝弟之尊勢傾朝野直兵鮑僧叡假王威權抑塞辭訟大臣莫敢言者陵聞之乃為奏彈導從南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯為斂容正坐陵進讀奏版時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然天康元年遷吏部尚書領大著作陵以梁末以來選授多失其所於是提舉綱維綜覈名實時有冒進求官諠競不已者陵乃為書宣示曰自古吏部尚書者品藻人倫簡其才能尋其門冑逐其大小量其官爵梁元帝承侯景之凶荒王太尉接荊州之禍敗爾時喪亂無復典章故使官方窮此紛雜永定之時聖朝草創干戈未息亦無條序府庫空虛賞賜懸乏白銀難得黃札易營權以官階代於錢絹義存撫接無計多少致令員外常侍路上比肩諮議參軍市中無數豈是朝章應其如此今衣冠禮樂日富年華何可猶作舊意非理望也所見諸君多踰本分猶言大屈未喻高懷若問梁朝朱領軍异亦為卿相此不踰其本分邪此是天子所拔非關選序梁武帝云世間人言有目色我特不目色范悌宋文帝亦云人世豈無運命每有好官缺輒憶羊玄保此則清階顯職不由選也秦有車府令趙高直至丞相漢有高廟令田千秋亦為丞相此復可為例邪既忝衡流應須粉墨所望諸賢深明鄙意自是衆咸服焉時論比之毛玠廢帝即位高宗入輔謀黜異志者引陵預其議高宗纂曆封建昌縣侯邑五百戶太建元年除尚書右僕射三年遷尚書左僕射陵抗表推周弘正王勱等高宗召陵入內殿曰卿何為固辭此職而舉人乎陵曰周弘正從陛下西還舊藩長史王勱太平相府長史張種帝鄉賢戚若選賢與舊臣宜居後固辭累日高宗苦屬之陵乃奉詔及朝議北伐高宗曰朕意已決卿可舉元帥衆議咸以中權將軍淳于量位重共署推之陵獨曰不然吳明徹家在淮左悉彼風俗將略人才當今亦無過者於是爭論累日不能決都官尚書裴忌曰臣同徐僕射陵應聲曰非但明徹良將裴忌即良副也是日詔明徹為大都督令忌監軍事遂克淮南數十州之地高宗因置酒舉杯屬陵曰賞卿知人陵避席對曰定策出自聖衷非臣之力也其年加侍中餘竝如故七年領國子祭酒南徐州大中正以公事免侍中僕射尋加侍中給扶又除領軍將軍八年加翊右將軍太子詹事置佐史俄遷右光祿大夫餘竝如故十年重為領軍將軍尋遷安右將軍丹陽尹十三年為中書監領太子詹事給鼓吹一部侍中將軍右光祿中正如故陵以年老累表求致仕高宗亦優之乃詔將作為造大齋令陵就第攝事後主即位遷左光祿大夫太子少傅餘如故至德元年卒時年七十七詔曰慎終有典抑乃舊章令德可甄諒宜追遠侍中安右將軍左光祿大夫太子少傅南徐州大中正建昌縣開國侯陵弱齡學尚登朝秀穎業高名輩文曰詞宗朕近歲承華特相引狎雖多臥疾方期克壯奄然殞逝震悼于懷可贈鎮右將軍特進其侍中左光祿鼓吹侯如故幷出舉哀喪事所須量加資給諡曰章陵器局深遠容止可觀性又清簡無所營樹祿俸與親族共之太建中食建昌邑邑戶送米至于水次陵親戚有貧匱者皆令取之數日便盡陵家尋致乏絕府僚怪而問其故陵云我有車牛衣裳可賣餘家有可賣不其周給如此少而崇信釋教經論多所精解後主在東宮令陵講大品經義學名僧自遠雲集每講筵商較四座莫能與抗目有青睛時人以為聰惠之相也自有陳創業文檄軍書及禪授詔策皆陵所製而九錫尤美為一代文宗亦不以此矜物未嘗詆訶作者其於後進之徒接引無倦世祖高宗之世國家有大手筆皆陵草之其文頗變舊體緝裁巧密多有新意每一文出手好事者已傳寫成誦遂被之華夷家藏其本後逢喪亂多散失存者三十卷有四子儉份儀僔儉一名衆幼而脩立勤學有志操汝南周弘正重其為人妻以女梁太清初起家豫章王府行參軍侯景亂陵使魏未反儉時年二十一攜老幼避于江陵梁元帝聞其名召為尚書金部郎中嘗侍宴賦詩元帝歎賞曰徐氏之子復有文矣江陵陷復還於京師永定初為太子洗馬遷鎮東從事中郎天嘉三年遷中書侍郎太建初廣州刺史歐陽紇舉兵反高宗令儉持節喻旨紇初見儉盛列仗衛言辭不恭儉曰呂嘉之事誠當已遠將軍獨不見周迪陳寶應乎轉禍為福未為晚也紇默然不答懼儉沮其衆不許入城置儉於孤園寺遣人守衛累旬不得還紇嘗出見儉儉謂之曰將軍業已舉事儉須還報天子儉之性命雖在將軍將軍成敗不在於儉幸不見留紇於是乃遣儉從閒道馳還高宗乃命章昭達率衆討紇仍以儉悉其形勢勑儉監昭達軍紇平高宗嘉之賜奴婢十人米五百斛除鎮北鄱陽王諮議參軍兼中書舍人累遷國子博士大匠卿餘竝如故尋遷黃門侍郎轉太子中庶子加通直散騎常侍兼尚書左丞以公事免尋起為中衛始興王限外諮議參軍兼中書舍人又為太子中庶子遷貞威將軍太子左衛率舍人如故後主立授和戎將軍宣惠晉熙王長史行丹陽郡國事俄以父憂去職尋起為和戎將軍累遷尋陽內史為政嚴明盜賊靜息遷散騎常侍襲封建昌侯入為御史中丞儉性公平無所阿附尚書令江總望重一時亦為儉所糾劾後主深委任焉又領右軍禎明二年卒份少有父風年九歲為夢賦陵見之謂所親曰吾幼屬文亦不加此解褐為祕書郎轉太子舍人累遷豫章王主簿太子洗馬出為海鹽令甚有治績秩滿入為太子洗馬份性孝悌陵嘗遇疾甚篤份燒香泣涕跪誦孝經晝夜不息如此者三日陵疾豁然而愈親戚皆謂份孝感所致太建二年卒時年二十二儀少聰警以周易生舉高第為袐書郎出為烏傷令禎明初遷尚書殿中郎尋兼東宮學士陳亡入隋開皇九年隱于錢塘之赭山煬帝召為學士尋除著作郎大業四年卒孝克陵之第三弟也少為周易生有口辯能談玄理既長遍通五經博覽史籍亦善屬文而文不逮義梁太清初起家為太學博士性至孝遭父憂殆不勝喪事所生母陳氏盡就養之道梁末侯景寇亂京邑大飢餓死者十八九孝克養母饘粥不能給妻東莞臧氏領軍將軍臧盾之女也甚有容色孝克乃謂之曰今飢荒如此供養交闕欲嫁卿與富人望彼此俱濟於卿意如何臧氏弗之許也時有孔景行者為侯景將富於財孝克密因媒者陳意景行多從左右逼而迎之臧涕泣而去所得穀帛悉以供養孝克又剃髮為沙門改名法整兼乞食以充給焉臧氏亦深念舊恩數私致饋餉故不乏絕後景行戰死臧伺孝克於途中累日乃見謂孝克曰往日之事非為相負今既得脫當歸供養孝克默然無答於是歸俗更為夫妻後東遊居于錢塘之佳義里與諸僧討論釋典遂通三論每日二時講旦講佛經晚講禮傳道俗受業者數百人天嘉中除剡令非其好也尋復去職太建四年徵為祕書丞不就乃蔬食長齋持菩薩戒晝夜講誦法華經高宗甚嘉其操行六年除國子博士遷通直散騎常侍兼國子祭酒尋為真孝克每侍宴無所食噉至席散當其前膳羞損減高宗密記以問中書舍人管斌斌不能對自是斌以意伺之見孝克取珍果內紳帶中斌當時莫識其意後更尋訪方知還以遺母斌以實啟高宗嗟歎良久乃勑所司自今宴享孝克前饌竝遣將還以餉其母時論美之至德中皇太子入學釋奠百司陪列孝克發孝經題後主詔皇太子北面致敬禎明元年入為都官尚書自晉以來尚書官僚皆攜家屬居省省在臺城內下舍門中有閣道東西跨路通于朝堂其第一即都官之省西抵閣道年代久遠多有鬼怪每昏夜之際無故有聲光或見人著衣冠從井中出須臾復沒或門閤自然開閉居省者多死亡尚書周確卒於此省孝克代確便即居之經涉兩載妖變皆息時人咸以為貞正所致孝克性清素而好施惠故不免飢寒後主勑以石頭津稅給之孝克悉用設齋寫經隨得隨盡二年為散騎常侍侍東宮陳亡隨例入關家道壁立所生母患欲粳米為粥不能常辦母亡之後孝克遂常噉麥有遺粳米者孝克對而悲泣終身不復食之焉開皇十年長安疾疫隋文帝聞其名行召令於尚書都堂講金剛般若經尋授國子博士後侍東宮講禮傳十九年以疾卒時年七十三臨終正坐念佛室內有非常異香氣隣里皆驚異之子萬載仕至晉安王功曹史太子洗馬史臣曰徐孝穆挺五行之秀稟天地之靈聰明特達籠罩今古及締構興王遭逢泰運位隆朝宰獻替謀猷蓋亮直存矣孝克砥身厲行養親逾禮亦參閔之志歟
