body:
  text: 陳書卷十一列傳第五黃法淳于量章昭達黃法字仲昭巴山新建人也少徑捷有膽力步行日三百里距躍三丈頗便書疏間明簿領出入郡中為鄉閭所憚侯景之亂於鄉里合徒衆太守賀詡下江州法監知郡事高祖將踰嶺入援建業李遷仕作梗中途高祖命周文育屯于西昌法遣兵助文育時法出頓新淦縣景遣行臺于慶至豫章慶分兵來襲新淦法拒戰敗之高祖亦遣文育進軍討慶文育疑慶兵強未敢進法率衆會之因進克笙屯俘獲甚衆梁元帝承制授超猛將軍交州刺史資領新淦縣令封巴山縣子邑三百戶承聖三年除明威將軍遊騎將軍進爵為侯邑五百戶貞陽侯僭位除左驍騎將軍敬帝即位改封新建縣侯邑如前太平元年割江州四郡置高州以法為使持節散騎常侍都督高州諸軍事信武將軍高州刺史鎮于巴山蕭勃遣歐陽頠攻法法與戰破之永定二年王琳遣李孝欽樊猛余孝頃攻周迪且謀取法法率兵援迪擒孝頃等三將進號宣毅將軍增邑並前一千戶給鼓吹一部又以拒王琳功授平南將軍開府儀同三司熊曇朗於金口反害周文育法共周迪討平之語在曇朗傳世祖嗣位進號安南將軍天嘉二年周迪反法率兵會都督吳明徹討迪於工塘迪平法功居多徵為使持節散騎常侍都督南徐州諸軍事鎮北大將軍南徐州刺史儀同鼓吹並如故未拜尋又改授都督江吳二州諸軍事鎮南大將軍江州刺史六年徵為中衛大將軍廢帝即位進爵為公給扶光大元年出為使持節都督南徐州諸軍事鎮北將軍南徐州刺史二年徙為都督郢巴武三州諸軍事鎮西將軍郢州刺史持節如故太建元年進號征西大將軍二年徵為侍中中權大將軍四年出為使持節散騎常侍都督南豫州諸軍事征南大將軍南豫州刺史五年大舉北伐都督吳明徹出秦郡以法為都督出歷陽齊遣其歷陽王步騎五萬來援於小峴築城法遣左衛將軍樊毅分兵於大峴禦之大破齊軍盡獲人馬器械於是乃為拍車及步艦竪拍以逼歷陽歷陽人窘蹴乞降法緩之則又堅守法怒親率士卒攻城施拍加其樓堞時又大雨城崩克之盡誅戍卒進兵合肥望旗降款法不令軍士侵掠躬自撫勞而與之盟並放還北以功加侍中改封義陽郡公邑二千戶其年遷都督合霍二州諸軍事征西大將軍合州刺史增邑五百戶七年徙都督豫建光朔合北徐六州諸軍事豫州刺史鎮壽陽侍中散騎常侍持節將軍儀同鼓吹扶並如故八年十月薨時年五十九贈侍中中權大將軍司空諡曰威子玩嗣淳于量字思明其先濟北人也世居京師父文成仕梁為將帥官至光烈將軍梁州刺史量少善自居處偉姿容有幹略便弓馬梁元帝為荊州刺史文成分量人馬令往事焉起家湘東王國常侍兼西中郎府中兵參軍纍遷府佐常兼中兵直兵者十餘載兵甲士卒盛於府中荊雍之界蠻左數反山帥文道期積為邊患中兵王僧辨征之頻戰不利遣量助之量至與僧辨並力大破道期斬其酋長俘虜萬計以功封廣晉縣男邑三百戶授涪陵太守歷為新興武寧二郡太守侯景之亂梁元帝凡遣五軍入援京邑量預其一臺城陷量還荊州元帝承制以量為假節通直散騎常侍都督巴州諸軍事信威將軍巴州刺史侯景西上攻巴州元帝使都督王僧辨入據巴陵量與僧辨並力拒景大敗景軍擒其將任約進攻郢州獲宋子仙仍隨僧辨克平侯景承聖元年以功授左衛將軍封謝沐縣侯邑五百戶尋出為持節都督桂定東西寧等四州諸軍事信威將軍安遠護軍桂州刺史荊州陷量保據桂州王琳擁割湘郢纍遣召量量外雖與琳往來而別遣使從間道歸於高祖高祖受襌授持節散騎常侍平西大將軍給鼓吹一部都督刺史並如故尋進號鎮南將軍仍授都督鎮西大將軍開府儀同三司世祖嗣位進號征南大將軍王琳平後頻請入朝天嘉五年徵為中撫大將軍常侍儀同鼓吹並如故量所部將帥多戀本土並欲逃入山谷不願入朝世祖使湘州刺史華皎征衡州界黃洞且以兵迎量天康元年至都以在道淹留為有司所奏免儀同餘並如故光大元年給鼓吹一部華皎構逆以量為使持節征南大將軍西討大都督總率大艦自郢州樊浦拒之皎平並降周將長胡公拓跋定等以功授侍中中軍大將軍開府儀同三司進封醴陵縣公增邑一千戶未拜出為使持節都督南徐州諸軍事鎮北將軍南徐州刺史侍中儀同鼓吹並如故太建元年進號征北大將軍給扶三年坐就江陰王蕭季卿買梁陵中樹季卿坐免量免侍中尋復加侍中五年徵為中護大將軍侍中儀同鼓吹扶並如故吳明徹之西伐也量贊成其事遣第六子岑率所領從軍淮南克定量改封始安郡公增邑一千五百戶六年出為使持節都督郢巴南司定四州諸軍事征西大將軍郢州刺史侍中儀同鼓吹扶並如故七年徵為中軍大將軍護軍將軍九年以公事免侍中尋復加侍中十年吳明徹陷沒加量使持節都督水陸諸軍事仍授散騎常侍都督南北六允譙三州諸軍事車騎將軍南六允州刺史餘並如故十三年加左光祿大夫增邑五百戶餘並如故十四年四月薨時年七十二贈司空章昭達字伯通吳興武康人也祖道蓋齊廣平太守父法尚梁揚州議曹從事昭達性倜儻輕財尚氣少時嘗遇相者謂昭達曰卿容貌甚善須小虧損則當富貴梁大同中昭達為東宮直後因醉墜馬鬢角小傷昭達喜之相者曰未也及侯景之亂昭達率募鄉人援臺城為流矢所中眇其一目相者見之曰卿相善矣不久當貴京城陷昭達還鄉里與世祖遊因結君臣之分侯景平世祖為吳興太守昭達杖策來謁世祖世祖見之大喜因委以將帥恩寵優渥超於儕等及高祖討王僧辨令世祖還長城招聚兵衆以備杜龕頻使昭達往京口稟承計畫僧辨誅後龕遣其將杜泰來攻長城世祖拒之命昭達總知城內兵事及杜泰退走因從世祖東進軍吳興以討杜龕龕平又從世祖東討張彪於會稽克之纍功除明威將軍定州刺史是時留異擁據東陽私署守宰高祖患之乃使昭達為長山縣令居其心腹永定二年除武康令世祖嗣位除員外散騎常侍天嘉元年追論長城之功封欣樂縣侯邑一千戶尋隨侯安都等拒王琳于沌柵口戰于蕪湖昭達乘平虜大艦中流而進先鋒發拍中于賊艦王琳平昭達册勳第一二年除使持節散騎常侍都督郢巴武沅四州諸軍事智武將軍郢州刺史增邑並前千五百戶尋進號平西將軍周迪據臨川反詔令昭達便道征之及迪敗走徵為護軍將軍給鼓吹一部改封邵武縣侯增邑並前二千戶常侍如故四年陳寶應納周迪復共寇臨川又以昭達為都督討迪至東興嶺而迪又退走昭達仍踰嶺頓于建安以討陳寶應寶應據建安晉安二郡之界水陸為柵以拒官軍昭達與戰不利因據其上流命軍士伐木帶枝葉為筏施拍於其上綴以大索相次列營夾于兩岸寶應數挑戰昭達按甲不動俄而暴雨江水大長昭達放筏衝突寶應水柵水柵盡破又出兵攻其步軍方大合戰會世祖遣余孝頃出自海道適至因並力乘之寶應大潰遂克定閩中盡擒留異寶應等以功授鎮前將軍開府儀同三司初世祖嘗夢昭達升於台鉉及旦以夢告之至是侍宴世祖顧昭達曰卿憶夢不何以償夢昭達對曰當效犬馬之用以盡臣節自餘無以奉償尋又出為使持節都督江郢吳三州諸軍事鎮南將軍江州刺史常侍儀同鼓吹如故廢帝即位遷侍中征南將軍改封邵陵郡公華皎之反也其移書文檄並假以昭達為辭又頻遣使招之昭達盡執其使送于京師皎平進號征南大將軍增邑並前二千五百戶秩滿徵為中撫大將軍侍中儀同鼓吹如故高宗即位進號車騎大將軍以還朝遲留為有司所劾降號車騎將軍歐陽紇據有嶺南反詔昭達都督衆軍討之昭達倍道兼行達于始興紇聞昭達奄至恇擾不知所為乃出頓洭口多聚沙石盛以竹籠置于水柵之外用遏舟艦昭達居其上流裝艫造拍以臨賊柵又令軍人銜刀潛行水中以斫竹籠籠篾皆解因縱大艦隨流突之賊衆大敗因而擒紇送于京師廣州平以功進車騎大將軍遷司空餘並如故太建二年率師征蕭巋于江陵時蕭巋與周軍大蓄舟艦於青泥中昭達分遣偏將錢道戢程文季等乘輕舟襲之焚其舟艦周兵又於峽下南岸築壘名曰安蜀城於江上橫引大索編瞬為橋以度軍糧昭達乃命軍士為長施於樓船之上仰割其索索斷糧絶因縱兵以攻其城降之三年遘疾薨時年五十四贈大將軍增邑五百戶給班劒二十人昭達性嚴刻每奉命出征必晝夜倍道然有所克捷必推功將帥廚膳飲食並同於羣下將士亦以此附之每飲會必盛設女伎雜樂備盡羌胡之聲音律姿容並一時之妙雖臨對寇敵旗鼓相望弗之廢也四年配享世祖廟庭子大寶襲封邵陵郡公纍官至散騎常侍護軍出為豐州刺史在州貪縱百姓怨酷後主以太僕卿李暈代之至德三年四月暈將到州大寶乃襲殺暈舉兵反遣其將楊通寇建安建安內史吳慧覺據郡城拒之通纍攻不克官軍稍近人情離異大寶計窮乃與通俱逃臺軍主陳景詳率兵追躡大寶大寶既入山山路阻險不復能行通背負之稍進尋為追兵所及生擒送都於路死傳首梟于朱雀航夷三族史臣曰黃法淳于量值梁末喪亂劉項未分其有辨明暗見是非者蓋鮮二公達向背之理位至鼎司亦其智也昭達與世祖鄉壤惟舊義等鄧蕭世祖纂曆委任隆重至於戰勝攻取纍平寇難斯亦良臣良將一代之吳耿矣
