body:
  text: 陳書卷十八列傳第十二沈衆袁泌劉仲威陸山才王質韋載族弟翽沈衆字仲師吳興武康人也祖約梁特進父旋梁給事黃門侍郎衆好學頗有文詞起家梁鎮衛南平王法曹參軍太子舍人是時梁武帝制千字詩衆為之注解與陳郡謝景同時召見于文德殿帝令衆為竹賦賦成奏帝善之手勑答曰卿文體翩翩可謂無忝爾祖當陽公蕭大心為郢州刺史以衆為限內記室參軍尋除鎮南湘東王記室參軍遷太子中舍人兼散騎常侍聘魏還遷驃騎廬陵王諮議參軍舍人如故侯景之亂衆表於梁武稱家代所隸故義部曲竝在吳興求還召募以討賊梁武許之及景圍臺城衆率宗族及義附五千餘人入援京邑頓于小航對賊東府置陣軍容甚整景深憚之梁武於城內遙授衆為太子右衞率京城陷衆降於景景平西上荊州元帝以為太子中庶子本州大中正尋遷司徒左長史江陵陷為西魏所虜尋而逃還敬帝承制授御史中丞紹泰元年除侍中遷左民尚書高祖受命遷中書令中正如故高祖以衆州里知名甚敬重之賞賜優渥超於時輩衆性嗇內治產業財帛以億計無所分遺其自奉養甚薄每於朝會之中衣裳破裂或躬提冠屨永定二年兼起部尚書監起太極殿恆服布袍芒屩以麻繩為帶又攜乾魚蔬菜飯獨噉之朝士共誚其所為衆性狷急於是忿恨遂歷詆公卿非毀朝廷高祖大怒以衆素有令望不欲顯誅之後因其休假還武康遂於吳中賜死時年五十六袁泌字文洋左光祿大夫敬之弟也清正有幹局容體魁岸志行脩謹釋褐員外散騎侍郎歷諸王府佐侯景之亂泌欲求為將是時泌兄君正為吳郡太守梁簡文板泌為東宮領直令往吳中召募士卒及景圍臺城泌率所領赴援京城陷退保東陽景使兵追之乃自會稽東嶺出湓城依于鄱陽嗣王蕭範範卒泌乃降景景平王僧辯表泌為富春太守兼丹陽尹貞陽侯僭位以泌為侍中奉使於齊高祖受禪王琳據有上流泌自齊從梁永嘉王蕭莊達琳所及莊僭立以泌為侍中丞相長史天嘉二年泌與琳輔莊至于柵口琳軍敗衆皆奔散唯泌獨乘輕舟送莊達于北境屬莊於御史中丞劉仲威令共入齊然後拜辭而歸詣闕請罪文帝深義之尋授寧遠始興王府法曹參軍轉諮議參軍除通直散騎常侍兼侍中領豫州大中正聘于周使還授散騎常侍御史中丞其中正如故高宗入輔以泌為雲旗將軍司徒左長史光大元年卒年五十八臨終戒其子蔓華曰吾於朝廷素無功績瞑目之後斂手足旋葬無得輒受贈諡其子述泌遺意表請之朝廷不許贈金紫光祿大夫諡曰質劉仲威南陽涅陽人也祖虯齊世以國子博士徵不就父之遴荊州治中從事史仲威少有志氣頗涉文史梁承聖中為中書侍郎蕭莊偽署御史中丞隨莊入齊終於鄴中仲威從弟廣德亦好學負才任氣父之亨梁安西湘東王長史南郡太守廣德承聖中以軍功官至給事黃門侍郎湘東太守荊州陷後依于王琳琳平文帝以廣德為寧遠始興王府限外記室參軍仍領其舊兵尋為太尉侯瑱湘州府司馬歷樂山豫章二郡太守新安內史光大中假節員外散騎常侍雲旗將軍河東太守太建元年卒於郡時年四十三贈左衞將軍陸山才字孔章吳郡吳人也祖翁寶梁尚書水部郎父汎散騎常侍山才少倜儻好尚文史范陽張續纘續纘弟綰竝欽重之起家王國常侍遷外兵參軍尋以父疾東歸侍養承聖元年王僧辯授山才儀同府西曹掾高祖誅僧辯山才奔會稽依張彪彪敗乃歸高祖紹泰中都督周文育出鎮南豫州不知書疏乃以山才為長史政事悉以委之文育南討剋蕭勃擒歐陽頠計畫多出山才及文育西征王琳留山才監江州事仍鎮豫章文育與侯安都於沌口敗績余孝頃自新林來寇豫章山才收合餘衆依于周迪擒余孝頃李孝欽等遣山才自都陽之樂安嶺東道送于京師除中書侍郎復由樂安嶺綏撫南川諸郡文育重鎮豫章金口山才復為貞威將軍鎮南長史豫章太守文育為熊曇朗所害曇朗囚山才等送于王琳未至而侯安都敗琳將常衆愛於宮亭湖由是山才獲反除貞威將軍新安太守為王琳未平留鎮富陽以捍東道入為員外散騎常侍遷宣惠始興王長史行東揚州事侯安都討留異山才率王府之衆從焉異平除明威將軍東陽太守入為鎮東始興王長史帶會稽郡丞行東揚州事未拜改授散騎常侍兼度支尚書滿歲為真高宗南征周迪以山才為軍司迪平復職余孝頃自海道襲晉安山才又以本官之會稽指授方略還朝坐侍宴與蔡景歷言語過差為有司所奏免官尋授散騎常侍遷雲旗將軍西陽武昌二郡太守天康元年卒時年五十八贈右衞將軍諡曰簡子王質字子貞右光祿大夫通之弟也少慷慨涉獵書史梁世以武帝甥封甲口亭侯補國子周易生射策高第起家祕書郎太子舍人尚書殿中郎遭母憂居喪以孝聞服闋除太子洗馬東宮領直累遷中舍人庶子太清元年除假節寧遠將軍領東宮兵從貞陽侯北伐及貞陽敗績質脫身逃還侯景於壽陽構逆質又領舟師隨衆軍拒之景軍濟江質便退走尋領步騎頓于宣陽門外景軍至京師質不戰而潰乃翦髮為桑門潛匿人間及柳仲禮等會援京邑軍據南岸質又收合餘衆從之京城陷後西奔荊州元帝承制以質為右長史帶河東太守俄遷侍中尋出為持節都督吳州諸軍事寧遠將軍吳州刺史領鄱陽內史荊州陷侯瑱鎮于湓城與質不協遣偏將羊亮代質且以兵臨之質率所部度信安嶺依于留異文帝鎮會稽以兵助質令鎮信安縣永定二年高祖命質率所部踰嶺出豫章隨都督周文育以討王琳質與琳素善或譖云於軍中潛信交通高祖命周文育殺質文育啟請救之獲免尋授散騎常侍晉陵太守文帝嗣位徵守五兵尚書高宗為揚州刺史以質為仁威將軍驃騎府長史天嘉二年除晉安太守高宗輔政以為司徒左長史將軍如故坐公事免官尋為通直散騎常侍遷太府卿都官尚書太建二年卒時年六十贈本官諡曰安子韋載字德基京兆杜陵人也祖叡梁開府儀同三司永昌嚴公父政梁黃門侍郎載少聰惠篤志好學年十二隨叔父稜見沛國劉顯顯問漢書十事載隨問應答曾無疑滯及長博涉文史沉敏有器局起家梁邵陵王法曹參軍遷太子舍人尚書三公郎侯景之亂元帝承制以為中書侍郎尋為建威將軍尋陽太守隨都督王僧辯東討侯景是時僧辯軍于湓城而魯悉達樊俊等各擁兵保境觀望成敗元帝以載為假節都督太原高唐新蔡三郡諸軍事高唐太守仍銜命喻悉達等令出軍討景及大軍東下載率三郡兵自焦湖出柵口與僧辯會于梁山景平除冠軍將軍琅邪太守尋奉使往東陽晉安招撫留異陳寶應等仍授信武將軍義興太守高祖誅王僧辯乃遣周文育輕兵襲載未至而載先覺乃嬰城自守文育攻之甚急載所屬縣卒竝高祖舊兵多善用弩載收得數十人繫以長宀元攵命所親監之使射文育軍約曰十發不兩中者則死每發輒中所中皆斃文育軍稍却因於城外據水立柵相持數旬高祖聞文育軍不利乃自將征之剋其水柵仍遣載族弟翽仭書喻載以誅王僧辯意并奉梁敬帝勑勑載解兵載得書乃以其衆降于高祖高祖厚加撫慰即以其族弟翽監義興郡所部將帥並隨才任使引載恆置左右與之謀議徐嗣徽任約等引齊軍濟江據石頭城高祖問計於載載曰齊軍若分兵先據三吳之路略地東境則時事去矣今可急於淮南即侯景故壘築城以通東道轉輸別命輕兵絕其糧運使進無所虜退無所資則齊將之首旬日可致高祖從其計永定元年除和戎將軍通直散騎常侍二年進號輕車將軍尋加散騎常侍太子右衛率將軍如故天嘉元年以疾去官載有田十餘頃在江乘縣之白山至是遂築室而居屏絕人事吉凶慶弔無所往來不入籬門者幾十載太建中卒於家時年五十八載族弟翽翽字子羽少有志操祖愛梁輔國將軍父乾向汝陰太守翽弱冠喪父哀毀甚至養母撫孤兄弟子以仁孝著稱高祖為南徐州刺史召為征北參軍尋監義興郡永定元年授貞毅將軍步兵校尉遷驍騎將軍領朱衣直閤驍騎之職舊領營兵兼統宿衛自梁代已來其任踰重出則羽儀清道入則與二衛通直臨軒則升殿俠侍翽素有名望每大事恆令俠侍左右時人榮之號曰俠御將軍尋出為宣城太守天嘉二年預平王琳之功封清源縣侯邑二百戶太建中卒官贈明霍羅三州刺史子宏字德禮有文學歷官至永嘉王府諮議參軍陳亡入隋史臣曰昔鄧禹基於文學杜預出自儒雅卒致軍功名著前代晉氏喪亂播遷江左顧榮郗鑒之輩溫嶠謝玄之倫莫非巾褐書生搢紳素譽抗敵以衛社稷立勳而升台鼎自斯以降代有其人但梁室沸騰懦夫立志既身逢際會見仗於時主美矣
