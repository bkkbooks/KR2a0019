body:
  text: 陳書卷二十二列傳第十六陸子隆錢道戢駱牙陸子隆字興世吳郡吳人也祖敞之梁嘉興令父悛封氏令子隆少慷慨有志功名起家東宮直後侯景之亂於鄉里聚徒是時張彪為吳郡太守引為將帥彪徙鎮會稽子隆隨之及世祖討彪彪將沈泰吳寶真申縉等皆降而子隆力戰敗績世祖義之復使領其部曲板為中兵參軍歷始豐永興二縣令世祖嗣位子隆領甲仗宿衛尋隨侯安都拒王琳於沌柵口王琳平授左中郎將天嘉元年封益陽縣子邑三百戶出為高唐郡太守二年除明威將軍廬陵太守時周迪據臨川反東昌縣人脩行師應之率兵以攻子隆其鋒甚盛子隆設伏於外仍閉門偃甲示之以弱及行師至腹背擊之行師大敗因乞降子隆許之送于京師四年周迪引陳寶應復出臨川子隆隨都督章昭達討迪迪退走因隨昭達踰東興嶺討陳寶應軍至建安以子隆監郡寶應據建安之湖際以拒官軍子隆與昭達各據一營昭達先與賊戰不利亡其鼓角子隆聞之率兵來救大破賊徒盡獲昭達所亡羽儀甲仗晉安平子隆功最遷假節都督武州諸軍事將軍如故尋改封朝陽縣伯邑五百戶廢帝即位進號智武將軍加員外散騎常侍餘如故華皎據湘州反以子隆居其心腹皎深患之頻遣使招誘子隆不從皎因遣兵攻之又不能剋及皎敗於郢州子隆出兵以襲其後因與王師相會授持節通直散騎常侍都督武州諸軍事進爵為侯增邑并前七百戶尋遷都督荊信祐三州諸軍事宣毅將軍荊州刺史持節常侍如故是時荊州新置治于公安城池未固子隆修建城郭綏集夷夏甚得民和當時號為稱職三年吏民詣都上表請立碑頌美功績詔許之太建元年進號雲麾將軍二年卒時年四十七贈散騎常侍諡曰威子之武嗣之武年十六領其舊軍隨吳明徹北伐有功官至王府主簿弘農太守仍隸明徹明徹於呂梁敗績之武逃歸為人所害時年二十二子隆弟子才亦有幹略從子隆征討有功除南平太守封始興縣子邑三百戶從吳明徹北伐監安州鎮于宿預除中衛始興王諮議參軍遷飊猛將軍信州刺史太建十三年卒時年四十二贈員外散騎常侍錢道戢字子韜吳興長城人也父景深梁漢壽令道戢少以孝行著聞及長頗有幹略高祖微時以從妹妻焉從平盧子略於廣州除濱江令高祖輔政遣道戢隨世祖平張彪于會稽以功拜直閤將軍除員外散騎常侍假節東徐州刺史封永安縣侯邑五百戶仍領甲卒三千隨侯安都鎮防梁山尋領錢塘餘杭二縣令永定三年隨世祖鎮于南皖口天嘉元年又領剡令鎮于縣之南巖尋為臨海太守鎮巖如故侯安都之討留異也道戢帥軍出松陽以斷其後異平以功拜持節通直散騎常侍輕車將軍都督東西二衡州諸軍事衡州刺史領始興內史光大元年增邑并前七百戶高宗即位徵歐陽紇入朝紇疑懼乃舉兵來攻衡州道戢與戰却之及都督章昭達率兵討紇以道戢為步軍都督由間道斷紇之後紇平除左衛將軍太建二年又隨昭達征蕭巋於江陵道戢別督衆軍與陸子隆焚青泥舟艦仍為昭達前軍攻安蜀城降之以功加散騎常侍仁武將軍增邑并前九百戶其年遷仁威將軍吳興太守未行改授使持節都督郢巴武三州諸軍事郢州刺史王師北討道戢與儀同黃法圍歷陽歷陽城平因以道戢鎮之以功加雲麾將軍增邑幷前一千五百戶其年十一月遘疾卒時年六十三贈本官諡曰肅子邈嗣駱牙字旗門吳興臨安人也祖祕道梁安成王田曹參軍父裕鄱陽嗣王中兵參軍事牙年十二宗人有善相者云此郎容貌非常必將遠致梁太清末世祖嘗避地臨安牙母陵覩世祖儀表知非常人賓待甚厚及世祖為吳興太守引牙為將帥因從平杜龕張彪等每戰輒先鋒陷陣勇冠衆軍以功授直閤將軍太平二年以母憂去職世祖鎮會稽起為山陰令永定三年除安東府中兵參軍出鎮冶城尋從世祖拒王琳於南皖世祖即位授假節威虜將軍員外散騎常侍封常安縣侯邑五百戶尋為臨安令遷越州刺史餘竝如故初牙母之卒也于時飢饉兵荒至是始葬詔贈牙母常安國太夫人諡曰恭遷牙為貞威將軍晉陵太守三年以平周迪之功遷冠軍將軍臨川內史太建三年授安遠將軍衡陽內史未拜徙為桂陽太守八年還朝遷散騎常侍入直殿省十年授豐州刺史餘竝如故至德二年卒時年五十七贈安遠將軍廣州刺史子義嗣史臣曰陸子隆錢道戢或舉門願從或舊齒樹勳有統領之才充師旅之寄至於受任藩屏功績竝著美矣駱牙識真有奉知世祖天授之德蓋張良之亞歟牙母智深先覺符柏谷之禮君子知鑒識弘遠其在茲乎
