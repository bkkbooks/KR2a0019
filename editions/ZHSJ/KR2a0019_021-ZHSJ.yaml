body:
  text: 陳書卷二十一列傳第十五謝哲蕭乾謝嘏張種王固孔奐蕭允弟引謝哲字穎豫陳郡陽夏人也祖朏梁司徒父譓梁右光祿大夫哲美風儀舉止醞藉而襟情豁然為士君子所重起家梁祕書郎累遷廣陵太守侯景之亂以母老因寓居廣陵高祖自京口渡江應接郭元建哲乃委質深被敬重高祖為南徐州刺史表哲為長史荊州陷高祖使哲奉表於晉安王勸進敬帝承制徵為給事黃門侍郎領步兵校尉貞陽侯僭位以哲為通直散騎常侍侍東宮敬帝即位遷長兼侍中高祖受命遷都官尚書豫州大中正吏部尚書出為明威將軍晉陵太守入為中書令世祖嗣位為太子詹事出為明威將軍衡陽內史秩中二千石遷長沙太守將軍加秩如故還除散騎常侍中書令廢帝即位以本官領前將軍高宗為錄尚書引為侍中仁威將軍司徒左長史未拜光大元年卒時年五十九贈侍中中書監謚康子蕭乾字思惕蘭陵人也祖嶷齊丞相豫章文獻王父子範梁祕書監乾容止雅正性恬簡善隸書得叔父子雲之法年九歲召補國子周易生梁司空袁昂時為祭酒深敬重之十五舉明經釋褐東中郎湘東王法曹參軍遷太子舍人建安侯蕭正立出鎮南豫州又板錄事參軍累遷中軍宣城王中錄事諮議參軍侯景平高祖鎮南徐州引乾為貞威將軍司空從事中郎遷中書侍郎太子家令永定元年除給事黃門侍郎是時熊曇朗在豫章周迪在臨川留異在東陽陳寶應在建晉共相連結閩中豪帥往往立砦以自保高祖甚患之乃令乾往使諭以逆順并觀虛實將發高祖謂乾曰建晉恃嶮好為姦宄方今天下初定難便出兵昔陸賈南征趙他歸順隨何奉使黥布來臣追想清風髣髴在目況卿坐鎮雅俗才高昔賢宜勉建功名不煩更勞師旅乾既至曉以逆順所在渠帥竝率部衆開壁款附其年就除貞威將軍建安太守天嘉二年留異反陳寶應將兵助之又資周迪兵粮出寇臨川因逼建安乾單使臨郡素無士卒力不能守乃𠫓廾郡以避寶應時閩中守宰竝為寶應迫脅受其署置乾獨不為屈徙居郊野屏絕人事及寶應平乃出詣都督章昭達昭達以狀表聞世祖甚嘉之超授五兵尚書光大元年卒謚曰靜子謝嘏字含茂陳郡陽夏人也祖𦵩齊金紫光祿大夫父舉梁中衛將軍開府儀同三司嘏風神清雅頗善屬文起家梁祕書郎稍遷太子中庶子掌東宮管記出為建安太守侯景之亂嘏之廣州依蕭勃承聖中元帝徵為五兵尚書辭以道阻轉授智武將軍蕭勃以為鎮南長史南海太守勃敗還至臨川為周迪所留久之又度嶺之晉安依陳寶應世祖前後頻召之嘏崎嶇寇虜不能自拔及寶應平嘏方詣闕為御史中丞江德藻所舉劾世祖不加罪責以為給事黃門侍郎尋轉侍中天康元年以公事免尋復本職光大元年為信威將軍中衛始興王長史遷中書令豫州大中正都官尚書領羽林監中正如故太建元年卒贈侍中中書令諡曰光子有文集行於世二子儼伸伷儼官至散騎常侍侍中御史中丞太常卿出監東揚州禎明二年卒於會稽贈中護軍張種字士苗吳郡人也祖辯宋司空右長史廣州刺史父略梁太子中庶子臨海太守種少恬靜居處雅正不妄交遊傍無造請時人為之語曰宋稱敷演梁則卷充清虛學尚種有其風仕梁王府法曹遷外兵參軍以父憂去職服闋為中軍宣城王府主簿種時年四十餘家貧求為始豐令入除中衛西昌侯府西曹掾時武陵王為益州刺史重選府僚以種為征西東曹掾種辭以母老抗表陳請為有司所奏坐黜免侯景之亂種奉其母東奔久之得達鄉里俄而母卒種時年五十而毀瘠過甚又迫以凶荒未獲時葬服制雖畢而居處飲食恆若在喪及景平司徒王僧辯以狀奉奏聞起為貞威將軍治中從事史并為具葬禮葬訖種方即吉僧辯又以種年老傍無胤嗣賜之以妾及居處之具貞陽侯僭位除廷尉卿太子中庶子敬帝即位為散騎常侍遷御史中丞領前軍將軍高祖受禪為太府卿天嘉元年除左民尚書二年權監吳郡尋徵復本職遷侍中領步兵校尉以公事免白衣兼太常卿俄而即真廢帝即位加領右軍將軍未拜改領弘善宮衛尉又領揚東揚二州大中正高宗即位重為都官尚書領左驍騎將軍遷中書令驍騎中正竝如故以疾授金紫光祿大夫種沈深虛靜而識量宏博時人皆以為宰相之器僕射徐陵嘗抗表讓位於種曰臣種器懷沈密文史優裕東南貴秀朝庭親賢克壯其猷宜居左執其為時所推重如此太建五年卒時年七十贈特進諡曰元子種仁恕寡欲雖歷居顯位而家產屢空終日晏然不以為病太建初女為始興王妃以居處僻陋特賜宅一區又累賜無錫嘉興縣侯秩嘗於無錫見有重囚在獄天寒呼出曝日遂失之世祖大笑而不深責有集十四卷種弟稜亦清靜有識度官至司徒左長史太建十一年卒時年七十贈光祿大夫種族子稚才齊護軍孫沖之孫少孤介特立仕為尚書金部郎中遷右丞建康令太舟卿揚州別駕從事史兼散騎常侍使于周還為司農廷尉卿所歷竝以清白稱王固字子堅左光祿大夫通之弟也少清正頗涉文史以梁武帝甥封莫口亭侯舉秀才起家梁祕書郎遷太子洗馬掌東宮管記丁所生母憂去職服闋除丹陽尹丞侯景之亂奔于荊州梁元帝承制以為相國戶曹屬掌管記尋聘于西魏魏人以其梁氏外戚待之甚厚承聖元年遷太子中庶子尋為貞威將軍安南長史尋陽太守荊州陷固之鄱陽隨兄質度東嶺居信安縣紹泰元年徵為侍中不就永定中移居吳郡世祖以固清靜且欲申以婚姻天嘉二年至都拜國子祭酒三年遷中書令四年又為散騎常侍國子祭酒其年以固女為皇太子妃禮遇甚重廢帝即位授侍中金紫光祿大夫時高宗輔政固以廢帝外戚妳媼恆往來禁中頗宣密旨事洩比將伏誅高宗以固本無兵權且居處清潔止免所居官禁錮太建二年隨例為招遠將軍宣惠豫章王諮議參軍遷太中大夫太常卿南徐州大中正七年卒官時年六十三贈金紫光祿大夫喪事所須隨由資給至德二年改葬謚曰恭子固清虛寡欲居喪以孝聞又崇信佛法及丁所生母憂遂終身蔬食夜則坐禪晝誦佛經兼習成實論義而於玄言非所長嘗聘于西魏因宴饗之際請停殺一羊羊於固前跪拜又宴於昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲子寬官至司徒左長史侍中孔奐字休文會稽山陰人也曾祖琇之齊左民尚書吳興太守祖臶太子舍人尚書三公郎父稚孫梁寧遠枝江公主簿無錫令奐數歲而孤為叔父虔孫所養好學善屬文經史百家莫不通涉沛國劉顯時稱學府每共奐討論深相歎服乃執奐手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍尋以相付州舉秀才射策高第起家揚州主簿宣惠湘東王行參軍竝不就又除鎮西湘東王外兵參軍入為尚書倉部郎中遷儀曹侍郎時左民郎沈炯為飛書所謗將陷重辟事連臺閣人懷憂懼奐廷議理之竟得明白丹陽尹何敬容以奐剛正請補功曹史出為南昌侯相值侯景亂不之官京城陷朝士竝被拘縶或薦奐於賊帥侯子鑒子鑒命脫桎梏厚遇之令掌書記時景軍士悉恣其凶威子鑒景之腹心委任又重朝士見者莫不卑俯屈折奐獨敖然自若無所下或諫奐曰當今亂世人思苟免獯羯無知豈可抗之以義奐曰吾性命有在雖未能死豈可取媚凶醜以求全乎時賊徒剝掠子女拘逼士庶奐每保持之得全濟者甚衆尋遭母憂哀毀過禮時天下喪亂皆不能終三年之喪唯奐及吳國張種在寇亂中守持法度竝以孝聞及景平司徒王僧辯先下辟書引奐為左西曹掾又除丹陽尹丞梁元帝於荊州即位徵奐及沈炯竝令西上僧辯累表請留之帝手勑報僧辯曰孔沈二士今且借公其為朝廷所重如此仍除太尉從事中郎僧辯為揚州刺史又補揚州治中從事史時侯景新平每事草創憲章故事無復存者奐博物彊識甄明故實問無不知儀注體式牋表書翰皆出於奐高祖作相除司徒右長史遷給事黃門侍郎齊遣東方老蕭軌等來寇軍至後湖都邑搔擾又四方壅隔粮運不繼三軍取給唯在京師乃除奐為貞威將軍建康令時累歲兵荒戶口流散勍敵忽至徵求無所高祖剋日決戰乃令奐多營麥飯以荷葉裹之一宿之閒得數萬裹軍人旦食訖𠫓廾其餘因而決戰遂大破賊高祖受禪遷太子中庶子永定二年除晉陵太守晉陵自宋齊以來舊為大郡雖經寇擾猶為全實前後二千石多行侵暴奐清白自守妻子竝不之官唯以單舩臨郡所得秩俸隨即分贍孤寡郡中大悅號曰神君曲阿富人殷綺見奐居處素儉乃餉衣一襲氈被一具奐曰太守身居美祿何為不能辦此但民有未周不容獨享溫飽耳勞卿厚意幸勿為煩初世祖在吳中聞奐善政及踐祚徵為御史中丞領揚州大中正奐性剛直善持理多所糾劾朝廷甚敬憚之深達治體每所敷奏上未嘗不稱善百司滯事皆付奐決之遷散騎常侍領步兵校尉中書舍人掌詔誥揚東揚二州大中正天嘉四年重除御史中丞尋為五兵尚書常侍中正如故時世祖不豫臺閣衆事竝令僕射到仲舉共奐決之及世祖疾篤奐與高宗及仲舉并吏部尚書袁樞中書舍人劉師知等入侍醫藥世祖嘗謂奐等曰今三方鼎峙生民未乂四海事重宜須長君朕欲近則晉成遠隆殷法卿等須遵此意奐乃流涕歔欷而對曰陛下御膳違和痊復非久皇太子春秋鼎盛聖德日躋安成王介弟之尊足為周旦阿衡宰輔若有廢立之心臣等愚誠不敢聞詔世祖曰古之遺直復見於卿天康元年乃用奐為太子詹事二州中正如故世祖崩廢帝即位除散騎常侍國子祭酒光大二年出為信武將軍南中郎康樂侯長史尋陽太守行江州事高宗即位進號仁威將軍雲麾始興王長史餘竝如故奐在職清儉多所規正高宗嘉之賜米五百斛并累降勑書殷勤勞問太建三年徵為度支尚書領右軍將軍五年改領太子中庶子與左僕射徐陵參掌尚書五條事六年遷吏部尚書七年加散騎常侍八年改加侍中時有事北討剋復淮泗徐豫酋長降附相繼封賞選紛紜重疊奐應接引進門無停賓加以鑒識人物詳練百氏凡所甄拔衣冠縉紳莫不悅伏性耿介絕請託雖儲副之尊公侯之重溺情相及終不為屈始興王叔陵之在湘州累諷有司固求台鉉奐曰衮章之職本以德舉未必皇枝因抗言於高宗高宗曰始興那忽望公且朕兒為公須在鄱陽王後奐曰臣之所見亦如聖旨後主時在東宮欲以江總為太子詹事令管記陸瑜言之於奐奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲宮竊有所難瑜具以白後主後主深以為恨乃自言於高宗高宗將許之奐乃奏曰江總文華之人今皇太子文華不少豈藉於總如臣愚見願選敦重之才以居輔導帝曰即如卿言誰當居此奐曰都官尚書王廓世有懿德識性敦敏可以居之後主時亦在側乃曰廓王泰之子不可居太子詹事奐又奏曰宋朝范虫念即范泰之子亦為太子詹事前代不疑後主固爭之帝卒以總為詹事由是忤旨其梗正如此初後主欲官其私寵以屬奐奐不從及右僕射陸繕遷職高宗欲用奐已草詔訖為後主所抑遂不行九年遷侍中中書令領左驍騎將軍揚東揚豐三州大中正十一年轉太常卿侍中中正竝如故十四年遷散騎常侍金紫光祿大夫領前軍將軍未拜改領弘範宮衛尉至德元年卒時年七十贈散騎常侍本官如故有集十五卷彈文四卷子紹薪紹忠紹忠字孝揚亦有才學官至太子洗馬儀同鄱陽王東曹掾蕭允字升叔佐蘭陵人也曾祖思話宋征西將軍開府儀同三司尚書右僕射封陽穆公祖惠蒨散騎常侍太府卿左民尚書父介梁侍中都官尚書允少知名風神凝遠通達有識鑒容止醞藉動合規矩起家邵陵王法曹參軍轉湘東王主簿遷太子洗馬侯景攻陷臺城百僚奔散允獨整衣冠坐于宮坊景軍人敬而弗之逼也尋出居京口時寇賊縱橫百姓波駭衣冠士族四出奔散允獨不行人問其故允答曰夫性命之道自有常分豈可逃而獲免乎但患難之生皆生於利苟不求利禍從何生方今百姓爭欲奮臂而論大功一言而取卿相亦何事於一書生哉莊周所謂畏影避迹吾弗為也乃閉門靜處并日而食卒免於患侯景平後高祖鎮南徐州以書召之允又辭疾永定中侯安都為南徐州刺史躬造其廬以申長幼之敬天嘉三年徵為太子庶子三年除稜威將軍丹陽尹丞五年兼侍中聘于周還拜中書侍郎大匠卿高宗即位遷黃門侍郎五年出為安前晉安王長史六年晉安王為南豫州允復為王長史時王尚少未親民務故委允行府州事入為光祿卿允性敦重未嘗以榮利干懷及晉安出鎮湘州又苦攜允允少與蔡景歷善景歷子徵脩父黨之敬聞允將行乃詣允曰公年德竝高國之元老從容坐鎮旦夕自為列曹何為方復辛苦在外允答曰已許晉安豈可忘信其恬於榮勢如此至德三年除中衛豫章王長史累遷通直散騎常侍光勝將軍司徒左長史安德宮少府鎮衛鄱陽王出鎮會稽允又為長史帶會稽郡丞行經延陵季子廟設蘋藻之薦託為異代之交為詩以意辭理清典後主嘗問蔡徵曰卿世與蕭允相知此公志操何如徵曰其清虛玄遠殆不可測至於文章可得而言因誦允詩以對後主嗟賞久之其年拜光祿大夫及隋師濟江允遷于關右是時朝士至長安者例竝授官唯允與尚書僕射謝伷辭以老疾隋文帝義之竝厚賜錢帛尋以疾卒於長安時年八十四弟引引字升叔休方正有器局望之儼然雖造次之間必由法度性聰敏博學善屬文釋褐著作佐郎轉西昌侯儀同府主簿侯景之亂梁元帝為荊州刺史朝士多往歸之引曰諸王力爭禍患方始今日逃難未是擇君之秋吾家再世為始興郡遺愛在民正可南行以存家門耳於是與弟彤及宗親等百餘人奔嶺表時始興人歐陽頠為衡州刺史引往依焉頠後遷為廣州病死子紇領其衆引每疑紇有異因事規正由是情禮漸疎及紇舉兵反時京都士人岑之敬公孫挺等竝皆惶駭唯引恬然謂之敬等曰管幼安袁曜卿亦但安坐耳君子正身以明道直己以行義亦復何憂懼乎及章昭達平番禺引始北還高宗召引問嶺表事引具陳始末帝甚悅即日拜金部侍郎引善隸書為當時所重高宗嘗披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其羽毛耳又謂引曰我每有所忿見卿輒意解何也引曰此自陛下不遷怒臣何預此恩太建七年加戎昭將軍九年除中衛始興王諮議參軍兼金部侍郎引性抗直不事權貴左右近臣無所造請高宗每欲遷用輒為用事者所裁及呂梁覆師戎儲空匱乃轉引為庫部侍郎掌知營造弓弩矟箭等事引在職一年而器械充牣頻加中書侍郎貞威將軍黃門郎十二年吏部侍郎缺所司屢舉王寬謝燮等帝並不用乃中詔用引時廣州刺史馬靖甚得嶺表人心而兵甲精練每年深入俚洞又數有戰功朝野頗生異議高宗以引悉嶺外物情且遣引觀靖審其舉措諷令送質引奉密旨南行外託收督賧物既至番禺靖即悟旨盡遣兒弟下都為質還至灨水而高宗崩後主即位轉引為中庶子以疾去官明年京師多盜乃復起為貞威將軍建康令時殿內朋隊主吳璡及宦官李善度蔡脫兒等多所請屬引一皆不許引族子密時為黃門郎諫引曰李蔡之勢在位皆畏憚之亦宜小為身計引曰吾之立身自有本末亦安能為李蔡改行就令不平不過解職耳吳璡竟作飛書李蔡證之坐免官卒於家時年五十八子德言最知名引宗族子弟多以行義知名弟彤以恬靜好學官至太子中庶子南康王長史密字士機幼而聰敏博學有文詞祖琛梁特進父遊少府卿密太建八年兼散騎常侍聘于齊歷位黃門侍郎太子中庶子散騎常侍史臣曰謝王張蕭咸以清淨為風文雅流譽雖更多難終克成名奐謇諤在公英飆振俗詳其行事抑古之遺愛矣固之蔬菲禪悅斯乃出俗者焉猶且致絓於黜免有懼於傾覆是知上官博陸之權勢閻鄧梁竇之震動吁可畏哉
