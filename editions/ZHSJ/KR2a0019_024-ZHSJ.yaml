body:
  text: 陳書卷二十四列傳第十八周弘正弟弘直弘直子確袁憲周弘正字思行汝南安城人也晉光祿大夫顗之九世孫也祖顒齊中書侍郎領著作父寶始梁司徒祭酒弘正幼孤及弟弘讓弘直俱為叔伯父侍中護軍捨所養年十歲通老子周易捨每與談論輒異之曰觀汝神情穎晤清理警發後世知名當出吾右河東裴子野深相賞納請以女妻之十五召補國子生仍於國學講周易諸生傳習其義以季春入學孟冬應舉學司以其日淺弗之許焉博士到洽議曰周郎年未弱冠便自講一經雖曰諸生實堪師表無俟策試起家梁太學博士晉安王為丹陽尹引為主簿出為鄴令丁母憂去職服闋歷曲阿安吉令普通中初置司文義郎直壽光省以弘正為司義侍郎中大通三年梁昭明太子薨其嗣華容公不得立乃以晉安王為皇太子弘正乃奏記曰竊聞撝謙之象起於羲軒爻畫揖讓之源生於堯舜禪受其來尚矣可得而詳焉夫以廟堂汾水殊途而同歸稷契巢許異名而一貫出者稱為元首處者謂之外臣莫不內外相資表𩹉成治斯蓋萬代同規百王不易者也暨于三王之世寖以陵夷各親其親各子其子乃至七國爭雄劉項競逐皇漢扇其俗有晉揚其波謙讓之道廢多歷年所矣夫文質遞變澆淳相革還樸反古今也其時伏惟明大王殿下天挺將聖聰明神武百辟冠冕四海歸仁是以皇上發德音下明詔以大王為國之儲副乃天下之本焉雖復夏啟周誦漢儲魏兩此數君者安足為大王道哉意者願聞殿下抗目夷上仁之義執子臧大賢之節逃玉輿而弗乘𠫓廾萬乘如脫屣庶改澆競之俗以大吳國之風古有其人今聞其語能行之者非殿下而誰能使無為之化復興於遂邃古讓王之道不墜於來葉豈不盛歟豈不盛歟弘正陋學書生義慙稽古家自汝潁世傳忠烈先人決曹掾燕抗辭九諫高節萬乘正色三府雖盛德之業將絕而狂直之風未墜是以敢布腹心肆其愚瞽如使芻言野說少陳於聽覽縱復委身烹鼎之下絕命肺石之上雖死之日猶生之年其抗直守正皆此類也累遷國子博士時於城西立士林館弘正居以講授聽者傾朝野焉弘正啟梁武帝周易疑義五十條又請釋乾坤二繫曰臣聞易稱立象以盡意繫辭以盡言然後知聖人之情幾可見矣自非含微體極盡化窮神豈能通志成務探賾致遠而宣尼比之桎梏絕韋編於漆字軒轅之所聽瑩遺玄珠於赤水伏惟陛下一日萬機匪勞神於瞬息凝心妙本常自得於天真聖智無以隱其幾深明神無以淪其不測至若爻畫之苞於六經文辭之窮於兩繫名儒劇談以歷載鴻生抵掌以終年莫有試遊其藩未嘗一見其涘自制旨降談裁成易道析至微於秋毫渙曾冰於幽谷臣親承音旨職司宣授後進詵詵不無傳業但乾坤之蘊未剖繫表之妙莫詮使一經深致尚多所惑臣不涯庸淺輕率短陋謹與受業諸生清河張譏等三百一十二人於乾坤二繫象爻未啟伏願聽覽之閑曲垂提訓得使微臣鑽仰成其篤習後昆好事專門有奉自惟多幸懽沐道於堯年肄業終身不知老之將至天尊不聞而冒陳請冰谷寘懷罔識攸厝詔答曰設卦觀象事遠文高作繫表言辭深理奧東魯絕編之思西伯幽憂之作事逾三古人更七聖自商瞿稟承子庸傳授篇簡湮沒歲月遼遠田生表菑川之譽梁丘擅琅邪之學代郡范生山陽王氏人藏荊山之寶各盡玄言之趣說或去取意有詳略近搢紳之學咸有稽疑隨答所問已具別解知與張譏等三百一十二人須釋乾坤文言及二繫萬機小暇試當討論弘正博物知玄象善占候大同末嘗謂弟弘讓曰國家厄運數年當有兵起吾與汝不知何所逃之及梁武帝納侯景弘正謂弘讓曰亂階此矣京城陷弘直為衡陽內史元帝在江陵遺弘直書曰適有都信賢兄博士平安但京師搢紳無不附逆王克已為家臣陸緬身充卒伍唯有周生確乎不拔言及西軍潺湲掩淚恆思吾至如望歲焉松柏後凋一人而已王僧辯之討侯景也弘正與弘讓自拔迎軍僧辯得之甚喜即日啟元帝元帝手書與弘正曰獯醜逆亂寒暑亟離海內相識零落略盡韓非之智不免秦獄劉歆之學猶弊亡新音塵不嗣每以耿灼常欲訪山東而尋子雲問關西而求伯起遇有今信力附相聞遲比來郵慰其延佇仍遣使迎之謂朝士曰晉氏平吳喜獲二陸今我破賊亦得兩周今古一時足為連類及弘正至禮數甚優朝臣無與比者授黃門侍郎直侍中省俄遷左民尚書尋加散騎常侍元帝嘗著金樓子曰余於諸僧重招提琰法師隱士重華陽陶貞白士大夫重汝南周弘正其於義理清轉無窮亦一時之名士也及侯景平僧辯啟送祕書圖籍勑弘正讎校時朝議遷都朝士家在荊州者皆不欲遷唯弘正與僕射王裒言於元帝曰若束脩以上諸士大夫微見古今者知帝王所都本無定處無所與疑至如黔首萬姓若未見輿駕入建鄴謂是列國諸王未名天子今宜赴百姓之心從四海之望時荊陝人士咸云王周皆是東人志願東下恐非良計弘正面折之曰若東人勸東謂為非計君等西人欲西豈成良策元帝乃大笑之竟不還都及江陵陷弘正遁圍而出歸於京師敬帝以為大司馬王僧辯長史行揚州事太平元年授侍中領國子祭酒遷太常卿都官尚書高祖受禪授太子詹事天嘉元年遷侍中國子祭酒往長安迎高宗三年自周還詔授金紫光祿大夫加金章紫綬領慈訓太僕廢帝嗣位領都官尚書總知五禮事仍授太傅長史加明威將軍高宗即位遷特進重領國子祭酒豫州大中正加扶太建五年授尚書右僕射祭酒中正如故尋勑侍東宮講論語孝經太子以弘正朝廷舊臣德望素重於是降情屈禮橫經請益有師資之敬焉弘正特善玄言兼明釋典雖碩學名僧莫不請質疑滯六年卒于官時年七十九詔曰追遠襃德抑有恆規故尚書右僕射領國子祭酒豫州大中正弘正識宇凝深藝業通備辭林義府國老民宗道映庠門望高禮閣卒然殂殞朕用惻然可贈侍中中書監喪事所須量加資給便出臨哭諡曰簡子所著周易講疏十六卷論語疏十一卷莊子疏八卷老子疏五卷孝經疏兩卷集二十卷行于世子墳官至吏部郎弘正二弟弘讓弘直弘讓性簡素博學多通天嘉初以白衣領太常卿光祿大夫加金章紫綬弘直字思方幼而聰敏解褐梁太學博士稍遷西中郎湘東王外兵記室參軍與東海鮑泉南陽宗懍平原劉緩沛郡劉瑴同掌書記入為尚書儀曹郎湘東王出鎮江荊二州累除錄事諮議參軍帶柴桑當陽二縣令及梁元帝承制授假節英果將軍世子長史尋除智武將軍衡陽內史遷貞毅將軍平南長史長沙內史行湘州府州事湘濱縣侯邑六百戶歷邵陵零陵太守雲麾將軍昌州刺史王琳之舉兵也弘直在湘州琳敗乃還朝天嘉中歷國子博士廬陵王長史尚書左丞領羽林監中散大夫祕書監掌國史遷太常卿光祿大夫加金章紫綬太建七年遇疾且卒乃遺疏勑其家曰吾今年已來筋力減耗可謂衰矣而好生之情曾不自覺唯務行樂不知老之將至今時制云及將同朝露七十餘年頗經稱足啟手告全差無遺恨氣絕已後便買市中見材材必須小形者使易提挈斂以時服古人通制但下見先人必須備禮可著單衣裙衫故履既應侍養宜備紛帨或逢善友又須香烟棺內唯安白布手巾麤香爐而已其外一無所用卒于家時年七十六有集二十卷子確確字士潛美容儀寬大有行檢博涉經史篤好玄言世父弘正特所鍾愛解褐梁太學博士司徒祭酒晉安王主簿高祖受禪除尚書殿中郎累遷安成王限內記室高宗即位授東宮通事舍人丁母憂去職及歐陽紇平起為中書舍人命於廣州慰勞服闋為太常卿歷太子中庶子尚書左丞太子家令以父憂去職尋起為貞威將軍吳令確固辭不之官至德元年授太子左衛率中書舍人遷散騎常侍加貞威將軍信州南平王府長史行揚州事為政平允稱為良吏遷都官尚書禎明初遘疾卒于官時年五十九詔贈散騎常侍太常卿官給喪事袁憲字德章尚書左僕射樞之弟也幼聰敏好學有雅量梁武帝脩建庠序別開五館其一館在憲宅西憲常招引諸生與之談論每有新議出人意表同輩咸嗟服焉大同八年武帝撰孔子正言章句詔下國學宣制旨義憲時年十四被召為國子正言生謁祭酒到溉溉目而送之愛其神彩在學一歲國子博士周弘正謂憲父君正曰賢子今茲欲策試不君正曰經義猶淺未敢令試居數日君正遣門下客岑文豪與憲候弘正會弘正將登講坐弟子畢集乃延憲入室授之麈尾令憲樹義時謝岐何妥在坐弘正謂曰二賢雖窮奧賾得無憚此後生耶何謝於是遞起義端深極理致憲與往復數番酬對閑敏弘正謂妥曰恣卿所問勿以童稚相期時學衆滿堂觀者重沓而憲神色自若辯論有餘弘正請起數難終不能屈因告文豪曰卿還咨袁吳郡此郎已堪見代為博士矣時生徒對策多行賄賂文豪請具束脩君正曰我豈能用錢為兒買第耶學司銜之及憲試爭起劇難憲隨問抗答剖析如流到溉顧憲曰袁君正其有後矣及君正將之吳郡溉祖道於征虜亭謂君正曰昨策生蕭敏孫徐孝克非不解義至於風神器局去賢子遠矣尋舉高第以貴公子選尚南沙公主即梁簡文之女也大同元年釋褐祕書郎太清二年遷太子舍人侯景寇逆憲東之吳郡尋丁父憂哀毀過禮敬帝承制徵授尚書殿中郎高祖作相除司徒戶曹永定元年授中書侍郎兼散騎常侍與黃門侍郎王瑜使齊數年不遣天嘉初乃還四年詔復中書侍郎直侍中省太建元年除給事黃門侍郎仍知太常事二年轉尚書吏部侍郎尋除散騎常侍侍東宮三年遷御史中丞領羽林監時豫章王叔英不奉法度逼取人馬憲依事劾奏叔英由是坐免黜自是朝野皆嚴憚焉憲詳練朝章尤明聽斷至有獄情未盡而有司具法者即伺閑暇常為上言之其所申理者甚衆嘗陪醼承香閣賓退之後高宗留憲與衛尉樊俊徙席山亭談宴終日高宗目憲而謂俊曰袁家故為有人其見重如此五年入為侍中六年除吳郡太守以父任固辭不拜改授明威將軍南康內史九年秩滿除散騎常侍兼吏部尚書尋而為真憲以久居清顯累表自求解任高宗曰諸人在職屢有謗書卿處事已多可謂清白別相甄錄且勿致辭十三年遷右僕射參掌選事先是憲長兄簡懿子為左僕射至是憲為右僕射臺省內目簡懿為大僕射憲為小僕射朝廷榮之及高宗不豫憲與吏部尚書毛喜俱受顧命始興王叔陵之肆逆也憲指麾部分預有力焉後主被瘡病篤執憲手曰我兒尚幼後事委卿憲曰羣情喁喁冀聖躬康復後事之旨未敢奉詔以功封建安縣伯邑四百戶領太子中庶子餘竝如故尋除侍中信威將軍太子詹事至德元年太子加元服二年行釋奠之禮憲於是表請解職後主不許給扶二人進號雲麾將軍置佐史皇太子頗不率典訓憲手表陳諫凡十條皆援引古今言辭切直太子雖外示容納而心無悛改後主欲立寵姬張貴妃子始安王為嗣嘗從容言之吏部尚書蔡徵順旨稱賞憲厲色折之曰皇太子國家儲嗣億兆宅心卿是何人輕言廢立夏竟廢太子為吳興王後主知憲有規諫之事歎曰袁德章實骨鯁之臣即日詔為尚書僕射禎明三年隋軍來伐隋將賀若弼進燒宮城北掖門宮衛皆散走朝士稍各引去惟憲衛侍左右後主謂憲曰我從來待卿不先餘人今日見卿可謂歲寒知松柏後凋也後主遑遽將避匿憲正色曰北兵之入必無所犯大事如此陛下安之臣願陛下正衣冠御前殿依梁武見侯景故事後主不從因下榻馳去憲從後堂景陽殿入後主投下井中憲拜哭而出京城陷入于隋隋授使持節昌州諸軍事開府儀同三司昌州刺史開皇十四年詔授晉王府長史十八年卒時年七十贈大將軍安城郡公諡曰簡長子承家仕隋至祕書丞國子司業史臣曰梁元帝稱士大夫中重汝南周弘正信哉斯言也觀其雅量標舉尤善玄言亦一代之國師矣袁憲風格整峻徇義履道韓子稱為人臣委質心無有二憲弗渝終始良可嘉焉
