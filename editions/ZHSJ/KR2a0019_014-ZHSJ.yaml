body:
  text: 陳書卷十四列傳第八衡陽獻王昌南康愍王曇朗子方泰方慶衡陽獻王昌字敬業高祖第六子也梁太清末高祖南征李賁命昌與宣后隨沈恪還吳興及高祖東討侯景昌與宣后世祖竝為景所囚景平拜長城國世子吳興太守時年十六昌容貌偉麗神情秀朗雅性聰辯明習政事高祖遣陳郡謝哲濟陽蔡景歷輔昌為郡又遣吳郡杜之偉授昌以經書昌讀書一覽便誦明於義理剖析如流尋與高宗俱往荊州梁元帝除員外散騎常侍荊州陷又與高宗俱遷關右西魏以高祖故甚禮之高祖即位頻遣使請高宗及昌周人許之而未遣及高祖崩乃遣之是時王琳梗於中流昌未得還居于安陸王琳平後天嘉元年二月昌發自安陸由魯山濟江而巴陵王蕭沇等率百僚上表曰臣聞宗子維城隆周之懋軌封建藩屏有漢之弘規是以卜世斯永寔資邢衞鼎命靈長實賴河楚伏惟陛下神猷光大聖德欽明道高日月德侔造化往者王業惟始天步方艱參奉權謨匡合義烈威略外舉神武內定故以再康禹迹大庇生民者矣及聖武升遐王師遠次皇嗣敻隔繼業靡歸宗祧危殆綴旒非喻既而傳車言反公卿定策纂我洪基光昭景運民心有奉園寢克寧后來其蘇復在茲日物情天意皎然可求王琳逆命逋誅歲久今者連結犬羊乘流縱釁舟旗野陣綿江蔽陸兵疲民弊杼軸用空中外騷然蕃籬罔固乃旰食當朝憑流授律蒼兕既馳長自翦廓清四表澄滌八紘雄圖遐舉仁聲遠暢德化所覃風行草偃故以功深於微禹道大於惟堯豈直社稷用寧斯乃黔黎是賴第六皇弟昌近以妙年出質提契寇手偏隔關徼旋踵末由陛下天倫之愛既深克讓之懷常切伏以大德無私至公有在豈得徇匹夫之恆情忘王業之大計憲章故實式遵典禮欽若姬漢建樹賢戚湘中地維形勝控帶川阜扞城之寄匪親勿居宜啟服衡疑兼崇徽飾臣等參議以昌為使持節散騎常侍都督湘州諸軍事驃騎將軍湘州牧封衡陽郡王邑五千戶加給皁輪三望車後部鼓吹一部班劒二十人啟可奉行詔曰可三月入境詔令主書舍人緣道迎接景子濟江於中流船壞以溺薨四月庚寅喪柩至京師上親出臨哭乃下詔曰夫寵章所以嘉德禮數所以崇親乃歷代之通規固前王之令典新除使持節散騎常侍都督湘州諸軍事驃騎將軍湘州牧衡陽王昌明哲在躬珪璋早秀孝敬內湛聰睿外宣梁季艱虞宗社顛墜西京淪覆陷身關隴及鼎業初基外蕃逆命聘問斯阻音介莫通睠彼機橋將隣烏白今者羣公勠力多難廓清輕傳入郛無勞假道周朝敦其繼好驂駕歸來欣此朝聞庶歡昬定報施徒語曾莫輔仁人之云亡殄悴斯在奄焉薨殞倍增傷悼津門之慟空在恆岫之切不追靜言念之心焉如割宜隆懋典以協徽猷可贈侍中假黃鉞都督中外諸軍事太宰揚州牧給東園溫明祕器九旒鑾輅黃屋左纛武賁班劒百人轀輬車前後部羽葆鼓吹葬送之儀一依漢東平憲王齊豫章文獻王故事仍遣大司空持節迎護喪事大鴻臚副其羽衞殯送所須隨由備辦諡曰獻無子世祖以第七皇子伯信為嗣南康愍王曇朗高祖母弟忠壯王休先之子也休先少倜儻有大志梁簡文之在東宮深被知遇太清中既納侯景有事北方乃使休先召募得千餘人授文德主帥頃之卒高祖之有天下也每稱休先曰此弟若存河洛不足定也梁敬帝即位追贈侍中使持節驃騎將軍南徐州刺史封武康縣公邑一千戶高祖受禪追贈侍中車騎大將軍司徒封南康郡王邑二千戶諡曰忠壯曇朗少孤尤為高祖所愛寵踰諸子有膽力善綏御侯景平後起家為著作佐郎高祖北濟江圍廣陵宿預人東方光據鄉建義乃遣曇朗與杜僧明自淮入泗應赴之齊援大至曇朗與僧明築壘抗禦尋奉命班師以宿預義軍三萬家濟江高祖誅王僧辯留曇朗鎮京口知留府事紹泰元年除中書侍郎監南徐州二年徐嗣徽任約引齊寇攻逼京邑尋而請和求高祖子姪為質時四方州郡竝多未賓京都虛弱粮運不斷在朝文武咸願與齊和親高祖難之而重違衆議乃言於朝曰孤謬輔王室而使蠻夷猾夏不能戡殄何所逃責今在位諸賢且欲息肩偃武與齊和好以靜邊疆若違衆議必謂孤惜子姪今決遣曇朗𠫓廾之寇庭且齊人無信窺窬不已謂我浸弱必當背盟齊寇若來諸君須為孤力鬬也高祖慮曇朗憚行或奔竄東道乃自率步騎往京口迎之以曇朗還京師仍使為質於齊齊果背約復遣蕭軌等隨嗣徽渡江高祖與戰大破之虜蕭軌東方老等齊人請割地幷入馬牛以贖之高祖不許及軌等誅齊人亦害曇朗于晉陽時年二十八是時既與齊絕弗之知也高祖踐祚猶以曇朗襲封南康郡王奉忠壯王祀禮秩一同皇子天嘉二年齊人結好方始知之世祖詔曰夫追遠慎終抑聞前誥南康王曇朗明哲懋親蕃維是屬入質北齊用紓時難皇運兆興未獲旋反永言跂予日夜不忘齊使始至凶問奄及追懷痛悼兼倍常情宜隆寵數以光恆序可贈侍中安東將軍開府儀同三司南徐州刺史諡曰愍乃遣兼郎中令隨聘使江德藻劉師知迎曇朗喪柩以三年春至都初曇朗未質於齊生子方泰方慶及將適齊以二妾自隨在北又生兩子方華方曠亦同得還方泰少麤獷與諸惡少年羣聚遊逸無度世祖以南康王故特寬貰之天嘉元年詔曰南康王曇朗出隔齊庭反身莫測國廟方修奠饗須主可以長男方泰為南康世子嗣南康王後聞曇朗薨於是襲爵南康嗣王尋為仁威將軍丹陽尹置佐史太建四年遷使持節都督廣衡交越成定明新合羅德宜黃利安建石崖十九州諸軍事平越中郎將廣州刺史為政殘暴為有司所奏免官尋起為仁威將軍置佐史六年授持節都督豫章郡諸軍事豫章內史在郡不修民事秩滿之際屢放部曲為劫又縱火延燒邑居因行暴掠驅錄富人徵求財賄代至又淹留不還至都詔以為宗正卿將軍佐史如故未拜為御史中丞宗元饒所劾免官以王還第十一年起為寧遠將軍直殿省尋加散騎常侍量置佐史其年八月高宗幸大壯觀因大閱武命都督任忠領步騎十萬陳於玄武湖都督陳景領樓艦五百出于瓜步江高宗登玄武門觀宴羣臣以觀之因幸樂遊苑設絲竹會仍重幸大壯觀集衆軍振旅而還是時方泰當從啟稱所生母疾不行因與亡命楊鍾期等二十人微服往民閒淫人妻為州所錄又率人仗抗拒傷禁司為有司所奏上大怒下方泰獄方泰初但承行淫不承拒格禁司上曰不承則上測方泰乃投列承引於是兼御史中丞徐君敷奏曰臣聞王者之心匪漏網而私物至治之本無屈法而申慈謹案南康王陳方泰宗屬雖遠幸託葭莩刺舉莫成共治罕績聖上弘以悔往許其錄用宮闈寄切宿衞是尸豈有金門旦啟玉輿曉蹕百司馳騖千隊騰驤憚此翼從之勞妄興晨昏之請飜以危冠淇上袨服桑中臣子之諐莫斯為大宜從霜簡允寘冬秋官臣等參議請依見事解方泰所居官下宗正削爵土謹以白簡奏聞上可其奏尋復本官爵禎明初遷侍中將軍如故三年隋師濟江方泰與忠武將軍南豫州刺史樊猛左衞將軍蔣元遜領水軍於白下往來斷遏江路隋遣行軍元帥長史高熲領船艦泝流當之猛及元遜竝降方泰所部將士離散乃𠫓廾船走及臺城陷與後主俱入關隋大業中為掖令方慶少清警涉獵書傳及長有幹略天嘉中封臨汝縣侯尋為給事中太子洗馬權兼宗正卿直殿省太建九年出為輕車將軍假節都督定州諸軍事定州刺史秩滿又為散騎常侍兼宗正卿至德二年進號智武將軍武州刺史初廣州刺史馬靖久居嶺表大得人心士馬彊盛朝廷疑之至是以方慶為仁威將軍廣州刺史以兵襲靖靖誅進號宣毅將軍方慶性清謹甚得民和四年進號雲麾將軍禎明三年隋師濟江東衡州刺史王勇遣高州刺史戴智烈將五百騎迎方慶欲令承制總督征討諸軍事是時隋行軍總管韋洸帥兵度嶺宣隋文帝敕云若嶺南平定留勇與豐州刺史鄭萬頃且依舊職方慶聞之恐勇賣己乃不從率兵以拒智烈智烈與戰敗之斬方慶於廣州虜其妻子王勇太建中為晉陵太守在職有能名方慶之襲馬靖也朝廷以勇為超武將軍東衡州刺史領始興內史以為方慶聲勢靖誅以功封龍陽縣子及隋軍臨江詔授勇使持節光勝將軍總督衡廣交桂武等二十四州諸軍事平越中郎將仍入援會京城陷勇因移檄管內徵兵據守使其同產弟鄧暠將兵五千頓于嶺上又遣使迎方慶欲假以為名而自執兵要及方慶敗績虜其妻子收其貲產分賞將帥又令其將王仲宣曾孝武迎西衡州刺史衡陽王伯信伯信懼奔于清遠郡孝武追殺之是時韋洸兵已上嶺豐州刺史鄭萬頃據州不受勇召而高梁女子浩洗氏舉兵以應隋軍攻陷傍郡勇計無所出乃以其衆降行至荊州道病卒隋贈大將軍宋州刺史歸仁縣公鄭萬頃滎陽人梁司州刺史紹叔之族子也父旻梁末入魏萬頃通達有材幹周武帝時為司城大夫出為溫州刺史至德中與司馬消難來奔尋拜散騎常侍昭武將軍豐州刺史在州甚有惠政吏民表請立碑詔許焉初萬頃之在周深被隋文帝知遇及隋文踐祚常思還北及王勇之殺方慶萬頃乃率州兵拒勇遣使由間道降于隋軍拜上儀同尋卒史臣曰獻愍二王聯華霄漢或壤子之暱或猶子之寵而機橋為阻驂駕無由有隔於休辰終之以早世悲夫
