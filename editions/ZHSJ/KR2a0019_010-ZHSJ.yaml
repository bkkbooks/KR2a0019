body:
  text: 陳書卷十列傳第四周鐵虎程靈洗子文季周鐵虎不知何許人也梁世南渡語音傖重膂力過人便馬槊事梁河東王蕭譽以勇敢聞譽板為府中兵參軍譽為廣州刺史以鐵虎為興寧令譽遷湘州又為臨蒸令侯景之亂元帝於荊州遣世子方等代譽且以兵臨之譽拒戰大捷方等死鐵虎功最譽委遇甚重及王僧辯討譽於陣獲鐵虎僧辯命烹之鐵虎呼曰侯景未滅柰何殺壯士僧辯奇其言乃宥之還其麾下及侯景西上鐵虎從僧辯克任約獲宋子仙每戰皆有功元帝承制授仁威將軍潼州刺史封沌陽縣子邑三百戶又從僧辯克定京邑降謝答仁平陸納於湘州承聖二年以前後戰功進爵為侯增邑幷前五百戶仍為散騎常侍領信義太守將軍如故高祖誅僧辯鐵虎率所部降因復其本職徐嗣徽引齊寇渡江鐵虎於板橋浦破其水軍盡獲甲仗船舸又攻歷陽襲齊寇步營竝皆克捷嗣徽平紹泰二年遷散騎常侍嚴威將軍太子左衛率尋隨周文育於南江拒蕭勃恆為前軍文育又命鐵虎偏軍於苦竹灘襲勃前軍歐陽頠又隨文育西征王琳於沌口敗績鐵虎與文育侯安都竝為琳所擒琳引見諸將與之語唯鐵虎辭氣不屈故琳盡宥文育之徒獨鐵虎見害時年四十九高祖聞之下詔曰天地之寶所貴曰生形魄之徒所重唯命至如捐生立節効命酬恩追遠懷昔信宜加等散騎常侍嚴威將軍太子左衛率潼州刺史領信義太守沌陽縣開國侯鐵虎器局沈厚風力勇壯北討南征竭忠盡力推鋒江夏致陷凶徒神氣彌雄肆言無撓豈直溫序見害方其理鬚龐德臨危猶能瞋目忠貞如此惻愴兼深可贈侍中護軍將軍青冀二州刺史加封一千戶幷給鼓吹一部侯如故天嘉五年世祖又詔曰漢室功臣形寫宮觀魏朝猛將名配宗祧功烈所以長存世代因之不朽故侍中護軍將軍青冀二州刺史沌陽縣開國侯鐵虎誠節梗亮力用雄敢王業初基行閒累及垂翅賊壘正色寇庭古之遺烈有識同壯隕身不屈雖隆榮等營魂易遠言追嘉惜宜仰陪壖寢恭頒饗奠可配食高祖廟庭子瑜嗣時有盱眙馬明字世朗梁世事鄱陽嗣王蕭範侯景之亂據廬江之東界拒賊臨城柵元帝授散騎常侍平北將軍北六允州刺史領廬江太守荊州陷沒歸于高祖紹泰中復官位封西華縣侯邑二千戶亦隨文育西征王琳於沌口軍敗明力戰死之贈使持節征西將軍郢州刺史程靈洗字玄滌新安海寧人也少以勇力聞步行日二百餘里便騎善游梁末海寧黟歙等縣及鄱陽宣城郡界多盜賊近縣苦之靈洗素為鄉里所畏伏前後守長恆使召募少年逐捕劫盜侯景之亂靈洗聚徒據黟歙以拒景景軍據有新安新安太守湘西鄉侯蕭隱奔依靈洗靈洗奉以主盟梁元帝於荊州承制又遣使間道奉表劉神茂自東陽建義拒賊靈洗攻下新安與神茂相應元帝授持節通直散騎常侍都督新安郡諸軍事雲麾將軍譙州刺史資領新安太守封巴丘縣侯邑五百戶神茂為景所破景偏帥呂子榮進攻新安靈洗退保黟歙及景敗子榮退走靈洗復據新安進軍建德擒賊帥趙桑乾以功授持節散騎常侍都督青冀二州諸軍事青州刺史增邑幷前一千戶將軍太守如故仍令靈洗率所部下揚州助王僧辯鎮防遷吳興太守未行僧辯命靈洗從侯瑱西援荊州荊州陷還都高祖誅僧辯靈洗率所領來援其徒力戰於石頭西門軍不利遣使招諭久之乃降高祖深義之紹泰元年授使持節信武將軍蘭陵太守常侍如故助防京口及平徐嗣徽靈洗有功除南丹陽太守封遂安縣侯增邑并前一千五百戶仍鎮採石隨周文育西討王琳於沌口敗績為琳所拘明年與侯安都等逃歸兼丹陽尹出為高唐太原二郡太守仍鎮南陵遷太子左衛率高祖崩王琳前軍東下靈洗於南陵破之虜其兵士并獲青龍十餘乘以功授持節都督南豫州緣江諸軍事信武將軍南豫州刺史侯瑱等敗王琳于柵口靈洗乘勝逐北據有魯山徵為左衛將軍餘如故天嘉四年周迪重寇臨川以靈洗為都督自鄱陽別道擊之迪又走山谷間五年遷中護軍常侍如故出為使持節都督郢巴武三州諸軍事宣毅將軍郢州刺史廢帝即位進號雲麾將軍華皎之反也遣使招誘靈洗靈洗斬皎使以狀聞朝廷深嘉其忠增其守備給鼓吹一部因推心待之使其子文季領水軍助防是時周遣其將長胡公拓跋定率步騎二萬助皎攻圍靈洗靈洗嬰城固守及皎退乃出軍躡定定不獲濟江以其衆降因進攻周沔州克之擒其刺史裴寬以功進號安西將軍改封重安縣公增邑幷前二千戶靈洗性嚴急御下甚苛刻士卒有小罪必以軍法誅之造次之閒便加捶撻而號令分明與士卒同甘苦衆亦以此依附性好播植躬勤耕稼至於水陸所宜刈穫早晚雖老農不能及也伎妾無游手竝督之紡績至於散用貲財亦弗儉吝光大二年卒於州時年五十五贈鎮西將軍開府儀同三司謚曰忠壯太建四年詔配享高祖廟庭子文季嗣文季字少卿幼習騎射多幹略果決有父風弱冠從靈洗征討必前登陷陣靈洗與周文育侯安都等敗於沌口為王琳所執高祖召陷賊諸將子弟厚遇之文季最有禮容深為高祖所賞永定中累遷通直散騎侍郎句容令世祖嗣位除宣惠始興王府限內中直兵參軍是時王為揚州刺史鎮冶城府中軍事悉以委之天嘉二年除貞毅將軍新安太守仍隨侯安都東討留異異黨向文政據有新安文季率精甲三百輕往攻之文政遣其兄子瓚來拒文季與戰大破瓚軍文政乃降三年始興王伯茂出鎮東州復以文季為鎮東府中兵參軍帶剡令四年陳寶應與留異連結又遣兵隨周迪更出臨川世祖遣信義太守余孝頃自海道襲晉安文季為之前軍所向克捷陳寶應平文季戰功居多還轉府諮議參軍領中直兵出為臨海太守尋乘金翅助父鎮郢城華皎平靈洗及文季竝有扞禦之功及靈洗卒文季盡領其衆起為超武將軍仍助防郢州文季性至孝雖軍旅奪禮而毀瘠甚至太建二年為豫章內史將軍如故服闋襲封重安縣公隨都督章昭達率軍往荊州征蕭巋巋與周軍多造舟艦置于青泥水中時水長漂疾昭達乃遣文季共錢道戢輕舟襲之盡焚其舟艦昭達因蕭巋等兵稍怠又遣文季夜入其外城殺傷甚衆既而周兵大出巴陵內史雷道勤拒戰死之文季僅以身免以功加通直散騎常侍安遠將軍增邑五百戶五年都督吳明徹北討秦郡秦郡前江浦通塗涂水齊人竝下大柱為杙柵水中乃前遣文季領驍勇拔開其柵明徹率大軍自後而至攻秦郡克之又別遣文季圍涇州屠其城進攻盱眙拔之仍隨明徹圍壽陽文季臨事謹急御下嚴整前後所克城壘率皆迮水為堰土木之功動踰數萬每置陣役人文季必先諸將夜則早起迄暮不休軍中莫不服其勤幹每戰恆為前鋒齊軍深憚之謂為程獸以功除散騎常侍明威將軍增邑五百戶又帶新安內史進號武毅將軍八年為持節都督譙州諸軍事安遠將軍譙州刺史其年又督北徐仁州諸軍事北徐州刺史餘竝如故九年又隨明徹北討於呂梁作堰事見明徹傳十年春敗績為周所囚仍授開府儀同三司十一年自周逃歸至渦陽為邊吏所執還送長安死于獄中後主是時既與周絕不之知也至德元年後主始知之追贈散騎常侍尋又詔曰故散騎常侍前重安縣開國公文季纂承門緒克荷家聲早歲出軍雖非元帥啟行為最致果有聞而覆喪車徒允從黜削但靈洗之立功扞禦久而見思文季之埋魂異域有足可憫言念勞舊傷茲廢絕宜存廟食無使餧而可降封重安縣侯邑一千戶以子饗襲封史臣曰程靈洗父子竝御下嚴苛治兵整肅然與衆同其勞苦匪私財利士多依焉故臨戎克辦矣
