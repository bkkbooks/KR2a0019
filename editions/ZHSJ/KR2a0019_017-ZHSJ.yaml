body:
  text: 陳書卷十七列傳第十一王沖王通弟勱袁敬兄子樞王沖字長深琅邪臨沂人也祖僧衍齊侍中父茂璋梁給事黃門侍郎沖母梁武帝妹新安穆公主卒於齊世武帝以沖偏孤深所鍾愛年十八起家梁祕書郎尋為永嘉太守入為太子舍人以父憂去職服闋除太尉臨川王府外兵參軍東宮領直累遷太子洗馬中舍人出為招遠將軍衡陽內史遷武威將軍安成嗣王長史長沙內史將軍如故王薨於湘州仍以沖監湘州事入為太子庶子遷給事黃門侍郎大同三年以帝甥賜爵安東亭侯邑一百五十戶歷明威將軍南郡太守太子中庶子侍中出監吳郡滿歲即真徵為通直散騎常侍兼左民尚書出為明威將軍輕車當陽公府長史江夏太守行郢州事遷平西邵陵王長史轉驃騎廬陵王長史南郡太守王薨行州府事梁元帝鎮荊州為鎮西長史將軍太守如故沖性和順事上謹肅習於法令政在平理佐藩莅人鮮有失德雖無赫赫之譽久而見思由是推重累居二千石又曉音樂習歌舞善與人交貴游之中聲名藉甚侯景之亂梁元帝於荊州承制沖求解南郡以讓王僧辯并獻女妓十人以助軍賞元帝授持節督衡桂成合四州諸軍事雲麾將軍衡州刺史元帝第四子元良為湘州刺史仍以沖行州事領長沙內史侯景平授翊左將軍丹陽尹武陵王舉兵至峽口王琳偏將陸納等據湘州應之沖為納所拘納降重授侍中中權將軍量置佐史尹如故江陵陷敬帝為太宰承制以沖為左長史紹泰中累遷左光祿大夫尚書右僕射遷左僕射開府儀同三司侍中將軍如故尋復領丹陽尹南徐州大中正給扶高祖受禪解尹以本官領左光祿大夫未拜改領太子少傅文帝嗣位解少傅加特進左光祿大夫尋又以本官領丹陽尹參撰律令廢帝即位給親信十人初高祖以沖前代舊臣特申長幼之敬文帝即位益加尊重嘗從文帝幸司空徐度宅宴筵之上賜以几其見重如此光大元年薨時年七十六贈侍中司空諡曰元簡沖有子三十人竝致通官第十二子瑒別有傳王通字公達琅邪臨沂人也祖份梁左光祿大夫父琳司徒左長史琳齊代娶梁武帝妹義興長公主有子九人竝知名通梁世起家國子生舉明經為祕書郎太子舍人以帝甥封武陽亭侯累遷王府主簿限外記室參軍司徒主簿太子中庶子驃騎廬陵王府給事中郎中權何敬容府長史給事黃門侍郎坐事免侯景之亂奔于江陵元帝以為散騎常侍遷守太常卿自侯景亂後臺內宮室竝皆焚燼以通兼部尚書歸于京師專掌繕造江陵陷敬帝承制以通為吏部尚書紹泰元年加侍中尚書如故尋為尚書右僕射吏部如故高祖受禪遷左僕射侍中如故文帝嗣位領太子少傅天康元年為翊右將軍右光祿大夫量置佐史廢帝即位號安右將軍又領南徐州大中正太建元年遷左光祿大夫六年加特進侍中將軍光祿佐史竝如故未拜卒時年七十二詔贈本官諡曰成葬日給鼓吹一部弟質弟固各有傳勱字公濟通之弟也美風儀博涉書史恬然清簡未嘗以利欲干懷梁世為國子周易生射策舉高第除祕書郎太子舍人宣惠武陵王主簿輕車河東王功曹史王出鎮京口勱將隨之藩范陽張纘時典選舉勱造纘言別纘嘉其風采乃曰王生才地豈可游外府乎奏為太子洗馬遷中舍人司徒左西屬出為南徐州別駕從事史大同末梁武帝謁園陵道出朱方勱隨例迎候勑勱令從輦側所經山川莫不顧問勱隨事應對咸有故實又從登北顧樓賦詩辭義清典帝甚嘉之時河東王為廣州刺史乃以勱為冠軍河東王長史南海太守王至嶺南多所侵掠因懼罪稱疾委州還朝勱行廣州府事越中饒沃前後守宰例多貪縱勱獨以清白著聞入為給事黃門侍郎侯景之亂西奔江陵元帝承制以為太子中庶子掌相府管記出為寧遠將軍晉陵太守時兵饑之後郡中凋弊勱為政清簡吏民便安之徵為侍中遷五兵尚書及西魏寇江陵元帝徵湘州刺史宜豐侯蕭循入援以勱監湘州江陵陷敬帝承制以為中書令紹泰元年加侍中高祖為司空以勱兼司空長史高祖為丞相為勱兼丞相長史侍中中書令竝如故時吳中遭亂民多乏絕乃以勱監吳興郡及蕭勃平後又以勱舊在嶺表早有政勣乃授使持節都督廣州等二十州諸軍事平南將軍平越中郎將廣州刺史未行改為衡州刺史持節都督竝如故王琳據有上流衡廣攜貳勱不得之鎮留于大庾嶺天嘉元年徵為侍中都官尚書未拜復為中書令遷太子詹事行東宮事侍中竝如故加金紫光祿大夫領度支尚書廢帝即位加散騎常侍太建元年遷尚書右僕射時東境大水百姓饑饉以勱為仁武將軍晉陵太守在郡甚有威惠郡人表請立碑頌勱政績詔許之徵為中書監重授尚書右僕射領右軍將軍四年五月卒時年六十七贈侍中中書監諡曰溫袁敬字子恭陳郡陽夏人也祖顗宋侍中吏部尚書雍州刺史父昂梁侍中司空諡穆公敬純孝有風格幼便篤學老而無倦釋褐祕書郎累遷太子舍人洗馬中舍人江陵淪覆流寓嶺表高祖受禪敬在廣州依歐陽頠及頠卒其子紇據州將有異志敬累諫紇為陳逆順之理言甚切至紇終不從高宗即位遣章昭達率衆討紇紇將敗之時恨不納敬言朝廷義之其年徵為太子中庶子通直散騎常侍俄轉司徒左長史尋遷左民尚書轉都官尚書領豫州大中正累遷太常卿散騎常侍金紫光祿大夫加特進至德三年卒時年七十九贈左光祿大夫諡曰靖德子元友嗣弟泌自有傳兄子樞樞字踐言梁吳郡太守君正之子也美容儀性沈靜好讀書手不釋卷家世顯貴貲產充積而樞獨居處率素傍無交往端坐一室非公事未嘗出遊榮利之懷淡如也起家梁祕書郎歷太子舍人輕車河東王主簿安前邵陵王中軍宣成城王二府功曹史侯景之亂樞往吳郡省父因丁父憂時四方擾亂人求苟免樞居喪以至孝聞王僧辯平侯景鎮京城衣冠爭往造請樞獨杜門靜居不求聞達紹泰元年徵為給事黃門侍郎未拜除員外散騎常侍兼侍中二年兼吏部尚書其年出為吳興太守永定二年徵為左民尚書未至改侍中掌大選事三年遷都官尚書掌選如故樞博聞彊識明悉舊章初高祖長女永世公主先適陳留太守錢蕆生子岊主及岊竝卒于梁世高祖受命唯公主追封至是將葬尚書主客請詳議欲加蕆駙馬都尉并贈岊官樞議曰昔王姬下嫁必適諸侯同姓為主聞於公羊之說車服不繫顯於詩人之篇漢氏初興列侯尚主自斯以後降嬪素族駙馬都尉置由漢武或以假諸功臣或以加於戚屬是以魏曹植表駙馬奉車趣為一號齊職儀曰凡尚公主必拜駙馬都尉魏晉以來因為瞻準蓋以王姬之重庶姓之輕若不加其等級寧可合卺而酳所以假駙馬之位乃崇於皇女也今公主早薨伉儷已絕既無禮數致疑何須駙馬之授案杜預尚晉宣帝第二女高陵宣公主晉武踐祚而主已亡泰始中追贈公主元凱無復駙馬之號梁之文帝女新安穆公主早薨天監初王氏無追拜之事遠近二例足以據明公主所生既未及成人之禮無勞此授今宜追贈亭侯時以樞議為長天嘉元年守吏部尚書三年即真尋領右軍將軍又領丹陽尹本官如故五年以葬父拜表自解詔賜絹布五十匹錢十萬令葬訖停宅視郡事葬服闋還復本職其年秩滿解尹加散騎常侍將軍尚書竝如故是時僕射到仲舉雖參掌選事銓衡汲引竝出於樞其所舉薦多會上旨謹慎周密清白自居文武職司鮮有遊其門者廢帝即位遷尚書左僕射光大元年卒時年五十一贈侍中左光祿大夫諡曰簡懿有集十卷行於世弟憲自有傳史臣曰王沖王通竝以貴游早升清貫而允蹈禮節篤誠奉上斯為美焉王勱之襟神夷澹袁樞之端操沉冥雖拘放為異而勝㮣一揆古所謂名士者蓋在其人乎
