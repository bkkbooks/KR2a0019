body:
  text: 陳書卷十一唐散騎常侍姚思廉撰列傳第五黄法氍淳于量章昭達黄法氍字仲昭巴山新建人也少勁捷有膽力歩行日三百里距躍三丈頗便書疏閑明簿領出入郡中為鄉閭所憚侯景之亂於鄉里合徒衆太守賀詡下江州法氍監知郡事髙祖將踰嶺入援建業李遷仕作梗中途髙祖命周文育屯于西昌法氍遣兵助文育時法氍出頓新淦縣景遣行臺于慶至豫章慶分兵來襲新淦法氍拒戰敗之髙祖亦遣文育進軍討慶文育疑慶兵彊未敢進法氍率衆會之因進克笙屯俘獲甚衆梁元帝承制授超猛將軍交州刺史資領新淦縣令封巴山縣子邑三百戸承聖三年除明威將軍游騎將軍進爵為侯邑五百戸貞陽侯僭位除左驍騎將軍敬帝即位改封新建縣侯邑如前太平元年割江州四郡置髙州以法氍為使持節散騎常侍都督髙州諸軍事信武將軍髙州刺史鎮于巴山蕭勃遣歐陽頠攻法氍法氍與戰破之永定二年王琳遣李孝欽樊猛余孝頃攻周迪且謀取法氍法氍率兵援迪擒孝頃等三將進號宣毅將軍增邑并前一千戸給鼓吹一部又以拒王琳功授平南將軍開府儀同三司熊曇朗於金口反害周文育法氍共周迪討平之語在曇朗傳世祖嗣位進號安南將軍天嘉二年周迪反法氍率兵會都督吳明徹討迪於工塘迪平法氍功居多徵為使持節散騎常侍都督南徐州諸軍事鎮北大將軍南徐州刺史儀同鼓吹竝如故未拜尋又改授都督江吳二州諸軍事鎮南大將軍江州刺史六年徵為中衛大將軍廢帝即位進爵為公給扶光大元年出為使持節都督南徐州諸軍事鎮北將軍南徐州刺史二年徙為都督郢巴武三州諸軍事鎮西將軍郢州刺史持節如故太建元年進號征西大將軍二年徵為侍中中權大將軍四年出為使持節散騎常侍都督南豫州諸軍事征南大將軍南豫州刺史五年大舉北伐都督吳明徹出秦郡以法氍為都督出歴陽齊遣其歴陽王歩騎五萬來援於小峴築城法氍遣左衞將軍樊毅分兵於大峴禦之大破齊軍盡獲人馬器械於是乃為拍車及歩艦豎拍以逼歴陽歴陽人窘蹴乞降法氍緩之則又堅守法氍怒親率士卒攻城施拍加其樓堞時又大雨城崩克之盡誅戍卒進兵合肥望旗降欵法氍不令軍士侵掠躬自撫勞而與之盟竝放還北以功加侍中改封義陽郡公邑二千戸其年遷都督合霍二州諸軍事征西大將軍合州刺史増邑五百戸七年徙都督豫建光朔合北徐六州諸軍事豫州刺史鎮夀陽侍中散騎常侍持節將軍儀同鼓吹扶竝如故八年十月薨時年五十九贈侍中中權大將軍司空諡曰威子玩嗣淳于量字思明其先濟北人也世居京師父文成仕梁為將帥官至光烈將軍梁州刺史量少善自居處偉姿容有幹略便弓馬梁元帝為荆州刺史文成分量人馬令往事焉起家湘東王國常侍兼西中郎府中兵參軍累遷府佐常兼中兵直兵者十餘載兵甲士卒盛於府中荆雍之界蠻左數反山帥文道期積為邊患中兵王僧辯征之頻戰不利遣量助之量至與僧辯并力大破道期斬其酋長俘虜萬計以功封廣晉縣男邑三百戸授涪陵太守歴為新興武寧二郡太守侯景之亂梁元帝凡遣五軍入援京邑量預其一臺城陷量還荊州元帝承制以量爲假節通直散騎常侍都督巴州諸軍事信威將軍巴州刺史侯景西上攻巴州元帝使都督王僧辯入據巴陵量與僧辯并力拒景大敗景軍擒其將任約進攻郢州獲宋子仙仍隨僧辯克平侯景承聖元年以功授左衞將軍封謝沐縣侯邑五百戸尋出為持節都督桂定東西寧等四州諸軍事信威將軍安逺䕶軍桂州刺史荆州陷量保據桂州王琳擁割湘郢累遣召量量外雖與琳往來而别遣使從閒道歸於髙祖髙祖受禪授持節散騎常侍平西大將軍給鼔吹一部都督刺史竝如故尋進號鎮南將軍仍授都督鎮西大將軍開府儀同三司世祖嗣位進號征南大將軍王琳平後頻請入朝天嘉五年徵為中撫大將軍常侍儀同鼓吹竝如故量所部將帥多戀本土竝欲逃入山谷不願入朝世祖使湘州刺史華晈征衡州界黄洞且以兵迎量天康元年至都以在道淹留為有司所奏免儀同餘竝如故光大元年給鼓吹一部華晈構逆以量為使持節征南大將軍西討大都督總率大艦自郢州樊浦拒之晈平并降周將長胡公拓跋定等以功授侍中中軍大將軍開府儀同三司進封醴陵縣公増邑一千戸未拜出為使持節都督南徐州諸軍事鎮北將軍南徐州刺史侍中儀同鼓吹竝如故大建元年進號征北大將軍給扶三年坐就江陰王蕭季卿買梁陵中樹季卿坐免量免侍中尋復加侍中五年徵為中䕶大將軍侍中儀同鼓吹扶竝如故吳明徹之西伐也量贊成其事遣第六子岑率所領從軍淮南克定量改封始安郡公増邑一千五百戸六年出為使持節都督郢巴南司定四州諸軍事征西大將軍郢州刺史侍中儀同鼓吹扶竝如故七年徵為中軍大將軍䕶軍將軍九年以公事免侍中尋復加侍中十年吳明徹陷没加量使持節都督水陸諸軍事仍授散騎常侍都督南北兖譙三州諸軍事車騎將軍南兖州刺史餘竝如故十三年加左光禄大夫増邑五百戸餘竝如故十四年四月薨時年七十二贈司空章昭達字伯通吳興武康人也祖道蓋齊廣平太守父法尚梁揚州議曹從事昭達性倜儻輕財尚氣少時嘗遇相者謂昭達曰卿容貎甚善須小虧損則當富貴梁大同中昭達為東宮直後因醉墜馬鬢角小傷昭達喜之相者曰未也及侯景之亂昭達率募鄉人援臺城為流矢所中眇其一目相者見之曰卿相善矣不久當貴京城陷昭達還郷里與世祖遊因結君臣之分侯景平世祖為吳興太守昭達杖策來謁世祖世祖見之大喜因委以將帥恩寵優渥超於儕等及髙祖討王僧辯令世祖還長城招聚兵衆以備杜龕頻使昭達往京口禀承計畫僧辯誅後龕遣其將杜泰來攻長城世祖拒之命昭達總知城内兵事及杜泰退走因從世祖東進軍吳興以討杜龕龕平又從世祖東討張彪於會稽克之累功除明威將軍定州刺史是時留異擁據東陽私署守宰髙祖患之乃使昭達為長山縣令居其心腹永定二年除武康令世祖嗣位除員外散騎常侍天嘉元年追論長城之功封欣樂縣侯邑一千戸尋隨侯安都等拒王琳于沌口戰于蕪湖昭達乘平虜大艦中流而進先鋒發拍中于賊艦王琳平昭達册勲第一二年除使持節散騎常侍都督郢巴武沅四州諸軍事智武將軍郢州刺史増邑并前千五百戸尋進號平西將軍周迪據臨川反詔令昭達便道征之及迪敗走徵為䕶軍將軍給鼓吹一部改封邵武縣侯増邑并前二千戸常侍如故四年陳寳應納周迪復共寇臨川又以昭達為都督討迪至東興嶺而迪又退走昭達仍踰嶺頓于建安以討陳寳應寳應據建安晉安二郡之界水陸為栅以拒官軍昭達與戰不利因據其上流命軍士伐木帶枝葉為筏施拍於其上綴以大索相次列營夾于兩岸寳應數挑戰昭達按甲不動俄而暴雨江水大長昭達放筏衝突寳應水栅水栅盡破又出兵攻其歩軍方大合戰會世祖遣余孝頃出自海道適至因并力乘之寳應大潰遂克定閩中盡擒留異寳應等以功授鎮前將軍開府儀同三司初世祖嘗夢昭達升於台鉉及旦以夢告之至是侍醼世祖顧昭達曰卿憶夢不何以償夢昭達對曰當効犬馬之用以盡臣節自餘無以奉償尋又出為使持節都督江郢吳三州諸軍事鎮南將軍江州刺史常侍儀同鼓吹如故廢帝即位遷侍中征南將軍改封邵陵郡公華晈之反也其移書文檄竝假以昭達為辭又頻遣使招之昭達盡執其使送于京師晈平進號征南大將軍増邑并前二千五百戸秩满徵為中撫大將軍侍中儀同鼓吹如故髙宗即位進號車騎大將軍以還朝遅留為有司所劾降號車騎將軍歐陽紇據有嶺南反詔昭達都督衆軍討之昭達倍道兼行達于始興紇聞昭達奄至恇擾不知所為乃出頓洭口多聚沙石盛以竹籠置于水栅之外用遏舟艦昭達居其上流裝艫造拍以臨賊柵又令軍人銜刀潛行水中以斫竹籠籠篾皆解因縱大艦隨流突之賊衆大敗因而擒紇送於京師廣州平以功進車騎大將軍遷司空餘竝如故太建二年率師征蕭巋于江陵時蕭巋與周軍大蓄舟艦於青泥中昭達分遣偏將錢道戢程文季等乘輕舟襲之焚其舟艦周兵又於峽下南岸築壘名曰安蜀城於江上横引大索編葦為橋以度軍糧昭達乃命軍士為長㦸施於樓船之上仰割其索索斷糧絶因縱兵以攻其城降之三年遘疾薨時年五十四贈大將軍増邑五百戸給班劒二十人昭達性嚴刻每奉命出征必晝夜倍道然有所克捷必推功將帥厨膳飲食竝同於羣下將士亦以此附之每飲會必盛設女伎雜樂備盡羌胡之聲音律姿容竝一時之玅雖臨對寇敵旗鼔相望弗之廢也四年配享世祖廟庭子大寳襲封邵陵郡公累官至散騎常侍護軍出為豐州刺史在州貪縱百姓怨酷後主以太僕卿李暈代之至徳三年四月暈將到州大寳乃襲殺暈舉兵反遣其將楊通寇建安建安内史吳慧覺據郡城拒之通累攻不克官軍稍近人情離異大寳計窮乃與通俱逃臺軍主陳景詳率兵追躡大寳大寳既入山山路阻險不復能行通背負之稍進尋為追兵所及生擒送都於路死傳首梟于朱雀航夷三族史臣曰黄法氍淳于量值梁末喪亂劉項未分其有辯明暗見是非者蓋鮮二公達向背之理位至鼎司亦其智也昭達與世祖鄉壤惟舊義等鄧蕭世祖纂歴委任隆重至於戰勝攻収累平寇難斯亦良臣良將一代之吳耿矣陳書卷十一
