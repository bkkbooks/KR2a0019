body:
  text: 陳書卷二十九唐散騎常侍姚思㢘撰列𫝊第二十三宗元饒司馬申毛喜蔡徴宗元饒南郡江陵人也少好學以孝敬聞仕梁世解褐本州主簿遷征南府行參軍仍轉外兵參軍及司徒王僧辯幕府初建元饒與沛國劉師知同為主簿高祖受禪除晉陵令入為尚書功論郎使齊還為廷尉正遷大僕卿領本邑大中正中書通事舍人尋轉廷尉卿加通直散騎常侍兼尚書左丞時高宗初即位軍國務廣事無巨細一以咨之臺省號為稱職遷御史中丞知五禮事時合州刺史陳裒贓汙狼籍遣使就渚斂魚又於六郡乞米百姓甚苦之元饒劾奏曰臣聞建旟求瘼實寄㢘平褰帷恤隐本資仁恕如或貪汙是肆徴賦無猒天網雖疎兹焉弗漏謹案鍾陵縣開國侯合州刺史臣裒因藉多幸預逢抽擢爵由恩被官以私加無徳無功坐尸榮貴譙肥之地久淪非所皇威剋復物仰仁風新邦用輕彌俟寛惠應斯作牧其寄尤重爰降曲恩祖行宣室親承規誨事等言提雖廉潔之懷誠無素蓄而禀兹嚴訓可以厲精遂乃擅行賦斂専肆貪取求粟不厭愧王沆之出賑徴魚無限異羊續之懸枯寘以嚴科實惟明憲臣等參議請依㫖免裒所應復除官其應禁錮及後選左降本資悉依免官之法遂可其奏吳興太守武陵王伯禮豫章内史南康嗣王方泰竝驕蹇放横元饒案奏之皆見削黜元饒性公平善持法諳曉故事明練治體吏有犯法政不便民及於名教不足者随事糾正多所裨益遷貞威將軍南康内史以秩米三千餘斛助民租課存問高年拯救乏絶百姓甚賴焉以課最入朝詔加散騎常侍荆雍湘巴武五州大中正尋以本官重領尚書左丞又為御史中丞歴左民尚書右衞將軍領前將軍吏部尚書太建十三年卒時年六十四詔贈侍中金紫光禄大夫官給喪事司馬申字季和河内温人也祖慧逺梁都水使者父𤣥通梁尚書左民郎申早有風槩十四便善弈棋嘗随父候吏部尚書到仲舉時梁州刺史隂子春領軍朱异在焉子春素知申即於坐所呼與對平申每有妙思异觀而竒之因引申遊處梁邵陵王為丹陽尹以申為主簿屬太清之難父母俱没因此自誓菜食終身梁元帝承制起為開逺將軍遷鎮西外兵記室參軍及侯景宼郢州申隨都督王僧辯據巴陵每進籌策皆見行用僧辯歎曰此生要鞬汗馬或非所長若使撫衆守城必有竒績僧辯之討陸納也申在軍中于時賊衆奄至左右披靡申躬蔽僧辯蒙楯而前會裴之横救至賊乃退僧辯顧申而笑曰仁者必有勇豈虗言哉除散騎侍郎紹泰初遷儀同侯安都從事中郎高祖受禪除安東臨川王諮議參軍天嘉三年遷征北諮議參軍兼廷尉監五年除鎮東諮議參軍兼起部郎出為戎昭將軍江乘令甚有治績入為尚書金部郎遷左民郎以公事免太建初起為貞威將軍征南鄱陽王諮議參軍九年除秣陵令在職以清能見紀有白雀巢于縣庭秩滿頃之預東宫賓客尋兼東宫通事舍人遷員外散騎常侍舍人如故及叔陵之肆逆也事既不捷出據東府申馳召右衞蕭摩訶帥兵先至追斬之因入城中收其府庫後主深嘉之以功除太子左衞率封文始縣伯邑四百戸兼中書通事舍人尋遷右衞將軍加通直散騎常侍以疾還第就加散騎常侍右衞舍人如故至徳四年卒後主嗟悼久之下詔曰慎終追逺欽若舊則闔棺定諡抑乃前典故散騎常侍右衞將軍文始縣開國伯申忠肅在公清正立已治繁處約投軀殉義朕任寄情深方康庶績奄然化往傷惻于懐可贈侍中䕶軍將軍進爵為侯増邑為五百户諡曰忠給朝服一具衣一龍剋日舉哀喪事所須随由資給及葬後主自製誌銘辭情傷切卒章曰嗟乎天不與善殱我良臣其見幸如此申歴事三帝内掌機密至於倉卒之閒軍國大事指麾斷决無有滯留子琇嗣官至太子舍人毛喜字伯武滎陽陽武人也祖稱梁散騎侍郎父栖忠梁尚書比部侍郎中權司馬喜少好學善草隸起家梁中衞西昌侯行參軍尋遷記室參軍高祖素知於喜及鎮京口命喜與高宗俱往江陵仍勑高宗曰汝至西朝可諮稟毛喜喜與高宗同謁梁元帝即以高宗為領直喜為尚書功論侍郎及江陵䧟喜及高宗俱遷闗右世祖即位喜自周還進和好之䇿朝廷乃遣周𢎞正等通聘及高宗反國喜於郢州奉迎又遣喜入闗以家屬為請周冡宰宇文䕶執喜手曰能結二國之好者卿也仍迎柳皇后及後主還天嘉三年至京師高宗時為驃騎将軍仍以喜為府諮議參軍領中記室府朝文翰皆喜詞也世祖嘗謂高宗曰我諸子皆以伯為名汝諸兒宜用叔為稱高宗以訪于喜喜即條牒自古名賢杜叔英虞叔卿等二十餘人以啓世祖世祖稱善世祖崩廢帝沖昧高宗錄尚書輔政僕射到仲舉等知朝望有歸乃矯太后令遣高宗還東府當時疑懼無敢措言喜即馳入謂高宗曰陳有天下日淺海内未夷兼國禍併鍾萬邦危懼皇太后深惟社稷至計令王入省方當共康庶績比徳伊周今日之言必非太后之意宗社之重願加三思以喜之愚須臾聞奏無使姦賊得肆其謀竟如其策右衞將軍韓子高始與仲舉通謀其事未發喜請高宗曰宜簡選人馬配與子高并賜鐵炭使修器甲高宗驚曰子高謀反即欲收執何為更如是邪喜荅曰山陵始畢邉冦尚多而子高受委前朝名為杖順然甚輕狷恐不時授首脱其稽誅或愆王度宜推心安誘使不自疑圗之一壯士之力耳高宗深然之卒行其計高宗即位除給事黃門侍郎兼中書舍人典軍國機密高宗將議北伐勑喜撰軍制凡十三條詔頒天下文多不載尋遷太子右衞率右衞將軍以定䇿功封東昌縣侯邑五百户又以本官行江夏武陵桂陽三王府國事太建三年丁母憂去職詔追贈喜母庾氏東昌國太夫人賜布五百匹錢三十萬官給喪事又遣員外散騎常侍杜緬圗其墓田高宗親與緬案圗指畫其見重如此尋起為明威將軍右衞舍人如故改授宣逺將軍義興太守尋以本號入為御史中丞服闋加散騎常侍五兵尚書參掌選事及衆軍北伐得淮南地喜陳安邉之術高宗納之即日施行又問喜曰我欲進兵彭汴於卿意如何喜對曰臣實才非智者安敢預兆未然竊以淮左新平邊民未乂周氏始吞齊國難與爭鋒豈以弊卒疲兵復加深入且棄舟檝之工踐車騎之地去長就短非吴人所便臣愚以為不若安民保境寢兵復約然後廣募英竒順時而動斯久長之術也高宗不從後吴明徹䧟周高宗謂喜曰卿之所言騐於今矣十二年加侍中十三年授散騎常侍丹陽尹遷吏部尚書常侍如故及高宗崩叔陵搆逆勑中庶子陸瓊宣㫖令南北諸軍皆取喜處分賊平又加侍中増封并前九百戸至徳元年授信威將軍永嘉内史加秩中二千石初高宗委政於喜喜亦勤心納忠多所匡益數有諫諍事竝見從由是十餘年間江東狹小遂稱全盛唯略地淮北不納喜謀而吴明徹竟敗高宗深悔之謂袁憲曰不用毛喜計遂令至此朕之過也喜既益親乃言無回避而皇太子好酒徳每共幸人為長夜之宴喜嘗為言高宗以誡太子太子陰患之至是稍見踈逺初後主為始興王所傷及瘡愈而自慶置酒於後殿引江總以下展樂賦詩醉而命喜于時山林初畢未及踰年喜見之不懌欲諌而後主已醉喜升階佯為心疾仆于階下移出省中後主醒乃疑之謂江總曰我悔召毛喜知其無疾但欲阻我懽宴非我所為故姦詐耳乃與司馬申謀曰此人負氣我欲將乞鄱陽兄弟聽其報讐可乎對曰終不為官用願如聖㫖傅縡争之曰不然若許報讐欲置先皇何地後主曰當乞一小郡勿令見人事耳乃以喜為永嘉内史喜至郡不受俸秩政𢎞清静民吏便之遇豐州刺史章大寳舉兵反郡與豐州相接而素無備禦喜乃修治城隍嚴飭器械又遣所部松陽令周磻領千兵援建安賊平授南安内史禎明元年徵為光禄大夫領左驍騎將軍喜在郡有惠政乃徴入朝道路追送者數百里其年道病卒時年七十二有集十卷子處沖嗣官至儀同從事中郎中書侍郎蔡徴字希祥侍中中撫軍將軍景歴子也幼聰敏精識彊記年六嵗詣梁吏部尚書河南褚翔翔字仲舉嗟其頴悟七嵗丁母憂居喪如成人禮繼母劉氏性悍忌視之不以道徴供持益謹初無怨色徴本名覽景歴以為有王祥之性更名徴字希祥梁承聖初高宗為南徐州刺史召補迎主簿尋授太學博士天嘉初遷始興王府法曹行參軍歴外兵參軍尚書主客郎所居以幹理稱太建初遷太子少傅丞新安王主簿通直散騎侍郎晉安王功曹史太子中舍人兼東宫領直中舍人如故丁父憂去職服闋襲封新豐縣侯授戎昭將軍鎮右新安王諮議參軍至徳二年遷廷尉卿尋為吏部郎遷太子中庶子中書舍人掌詔誥尋授左民尚書與僕射江總知撰五禮事尋加寧逺將軍後主器其才幹任寄日重遷吏部尚書安右將軍每十日一往東宫於太子前論述古今得喪及當時政務又勑以廷尉寺獄事無大小取徴議決俄有勑遣徴收募兵士自為部曲徴善撫卹得物情旬月之間衆近一萬徴位望既重兼聲勢熏灼物議咸忌憚之尋徙為中書令將軍如故中令清簡無事或云徴有怨言事聞後主後主大怒收奪人馬将誅之有固諌者獲免禎明三年隋軍濟江後主以徴有幹用權知中領軍日夜勤苦備盡心力後主嘉焉謂曰事寧有以相報及决戰於鍾山南崗勑徴守宫城西北大營尋令督衆軍戰事城陥随例入闗徴羙容儀有口辯多所詳究至於士流官宦皇家戚屬及當朝制度憲章儀軌戸口風俗山川土地問無不對然性頗便佞進取不能以退素自業初拜吏部尚書啓後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徴不自量揆紊我朝章然其父景歴既有締構之功宜且如所啓拜訖即追還徴不修㢘隅皆此類也隋文帝聞其敏贍召見顧問言輒㑹㫖然累年不調久之除太常丞歴尚書民部儀曹郎轉給事卒時年六十七子翼治尚書官至司徒屬徳教學士入隋為東宫學士史臣曰宗元饒夙夜匪懈濟務益時司馬申清恪在朝攻苦立行加之以忠節美矣毛喜深逹事機匡賛時主蔡徴聪敏才贍而擅權自躓惜哉陳書卷二十九
