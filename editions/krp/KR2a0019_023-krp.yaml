  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0019_WYG_023-1a, image: WYG0260/WYG0260-0688a.png}
body:
  text: 陳書卷二十三唐散騎常侍姚思廉撰列傳第十七沈君理王㻛陸繕沈君理字仲倫吳興人也祖僧畟梁左民尚書父巡素與髙祖相善梁太清中為東陽太守侯景平後元帝徵為少府卿荆州䧟蕭詧署金紫光禄大夫君理美風儀博涉經史有識鑒起家湘東王法曹參軍髙祖鎮南徐州巡遣君理自東陽謁于髙祖髙祖器之命尚㑹稽長公主辟為府西曹掾稍遷中衞豫章王從事中郎尋加明威將軍兼尚書吏部侍郎遷給事黄門侍郎監吳郡髙祖受禪拜駙馬都尉封永安亭侯出為吳郡太守是時兵革未寧百姓荒弊軍國之用咸資東境君理招集士卒修治器械民下悅附深以幹理見稱世祖嗣位徵為侍中遷守左民尚書未拜為明威將軍丹陽尹天嘉三年重授左民尚書領歩兵校尉尋改前軍將軍四年侯安都徙鎮江州以本官監南徐州六年出為仁威將軍東陽太守天康元年以父憂去職君理因自請徃荆州迎䘮柩朝議以在位重臣難令出境乃令長兄君嚴往焉及還將葬詔贈巡侍中領軍將軍諡曰敬子其年起君理為信威將軍左衞將軍又起為持節都督東衡衡二州諸軍事仁威將軍東衡州刺史領始興内史又起為明威將軍中書令前後奪情者三並不就太建元年服闋除太子詹事行東宫事遷吏部尚書二年髙宗以君理女為皇太子妃賜爵望蔡縣侯邑五百户四年加侍中五年遷尚書右僕射領吏部侍中如故其年有疾輿駕親臨視九月卒時年四十九詔贈侍中太子少傅䘮事所須隨由資給重贈翊左將軍開府儀同三司侍中如故諡曰貞憲君理子遵儉早卒以弟君髙子遵禮為嗣君理第五叔邁亦方正有幹局仕梁為尚書金部郎永定中累遷中書侍郎天嘉中歴太僕廷尉出為鎮東始興王長史㑹稽郡丞行東揚州事光大元年除尚書吏部郎太建元年遷為通直散騎常侍侍東宫二年卒時年五十二贈散騎常侍君理第六弟君髙字季髙少知名性剛直有吏能以家門外戚早居清顯歴太子舍人洗馬中舍人髙宗司空府從事中郎廷尉卿太建元年東境大水百姓饑弊乃以君髙為貞威將軍呉令尋除太子中庶子尚書吏部郎衞尉卿出為宣逺將軍平南長沙王長史南海太守行廣州事以女為王妃固辭不行復為衛尉卿八年詔授持節都督交廣等十八州諸軍事寧逺將軍平越中郎將廣州刺史嶺南俚獠世相攻伐君髙本文吏無武幹推心撫御甚得民和十年卒于官時年四十七贈散騎常侍諡曰祁子王瑒字子璵司空沖之第十二子也沉靜有器局美風儀舉止醖藉梁大同中起家祕書郎遷太子洗馬元帝承制徴為中書侍郎直殿省仍掌相府管記出為東宫内史遷太子中庶子丁所生母憂歸于丹陽江陵䧟梁敬帝承制除仁威將軍尚書吏部郎中貞陽侯僭位以敬帝為太子授瑒散騎常侍侍東宫尋遷長史兼侍中髙祖入輔以為司徒左長史永定九年遷守五兵尚書世祖嗣位授散騎常侍領太子庶子侍東宫遷領左驍騎將軍太子中庶子常侍侍中如故瑒為侍中六載父冲嘗為瑒辭領中庶子世祖顧謂冲曰所以久留瑒於承華政欲使太子㣲有瑒風法耳廢帝嗣位以侍中領左驍騎將軍光大元年以父憂去職髙宗即位太建元年復除侍中領左驍騎將軍遷度支尚書領羽林監出為信威將軍雲麾始興王長史行州府事未行遷中書令尋加散騎常侍除吏部尚書常侍如故瑒性寛和及居選職務在清靜謹守文案無所抑揚尋授尚書右僕射未拜加侍中遷左僕射參掌選事侍中如故瑒兄弟三十餘人居家篤睦每歲時饋遺遍及近親敦誘諸弟並禀其規訓太建六年卒時年五十四贈侍中特進䕶軍將軍喪事随所資給諡曰光子瑒第十三弟瑜字子珪亦知名美容儀早歴清顯年五十官至侍中永定元年使於齊以陳郡袁憲為副齊以王琳之故執而四之齊文宣帝每行載死囚以從齊人呼曰供御囚每有他怒則召殺之以快其意瑜及憲並危殆者數矣齊僕射楊遵彦憫其無辜每救䕶之天嘉二年還朝詔復侍中頃之卒時年四十贈本官諡曰貞子陸繕字士繻呉郡呉人也祖恵曉齊太常卿父任梁御史中丞繕幼有志尚以雅正知名起家梁宣恵武陵王法曹叅軍承聖中授中書侍郎掌東宫管記江陵陷繕微服遁還京師紹泰元年除司徒右長史御史中丞以父任所終固辭不就髙祖引繕為司徒司馬遷給事黄門侍郎領歩兵校尉通直散騎常侍兼侍中永定元年遷侍中時留異擁割東陽新安人向文政與異連結因據本郡朝廷以繕為貞威將軍新安太守世祖嗣位徴為太子中庶子領歩兵校尉掌東宫管記繕儀表端麗進退閑雅世祖使太子諸王咸取則焉其趨歩躡履皆令習繕規矩除尚書吏部郎中歩兵如故仍侍東宫陳寶應平後出為貞毅將軍建安太守秩滿為散騎常侍御史中丞猶以父之所終固辭不許乃權換廨宇徙居之太建初遷度支尚書侍中太子詹事行東宫事領揚州大中正及太子親莅庶政觧行事加散騎常侍改加侍中遷尚書右僕射尋遷左僕射參掌選事侍中如故更為尚書僕射領前將軍重授左僕射領揚州大中正别勑令與徐陵等七人參議政事十二年卒時年六十三贈侍中特進金紫光禄大夫諡曰安子太子以繕東宫舊臣特賜祖奠繕子辯恵年數歲詔引入殿内辯恵應對進止有父風髙宗因賜名辯恵字敬仁云繕兄子見賢亦方雅髙宗為揚州牧乃以為治中從事史深被知遇歴給事黄門侍郎長沙鄱陽二王長史帶尋陽太守少府卿太建十年卒時年五十贈廷尉卿諡曰平子史臣曰夫衣冠雅道廊廟嘉猷諒以操履敦修局宇詳正經曰容止可觀詩言其儀罔忒彼三子者其有斯風焉陳書卷二十三陳書卷二十三考證沈君理𫝊拜駙馬都尉封永安亭侯亭監本誤定今改從南史陸繕𫝊陸繕字士繻繻一本作儒父任梁御史中丞任一本作倕陳書卷二十三考證
