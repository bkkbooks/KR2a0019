body:
  text: 陳書卷三十五唐散騎常侍姚思㢘撰列𫝊第二十九熊曇朗周廸留異陳寳應熊曇朗豫章南昌人也世為郡著姓曇朗跅㢮不羈有膂力容貎甚偉侯景之亂稍聚少年據豐城縣為柵桀黠刼盗多附之梁元帝以為巴山太守荆州陷曇朗兵力稍彊刼掠隣縣縳賣居民山谷之中最為巨患及侯瑱鎮豫章曇朗外示服從隂欲圗瑱侯方兒之反瑱也曇朗為之謀主瑱敗曇朗獲瑱馬仗子女甚多及蕭勃踰嶺歐陽頠為前軍曇朗紿頠共往巴山襲黄法氍又報法氍期共破頠約曰事捷與我馬仗及出軍與頠犄角而進又紿頠曰余孝頃欲相掩襲須分留竒兵甲仗既少恐不能濟頠乃送甲三百領助之及至城下將戰曇朗僞北法氍乗之頠失援狼狽退衂曇朗取其馬仗而歸時巴山陳定亦擁兵立寨曇朗僞以女妻定子又謂定曰周廸余孝頃並不願此婚必須以彊兵來迎定乃遣精甲三百并土豪二十人往迎既至曇朗執之收其馬仗竝論價責贖紹泰二年曇朗以南川豪帥随例除游騎將軍尋為持節飈猛將軍桂州刺史資領豐城令歴宜新豫章二郡太守王琳遣李孝欽等随余孝頃於臨川攻周迪曇朗率所領赴援其年以功除持節通直散騎常侍寧逺將軍封永化縣侯邑一千户給鼓吹一部又以抗禦王琳之功授平西將軍開府儀同三司餘竝如故及周文育攻余孝勱於豫章曇朗出軍㑹之文育失利曇朗乃害文育以應王琳事見文育𫝊於是盡執文育所部諸將據新淦縣帶江為城王琳東下世祖徴南川兵江州刺史周迪高州刺史黄法氍欲沿流應赴曇朗乃據城列艦斷遏廸等與法氍因帥南中兵築城圍之絶其與琳信使及王琳敗走曇朗黨援離心廸攻陷其城虜其男女萬餘口曇朗走入村中村民斬之𫝊首京師懸于朱雀觀於是盡收其黨族無少長皆棄市周廸臨川南城人也少居山谷有膂力能挽彊弩以弋獵為事侯景之亂廸宗人周續起兵於臨川梁始興王蕭毅以郡讓續廸召募鄉人從之每戰必勇冠衆軍續所部渠帥皆郡中豪族稍驕橫續頗禁之渠帥等竝怨望乃相率殺續推廸為主廸乃據有臨川之地築城于工塘梁元帝授廸持節通直散騎常侍壯武將軍高州刺史封臨汝縣侯邑五百戸紹泰二年除臨川内史尋授使持節散騎常侍信威將軍衡州刺史領臨川内史周文育之討蕭勃也廸按甲保境以觀成敗文育使長史陸山才説廸廸乃大出糧餉以資文育勃平以功加振逺將軍遷江州刺史高祖受禪王琳東下廸欲自據南川乃總召所部八郡守宰結盟聲言入赴朝廷恐其為變因厚慰撫之琳至湓城新吳洞主余孝頃舉兵應琳琳以為南川諸郡可𫝊檄而定乃遣其將李孝欽樊猛等南徴糧餉猛等與余孝頃相合衆且二萬來趨工塘連八城以逼廸廸使周敷率衆頓臨川故郡截斷江口因出與戰大敗之屠其八城生擒李孝欽樊猛余孝頃送于京師收其軍實器械山積并虜其人馬廸竝自納之永定二年以功加平南將軍開府儀同三司増邑一千五百户給鼓吹一部世祖嗣位進號安南將軍熊曇朗之反也廸與周敷黄法氍等率兵共圍曇朗屠之盡有其衆王琳敗後世祖徴廸出鎮湓城又徴其子入朝廸趑趄顧望竝不至豫章太守周敷本屬於廸至是與黄法氍率其所部詣闕世祖録其破熊曇朗之功竝加官賞廸聞之甚不平乃隂與留異相結及王師討異廸疑懼不自安乃使其弟方興率兵襲周敷敷與戰破之又别使兵襲華皎於湓城事覺盡為皎所擒三年春世祖乃下詔赦南川士民為廸所詿誤者使江州刺史吳明徹都督衆軍與高州刺史黄法氍豫章太守周敷討廸於是尚書下符曰告臨川郡士庶昔西京為盛信越背誕東都中興萌寵違戾是以鷹鸇競逐􅀢醢極誅自古有之其來尚矣逆賊周廸本出輿臺有梁喪亂暴掠山谷我高祖躬率百越師次九川濯其泥沙假以毛羽裁解豚佩仍剖虎符卵翼之恩方斯莫喻皇運肇基頗布誠款國歩艱阻竟微効力龍節繡衣藉王爵而御下熊旗組甲因地險而陵上日者王琳始貳蕭勃未夷西結三湘南通五嶺衡廣勘定既安反側江郢紛梗復生攜背擁據一郡茍且百心志貌常違言迹不副特以新吳未静地逺兵彊互相兼并成其形勢收獲器械俘虜士民竝曰私財曽無獻捷時遣一介終持兩端朝廷光大含𢎞引納崇遇遂乃位等三槐任均四嶽富貴隆赫超絶功臣加以出師逾嶺逺相響援按甲斷江翻然猜拒故司空愍公敦以宗盟情同骨肉城池連接勢猶脣齒彭亡之禍坐觀難作階此舋故結其黨與于時北寇侵軼西賊慿陵屝屨糇糧悉以資寇爵號軍容一遵僞黨及王師凱振大定區中天網恢𢎞棄之度外璽書綸誥撫慰綢繆冠盖縉紳敦授重疊至於熊曇朗勦滅豐城克定盖由儀同法氍之元功安西周敷之効力司勲有典懋賞斯舊惡直醜正自為仇讐悖禮姦謀因此滋甚徴出湓城歴年不就求遣侍子累載未朝外誘逋亡招集不逞中調京輦規冀非常擅斂征賦罕歸九府擁遏二賈害及四民潛結賊異共為表裏同惡相求密加應援謂我六軍薄伐三越未寧屠破述城虜縛妻息分襲湓鎮稱兵蠡邦拘逼酋豪攻圍城邑幸國有備應時衂殄假節通直散騎常侍仁武将軍尋陽太守懐仁縣伯華皎明威將軍廬陵太守益陽縣子陸子隆竝破賊徒剋全郡境持節散騎常侍安西將軍定州刺史領豫章太守西豐縣侯周敷躬扞溝壘身當矢石率兹義勇以寡摧衆斬馘萬計俘虜千羣廸方收餘燼還固墉堞使持節安南將軍開府儀同三司高州刺史新建縣侯法氍雄績早宣忠誠夙著未奉王命前率義旅既援敷等又全子隆裹糧擐甲仍躡飛走批熊之旅驅馳越電振武之衆叱咤移山以此追奔理無遺類雖復朽株将拔非待尋斧落葉就殞無勞烈風但去草絶根在於未蔓撲火止燎貴乎速滅分命将帥實資英果今遣鎮南儀同司馬湘東公相劉廣徳兼平西司馬孫曉北新蔡太守魯廣逹持節安南将軍吳州刺史彭澤縣侯魯悉逹甲士萬人歩出興口又遣前吴興太守胡櫟樹功将軍前宣城太守錢法成天門義陽二郡太守樊毅雲麾将軍合州刺史南固縣侯焦僧度嚴武将軍建州刺史辰縣子張智逹持節都督江吳二州諸軍事安南将軍江州刺史安吳縣侯吳明徹樓艦馬歩直指臨川前安成内史劉士京巴山太守蔡僧貴南康内史劉峰廬陵太守陸子隆安成内史闕慎竝受儀同法氍節度同㑹故郡又命尋陽太守華皎光烈将軍巴州刺史潘純陁平西将軍郢州刺史欣樂縣侯章昭逹竝率貔豹逕造賊城使持節散騎常侍鎮南将軍開府儀同三司湘州刺史湘東郡公度分遣偏裨相繼上道戈船蔽水彀騎彌山又詔鎮南将軍開府儀同三司歐陽頠率其子弟交州刺史盛新除太子右率邃衡州刺史侯曉等以勁越之兵踰嶺北邁千里同期百道俱集如脱稽誅更淹旬晦司空大都督安都已平賊異凱歸非乆飲至禮畢乗勝長驅勦撲凶醜如燎毛髪已有明詔罪唯廸身黎民何辜一皆原宥其有因機立功賞如别格執迷不改刑兹罔赦吳明徹至臨川令衆軍作連城攻廸相拒不能剋世祖乃遣高宗縂督討之廸衆潰妻子悉擒乃脱身踰嶺之晉安依于寳應寳應以兵資廸留異又遣第二子忠臣随之明年秋復越東興嶺東興南城永成縣民皆廸故人復共應之世祖遣都督章昭逹征廸廸又散于山谷初侯景之亂也百姓皆棄本業羣聚為盗唯廸所部獨不侵擾竝分結田疇督其耕作民下肆業各有贏儲政敎嚴明徴斂必至餘部之絶者皆仰以取給廸性質朴不事威儀冬則短身布袍夏則紫紗袜腹居常徒跣雖外列兵衞内有女伎挼䋲破篾傍若無人然輕財好施凡所周贍毫釐必均訥於言語而襟懐信實臨川人皆徳之至是竝共蔵匿雖加誅戮無肯言者昭逹仍度嶺頓于建安與陳寳應相抗廸復收合出東興時宣城太守錢肅鎮東興以城降廸吳州刺史陳詳率師攻廸詳兵大敗䖍化侯陳訬陳留太守張遂竝戰死於是廸衆復振世祖遣都督程靈洗撃破之廸又與十餘人竄于山穴中日月轉久相随者亦稍苦之復遣人潛出臨川郡市魚鮭足痛舍於邑子邑子告臨川太守駱牙牙執之令取廸自効因使腹心勇士随入山中誘廸出獵伏兵於道傍斬之𫝊首京都梟于朱雀觀三日留異東陽長山人也世為郡著姓異善自居處言語醖藉為鄉里雄豪多聚惡少陵侮貧賤守宰皆患之梁代為蟹浦戍主歴晉安安固二縣令侯景之亂還鄉里召募士卒東陽郡丞與異有隙引兵誅之及其妻子太守沈廵援臺讓郡於異異使兄子超監知郡事率兵随廵出都及京城陷異随臨城公蕭大連大連板為司馬委以軍事異性殘暴無逺畧督責大連軍主及以左右私樹威福衆竝患之㑹景将軍宋子仙濟浙江異奔還鄉里尋以其衆降于子仙是時大連亦趣東陽之信安嶺欲之鄱陽異乃為子仙鄉導令執大連侯景署異為東陽太守收其妻子為質景行臺劉神茂建義拒景異外同神茂而密契於景及神茂敗績為景所誅異獨獲免侯景平後王僧辯使異慰勞東陽仍糾合鄉閭保據巖阻其徒甚盛州郡憚焉元帝以為信安令荆州陷王僧辯以異為東陽太守世祖平定㑹稽異雖轉輸糧饋而擁擅一郡威福在已紹泰二年以應接之功除持節通直散騎常侍信武将軍縉州刺史領東陽太守封永興縣侯邑五百户其年遷散騎常侍信威将軍増邑三百户餘竝如故又以世祖長女豐安公主配異第三子貞臣永定二年徴異為使持節散騎常侍都督南徐州諸軍事平北将軍南徐州刺史異遷延不就世祖即位改授都督縉州諸軍事安南将軍縉州刺史領東陽太守異頻遣其長史王澌為使入朝澌每言朝廷虚弱異信之雖外示臣節恒懐兩端與王琳自鄱陽信安嶺潛通信使王琳又遣使往東陽署守宰及琳敗世祖遣左衞将軍沈恪代異為郡實以兵襲之異出下淮抗禦恪與戰敗績退還錢塘異乃表啓遜謝是時衆軍方事湘郢乃降詔書慰喻且羈縻之異亦知朝廷終討於己乃使兵戍下淮及建徳以備江路湘州平世祖乃下詔曰昔四罪難𢎞大媯之所無赦九黎亂徳少昊之所必誅自古皇王不貪征伐茍為時蠧事非獲已逆賊留異數應亡滅繕甲完聚由來積年進謝羣龍自躍於千里退懐首鼠恒持於百心中嵗密契畨禺既𢎞天網賜以名爵敦以國姻儻望懐音猶能革面王琳竊據中流翻相應接别引南川之嶺路専為東道之主人結附凶渠唯欣禍亂既祅氛盪定氣沮心孤類傷鳥之驚弦等窮獸之謀觸雖復遣家入質子陽之態轉遒侍子還朝隗囂之心方熾朕志相成養不計疵慝披襟解帶敦喻殷勤蜂目彌彰梟聲無改遂置軍江口嚴戌下淮顯然反叛非可容匿且縉邦膏腴稽南殷曠永割王賦長壅國民竹箭良材絶望京輦萑蒲小盗共肆貪殘念彼餘甿兼其慨息西戎屈膝自款重闗秦國依風竝輸侵地三邉已乂四表咸寧唯此微妖所宜清殄可遣使持節都督南徐州諸軍事征北将軍司空南徐州刺史桂陽郡開國公安都指往擒戮罪止異身餘無所問異本謂官軍自錢塘江而上安都乃由㑹稽諸暨歩道襲之異聞兵至大恐棄郡奔于桃支嶺於嶺口立柵自固明年春安都大破其柵異與第二子忠臣奔于陳寳應於是虜其餘黨男女數千人天嘉五年陳寳應平并擒異送都斬于建康市子姪及同黨無少長皆伏誅唯第三子貞臣以尚主獲免陳寳應晉安侯官人也世為閩中著姓父羽有材幹為郡䧺豪寳應性反覆多變詐梁代晉安數反累殺郡将羽初竝扇惑合成其事後復為官軍鄉導破之由是一郡兵權皆自己出侯景之亂晉安太守賓化侯蕭雲以郡讓羽羽年老但治郡事令寳應典兵是時東境饑饉㑹稽尤甚死者十七八平民男女竝皆自賣而晉安獨豐沃寳應自海道寇臨安永嘉及㑹稽餘姚諸暨又載米粟與之貿易多致玉帛子女其有能致舟乘者亦竝奔歸之由是大致貲産士衆彊盛侯景平元帝因以羽為晉安太守高祖輔政羽請歸老求𫝊郡于寳應高祖許之紹泰元年授壯武将軍晉安太守尋加員外散騎常侍二年封侯官縣侯邑五百戸時東西嶺道寇賊擁隔寳應自海道趨于㑹稽貢獻高祖受禪授持節散騎常侍信武将軍閩州刺史領㑹稽太守世祖嗣位進號宣毅将軍又加其父光祿大夫仍命宗正錄其本系編為宗室并遣使條其子女無大小竝加封爵寳應娶留異女為妻侯安都之討異也寳應遣助之又資周廸兵糧出寇臨川及都督章昭逹於東興南城破廸世祖因命昭逹都督衆軍由建安南道渡嶺又命益州刺史領信義太守余孝頃都督㑹稽東陽臨海永嘉諸軍自東道㑹之以討寳應并詔宗正絶其屬籍於是尚書下符曰告晉安士庶昔隴西旅拒漢不稽誅遼東叛渙魏申宏畧若夫無諸漢之䇿勲有扈夏之同姓至於納吳濞之子致橫海之師違姒啓之命有甘誓之討况廼族不繋於宗盟名無紀於庸器而顯成三叛舋深四罪者乎案閩寇陳寳應父子卉服支孽本迷愛敬梁季喪亂閩隅阻絶父既豪俠扇動蠻陬椎䯻箕坐自為渠帥無聞訓義所資姦諂爰肆蜂豺俄而解印炎行方謝漏網吞舟日月居諸棄之度外自東南王氣實表聖基斗牛聚星允符王迹梯山航海雖若款誠擅割壊珍竟微職貢朝廷遵養含𢎞寵靈隆赫起家臨郡兼晝繡之榮裂地置州假藩麾之盛即封户牖仍邑櫟陽乘華轂者十人保弊廬而萬石又以盛漢君臨推恩婁敬隆周朝㑹廼長滕侯由是紫泥青紙逺賁恩澤鄉亭龜組頒及嬰孩自谷遷喬孰復為擬而苞蔵鴆毒敢行狼戾連結留異表裏周廸盟歃婚姻自為脣齒屈彊山谷推移嵗時及我彀騎防山定秦望之西部戈船下瀨克匯澤之南川遂敢舉斧竝助凶孽莫不應弦摧衂盡殪醜徒每以罪在酋渠憫兹驅逼所收俘馘竝勒矜放仍遣中使爰降詔書天網恢宏猶許改思異既走險廸又逃刑誑侮王人為之川藪遂使袁熙請席逺歎頭行馬援觀蛙猶安井底至如遏絶九賦剽掠四民闔境資財盡室封奪凡厥蒼頭皆畧黔首蝥賊相扇叶契連蹤乃復踰超瀛溟寇擾浹口侵軼嶺嶠掩襲述城縳掠吏民焚燒官寺此而可縱孰不可容今遣沙州刺史俞文冏明威将軍程文季假節宣猛将軍成州刺史甘他假節雲旗将軍譚瑱假節宣猛将軍前監臨海郡陳思慶前軍将軍徐智逺明毅将軍宜黄縣開國侯慧紀開逺將軍新除晉安太守趙彖持節通直散騎常侍壮武将軍定州刺史康樂縣開國侯林馮假節信威将軍都督東討諸軍事益州刺史余孝頃率羽林二萬蒙衝蓋海乗跨滄波掃蕩巢窟此皆明恥敎戰濡須鞠旅累從揚僕亟走孫恩斬蛟中流命馮夷而鳴鼓黿鼍為駕􅞂方壺而建旗義安太守張紹賓忠誠款到累使求軍南康内史裴忌新除輕車将軍劉峯東衡州刺史錢道戢竝即遣人仗與紹賓同行故司空歐陽公昔有表奏請宣薄伐遙途意合若伏波之論兵長逝遺城同子顔之勿赦征南薨謝上䇿無忘周南餘恨嗣子弗忝廣州刺史歐陽紇克符家聲聿遵廣畧舟師歩卒二萬分趨水扼長鯨陸掣封狶董率衡廣之師㑹我六軍潼州刺史李䐗明州刺史戴晃新州刺史區白獸壮武将軍脩行師陳留太守張遂前安成内史闕慎前廬陵太守陸子隆前豫章太守任蠻奴巴山太守黄法慈戎昭将軍湘東公世子徐敬成吳州刺史魯廣逹前吳州刺史遂興縣開國侯詳使持節都督征討諸軍事散騎常侍䕶軍将軍昭逹率緹騎五千組甲二萬直渡邵武仍頓晉安按轡揚旌夷山堙谷指期掎角以制飛走前宣威太守錢肅臨川太守駱牙太子左衞率孫詡尋陽太守莫景隆豫章太守劉廣徳竝随機鎮遏絡驛在路使持節散騎常侍鎮南将軍開府儀同三司江州刺史新建縣開國侯法氍戒嚴中流以為後殿斧鉞所臨罪唯元惡及留異父子其黨主帥雖有請泥函谷相背淮隂若能翻然改圗因機立効非止肆眚仍加賞擢其建晉士民久被驅廹者大軍明加撫慰各安樂業流寓失鄉即還本土其餘立功立事已具賞格若執迷不改同惡趦趄斧鉞一臨罔知所赦昭逹既剋周廸踰東興嶺頓于建安余孝頃又自臨海道襲于晉安寳應據建安之湖際逆拒王師水陸為柵昭逹深溝高壘不與戰但命軍士伐木為簰俄而水盛乘流放之突其水柵仍水歩薄之寳應衆潰身奔山草閒窘而就執并其子弟二十人送都斬于建康市史臣曰梁末之災沴羣凶競起郡邑巖穴之長村屯鄔壁之豪資剽掠以致彊恣陵侮而為大高祖應期撥亂戡定安輯熊曇朗周廸留異陳寳應雖身逢興運猶志在亂常曇朗姦慝翻覆夷滅斯為幸矣寳應及異世祖或敦以婚姻或處其類族豈有不能威制盖以徳懐也遂乃背恩負義各立異圗地匪淮南有為帝之志勢非庸蜀啓自王之心嗚呼既其迷暗所致五宗屠勦宜哉陳書卷三十五陳書卷三十五考證熊曇朗𫝊懸於朱雀觀觀南史作航陳書卷三十五考證
