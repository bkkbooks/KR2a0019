body:
  text: 陳書卷三十三唐散騎常侍姚思亷撰列𫝊第二十七儒林沈文阿沈洙戚衮鄭灼張崖威沈徳陸詡基賀徳全緩張譏顧越沈不害王元規蓋今儒者本因古之六學以敎之典籍斯則先聖所以明天道正人倫致治之成法也秦始皇焚書坑儒六學自此缺矣漢武帝立五經博士置弟子員設科射策勸以官禄其傳業者甚衆焉自兩漢登賢咸資經術魏晉浮蕩儒敎淪歇公卿士庻罕通經業矣宋齊之間國學時復開置梁武帝開五館建國學總以五經敎授經各置助敎云武帝或紆鑾駕臨幸庫序釋奠先師躬親試胄申之醼語勞之束帛濟濟焉斯蓋一代之盛矣高祖創業開基承前代離亂衣冠殄盡寇賊未寧既日不暇給弗遑勸課世祖以降稍置學官雖博延生徒成業蓋寡今之採綴蓋亦梁之遺儒云沈文阿字國衞吳興武康人也父峻以儒學聞於梁世授桂州刺史不行文阿性剛彊有膂力少習父業研精章句祖舅太史叔明舅王慧興竝通經術而文阿頗傳之又博採先儒異同自爲義疏治三禮三𫝊察孝亷爲梁臨川王國侍郎累遷兼國子助敎五經博士梁簡文在東宫引爲學士深相禮遇及撰長春義記多使文阿撮異聞以廣之及侯景寇逆簡文别遣文阿招募士卒入援京師城陷與張嵊共保呉興嵊敗文阿竄于山野景素聞其名求之甚急文阿窮廹不知所出登樹自縊遇有所親救之便自投而下折其左臂及景平高祖以文阿州里表爲原鄉令監江隂郡紹泰元年入爲國子博士尋領歩兵校尉兼掌儀禮自泰清之亂臺閣故事無有存者文阿父峻梁武世甞掌朝儀頗有遺藁於是斟酌裁撰禮度皆自之出及高祖受禪文阿輒棄官還武康髙祖大怒發使往誅之時文阿宗人沈恪爲郡請使者寛其死卽面縛鎻頸致於高祖高祖視而笑曰腐儒復何爲者遂赦之高祖崩文阿與尚書左丞徐陵中書舍人劉師知等議大行皇帝靈座俠御衣服之制語在師知𫝊及世祖卽皇帝位剋日謁廟尚書右丞庾持奉詔遣博士議其禮文阿議曰民物推移質文殊軌聖賢因機而立敎王公隨時以適宜夫千人無君不散則亂萬乗無主不危則亡當隆周之日公旦叔父吕召爪牙成王在喪禍幾覆國是以旣葬便有公冠之儀始殯受麻冕之䇿斯蓋示天下以有主慮社稷之艱難逮乎末葉縱横漢承其弊雖文景刑措而七國連兵或踰月卽尊或崩日稱詔此皆有爲而爲之非無心於禮制也今國諱之日雖抑哀於璽紱之重猶未序於君臣之儀古禮朝廟退坐正寝聽羣臣之政今皇帝拜廟還宜御太極殿以正南面之尊此即周康在朝一二臣衞者也其壤奠之節周禮以玉作贄公侯以珪子男執璧此瑞玉也奠贄既竟又復致享天子以璧王后用琮秦燒經典威儀散㓕叔孫通定禮尤失前憲奠贄不珪致享無帛公王同璧鴻臚奏賀若此數事未聞於古後相㳂襲至梁行之夫稱觴奉壽家國大慶四廂雅樂歌奏懽欣今君臣吞哀萬民抑割豈同於惟新之禮乎且周康賔稱奉珪無萬夀之獻此則前凖明矣三宿三咤上宗曰饗斯蓋祭儐受福寧謂賀酒邪愚以今坐正殿止行薦璧之儀無賀酒之禮謹撰謁廟還升正寢羣臣陪薦儀注如别詔可施行尋遷通直散騎常侍兼國子博士領羽林監仍令於東宫講孝經論語天嘉四年卒時年六十一詔贈廷尉卿文阿所撰儀禮八十餘卷經典大義十八卷竝行於世諸儒多傳其學沈洙字𢎞道呉興武康人也祖休稚梁餘杭令父山卿梁國子博士中散大夫洙少方雅好學不妄交遊治三禮春秋左氏𫝊精識彊記五經章句諸子史書問無不答觧巾梁湘東王國左常侍轉中軍宣城王限内參軍板仁威臨賀王記室參軍遷尚書祠部郎中時年蓋二十餘大同中學者多渉獵文史不爲章句而洙獨積思經術呉郡朱异㑹稽賀琛甚嘉之及异琛於士林館講制旨義常使洙爲都講侯景之亂洙竄於臨安時世祖在焉親就習業及高祖入輔除國子博士與沈文阿同掌儀禮高祖受禪加員外散騎常侍歴揚州别駕從事史大匠卿有司奏前寧逺將軍建康令沈孝軌門生陳三兒牒稱主人翁靈柩在周主人奉使闗内因欲迎䘮久而未返此月晦即是再周主人弟息見在此者爲至月末除靈内外即吉爲待主人還情禮申竟以事諮左丞江徳藻徳藻議王衞軍云久䘮不葬唯主人不變其餘親各終月數而除此蓋引禮文論在家内有事故未得葬者耳孝軌既在異域雖已迎䘮還期無指諸弟若遂不除永絶婚嫁此於人情或爲未允中原淪陷已後理有事例宜諮沈常侍詳議洙議曰禮有變正又有從宜禮小記云久而不葬者唯主祭者不除其餘以麻終月數者除䘮則已注云其餘謂傍親如鄭所觧衆子皆應不除王衞軍所引此蓋禮之正也但魏氏東闗之役既失亡屍柩葬禮無期議以爲禮無終身之喪故制使除服晉氏䘮亂或死於虜庭無由迎殯江左故復申明其制李𦙍之祖王華之父竝存亡不測其子制服依時釋縗此竝變禮之宜也孝軌雖因奉使便欲迎䘮而戎狄難親還期未剋愚謂宜依東闗故事在此國内者竝應釋除縗麻毁靈祔祭若䘮柩得還别行改葬之禮自天下寇亂西朝傾覆流播絶域情禮莫申若此之徒諒非一二寧可䘮期無數而弗除衰服朝廷自應爲之限制以義斷恩通訪博識折之禮𠂻徳藻依洙議奏可世祖即位遷通直散騎常侍侍東宫讀尋兼尚書左丞領揚州大中正遷光禄卿侍讀如故廢帝嗣位重爲通直散騎常侍兼尚書左丞遷戎昭將軍輕車衡陽王長史行府國事帶琅邪彭城二郡丞梁代舊律測囚之法日一上起自晡鼓盡於二更及比部郎范泉刪定律令以舊法測立時乆非人所堪分其刻數日再上廷尉以爲新制過輕請集八座丞郎并祭酒孔奐行事沈洙五舍人㑹尚書省詳議時髙宗録尚書集衆議之都官尚書周𢎞正曰未知獄所測人有幾人欵幾人不欵須前責取人名及數并其罪目然後更集得廷尉監沈仲由列稱别制已後有夀羽兒一人坐殺夀慧劉磊渇等八人坐偷馬仗家口渡北依法測之限訖不欵劉道朔坐犯七改偷依法測立首尾二日而欵陳法滿坐被使封藏阿法受錢未及上而欵𢎞正議曰凡小大之獄必應以情正言依凖五聽驗其虗實豈可全恣考掠以判刑罪且測人時節本非古制近代已來方有此法起自晡鼓迄於二更豈是常人所能堪忍所以重械之下危墯之上無人不服誣枉者多朝晚二時同等刻數進退而求於事爲𠂻若謂小促前期致實罪不伏如復時節延長則無愆妄欵且人之所堪既有彊弱人之立意固亦多途至如貫高榜笞刺爇身無完膚戴就熏針竝極困篤不移豈闗時刻長短掠測優劣夫與殺不辜寧失不經罪疑惟輕功疑惟重斯則古之聖王垂此明法愚謂依范泉著制於事為允舍人盛權議曰比部范泉新制尚書周𢎞正明議咸允虞書惟輕之㫖殷頌敷正之言竊尋廷尉監沈仲由等列新制以後凡有獄十一人其所測者十人欵者唯一愚謂染罪之囚獄官宜明加辯析窮考事理若罪有可疑自宜啓審分判幸無濫測若罪有實驗乃可啓審測立此則枉直有分刑宥斯理范泉今牒述漢律云死罪及除名罪證明白考掠已至而抵隠不服者處當列上杜預注云處當證驗明白之狀列其抵隠之意竊尋舊制深峻百中不欵者一新制寛優十中不欵者九參㑹兩文寛猛寔異處當列上未見釐革愚謂宜付典法更詳處當列上之文洙議曰夜中測立緩急易欺兼用晝漏於事爲允但漏刻賖促今古不同漢書律歴何承天祖沖之暅之父子漏經竝自闗鼓至下鼓自晡鼓至闗鼓皆十三刻冬夏四時不異若其日有長短分在中時前後今用梁末改漏下鼓之後分其短長夏至之日各十七刻冬至之日各十二刻伏承命㫖刻同勒令檢一日之刻乃同而四時之用不等廷尉今牒以時刻短促致罪人不欵愚意願去夜測之昧從晝漏之明斟酌古今之間參㑹二漏之義舍秋冬之少刻從夏日之長晷不問寒暑竝依今之夏至朝夕上測各十七刻比之古漏則上多昔四刻即用今漏則冬至多五刻雖冬至之時數刻侵夜正是少日於事非疑庻罪人不以漏短而為捍獄囚無以在夜而致誣求之鄙意竊謂允合衆議以為宜依范泉前制高宗曰沈長史議得中宜更博議左丞宗元饒議曰竊尋沈議非頓異范正是欲使四時均其刻數兼斟酌其佳以㑹優劇即同牒請冩還刪定曹詳改前制高宗依事施行洙以太建元年卒時年五十二戚衮字公文吳郡鹽官人也祖顯齊給事中父霸梁臨賀王府中兵參軍衮少聰慧遊學京都受三禮於國子助敎劉文紹一二年中大義略備年十九梁武帝勅䇿孔子正言并周禮禮記義衮對高第仍除揚州祭酒從事史就國子博士宋懐方質儀禮義懐方北人自魏擕儀禮禮記疏祕惜不𫝊及將亡謂家人曰吾死後戚生若赴便以儀禮禮記義本付之右其不來即宜隨屍而殯其為儒者推許如此尋兼太學博士梁簡文在東宫召衮講論又嘗置宴集𤣥儒之士先命道學互相質難次令中庻子徐摛馳騁大義問以劇談摛辭辯縱横難以答抗諸人懾氣皆失次序時衮說朝聘義摛與往復衮精采自若對答如流簡文深加歎賞尋除員外散騎侍郎又遷員外散騎常侍敬帝承制出為江州長史仍隨沈泰鎮南豫州泰之奔齊也逼衮俱行後自鄴下遁還又隨程文季北伐吕梁軍敗衮没于周乆之得歸仍兼國子助敎除中衞始興王府録事參軍太建十三年卒時年六十三衮於梁代撰三禮義記值亂亡失禮記義四十卷行於世鄭灼字茂昭東陽信安人也祖恵梁衡陽太守父季徽通直散騎侍郎建安令灼幼而聰敏勵志儒學少受業于皇侃梁中大通五年釋褐奉朝請累遷員外散騎侍郎給事中安東臨川王府記室參軍轉平西邵陵王府記室簡文在東宫雅愛經術引灼為西省義學士承聖中除通直散騎侍郎兼國子博士尋為威戎將軍兼中書通事舍人尚祖世祖之世歴安東臨川鎮北鄱陽二王府諮議參軍累遷中散大夫以本職兼國子博士未拜太建十三年卒時年六十八灼性精勤尤明三禮少時嘗夢與皇侃遇於途侃謂灼曰鄭郎開口侃因唾灼口中自後義理逾進灼家貧抄義疏以日繼夜筆毫盡每削用之灼常蔬食講授多苦心熱若瓜時輒偃臥以瓜鎮心起便誦讀其篤志如此時有晉陵張崖呉郡陸詡呉興沈徳威㑹稽賀徳基伹以禮學自命張崖𫝊三禮於同郡劉文紹仕梁歴王府中記室天嘉元年為尚書儀曹郎廣沈文阿儀注撰五禮出為丹陽令王府諮議參軍御史中丞宗元饒表薦為國子博士陸詡少習崔靈恩三禮義宗梁世百濟國表求講禮博士詔令詡行還除給事中定陽令天嘉初侍始興王伯茂讀遷尚書祠部郎中沈徳威字懐遠少有操行梁太清末遁於天目山築室以居雖處亂離而篤學無倦遂治經業天嘉元年徴出都侍太子講禮𫝊尋授太學博士轉國子助敎毎自學還私室即講授道俗受業者數十百人率常如此遷太常丞兼五禮學士尋為尚書儀曹郎後為祠部郎俄丁母憂去職禎明三年入隋官至秦王府主簿年五十五卒賀徳基字承業世𫝊禮學祖文發父淹仕梁俱為祠部郎竝有名當世徳基少遊學于京邑積年不歸衣資罄乏又恥服故弊盛冬止衣裌襦袴嘗於白馬寺前逢一婦人容服甚盛呼徳基入寺門脱白綸巾以贈之仍謂徳基曰君方為重器不久貧寒故以此相遺耳徳基問嫗姓名不答而去徳基於禮記稱為精明居以𫝊授累遷尚書祠部郎徳基雖不至大官而三世儒學俱為祠部時論美其不墜焉全緩字𢎞立呉郡錢塘人也初受易于博士褚仲都篤志研翫得其精微梁太清初歴王國侍郎奉朝請俄轉國子助敎兼司義郎専講詩義紹泰元年除尚書水部郎太建中累遷南始興王府諮議參軍隨府詣湘州以疾卒時年七十四緩治周易老莊時人言𤣥者咸推之張譏字直言清河武城人也祖僧寳梁散騎侍郎太子洗馬父仲悅梁廬陵王府録事參軍尚書祠部郎中譏幼聰俊有思理年十四通孝經論語篤好𤣥言受學于汝南周𢎞正毎有新意為先軰推服梁大同中召補國子正言生梁武帝嘗於文徳殿釋乾坤文言譏與陳郡袁憲等預焉勅令論議諸儒莫敢先出譏乃整容而進諮審循環辭令温雅梁武帝甚異之賜裙襦絹等仍云表卿稽古之力譏幼䘮母有錯綵經帕即母之遺製及有所識家人具以告之每歳時輒對帕哽噎不能自勝及丁父憂居䘮過禮服闋召補湘東王國左常侍轉田曹參軍遷士林館學士簡文在東宫出士林館發孝經題譏論議徃復甚見嗟賞自是每有講集必遣使召譏及侯景寇逆於圍城之中猶侍哀太子於武徳後殿講老荘梁䑓陷譏崎嶇避難卒不事景景平歴臨安令髙祖受禪除太常丞轉始興王府刑獄參軍天嘉中遷國子助敎是時周𢎞正在國學發周易題𢎞正第四弟𢎞且亦在講席譏與𢎞正論議𢎞正乃屈𢎞直危坐厲聲助其申理譏乃正色謂𢎞直曰今日義集辯正名理雖知兄弟急難四公不得有助𢎞直曰僕助君師何為不可舉座以為笑樂𢎞正嘗謂人曰吾毎登座見張譏在席使人懔然高宗世歴建安王府記室參軍兼東宫學士轉武陵王限内記室學士如故後主在東宫集宫僚置宴時造玉柄麈尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏仍令於温文殿講莊老高宗幸宫臨聽賜御所服衣一襲後主嗣位領南平王府諮議參軍東宫學士尋遷國子博士學士如故後主嘗幸鍾山開善寺召從臣坐於寺西南松林下勅召譏豎義時索麈尾未至後主勅取松枝手以屬譏曰可代麈尾顧謂羣臣曰此即是張譏後事禎明三年入隋終於長安時年七十六譏性恬靜不求榮利常慕閑逸所居宅營山池植花果講周易老莊而敎授焉呉郡陸元朗朱孟博一乗寺沙門法才法雲寺沙門慧休至真觀道士姚綏皆𫝊其業譏所撰周易義三十卷尚書義十五卷毛詩義二十卷孝經義八卷論語義二十卷老子義十一卷莊子内篇義十二卷外篇義二十卷雜篇義十卷𤣥部通義十二卷又撰遊𤣥桂林二十四卷後主嘗勅人就其家寫入祕閣子孝則官至始安王記室參軍顧越字思南呉郡鹽官人也所居新坡黄岡世有鄉校由是顧氏多儒學焉越少孤以勤苦自立聰慧有口辯說毛氏詩傍通異義梁太子詹事周捨甚賞之觧褐揚州議曹史兼太子左率丞越於義理精明尤善持論與㑹稽賀文發俱為梁南平王偉所重引為賔客尋補五經博士紹泰元年遷國子博士世祖即位除始興王諮議參軍侍東宫讀世祖以越篤老厚遇之除給事黄門侍郎又領國子博士侍讀如故廢帝嗣立除通直散騎常侍中書舍人華皎之構逆也越在東陽或譖之於高宗言其有異志詔下獄因坐免太建元年卒於家時年七十八時有東陽龔孟舒者亦治毛氏詩善談名理梁武世仕至尋陽郡丞元帝在江州遇之甚重躬師事焉承聖中兼中書舍人天嘉初除員外散騎常侍兼國子助敎太中大夫太建中卒沈不害字孝和呉興武康人也祖總齊尚書祠部郎父懿梁邵陵王參軍不害幼孤而脩立好學十四召補國子生舉明經累遷梁太學博士轉廬陵王府刑獄參軍長沙王府諮議帶汝南令天嘉初除衡陽王府中記室參軍兼嘉徳殿學士自梁季䘮亂至是國學未立不害上書曰臣聞立人建國莫尚於尊儒成俗化民必崇於敎學故東膠西序事隆乎三代環林璧水業盛於兩京自淳源既逺澆波已扇物之感人無窮人之逐欲無節是以設訓垂範啓導心靈譬彼染藍類諸琢玉然後人倫以睦卑高有序忠孝之理既明君臣之道攸固執禮自基魯公所以難侮歌樂已細鄭伯于是前亡干戚舞而有苗至泮宫成而淮夷服長想洙泗之風載懐淹稷之盛有國有家莫不尚已梁太清季年數鍾否剝戎狄外侵姦回内奰朝聞鼓鼙夕炤烽火洪儒碩學觧散甚於坑夷五典九丘湮滅逾乎帷蓋成均自斯墜業瞽宗於是不脩裒成之祠弗陳祼享釋莱之禮無稱爼豆頌聲寂寞遂踰一紀後生敦悦不見函丈之儀晚學鑽仰徒深倚席之歎陛下繼歴升統握鏡臨㝢道洽寰中威加無外濁流已清重氛載廓含生熙阜品庻咸亨宜其𢎞振禮樂建立庠序式稽古典紆迹儒宫選公卿門子皆入於學助敎博士朝夕講肄使擔簦負笈鏘鏘接衽方領矩歩濟濟成林如切如磋聞詩聞禮一年可以功倍三冬於是足用故能擢秀雄州揚庭觀國入仕登朝資優學以自輔莅官從政有經業以治身轖駕列庭青紫拾地古者王世子之貴猶與國子齒降及漢儲茲禮不墜暨乎兩晉斯事彌隆所以見師嚴而道尊者也皇太子天縱生知無待審喻猶宜晦迹俯同専經請業奠爵前師肅若舊典昔闕里之堂草萊自闢舊宅之内絲竹流音前聖遺烈深以烱戒況復江表無虞海外有截豈得不開闡大猷恢𢎞至道寧可使𤣥敎儒風弗興聖世盛徳大業遂藴堯年臣末學小生詞無足算輕獻瞽言伏増悚惕詔答曰省表聞之自舊章㢮廢微言將絶朕嗣膺寳業念在緝熙而兵革未息軍國草創常恐前王令典一朝泯滅卿才思優洽文理可求𢎞惜大體殷勤名敎付外詳議依事施行又表改定樂章詔使製三朝樂歌八首合二十八曲行之樂府五年除灨令入為尚書儀曹郎遷國子博士領羽林監勅治五禮掌策文謚議太建中除仁武南康嗣王府長史行丹陽郡事轉員外散騎常侍光禄卿尋為戎昭將軍明威武陵王長史行呉興郡事俄入為通直散騎常侍兼尚書左丞十二年卒時年六十三不害治經術善屬文雖博綜墳典而家無卷軸每製文操筆立成曽無尋檢僕射汝南周𢎞正常稱之曰沈生可謂意聖人乎著治五禮儀一百卷文集十四卷子志道字崇基少知名解褐揚州主簿尋兼文林著士歴安東新蔡王記室參軍禎明三年入隋王元規字正範太原晉陽人也祖道寳齊員外散騎常侍晉安郡守父瑋梁武陵王府中記室參軍元規八歳而孤兄弟三人隨母依舅氏徃臨海郡時年十二郡土豪劉瑱者資財巨萬以女妻之元規母以其兄弟㓜弱欲結彊援元規泣請曰因不失親古人所重豈得茍安異壤輒婚非類母感其言而止元規性孝事母甚謹晨昏未嘗離左右梁時山隂縣有暴水流漂居宅元規唯有一小船倉卒引其母妹并孤姪入船元規自執檝棹而去留其男女三人閣於樹杪及水退獲全時人皆稱其至行元規少好學從呉興沈文阿受業十八通春秋左氏孝經論語䘮服梁中大通元年詔䇿春秋舉高第時名儒咸稱賞之起家湘東王國左常侍轉員外散騎侍郎簡文之在東宫引為賔客每令講論甚見優禮除中軍宣城王府記室參軍及侯景寇亂擕家屬還㑹稽天嘉中除始興王府功曹參軍領國子助敎轉鎮東鄱陽王府記室參軍領助敎如故後主在東宫引為學士親受禮記左𫝊喪服等義賞賜優厚遷國子祭酒新安王伯固嘗因入宫適㑹元規將講乃啓請執經時論以為榮俄除尚書祠部郎自梁代諸儒相𫝊為左氏學者皆以賈逵服䖍之義難駮杜預凡一百八十條元規引證通析無復疑滯每國家議吉凶大禮常參預焉丁母憂去職服闋除鄱陽王府中録事參軍俄轉散騎侍郎遷南平王府限内參軍王為江州元規隨府之鎮四方學徒不逺千里來請道者常數十百人禎明三年入隋為秦王府東閣祭酒年七十四卒於廣陵元規著春秋發題辭及義記十一卷續經典大義十四卷孝經義記兩卷左𫝊音三卷禮記音兩卷子大業聰敏知名時有呉郡陸慶少好學遍知五經尤明春秋左氏傳節操甚高釋褐梁武陵王國右常侍歴征西府墨曹行參軍除婁令值梁季䘮亂乃覃心釋典經論靡不該究天嘉初徴為通直散騎侍郎不就永陽王為呉郡太守聞其名欲與相見慶固辭以疾時宗人陸榮為郡五官掾慶嘗詣焉王乃微服徃榮第穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚茲鄱陽晉安王俱以記室徴竝不就乃築室屏居以禪誦為事由是𫝊經受業者蓋鮮焉史臣曰夫砥身勵行必先經術樹國崇家率由茲道故王政因之而至治人倫得之而攸序若沈文阿之徒各専經授業亦一代之鴻儒焉文阿加復草創禮儀蓋叔孫通之流亞矣陳書卷三十三陳書卷三十三考證沈洙𫝊祖休稚稚南史作季比之古漏則上多昔四刻南史則字下有一字張譏傳法雲寺沙門慧休休南史作㧞顧越𫝊顧越字思南思南史作允王元規𫝊祖道寳寳南史作實元規唯有一小船倉卒引其母妹并孤姪入船孤南史作姑陳書卷三十三考證
