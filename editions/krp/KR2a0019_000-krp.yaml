body:
  text: 陳書序陳書六本紀三十列𫝊凡三十六篇唐散騎常侍姚思廉撰始思廉父察梁陳之史官也錄二代之事未就而陳亡隋文帝見察甚重之每就察訪梁陳故事察因以所論載每一篇成輙奏之而文帝亦遣虞世基就察求其書又未就而察死察之將死屬思㢘以繼其業唐興武徳五年高祖以自魏以來二百餘嵗世統數更史事放逸乃詔撰次而思廉遂受詔為陳書久之猶不就貞觀三年遂詔論撰於秘書内省十年正月壬子始上之觀察等之為此書厯三世𫝊父子更數十嵗而後乃成盖其難如此然及其既成與宋魏梁齊等書世亦𫝊之者少故學者於其行事之迹亦罕得而詳也而其書亦以罕𫝊則自秘府所藏往往脱悞嘉祐六年八月始詔校讐使可鏤板行之天下而臣等言梁陳等書缺獨館閣所藏恐不足以定著願詔京師及州縣藏書之家使悉上之先皇帝為下其事至七年冬稍稍始集臣等以相校至八年七月陳書三十六篇者始校定可𫝊之學者其疑者亦不敢損益特各疏於篇末其書舊無目列𫝊名氏多闕謬因别為目錄一篇使覽者得詳焉夫陳之為陳盖偷為一切之計非有先王經紀禮義風化之美制治之法可章示後世然而兼權尚訃明於任使恭儉愛人則其始之所以興惑於邪臣溺於嬖妾忘患縱欲則其終之所以亡興亡之端莫非自己致者至於有所因造以為號令威刑職官州郡之制雖其事已淺然亦各施於一時皆學者之所不可不考也而當時之士自爭奪詐偽茍得偷合之徒尚不得不列以為世戒而況於壊亂之中蒼皇之際士之安貧樂義取舍去就不為患禍勢利動其心者亦不絶於其間若此人者可謂篤於善矣盖古人之所思見而不可得風雨之詩所為作者也安可使之泯泯不少概見於天下哉則陳之史其可廢乎盖此書成之既難其後又久不顯及宋興已百年古文遺事靡不畢講而始得盛行於天下列於學官其傳之之難又如此豈非遭遇固自有時也哉臣恂臣穆臣藻臣覺臣彦若臣洙臣鞏謹叙目錄昧死上陳書序欽定四庫全書史部一陳書目錄正史類唐散騎常侍姚思㢘撰本紀六卷列𫝊三十卷凡三十六卷本紀陳書卷一本紀第一高祖上姓陳氏諱覇先陳書卷二本紀第二高祖下陳書卷三本紀第三世祖諱蒨陳書卷四本紀第四廢帝諱伯宗陳書卷五本紀第五宣帝諱頊陳書卷六本紀第六後主諱叔寳列傳陳書卷七列傳第一皇后髙祖章皇后世祖沈皇后廢帝王皇后髙宗栁皇后後主沈皇后張貴妃陳書卷八列傳第二杜僧明周文育子寳安侯安都陳書卷九列傳第三侯瑱歐陽頠子紇吳明徹裴子烈陳書卷十列傳第四周鐡虎程靈洗子文季陳書卷十一列傳第五黄法氍淳于量章昭達陳書卷十二列傳第六胡頴徐度子敬成杜稜沈恪陳書卷十三列傳第七徐世譜魯悉達周敷荀朗子法尚周炅陳書卷十四列傳第八衡陽獻王昌南康愍王曇朗子方泰方慶陳書卷十五列傳第九宗室陳擬陳詳陳慧紀陳書卷十六列傳第十趙知禮蔡景歴劉師知謝岐陳書卷十七列傳第十一王沖王通弟勱袁敬兄子樞陳書卷十八列傳第十二沈衆袁泌劉仲威陸山才王質韋載族弟翽陳書卷十九列傳第十三沈烱虞荔弟寄馬樞陳書卷二十列𫝊第十四到仲舉韓子高華皎陳書卷二十一列傳第十五謝哲蕭乾謝嘏張種王固孔奐蕭允弟引陳書卷二十二列傳第十六陸子隆錢道戢駱牙陳書卷二十三列傳第十七沈君理王瑒陸繕陳書卷二十四列傳第十八周𢎞正弟𢎞直確𢎞直子袁憲陳書卷二十五列𫝊第十九裴忌孫瑒陳書卷二十六列傳第二十徐陵子儉克份弟孝儀陳書卷二十七列傳第二十一江總姚察陳書卷二十八列傳第二十二世祖九王始興王伯茂鄱陽王伯山晉安王伯恭衡陽王伯信廬陵王伯仁江夏王伯義武陵王伯禮永陽王伯智桂陽王伯謀高宗二十九王豫章王叔英長沙王叔堅建安王叔卿宜都王叔明河東王叔獻新蔡王叔齊晉熙王叔文淮南王叔彪始興王叔重尋陽王叔儼岳陽王叔慎義陽王叔達巴山王叔雄武昌王叔虞湘東王叔平臨賀王叔敖陽山王叔宣西陽王叔穆南安王叔儉南郡王叔澄沅陵王叔興岳山王叔韶新興王叔純巴東王叔謨臨海王叔顯新㑹王叔坦新寧王叔隆新昌王叔榮太原王叔匡後主諸子皇太子深吳興王𦙍南平王嶷永嘉王彦南海王䖍信義王祗邵陵王兢會稽王莊東陽王恮吳郡王藩錢唐王恬陳書卷二十九列傳第二十三宗元饒司馬申毛喜蔡徵陳書卷三十列傳第二十四蕭濟陸瓊子從典顧野王傅縡章華陳書卷三十一列傳第二十五蕭摩訶子世㢘任忠樊毅弟猛魯廣達陳書卷三十二列傳第二十六孝行殷不害弟不佞謝貞司馬暠張昭陳書卷三十三列𫝊第二十七儒林沈文阿沈洙戚衮鄭灼張崖威沈徳陸詡基賀徳全緩張譏顧越沈不害王元規陳書卷三十四列𫝊第二十八文學杜之偉顔晃江徳藻庾持許亨褚玠岑之敬陸琰弟瑜父瑜從父兄玠從弟琛何之元徐伯陽張正見蔡凝阮卓陳書卷三十五列傳第二十九熊曇朗周廸留異陳寶應陳書卷三十六列傳第三十始興王叔陵新安王伯固臣等謹案陳書三十六卷唐姚思㢘奉勅撰劉知幾史通謂貞觀初思㢘奉詔撰成二史彌厯九載方始畢功而曽鞏校上序謂姚察録梁陳之事其書未就屬子思㢘繼其業武徳五年思㢘受詔為陳書貞觀三年論撰於祕書内省十年正月壬子始上之是思㢘編緝之功固不止於九載矣知幾又謂陳史初有顧野王傅縡各為撰史學士太建初中書郎陸瓊續撰諸篇姚察就加删改是察之修史實兼採三家考隋書經籍志有顧野王陳書三卷傅縡陳書三卷陸瓊陳書四十二卷殆即察所據之本而思㢘為傅縡陸瓊𫝊詳述撰著獨不言其修史篇第殊為疎畧至顧野王傳稱其撰國史紀傳二百卷與隋志卷帙不符則疑隋志舛訛思亷所記得其真也察傳見二十七卷載其撰梁陳二史事甚詳是書為奉詔所修不同私撰故不用序傳之例無庸以變古為嫌惟察陳亡入隋為祕書丞北絳郡開國公與同時江總袁憲諸人並稽首新朝厯踐華秩而仍列傳於陳書揆以史例失限斷矣且江總何人乃取與其父合傳尤屬自汚觀李商𨼆贈杜牧詩有前身應是梁江總句乃借以相譽豈總之為人唐時尚未論定耶書中惟二卷三卷題陳吏部尚書姚察他卷則俱稱史臣葢察先纂梁書此書僅成二卷其餘皆思亷所補撰今讀其列傳體例秩然出於一手不似梁書之參差亦以此也惟其中記𫝊年月間有牴牾不能不謂之疵累然諸史皆然亦不能獨責此書矣乾隆四十一年九月恭校上總纂官臣紀昀臣陸錫純臣孫士毅總校官臣陸費墀
