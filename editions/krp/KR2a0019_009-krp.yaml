body:
  text: 陳書卷九唐散騎常侍姚思廉撰列傳第三矦瑱歐陽頠子紇吳明徹裴子烈矦瑱字伯玉巴西充國人也父𢎞遠世爲西蜀酋豪蜀賊張文蕚據白崖山有衆萬人梁益州刺史鄱陽王蕭範命𢎞遠討之𢎞遠戰死瑱固請復讐每戰必先鋒陷陣遂斬文蕚由是知名因事範範委以將帥之任山谷夷獠不賓附者竝遣瑱征之累功授輕車府中兵參軍晉康太守範為雍州刺史瑱除超武將軍馮翊太守範遷鎮合肥瑱又隨之侯景圍臺城範乃遣瑱輔其世子嗣入援京邑京城陷瑱與嗣退還合肥仍隨範徙鎭湓城俄而範及嗣皆卒瑱領其衆依于豫章太守莊鐵鐵疑之瑱懼不自安詐引鐵謀事因而刃之據有豫章之地侯景將于慶南略地至豫章城邑皆下瑱窮蹙乃降於慶慶送瑱於景景以瑱與己同姓託為宗族待之甚厚留其妻子及弟為質遣瑱隨慶平定蠡南諸郡及景敗於巴陵景將宋子仙任約等竝為西軍所獲瑱乃誅景黨與以應義軍景亦盡誅其弟及妻子梁元帝授瑱武臣將軍南兖州刺史郫縣侯邑一千戸仍隨都督王僧辯討景恒為前鋒每戰却敵既復臺城景奔吳郡僧辯使瑱率兵追之與景戰於吳松江大敗景盡獲其軍實進兵錢塘景將謝答仁呂子榮等皆降以功除南豫州刺史鎮于姑熟承聖二年齊遣郭元建出自濡須僧辯遣瑱領甲士三千築壘於東關以扞之大敗元建除使持節鎮北將軍給鼓吹一部增邑二千戸西魏來寇荆州王僧辯以瑱為前軍赴援未至而荆州陷瑱之九江因衛晉安王還都承制以瑱為侍中使持節都督江晉吳齊四州諸軍事江州刺史改封康樂縣公邑五千戸進號車騎將軍司徒陸法和據郢州引齊兵來寇乃使瑱都督衆軍西討未至法和率其部北度入齊齊遣慕容恃徳鎮于夏首瑱控引西還水陸攻之恃徳食盡請和瑱還鎮豫章僧辯使其弟僧愔率兵與瑱共討蕭勃及髙祖誅僧辯僧愔陰欲圖瑱而奪其軍瑱知之盡收僧愔徒黨僧愔奔齊紹泰二年以本號加開府儀同三司餘並如故是時瑱據中流兵甚彊盛又以本事王僧辯雖外示臣節未有入朝意初余孝頃為豫章太守及瑱鎭豫章乃於新吳縣别立城栅與瑱相拒瑱留軍人妻子於豫章令從弟奫知後事悉衆以攻孝頃自夏及冬弗能克乃長圍守之盡收其禾稼奫與其部下侯方兒不協方兒怒率所部攻奫虜掠瑱軍府妓妾金玉歸于髙祖瑱既失根本兵衆皆潰輕歸豫章豫章人拒之乃趨湓城投其將焦僧度僧度勸瑱投齊瑱以髙祖有大量必能容己乃詣闕請罪髙祖復其爵位永定元年授侍中車騎將軍二年進位司空王琳至於沌口周文育侯安都竝沒乃以瑱為都督西討諸軍事瑱至于梁山世祖即位進授太尉増邑千戸王琳至于栅口又以瑱為都督侯安都等竝隸焉瑱與琳相持百餘日未決天嘉元年二月東關春水稍長舟艦得通琳引合肥漅湖之衆舳艫相次而下其勢甚盛瑱率軍進獸檻洲琳亦出船列于江西隔洲而泊明日合戰琳軍少却退保西岸及夕東北風大起吹其舟艦舟艦並壞沒于沙中溺死者數十百人浪大不得還浦夜中又有流星墜于賊營及旦風靜琳入浦治船以荻船塞于浦口又以鹿角繞岸不敢復出是時西魏遣大將軍史寧躡其上流瑱聞之知琳不能持乆收軍却據湖浦以待其敝及史寧至圍郢州琳恐衆潰乃率船艦來下去蕪湖十里而泊擊柝聞於軍中明日齊人遣兵數萬助琳琳引衆向梁山欲越官軍以屯險要齊儀同劉伯球率兵萬餘人助琳水戰行臺慕容恃徳子子會領鐵騎二千在蕪湖西岸博望山南為其聲勢瑱令軍中晨炊蓐食分搥盪頓蕪湖洲尾以待之將戰有微風至自東南衆軍施拍縱火定州刺史章昭達乗平虜大艦中江而進發拍中于賊艦其餘冒突青龍各相當値又以牛皮冒蒙衝小船以觸賊艦并鎔鐵灑之琳軍大敗其歩兵在西岸者自相蹂踐馬騎竝淖于蘆荻中棄馬脫走以免者十二三盡獲其舟艦器械并禽齊將劉伯球慕容子會自餘俘馘以萬計琳與其黨潘純陁等乗單舴艋冒陣走至湓城猶欲收合離散衆無附者及與妻妾左右十餘人入齊其年詔以瑱為都督湘巴郢江吳等五州諸軍事鎭湓城周將賀若敦獨孤盛等寇巴湘又以瑱為西討都督與盛戰於西江口大敗盛軍虜其人馬器械不可勝數以功授使持節都督湘桂郢巴武沅六州諸軍事湘州刺史改封零陵郡公邑七千戸餘如故二年以疾表求還朝三月於道薨時年五十二贈侍中驃騎大將軍大司馬加羽葆鼓吹班劒二十人給東園祕器諡曰壯肅其年九月配享髙祖廟庭子淨藏嗣淨藏尚世祖第二女富陽公主以公主除員外散騎侍郎太建三年卒贈司徒主簿淨藏無子弟就襲封歐陽頠字靖世長沙臨湘人也為郡豪族祖景達梁代為本州治中父僧寳屯騎校尉頠少質直有思理以言行篤信著聞於嶺表父䘮毁瘠甚至家産累積悉讓諸兄州郡頻辟不應乃廬於麓山寺傍專精習業博通經史年三十其兄逼令從宦起家信武府中兵參軍遷平西邵陵王中兵參軍事梁左衛將軍蘭欽之少也與頠相善故頠常隨欽征討欽為衡州仍除清逺太守欽南征夷獠擒陳文徹所獲不可勝計獻大銅鼓累代所無頠預其功還為直閤將軍仍除天門太守伐蠻左有功刺史廬陵王蕭續深嘉之引為賓客欽征交州復啓頠同行欽度嶺以疾終頠除臨賀内史啓乞送欽䘮還都然後之任時湘衡之界五十餘洞不賓敕命衡州刺史韋粲討之粲委頠為都督悉皆平殄粲啓梁武稱頠誠幹降詔襃賞仍加超武將軍征討廣衡二州山賊侯景構逆粲自解還都征景以頠監衡州京城陷後嶺南互相吞併蘭欽弟前髙州刺史裕攻始興内史蕭紹基奪其郡裕以兄欽與頠有舊遣招之頠不從乃謂使云髙州昆季隆顯莫非國恩今應赴難援都豈可自為跋扈及髙祖入援京邑將至始興頠乃深自結託裕遣兵攻頠髙祖援之裕敗髙祖以王懷明為衡州刺史遷頠為始興内史髙祖之討蔡路養李遷仕也頠率兵度嶺以助髙祖及路養等平頠有功梁元帝承制以始興郡為東衡州以頠為持節通直散騎常侍都督東衡州諸軍事雲麾將軍東衡州刺史新豐縣伯邑四百戸侯景平元帝遍問朝宰今天下始定極湏良才卿各舉所知羣臣未有對者帝曰吾已得一人侍中王襃進曰未審為誰帝云歐陽頠公正有匡濟之才恐蕭廣州不肯致之乃授武州刺史尋授郢州刺史欲令出嶺蕭勃留之不獲拜命尋授使持節散騎常侍都督衡州諸軍事忠武將軍衡州刺史進封始興縣侯時蕭勃在廣州兵彊位重元帝深患之遣王琳代為刺史琳已至小桂嶺勃遣其將孫瑒監州盡率部下至始興避琳兵鋒頠别據一城不往謁勃閉門髙壘亦不拒戰勃怒遣兵襲頠盡收其貲財馬仗尋赦之還復其所復與結盟荆州陷頠委質於勃及勃度嶺出南康以頠為前軍都督頓豫章之苦竹灘周文育擊破之擒送于髙祖髙祖釋之深加接待蕭勃死後嶺南擾亂頠有聲南土且與髙祖有舊乃授頠使持節通直散騎常侍都督衡州諸軍事安南將軍衡州刺史始興縣侯未至嶺南頠子紇已克定始興及頠至嶺南皆懾伏乃進廣州盡有越地改授都督廣交越成定明新髙合羅愛建徳宜黃利安石雙十九州諸軍事鎭南將軍平越中郎將廣州刺史持節常侍侯並如故王琳據有中流頠自海道及東嶺奉使不絶永定三年進授散騎常侍增都督衡州諸軍事即本號開府儀同三司世祖嗣位進號征南將軍改封陽山郡公邑一千五百戸又給鼓吹一部初交州刺史袁曇緩密以金五百兩寄頠令以百兩還合浦太守龔蒍四百兩付兒智矩餘人弗之知也頠尋為蕭勃所破貲財並盡唯所寄金獨在曇緩亦尋卒至是頠竝依信還之時人莫不嘆服其重然諾如此時頠弟盛為交州刺史次弟邃為衡州刺史合門顯貴名振南土又多致銅鼔生口獻奉珍異前後委積頗有助於軍國焉頠以天嘉四年薨時年六十六贈侍中車騎大將軍司空廣州刺史諡曰穆子紇嗣紇字奉聖頗有幹略天嘉中除黄門侍郎員外散騎常侍累遷安遠將軍衡州刺史襲封陽山郡公都督交廣等十九州諸軍事廣州刺史在州十餘年威惠著於百越進號輕車將軍光大中上流蕃鎭竝多懷貳高宗以紇久在南服頗疑之太建元年下詔徵紇為左衞將軍紇懼未欲就徵其部下多勸之反遂舉兵攻衡州刺史錢道戢道戢告變乃遣儀同章昭達討紇屢戰兵敗執送京師伏誅時年三十三家口籍没子詢以年幼免吳明徹字通昭秦郡人也祖景安齊南譙太守父樹梁右軍將軍明徹幼孤性至孝年十四感墳塋未備家貧無以取給乃勤力耕種時天下亢旱苗稼焦枯明徹哀憤每之田中號泣仰天自訴居數日有自田還者云苗已更生明徹疑之謂為紿已及往田所竟如其言秋而大穫足充葬用時有伊氏者善占墓謂其兄曰君葬之日必有乘白馬逐鹿者來經墳所此是最小孝子大貴之徵至時果有此應明徹即樹之最小子也起家梁東宫直後及侯景寇京師天下大亂明徹有粟麥三千餘斛而隣里飢餧乃白諸兄曰當今草竊人不圖久奈何有此而不與鄉家共之於是計口平公同其豐儉羣盜聞而避焉賴以存者甚衆及髙祖鎭京口深相要結明徹乃詣髙祖髙祖為之降階執手即席與論當世之務明徹亦微渉書史經傳就汝南周𢎞正學天文孤虗遁甲略通其玅頗以英雄自許高祖深竒之承聖三年授戎昭將軍安州刺史紹泰初隨周文育討杜龕張彪等東道平授使持節散騎常侍安東將軍南兖州刺史封安吳縣侯髙祖受禪拜安南將軍仍與侯安都周文育將兵討王琳及衆軍敗没明徹自拔還京世祖即位詔以本官加右衛將軍王琳敗授都督武沅二州諸軍事安西將軍武州刺史餘並如故周遣大將軍賀若敦率馬歩萬餘人奄至武陵明徹衆寡不敵引軍巴陵仍破周别軍於雙林天嘉三年授安西將軍及周迪反臨川詔以明徹為安南將軍江州刺史領豫章太守總督衆軍以討迪明徹雅性剛直統内不甚和世祖聞之遣安成王頊慰曉明徹令以本號還朝尋授鎭前將軍五年遷鎭東將軍吳興太守及引辭之郡世祖謂明徹曰吳興雖郡帝鄉之重故以相授君其勉之及世祖弗豫徵拜中領軍廢帝即位授領軍將軍尋遷丹陽尹仍詔明徹以甲仗四十人出入殿省到仲舉之矯令出高宗也毛喜知其謀高宗疑懼遣喜與明徹籌焉明徹謂喜曰嗣君諒闇萬機多闕外隣彊敵内有大䘮殿下親實周邵徳冠伊霍社稷至重願留中深計愼勿致疑及湘州刺史華晈陰有異志詔授明徹使持節散騎常侍都督湘桂武三州諸軍事安南將軍湘州刺史給鼔吹一部仍與征南大將軍淳于量等率兵討晈晈平授開府儀同三司進爵為公太建元年授鎭南將軍四年徴為侍中鎭前將軍餘並如故會朝議北伐公卿互有異同明徹決策請行五年詔加侍中都督征討諸軍事仍賜女樂一部明徹總統衆軍十餘萬發自京師緣江城鎭相續降欵軍至秦郡克其水栅齊遣大將尉破胡將兵為援明徹破走之斬獲不可勝計秦郡乃降髙宗以秦郡明徹舊邑詔具太牢令拜祠上冡文武羽儀甚盛鄉里以為榮進克仁州授征北大將軍進爵南平郡公增邑并前二千五百戸次平峽石岸二城進逼壽陽齊遣王琳將兵拒守琳至與刺史王貴顯保其外郭明徹以琳初入衆心未附乗夜攻之中宵而潰齊兵退據相國城及金城明徹令軍中益脩治攻具又迮肥水以灌城城中苦濕多腹疾手足皆腫死者十六七會齊遣大將軍皮景和率兵數十萬來援去壽春三十里頓軍不進諸將咸曰堅城未拔大援在近不審明公計將安出明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄四面疾攻城中震恐一鼓而克生禽王琳王貴顯扶風王可朱渾孝裕尚書盧潛左丞李騊駼送京師景和惶懼遁走盡收其駞馬輜重琳之獲也其舊部曲多在軍中琳素得士卒心見者皆歔欷不能仰視明徹慮其有變遣左右追殺琳傳其首詔曰壽春者古之都會襟帶淮汝控引河洛得之者安是稱要害侍中使持節都督征討諸軍事征北大將軍開府儀同三司南平郡開國公明徹雄圖克舉宏略盖世在昔屯夷締構皇業乃掩衡岳用清氛沴實吞雲夢即敘上游今茲蕩定恢我王略風行電掃貔虎爭馳月陣雲梯金湯奪險威陵殊俗惠漸邊氓惟功與能元戎是屬崇麾廣賦茂典恒宜可都督豫合建光朔北徐六州諸軍事車騎大將軍豫州刺史増封并前三千五百戸餘如故詔遣謁者蕭淳風就壽陽冊明徹於城南設壇士卒二十萬陳旗鼓戈甲明徹登壇拜受成禮而退將卒莫不踴躍焉初秦郡屬南兖州後𨽻譙州至是詔以譙之秦盱眙神農三郡還屬南兖州以明徹故也六年自壽陽入朝輿駕幸其第賜鍾磬一部米一萬斛絹布二千匹七年進攻彭城軍至呂梁齊遣援兵前後至者數萬明徹又大破之八年進位司空餘如故又詔曰昔者軍事建旌交鋒作鼓頃日訛替多乖舊章至於行陣不相甄别今可給司空大都督鈇鉞龍麾其次將各有差尋授都督南北兖南北青譙五州諸軍事南兖州刺史會周氏滅齊高宗將事徐兖九年詔明徹進軍北伐令其世子戎昭將軍員外驃騎侍郎惠覺攝行州事明徹軍至吕梁周徐州總管梁士彦率衆拒戰明徹頻破之因退兵守城不復敢出明徹仍迮清水以灌其城環列舟艦於城下攻之甚急周遣上大將軍王軌將兵救之軌輕行自清水入淮口横流豎木以鐵鎖貫車輪遏斷船路諸將聞之甚惶恐議欲破堰拔軍以舫載馬馬主裴子烈議曰若決堰下船船必傾倒豈可得乎不如前遣馬出於事為允適會明徹苦背疾甚篤知事不濟遂從之乃遣蕭摩訶帥馬軍數千前還明徹仍自決其堰乘水勢以退軍冀其獲濟及至清口水勢漸微舟艦竝不得渡衆軍皆潰明徹窮蹙乃就執尋以憂憤遘疾卒於長安時年六十七至徳元年詔曰李陵矢竭不免請降于禁水漲猶且生獲固知用兵上術世罕其人故侍中司空南平郡公明徹爰初躡足迄屆元戎百戰百勝之竒決機決死之勇斯亦侔於古焉及拓定淮肥長驅彭汴覆勍寇如舉毛掃銳師同沃雪風威慴於異俗功効著於同文方欲息駕陰山解鞍瀚海既而師出已老數亦終竒不就結纓之功無辭入褚之屈望封崤之為易冀平翟之非難雖志在屈伸而奄中霜露埋恨絶域甚可嗟傷斯事已往累逢肆赦凡厥罪戾皆蒙洒濯獨此孤魂未霑寛惠遂使爵土湮没饗醊無主棄瑕錄用宜在茲辰可追封邵陵縣開國侯食邑一千戸以其息惠覺為嗣惠覺歴黄門侍郎以平章大寳功授豐州刺史明徹兄子超字逸世少倜儻以幹略知名隨明徹征伐有戰功官至忠毅將軍散騎常侍桂州刺史封汝南縣侯邑一千戸卒贈廣州刺史諡曰節裴子烈字大士河東聞喜人梁員外散騎常侍猗之子子烈少孤有志氣遇梁末丧亂因習武藝以驍勇聞頻從明徹征討所向必先登陷陳官至電威將軍北譙太守岳陽内史海安縣伯邑五伯戸至徳四年卒史臣曰髙祖撥亂創基光啓天歴侯瑱歐陽頠竝歸身有道位貴鼎司羙矣吳明徹居將帥之任初有軍功及呂梁敗績為失算也斯以勇非韓白識異孫吳遂使蹙境䘮師金陵虚弱禎明淪覆蓋由其漸焉陳書卷九陳書卷九考證侯瑱傳瑱令軍中晨炊蓐食分搥盪頓蕪湖洲尾以待之南史無分搥盪三字及與妻妾左右十餘人入齊上文謂王琳走至湓城衆無附者故遂入齊此及字係乃字之訛也歐陽頠傳獻大銅鼓南史作大獻銅鼓吳明徹傳又迮肥水以灌城迮南史作遏詔遣謁者蕭淳風就壽陽册明徹南史淳字下無風字册字上有授字裴子烈傳梁員外散騎常侍猗之子猗一本作琦陳書卷九考證
