body:
  text: 陳書卷十六唐散騎常侍姚思廉撰列傳第十趙知禮蔡景歴劉師知謝岐趙知禮字齊旦天水隴西人也父孝穆梁候官令知禮渉獵文史善𨽻書髙祖之討元景仲也或薦之引為記室參軍知禮為文贍速每占授軍書下筆便就率皆稱旨由是恒侍左右深被委任當時計畫莫不預焉知禮亦多所獻替髙祖平侯景軍至白茅灣上表梁元帝及與王僧辯論述軍事其文竝知禮所製侯景平授中書侍郎封始平縣子邑三百戸髙祖為司空以為從事中郎髙祖入輔遷給事黄門侍郎兼衛尉卿髙祖受命遷通直散騎常侍直殿省尋遷散騎常侍守太府卿權知領軍事天嘉元年進爵為伯增邑通前七百戸王琳平授持節督吳州諸軍事明威將軍吳州刺史知禮沉靜有謀謨每軍國大事世祖輒令璽書問之秩滿為明威將軍太子右衛率遷右衛將軍領前軍將軍六年卒時年四十七詔贈侍中諡曰忠子允恭嗣蔡景歴字茂世濟陽考城人也祖點梁尚書左民侍郎父大同輕車岳陽王記室參軍掌京邑行選景歴少俊爽有孝行家貧好學善尺牘工草隸解褐諸王府佐出為海陽令為政有能名侯景亂梁簡文帝為景所幽景歴與南康嗣王蕭會理謀欲挾簡文出奔事泄見執賊黨王偉保䕶之獲免因客遊京口侯景平髙祖鎭朱方素聞其名以書要之景歴對使人答書筆不停輟文不重改曰蒙降札書曲垂引逮伏覽循囘載深欣暢竊以世求名駿行地能致千里時愛竒寳照車遂有徑寸但雲咸斯奏自輟巴渝把梓方雕豈盼樗櫪仰惟明將軍使君侯節下英才挺茂雄姿秀拔運屬時艱志匡多難振衡嶽而綏五嶺滌灨源而澄九派帶甲十萬彊弩數千誓勤王之師總義夫之力鯨鯢式翦役不踰時氛霧廓清士無血刃雖漢誅祿産舉朝寔賴綘侯晉討約峻中外一資陶牧比事論功彼奚足算加以抗威兖服冠蓋通于北門整斾徐方咏歌溢于東道能使邊亭卧鼓行旅路宿巷不拾遺市無異價洋洋乎功徳政化曠古未儔諒非膚淺所能殫述是以天下之人向風慕義接踵披衿雜遝而至矣或帝室英賢貴遊令望齊楚秀異荆吳岐嶷武夫則猛氣紛紜雄心四據陸拔山嶽水斷虬龍六鈞之弓左右馳射萬人之劒短兵交接攻壘若文鴦焚艦如黄盖百戰百勝貔貅為羣文人則通儒博識英才偉器雕麗暉煥摛掞絢藻子雲不能抗其筆元瑜無以髙其記尺翰馳而聊城下清談奮而嬴軍却復有三河辯客改哀樂於須臾六竒謀士斷變反於倐忽治民如子賤踐境有成折獄如仲由片詞從理直言如毛遂能厲主威銜使若相如不辱君命懐忠抱義感恩狥已誠斷黄金精貫白日海内雄賢牢籠斯備明將軍徹鞍下馬推案止食申爵以榮之築舘以安之輕財重氣卑躬厚士盛矣哉盛矣哉抑又聞之戰國將相咸推引賓遊中代岳牧竝盛延僚友濟濟多士所以成將軍之貴但量能校實稱才任使員行方止各盡其宜受委責成誰不畢力至如走賤妄庸人耳秋冬讀書終慙專學刀筆為吏竟闕異等衡門衰素無所聞達薄官輕資焉能遠大自陽九遘屯天歩艱阻同彼貴仕溺於巨寇亟隣危殆備踐薄氷今王道中興慇憂啓運獲存微命足為幸甚方歡飲啄是謂來蘇然皇鑾未反宛洛無曠四壁固三軍之餘長夏無半菽之産遨遊古人聊為借貸屬此樂土洵羙忘歸竊服髙義暫謁門下明將軍降以顔色二三士友假其餘論菅蒯不棄折簡賜留欲以鷄鶩廁鴛鴻於池沼將移瓦礫參金碧之聲價昔折脅遊秦忽逢盼採擔簦入趙便致留連今雖覊旅方之非匹樊林之賁何用克堪但眇眇纎蘿憑喬松以自聳蠢蠢輕蚋託驂尾而遠鶩竊不自涯願備下走且為腹背之毛脫充鳴吠之數増容改觀為幸已多海不厭深山不讓髙敢布心腹惟將軍覽焉髙祖得書甚加欽賞仍更賜書報答即日板征北府中記室參軍仍領記室衡陽獻王時為吳興郡昌年尚少吳興王之鄉里父老故人尊卑有數髙祖恐昌年少接對乖禮乃遣景歴輔之承聖中授通直散騎侍郎還掌府記室髙祖將討王僧辯獨與侯安都等數人謀之景歴弗之知也部分既畢召命草檄景歴援筆立成辭義感激事皆稱旨僧辯誅髙祖輔政除從事中郎掌記室如故紹泰元年遷給事黄門侍郎兼掌相府記室髙祖受禪遷袐書監中書通事舍人掌詔誥永定二年坐妻弟劉淹詐受周寳安餉馬為御史中丞沈烱所劾降為中書侍郎舍人如故三年髙祖崩時外有彊寇世祖鎮于南晥朝無重臣宣后呼景歴及江大權杜稜定議乃秘不發喪疾召世祖景歴躬共宦者及内人密營歛服時既暑熱須治梓宫恐斤斧之聲或聞于外仍以蠟為祕器文書詔誥依舊宣行世祖即位復為祕書監舍人如故以定策功封新豐縣子邑四百尸累遷散騎常侍世祖誅侯安都景歴勸成其事天嘉三年以功遷太子左衞率進爵為侯增邑百戸常侍舍人如故六年坐妻兄劉洽依倚景歴權勢前後姦訛并受歐陽武威餉絹百匹免官廢帝即位起為鎭東鄱陽王諮議參軍兼太府卿華皎反以景歴為武勝將軍吳明徹軍司皎平明徹於軍中輒戮安成内史楊文通又受降人馬仗有不分明景歴又坐不能匡正被收付治久之獲宥起為鎭東鄱陽王諮議參軍髙宗即位遷宣惠豫章王長史帶會稽郡守行東揚州府事秩滿遷戎昭將軍宣義長沙王長史尋陽太守行江州府事以疾辭遂不行入為通直散騎常侍中書通事舍人掌詔誥仍復封邑遷太子左衞率常侍舎人如故太建五年都督吳明徹北伐所向克㨗與周將梁士彦戰於呂梁大破之斬獲萬計方欲進圖彭城是時髙祖銳意河南以為指麾可定景歴諫稱師老將驕不宜過窮遠略髙祖惡其沮衆大怒猶以朝廷舊臣不深罪責出為宣遠將軍豫章内史未行為飛章所劾以在省之日贓汙狼藉帝令有司按問景歴但承其半於是御史中丞宗元饒奏曰臣聞士之行已忠以事上亷以持身茍違斯道刑兹罔赦謹按宣遠將軍豫章内史新豐縣開國侯景歴因藉多幸豫奉興王皇運權輿頗參締構天嘉之世贓賄狼藉聖恩錄用許以更鳴裂壤崇階不遠斯復不能改節自勵以報曲成遂乃專擅貪汙彰於遠近一則已甚其可再乎宜寘刑書以明秋憲臣等參議以見事免景歴所居官下鴻臚削爵土謹奉白簡以聞詔曰可於是徙居會稽及吳明徹敗帝思景歴前言即日追還復以為征南鄱陽王諮議參軍數日遷員外散騎常侍兼御史中丞復本封爵入守度支尚書舊式拜官在午後景歴拜日適値輿駕幸𤣥武觀在位皆侍宴帝恐景歴不豫特令早拜其見重如此是歳以疾卒官時年六十贈太常卿諡曰敬十三年改葬重贈中領軍禎明元年配享髙祖廟庭二年輿駕親幸其宅重贈景歴侍中中撫將軍諡曰忠敬給鼓吹一部并於墓所立碑景歴屬文不尚雕靡而長於叙事應機敏速為當世所稱有文集三十卷劉師知沛國相人也家世素族祖奚之齊晉安王諮議參軍淮南太守有能政齊武帝手詔頻襃賞父景彦梁尚書左丞司農鄉師知好學有當世才博渉書史工文筆善儀體臺閣故事多所詳悉梁世歴王府參軍紹泰初髙祖入輔以師知為中書舎人掌詔誥是時兵亂之後禮儀多闕髙祖為丞相及加九錫并受禪其儀注竝師知所定焉髙祖受命仍為舎人性疎簡與物多忤雖位宦不遷而委任甚重其所獻替皆有𢎞益及髙祖崩六日成服朝臣共議大行皇帝靈座俠御人所服衣服吉凶之制博士沈文阿議宜服吉服師知議云既稱成服本備喪禮靈筵服物皆悉縞素今雖無大行俠御官事按梁昭明太子薨成服俠侍之官悉着縗斬惟着鎧不異此即可擬愚謂六日成服俠靈座須服縗絰中書舎人蔡景歴亦云雖不悉準按山陵有凶吉羽儀成服唯凶無吉文武俠御不容獨鳴玉珥貂情禮二三理宜縗斬中書舎人江徳藻謝岐等竝同師知議文阿重議云檢晉宋山陵儀靈輿梓宫降殿各侍中奏又成服儀稱靈輿梓宮容俠御官及香橙又檢靈輿梓宫進止儀稱直靈俠御吉服在吉鹵簿中又云梓宫俠御縗絰在凶鹵簿中是則在殿吉凶兩俠御也時以二議不同乃啓取左丞徐陵決斷陵云梓宫祔山陵靈筵祔宗廟有此分判便驗吉凶按山陵鹵簿吉部伍中公卿以下導引者爰及武賁鼓吹執蓋奉車竝是吉服豈容俠御獨為縗絰邪斷可知矣若言公卿胥吏竝服縗苴此與梓宫部伍有何差别若言文物竝吉司事者凶豈容衽絰而奉華葢縗衣而升玉輅邪同博士議師知又議曰左丞引梓宫祔山陵靈筵祔宗廟必有吉凶二部成服不容上凶博士猶執前斷終是山陵之禮若龍駕啓殯鑾輿兼設吉凶之儀由來本備準之成服愚有未安夫喪禮之制自天子達按王文憲喪服明記云官品第三侍靈人二十官品第四下達士禮侍靈之數竝有十人皆白布袴褶著白絹帽内喪女侍數如外而著齊縗或問内外侍靈是同何忽縗服有異答云若依君臣之禮則外侍斬内侍齊頃世多故禮隨事省諸侯以下臣吏蓋微至於侍奉多出義附君臣之節不全縗冠之費實闕所以因其常服止變帽而已婦人侍者皆是卑隸君妾之道既純服章所以備矣皇朝之典猶自不然以此而推是知服斬彼有侍靈則猶俠御既著白帽理無彤服且梁昭明儀注今則見存二文顯證差為成準且禮出人情可得消息凡人有喪既陳筵几繐帷靈房變其常儀蘆箔草廬即其凶禮堂室之内親賓具來齊斬麻緦差池哭次𤣥冠不弔莫非素服豈見門生故吏綃縠間趨左姬右姜紅紫相揉況四海遏密率土之情是同三軍縞素為服之制斯一遂使千門旦啓非塗堊於彤闈百僚戾止變服麤於朱韍而耀金在列鳴玉節行求之懐抱固為未愜準以禮經彌無前事豈可成服之儀譬以山陵之禮葬既始終已畢故有吉凶之儀所謂成服本成喪禮百司外内皆變吉容俠御獨不何謂成服若靈無俠御則已有則必應縗服謝岐議曰靈筵祔宗廟梓宫祔山陵實如左丞議但山陵鹵簿備有吉凶從靈輿者儀服無變從梓宫者皆服苴縗爰至士禮悉同此制此自是山陵之儀非闗成服今謂梓宫靈扆共在西階稱為成服亦無鹵簿直是爰自胥吏上至王公四海之内必備縗絰案梁昭明太子薨略是成例豈容凡百士庶悉皆服重而侍中至於武衞最是近官反鳴玉紆青與平吉不異左丞既推以山陵事愚意或謂與成服有殊若爾日俠御文武不異惟侍靈之人主書宣傳齋幹應勅悉應不改蔡景歴又議云俠御之官本出五百爾日備服居廬仍於本省引上登殿豈應變服貂玉若别攝餘官以充簪珥則爾日便有不成服者山陵自有吉凶二儀成服凶而不吉猶依前議同劉舎人徳藻又議云愚謂祖葬之辰始终永畢達官有追贈須表恩榮有吉鹵簿恐由此義私家放斆因以成俗上服本變吉為凶理不應猶襲紈綺劉舎人引王衛軍喪儀及檢梁昭明故事此明據已審博士左丞乃各盡事衷既未取證須更詢詳宜諮八座詹事太常中丞及中庶諸通袁樞張種周𢎞正𢎞讓沈烱孔奐時八座以下竝請案羣議斟酌舊儀梁昭明太子喪成服儀注明文見存足為準的成服日侍官理不容猶從吉禮其葬禮分吉自是山陵之時非闗成服之日愚謂劉舎人議於事為允陵重答云老病屬纊不能多説古人爭議多成怨府傳𤣥見尤於晉代王商取陷於漢朝謹自三緘敬同髙命若萬一不死猶得展言庶與朝賢更申揚𣙜文阿猶執所見衆議不能決乃具錄二議奏聞從師知議尋遷鴻臚卿舎人如故天嘉元年坐事免初世祖勅師知撰起居注自永定二年秋至天嘉元年冬為十卷起為中書舎人復掌詔誥天康元年世祖不豫師知與尚書僕射到仲舉等入侍醫藥世祖崩預受顧命及髙宗為尚書令入輔光大元年師知與仲舉等遣舎人殷不佞矯詔令髙宗還東府事覺於北獄賜死謝岐會稽山陰人也父達梁太學博士岐少機警好學見稱於梁世為尚書金部郎山陰令侯景亂岐流寓東陽景平依于張彪彪在吳郡及會稽庶事一以委之彪每征討恒留岐監郡知後事彪敗髙祖引岐參預機密以為兼尚書右丞時軍旅屢興糧儲多闕岐所在幹理深被知遇永定元年為給事黄門侍郎中書舎人兼右丞如故天嘉二年卒贈通直散騎常侍岐弟嶠篤學為世通儒史臣曰髙祖開基創業剋定禍亂武猛固其立功文幹亦乃展力趙知禮蔡景歴早識攀附預締搆之臣焉劉師知博渉多通而闇於機變雖欲存乎節義終陷極刑斯不智矣陳書卷十六陳書卷十六考證趙知禮傳子允恭嗣允南史作元蔡景歴傳即日板征北府中記室參軍板南史作授并受歐陽武威餉絹百匹南史無武字兼太府卿府監本誤舟今改正陳書卷十六考證
