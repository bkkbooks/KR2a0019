body:
  text: 陳書卷十二唐散騎常侍姚思廉撰列傳第六胡頴徐度子敬成杜稜沈恪胡頴字方秀吳興東遷人也其先寓居吳興土斷為民頴偉姿容性寛厚梁世仕至武陵國侍即東宮直前出番禺征討俚洞廣州西江督護髙祖在廣州頴仍自結髙祖髙祖與其同郡接遇甚隆及南征交趾頴從行役餘諸將帥皆出其下及平李賁髙祖旋師頴𨽻在西江出兵多以頴留守侯景之亂髙祖克元景仲仍渡嶺援臺平蔡路養李遷仕頴皆有功歴平固遂興二縣令髙祖進軍頓而昌以頴為巴丘縣令鎮大臯督糧運下至豫章以頴監豫章郡髙祖率衆與王僧辯會於白茅灣同討侯景以頴知留府事梁承聖初元帝授頴假節鐡騎將軍羅州刺史封漢陽縣侯邑五百戸尋除豫章内史隨髙祖鎮京口齊遣郭元建出闗都督侯瑱率師禦之髙祖選府内驍勇三千人配頴令隨瑱於東闗大破之三年髙祖圍廣陵齊人東方光據宿預請降以頴為五原太守隨杜僧明援光不克退還除曲阿令尋領馬軍從髙祖襲王僧辯又隨周文育於吳興討杜龕紹泰元年除假節都督南豫州諸軍事輕車將軍南豫州刺史太平元年除持節散騎常侍仁威將軍尋兼丹陽尹髙祖受禪兼左衞將軍餘如故永定三年隨侯安都征王琳於宮亭破賊帥常衆愛等世祖嗣位除侍中都督吳州諸軍事宣惠將軍吳州刺史不行尋為義興太守將軍如故天嘉元年除散騎常侍吳興太守其年六月卒時年五十四贈侍中中護軍謚曰壯二年配享髙祖廟庭子六同嗣頴弟鑠亦隨頴將軍頴卒鑠統其衆歴東海豫章二郡守遷員外散騎常侍隨章昭達南平歐陽紇為廣州東江督護還預北伐除雄信將軍歴陽太守太建六年卒贈桂州刺史徐度字孝節安陸人也世居京師少倜儻不拘小節及長姿貎瓌偉嗜酒好博恒使僮僕屠酤為事梁始興内史蕭介之郡度從之將領士卒征諸山洞以驍勇聞髙祖征交趾厚禮招之度乃委質侯景之亂髙祖克定廣州平蔡路養破李遷仕計畫多出於度兼統兵甲每戰有功歸至白茅灣梁元帝授寧朔將軍合州刺史侯景平後追錄前後戰功加通直散騎常侍封廣徳縣侯邑五百戸遷散騎常侍髙祖鎮朱方除信武將軍蘭陵太守髙祖遣衡陽獻王平荆州度率所領從焉江陵陷閒行東歸髙祖平王僧辯度與侯安都為水軍紹泰元年髙祖東討杜龕奉敬帝幸京口以度領宿衛并知留府事徐嗣徽任約等來寇髙祖與敬帝還都時賊已據石頭城市鄽居民竝在南路去臺遥遠恐為賊所乘乃使度將兵鎮于冶城寺築壘以斷之賊悉衆來攻不能克髙祖尋亦救之大敗約等明年嗣徽等又引齊寇濟江度隨衆軍破之於北郊壇以功除信威將軍郢州刺史兼領吳興太守尋遷鎮右將軍領軍將軍徐州緣江諸軍事鎮北將軍南徐州刺史給鼓吹一部周文育侯安都等西討王琳敗績為琳所拘乃以度為前軍都督鎮于南陵世祖嗣位遷侍中中撫軍將軍開府儀同三司進爵為公未拜出為使持節散騎常侍鎮東將軍吳郡太守天嘉元年增邑千戸以平王琳功改封湘東郡公邑四千戸秩滿為侍中中軍將軍出為使持節都督會稽東陽臨海永嘉新安新寧信安晉安建安九郡諸軍事鎮東將軍會稽太守未行而太尉侯瑱薨于湘州乃以度代瑱為都督湘沅武巴郢桂六州諸軍事鎮南將軍湘州刺史秩满為侍中中軍大將軍儀同鼔吹竝如故世祖崩度預顧命以甲仗五十人入殿省廢帝即位進位司空華晈據湘州反引周兵下至沌口與王師相持乃加度使持節車騎將軍總督歩軍自安成郡由嶺路出于湘東以襲湘州盡獲其所留軍人家口以歸光大二年薨時年六十贈太尉給班劒二十人諡曰忠肅太建四年配享髙祖廟庭子敬成嗣敬成幼聰慧好讀書少機警善占對結交文義之士以識鑒知名起家著作郎永定九年領度所部士卒隨周文育侯安都征王琳於沌口敗績為琳所縶二年隨文育安都得歸除太子舍人遷洗馬度為吳郡太守以敬成監郡天嘉二年遷太子中舎人拜湘東郡公世子四年度自湘州還朝士馬精銳敬成盡領其衆隨章昭達征陳寳應晉安平除貞威將軍豫章太守光大元年華晈謀反以敬成為假節都督巴州諸軍事雲旗將軍巴州刺史尋詔為水軍隨吳明徹征華晈晈平還州太建二年以父憂去職尋起為持節都督南豫州諸軍事壮武將軍南豫州刺史四年襲爵湘東郡公授太子右衞率五年除貞威將軍吳興太守其年隨都督吳明徹北討出秦郡别遣敬成為都督乘金翅自歐陽引埭上泝江由廣陵齊人皆城守弗敢出自繁梁湖下淮圍淮陰城仍監北兖州淮泗義兵相率響應一二日間衆至數萬遂克淮陰山陽鹽城三郡并連口胊山二戍仍進攻鬰州克之以功加通直散騎常侍雲旗將軍增邑五百戸又進號壯武將軍鎮胊山坐於軍中輒科訂并誅新附免官尋復為持節都督安元潼三州諸軍事安州刺史將軍如故鎮宿預七年卒時年三十六贈散騎常侍諡曰思子敞嗣杜稜字雄盛吳郡錢塘人也世為縣大姓稜頗渉書𫝊少落泊不為當世所知遂遊嶺南事梁廣州刺史新渝侯蕭暎暎卒從髙祖恒典書記侯景之亂命稜將領平蔡路養李遷仕皆有功軍至豫章梁元帝承制授稜仁威將軍石州刺史上陌縣侯邑八百戸侯景平髙祖鎮朱方稜監義興琅邪二郡髙祖誅王僧辯引稜與侯安都等共議稜難之髙祖懼其泄已乃以手巾絞稜稜悶絶于地因閉於别室軍發召與同行及僧辯平後髙祖東征杜龕等留稜與安都居守徐嗣徽任約引齊寇濟江攻臺城安都與稜隨方抗拒稜晝夜廵警綏撫士卒未常解帶賊平以功除通直散騎常侍右衛將軍丹陽尹永定元年加侍中忠武將軍尋遷中領軍侍中將軍如故三年髙祖崩世祖在南晥時内無嫡嗣外有彊敵侯瑱侯安都徐度等竝在軍中朝廷宿將唯稜在都獨典禁兵乃與蔡景歴等秘不發喪奉迎世祖事見景歴傳世祖即位遷領軍將軍天嘉元年以預建立之功改封永城縣侯增邑五百戸出為雲麾將軍晉陵太守加秩中二千石二年徵為侍中領軍將軍尋遷翊左將軍丹陽尹廢帝即位遷鎮右將軍特進侍中尹如故光大元年解尹量置佐史給扶重授領軍將軍太建元年出為散騎常侍鎮東將軍吳興太守秩中二千石二年徵為侍中鎮右將軍尋加特進護軍將軍三年以公事免侍中護軍四年復為侍中右光祿大夫并給鼔吹一部將軍佐史扶竝如故稜歴事三帝竝見恩寵末年不預征役優遊京師賞賜優洽頃之卒于官時年七十贈開府儀同三司喪事所須竝令資給諡曰成其年配享髙祖廟庭子安世嗣沈恪字子恭吳興武康人也深沉有幹局梁新渝侯蕭映為郡將召為主簿映遷北徐州恪隨映之鎮映遷廣州以恪兼府中兵參軍常領兵討伐俚洞盧子畧之反也恪拒戰有功除中兵參軍髙祖與恪同郡情好甚暱蕭暎卒後髙祖南討李賁仍遣妻子附恪還鄉尋補東宮直後以嶺南勲除員外散騎侍即仍令招集宗從子弟侯景圍臺城恪率所領入臺隨例加右軍將軍賊起東西二土山以逼城城内亦作土山以應之恪為東土山主晝夜拒戰以功封東興縣侯邑五百戸遷員外散騎常侍京城陷恪閒行歸鄉里髙祖之討侯景遣使報恪乃於東起兵相應賊平恪謁髙祖於京口即日授都軍副尋為郡司馬及髙祖謀討王僧辯恪預其謀時僧辯女壻杜龕鎮吳興髙祖乃使世祖還長城立栅備龕又使恪還武康招集兵衆及僧辯誅龕果遣副將杜泰率衆襲世祖於長城恪時已率兵士出縣誅龕黨與髙祖尋遣周文育來援長城文育至泰乃遁走世祖仍與文育進軍出郡恪軍亦至屯于郡南及龕平世祖襲東揚州刺史張彪以恪監吳興郡太平元年除宣猛將軍交州刺史其年遷永嘉太守不拜復令監吳興郡自吳興入朝髙祖受禪使中書舎人劉師知引恪令勒兵入因衛敬帝如别宮恪乃排闥入見髙祖叩頭謝曰恪身經事蕭家來今日不忍見許事分受死耳決不奉命髙祖嘉其意乃不復逼更以盪主王僧志代之髙祖踐阼除吳興太守永定二年徙監會稽郡會余孝頃謀應王琳出兵臨川攻周迪以恪為壯武將軍率兵踰嶺以救迪余孝頃聞恪至退走二年遷使持節通直散騎常侍智武將軍吳州刺史便道之鄱陽尋有詔追還行會稽郡事其年除散騎常侍忠武將軍會稽太守世祖嗣位進督會稽東陽新安臨海永嘉建安晉安新寜信安九郡諸軍事將軍太守如故天嘉元年増邑五百戸二年徵為左衛將軍俄出為都督郢武巴定四州諸軍事軍師將軍郢州刺史六年徵為中護軍尋遷護軍將軍光大二年遷使持節都督荆武祐三州諸軍事平西將軍荆州刺史未之鎮改為護軍將軍髙宗即位加散騎常侍都督廣衡東衡交越成定新合羅愛徳宜黄利安石雙等十八州諸軍事鎮南將軍平越中郎將廣州刺史恪未至嶺前刺史歐陽紇舉兵拒險恪不得進朝廷遣司空章昭達督衆軍討紇紇平乃得入州州罹兵荒所在殘毁恪綏懷安緝被以恩惠嶺表頼之太建四年徵為領軍將軍及代還以途遠不時至爲有司所奏免十一年起為散騎常侍衛尉卿其年授平北將軍假節監南兖州十二年改授散騎常侍翊右將軍監南徐州又遣電威將軍裴子烈領馬五百匹助恪緣江防戍明年入為衛尉卿常侍將軍如故尋加侍中遷護軍將軍後主即位以疾改授散騎常侍特進金紫光祿大夫其年卒時年七十四贈翊左將軍詔給東園祕器仍出舉哀喪事所須並令資給諡曰元子法興嗣史臣曰胡頴徐度杜稜沈恪竝附騏驥而騰躍依日月之光輝始覯王佐之才方悟公輔之量生則肉食終以配饗盛矣哉陳書卷十二陳書卷十二考證杜稜傳髙祖誅王僧辯誅字上南史有謀字沈恪傳仍令招集宗從子弟招南史作總陳書卷十二考證
