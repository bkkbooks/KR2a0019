body:
  text: 陳書卷十五唐散騎常侍姚思亷撰列傳第九陳擬陳詳陳慧紀陳擬字公正髙祖疎屬也少孤貧性質直彊記髙祖南征交趾擬從焉及進討侯景至豫章以擬為羅州刺史與胡頴共知後事并應接軍糧髙祖作鎮朱方擬除歩兵校尉曲阿令紹泰元年授貞威將軍義興太守二年入知衛尉事除員外散騎常侍明威將軍雍州刺史資監南徐州髙祖踐阼詔曰維城宗子實固有周盤石懿親用隆大漢故會盟則異姓為後啓土則非劉勿王所以糾合枝幹廣樹蕃屏前王懋典列代恒規從子持節員外散騎常侍明威將軍雍州刺史監南徐州擬持節通直散騎侍郎貞威將軍北徐州刺史褒從子晃炅從孫假節員外散騎常侍明威將軍訬假節信威將軍北徐州刺史吉陽縣開國侯諠假節通直散騎侍郎信武將軍祏假節散騎侍郎雄信將軍青州刺史廣梁太守詳貞威將軍通直散騎侍郎慧紀從孫敬雅敬泰竝枝戚密近劬勞王室宜列河山以光利建擬可永脩縣開國侯褒鍾陵縣開國侯晃建城縣開國侯炅上饒縣開國侯訬䖍化縣開國侯諠仍前封祏豫章縣開國侯詳遂興縣開國侯慧紀宜黄縣開國侯敬雅寧都縣開國侯敬泰平固縣開國侯各邑五百戸擬尋除輕車將軍兼南徐州刺史常侍如故其年授通直散騎常侍中領軍三年復以本官監南徐州世祖嗣位除丹陽尹常侍如故坐事又以白衣知郡尋復本職天嘉元年卒時年五十八贈領軍將軍凶事所須竝官資給諡曰定二年配享髙祖廟廷子黨嗣陳詳字文㡬少出家為桑門善書記談論清雅髙祖討侯景召詳令反初服配以兵馬從定京邑髙祖東征杜龕詳躬下安吉原鄉故鄣三縣龕平以功授散騎侍郎假節雄信將軍青州刺史資割故鄣廣徳置廣梁郡以詳為太守髙祖踐阼改廣梁為陳留又以為陳留太守永定二年封遂興縣侯食邑五百戸其年除明威將軍通直散騎常侍三年隨侯安都破王琳將常衆愛於宮亭湖世祖嗣位除宣城太守將軍如故王琳下據栅口詳隨吳明徹襲湓城取琳家口不克因入南湖自鄱陽歩道而歸琳平詳與明徹竝無功天嘉元年隨例增邑并前一千五百戸仍除通直散騎常侍兼右衛將軍三年出為假節都督吳州諸軍事仁威將軍吳州刺史周迪據臨川舉兵詳自州從他道襲迪於濡城别營獲其妻子迪敗走詳還復本鎮五年周迪復出臨川乃以詳為都督率水歩討迪軍至南城與賊相遇戰敗死之時年四十二以所統失律無贈諡子正理嗣陳慧紀字元方髙祖之從孫也渉獵書史負才任氣髙祖平侯景慧紀從焉尋配以兵馬景平從征杜龕除貞威將軍通直散騎常侍高祖踐阼封宜黄縣侯邑五百戸除黄門侍郎世祖即位出為安吉縣令遷明威將軍軍副司空章昭達征安蜀城慧紀為水軍都督於荆州燒青泥船艫光大元年以功除持節通直散騎常侍宣遠將軍豐州刺史增邑并前一千戸太建十年吳明徹北討敗績以慧紀為持節智武將軍緣江都督兖州刺史増邑并前二千戸餘如故周軍乘勝據有淮南江外騒擾慧紀收集士卒自海道還都尋除使持節散騎常侍宣毅將軍都督郢巴二州諸軍事郢州刺史增邑并前二千五百戸至徳二年遷使持節散騎常侍雲麾將軍都督荆信二州諸軍事荆州刺史賜女伎一部增邑并前三千戸禎明元年蕭琮尚書左僕射安平王蕭巖晉熈王蕭瓛等率其部衆男女二萬餘口詣慧紀請降慧紀以兵迎之其年以應接功加侍中金紫光祿大夫開府儀同三司征西將軍增邑并前六千戸餘如故及隋師濟江元帥清河公楊素下自巴硤慧紀遣其將呂忠肅陸倫等拒之戰敗素進據馬頭是時隋將韓擒虎及賀若弼等已濟江據蔣山慧紀聞之留其長史陳文盛等居守身率將士三萬人樓船千餘乘㳂江而下欲趣臺城至漢口為秦王軍所拒不得進因與湘州刺史晉熈王叔文巴州刺史畢寳等請降入隋依例授儀同三司頃之卒子正平頗有文學史臣曰詩云宗子維城無俾城壊又曰綿綿𤓰瓞葛藟纍之西京皆豐沛故人東都亦南陽多顯有以哉陳書卷十五陳書卷十五考證陳慧紀傳增邑并前二千五百戸增各本誤贈今改正慧紀遣其將吕忠肅陸倫等拒之南史無忠字亦不載陸倫是時隋將韓擒虎及賀若弼等此下南史較詳陳書卷十五考證
