body:
  text: 陳書卷三十唐散騎常侍姚思㢘撰列𫝊第二十四蕭濟陸瓊子從典顧野王傅縡章華蕭濟字孝康東海蘭陵人也少好學博通經史諮梁武帝左氏疑義三十餘條尚書僕射范陽張纉太常卿南陽劉之遴竝與濟討論纉等莫能抗對觧褐梁祕書郎遷太子舍人預平侯景之功封松陽縣侯邑五百戸及高祖作鎮徐方以濟為明威將軍征比長史承聖二年徴為中書侍郎轉通直散騎常侍世祖為㑹稽太守又以濟為宣毅府長史遷司徒左長史世祖即位授侍中尋遷太府卿丁所生母憂不拜濟毗佐二主恩遇甚篤賞賜加於凡等歴守蘭陵陽羡臨津臨安等郡所在皆著聲績太建初入為五兵尚書與左僕射徐陵特進周𢎞正度支尚書王瑒散騎常侍袁憲俱侍東宫復為司徒長史尋授度支尚書領羽林監遷國子祭酒領羽林如故加金紫光禄大夫兼安徳宫衞尉尋遷仁威將軍揚州長史高宗嘗勅取揚州曹事躬自省覽見濟條理詳悉文無滯害乃顧謂左右曰我本期蕭長史長於經𫝊不言精練繁劇乃至於此遷祠部尚書加給事中復為金紫光禄大夫未拜而卒時年六十六詔贈本官官給喪事陸瓊字伯玉吴郡吴人也祖完梁琅邪彭城二郡丞父雲公梁給事黃門侍郎掌著作瓊幼聰慧有思理六嵗為五言詩頗有詞采大同末雲公受梁武帝詔校定惎品到溉朱异以下竝集瓊時年八嵗於客前覆局由是京師號曰神童异言之武帝有勅召見瓊風神警亮進退詳審帝甚異之十一丁父憂毁瘠有至性從祖襄歎曰此兒必荷門基所謂一不為少及侯景作逆擕母避地于縣之西鄉勤苦讀書晝夜無怠遂博學善屬文永定中州舉秀才天嘉元年為寧逺始興王府法曹行參軍尋以本官兼尚書外兵郎以文學轉兼殿中郎滿嵗為真瓊素有令名深為世祖所賞及討周廸陳寶應等都官符及諸大手筆竝中勅付瓊遷新安王文學掌東宫管記及高宗為司徒妙簡僚佐吏部尚書徐陵薦瓊於高宗曰新安王文學陸瓊見識優敏文史足用進居郎署嵗月過淹左西掾缺允膺兹選階次小踰其屈滯已積乃除司徒左西掾尋兼通直散騎常侍聘齊太建元年重以本官掌東宫管記除太子庶子兼通事舍人轉中書侍郎太子家令長沙王為江州刺史不循法度高宗以王年少授瓊長史行江州府國事帶尋陽太守瓊以母老不欲逺出太子亦固請留之遂不行累遷給事黃門侍郎領羽林監轉太子中庶子領歩兵校尉又領大著作撰國史後主即位直中書省掌詔誥俄授散騎常侍兼度支尚書領揚州大中正至徳元年除度支尚書參掌詔誥并判廷尉建康二獄事初瓊父雲公奉梁武帝勅撰嘉瑞記瓊述其㫖而續焉自永定訖于至徳勒成一家之言遷吏部尚書著作如故瓊詳練譜牒雅鑒人倫先是吏部尚書宗元饒卒右僕射袁憲舉瓊高宗未之用也至是居之號為稱職後主甚委任焉瓊性謙儉不自封植雖位望日隆而執志愈下園池室宇無所改作車馬衣服不尚鮮華四時祿俸皆散之宗族家無餘財暮年深懐止足思避權要恒謝病不視事俄丁母憂去職初瓊之侍東宫也母随在官舍後主賞賜優厚及喪柩還鄉詔加賻贈并遣謁者黃長貴持冊奠祭後主又自製誌銘朝野榮之瓊哀慕過毁以至徳四年卒時年五十詔贈領軍將軍官給喪事有集二十卷行於世長子從宜仕至武昌王文學第三子從典字由儀幼而聰敏八嵗讀沈約集見囘文研銘從典援筆擬之便有佳致年十三作柳賦其詞甚羙瓊時為東宫管記宫僚竝一時俊偉瓊示以此賦咸竒其異才從父瑜特所賞愛及瑜將終家中墳籍皆付從典從典乃集瑜文為十卷仍製集序其文甚工從典篤好學業博渉羣書於班史尤所屬意年十五本州舉秀才解褐著作佐郎轉太子舍人時後主賜僕射江縂并其父瓊詩總命從典為謝啓俄頃便就文華理暢總甚異焉尋授信義王文學轉太子洗馬又遷司徒左西掾兼東宫學士丁父憂去職尋起為徳敎學士固辭不就後主勅留一員以待從典俄屬金陵淪没随例遷闗右仕隋為給事郎兼東宫學士又除著作佐郎右僕射楊素奏從典續司馬遷史記迄于隋其書未就值隋末喪亂寓居南陽郡以疾卒時年五十七顧野王字希馮吳郡吴人也祖子喬梁東中郎武陵王府參軍事父烜信威臨賀王記室兼本郡五官掾以儒術知名野王幼好學七嵗讀五經畧知大旨九嵗能屬文嘗製日賦領軍朱异見而竒之年十二隨父之建安撰建安地記二篇長而遍觀經史精記嘿識天文地理蓍龜占候蟲篆竒字無所不通梁大同四年除太學博士遷中領軍臨賀王府記室參軍宣城王為揚州刺史野王及琅邪王襃竝為賔客王甚愛其才野王又善丹青王於東府起齋乃令野王畫古賢命王襃書贊時人稱為二絶及侯景之亂野王丁父憂歸本郡乃召募鄉黨數百人随義軍援京邑野王體素清羸裁長六尺又居喪過毁殆不勝衣及杖戈被甲陳君臣之義逆順之理抗辭作色見者莫不壯之京城陷野王逃㑹稽尋往東陽與劉歸義合軍據城拒賊侯景平太尉王僧辯深嘉之使監海鹽縣高祖作宰為金威將軍安東臨川王府記室參軍尋轉府諮議參軍天嘉元年勅補撰史學士尋加招逺將軍光大元年除鎮東鄱陽王諮議參軍太建二年遷國子博士後主在東宫野王兼東宫管記本官如故六年除太子率更令尋領大著作掌國史知梁史事兼東宫通事舍人時宫僚有濟陽江總吴國陸瓊北地傅縡吴興姚察竝以才學顯著論者推重焉遷黃門侍郎光禄卿知五禮事餘官竝如故十三年卒時年六十三詔贈祕書監至徳二年又贈右衞將軍野王少以篤學至性知名在朝無過辭失色觀其容貎似不能言及其勵精力行皆人所莫及第三弟充國早卒野王撫養孤幼恩義甚厚其所撰著玉篇三十卷輿地志三十卷符瑞圗十卷顧氏譜傳十卷分野樞要一卷續洞㝠紀一卷𤣥象表一卷竝行於世又撰通史要畧一百卷國史紀𫝊二百卷未就而卒有文集二十卷傅縡字宜事北地靈州人也父彜梁臨沂令縡幼聪敏七嵗誦古詩賦至十餘萬言長好學能屬文梁太清末擕母南奔避難俄丁母憂在兵亂之中居喪盡禮哀毁骨立士友以此稱之後依湘州刺史蕭循循頗好士廣集墳籍縡肆志尋閲因博通羣書王琳聞其名引為府記室琳敗随琳將孫瑒還都時世祖使顔晃賜瑒雜物瑒託縡啟謝詞理優洽文無加㸃晃還言之世祖召為撰史學士除司空府記室参軍遷驃騎安成王中記室撰史如故縡篤信佛敎從興皇寺惠朗法師受三論盡通其學時有大心暠法師著無諍論以詆之縡乃為明道論用釋其難其畧曰無諍論言比有𢎞三論者雷同訶詆恣言罪狀歴毁諸師非斥衆學論中道而執偏心語忘懐而競獨勝方學數論更為讐敵讐敵既搆諍鬬大生以此之心而成罪業罪業不止豈不重増生死大苦聚集答曰三論之興為日久矣龍樹創其源除内學之偏見提婆揚其㫖蕩外道之邪執欲使大化流而不擁𤣥風闡而無墜其言曠其意逺其道博其流深斯固龍象之騰驤鯤鵬之博運蹇乘決羽豈能觖望其間哉頃代澆薄時無曠士茍習小學以化蒙心漸染成俗遂迷正路唯競穿鑿各肆營造枝葉徒繁本源日翳一師解釋復異一師更改舊宗各立新意同學之中取寤復别如是展轉添糅倍多總而用之心無的准擇而行之何者為正豈不渾沌傷竅嘉樹弊牙雖復人說非馬家握靈蛇以無當之巵同畫地之餅矣其於失道不亦宜乎攝山之學則不如是守一遵本無改作之過約文申意杜臆斷之情言無預説理非宿構覩縁爾乃應見敵然後動縱横絡繹忽怳杳冥或彌綸而不窮或消散而無所煥乎有文章蹤朕不可得深乎不可量即事而非逺凡相酬對随理詳覈有何嫉詐干犯諸師且諸師所説為是可毁為不可毁若可毁者毁故為衰若不可毁毁自不及法師何獨蔽䕶不聽毁乎且敎有大小備在聖誥大乘之文則指斥小道今𢎞大法寧得不言大乘之意耶斯則襃貶之事從𢎞放學與奪之辭依經議論何得見佛說而信順在我語而忤逆無諍平等心如是耶且忿恚煩惱凡夫恒性失理之徒率皆有此豈可以三修未惬六師懐恨而藴湼槃妙法永不宣揚但冀其忿憤之心既極恬淡之寤自成耳人面不同其心亦異或有辭意相反或有心口相符豈得必謂他人説中道而心偏執已行無諍外不違而内平等讐敵鬬訟豈我事焉罪業聚集鬬諍者所畏耳無諍論言攝山大師誘進化導則不如此即習行於無諍者也導悟之徳既往淳一之風已澆競勝之心阿毁之曲盛於兹矣吾願息諍以通道讓勝以忘徳何必排拂異家生其恚怒者乎若以中道之心行於成實亦能不詳若以偏著之心說於中論亦得有諍固知諍與不諍偏在一法荅曰攝山大師實無諍矣但法師所賞未𠂻其節彼静守幽谷寂爾無為凡有訓勉莫匪同志從容語嘿物無間然故其意雖深其言甚約今之敷暢地勢不然處王城之隅居聚落之内呼吸顧望之客脣吻縱横之士奮鋒穎勵羽翼明目張膽被堅執鋭騁異家衒别解窺伺閒隙邀冀長短與相酬對桷其輕重豈得黙黙無言唯唯應命必須掎摭同異發擿玭瑕忘身而𢎞道忤俗而通教以此為病益知未逹若令大師當此之地亦何必黙已而為法師所貴耶法師又言吾願息諍以通道讓勝以忘徳道徳之事不止在諍與不詳讓與不讓也此語直是人間所重法師慕而言之竟未知勝若為可讓也若他人道高則自勝不勞讓矣他人道劣則雖讓而無益矣欲讓之辭將非虚設中道之心無處不可成實三論何事致乖但須息守株之解除膠柱之意是事皆中也來旨言諍與不諍偏在一法何為獨襃無諍耶詎非矛楯無諍論言邪正得失勝負是非必生於心矣非謂所説之法而有定相論勝劣也若異論是非以偏著為失言無是無非消彼得失以此論為勝妙者他論所不及此亦為失也何者凡心所破豈無心於能破則勝負之心不忘寧不存勝者乎斯則矜我為得棄他之失即有取舍大生是非使是増諍答曰言為心使心受言銓和合根塵鼓動風氣故成語也事必由心實如來説至於心造偽以使口口行詐以應心外和而内險言随而意逆求利養引聲名入道之人在家之士斯輩非一聖人所以曲陳敎誠深致防杜説見在之殃咎敘將來之患害此文明著甚於日月猶有忘愛軀冐峻制蹈湯炭甘虀粉必行而不顧也豈能悦無諍之作而囘首革音耶若𢎞道之人宣化之士心知勝也口言勝也心知劣也口言劣也亦無所包藏亦無所忌憚但直心而行之耳他道雖劣聖人之敎也已徳雖優亦聖人之敎也我勝則聖人勝他劣則聖人劣聖人之優劣盖根縁所宜爾於彼於此何所厚薄哉雖復終日按劒極夜擊柝瞋目以争得失作氣以求勝負在誰處乎有心之與無心徒欲分别虚空耳何意不許我論説而使我謙退此謂鷦鵬已翔於寥廓而虞者猶窺藪澤而求之嗟乎丈夫當𢎞斯道矣無諍論言無諍之道通於内外子所言須諍者此用末而救本失本而營末者也今為子言之何則若依外典尋書契之前至淳之世朴質其心行不言之敎當于此時民至老死不相往來而各得其所復有何諍乎固知本來不諍是物之真矣答曰諍與無諍不可偏執本之與末又安可知由來不諍寧知非末於今而諍何騐非本夫居後而望前則為前居前而望後則為後而前後之事猶如彼此彼呼此為彼此呼彼為彼彼此之名的居誰處以此言之萬事可知矣本末前後是非善惡可恒守邪何得自信聰明廢他耳目夫水泡生滅火輪旋轉入牢穽受羈紲生憂畏起煩惱其失何哉不與道相應而起諸見故也相應者則不然無為也無不為也善惡不能偕而未曽離善惡生死不能至亦終然在生死故得永離而任放焉是以聖人念繞桎之不脱愍黏膠之難離故殷勤敎示備諸便巧希向之徒涉求有類雖驎角難成象形易失寧得不髣髴遐路勉勵短晨且當念已身之善惡莫揣他物而欲分别而言我聰明我知見我計校我思惟以此而言亦為疎矣他人者實難測或可是凡夫真爾亦可是聖人俯同時俗所宜見果報所應覩安得肆胷衿盡情性而生譏誚乎正應虚已而遊乎世俛仰於電露之間耳明月在天衆水咸見清風在林羣籟畢響吾豈逆物哉不入鮑魚不甘腐鼠吾豈同物哉誰能知我共行斯路浩浩堂堂乎豈復見有諍為非無諍為是此則諍者自諍無諍者自無諍吾俱取而用之寧勞法師費功夫㸃筆紙但申於無諍弟子疲脣舌消晷漏唯對於明道戲論於糟粕哉必欲且考真偽蹔觀得失無過依賢聖之言檢行蔵之理始終研究表裏綜覈使浮辭無所用詐道自然消請待後筵以觀其妙矣尋以本官兼通直散騎侍郎使齊還除散騎侍郎鎮南始興王諮議叅軍兼東宫管記歴太子庶子僕兼管記如故後主即位遷祕書監右衞將軍兼中書通事舍人掌詔誥縡為文典麗性又敏速雖軍國大事下筆輒成未嘗起草沉思者亦無以加焉甚為後主所重然性木彊不持檢操負才使氣陵侮人物朝士多銜之㑹施文慶沈客卿以便佞親幸専制衡軸而縡益疎文慶等因共譖縡受高麗使金後主收縡下獄縡素剛因憤恚乃於獄中上書曰夫君人者恭事上帝子愛下民省嗜欲逺諂佞未明求衣日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不䖍郊廟之神専媚淫昬之鬼小人在側宦豎弄權惡忠直若仇讐視生民如草芥後宫曳綺繡廐馬餘菽粟百姓流離僵尸蔽野貨賂公行帑蔵損耗神怒民怨衆叛親離恐東南王氣自斯而盡書奏後主大怒頃之意稍觧遣使謂縡曰我欲赦卿卿能改過不縡對曰臣心如面臣面可改則臣心可改後主於是益怒令宦者李善慶窮治其事遂賜死獄中時年五十五有集十卷行於世時有吴興章華字伸宗家世農夫至華獨好學與士君子遊處頗覽經史善屬文侯景之亂乃遊嶺南居羅浮山寺専精習業歐陽頠為廣州刺史署為南海太守及歐陽紇敗乃還京師太建中高宗使吏部侍郎蕭引喻廣州刺史馬靖令入子為質引奏華與俱行使還而高祖崩後主即位朝臣以華素無伐閔競排抵之乃除大市令既雅非所好乃辭以疾欝欝不得志禎明初上書極諌其大略曰昔高祖南平百越北誅逆虜世祖東定吴㑹西破王琳高宗克復淮南辟地千里三祖之功亦至勤矣陛下即位于今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祀七廟而不出拜妃嬪而臨軒老臣宿將棄之草莽諂佞讒邪昇之朝廷今疆埸日蹙隋軍壓境陛下如不改弦易張臣見麋鹿復遊於姑蘇臺矣書秦後主大怒即日命斬之史臣曰蕭濟陸瓊俱以才學顯著顧野王博極羣典傅縡聪警特逹竝一代之英靈矣然縡不能循道進退遂寘極綱悲夫陳書卷三十
