body:
  text: 陳書卷三十二唐散騎常侍姚思亷撰列𫝊第二十六孝行殷不害弟不佞謝貞司馬暠張昭孔子曰夫聖人之徳何以加於孝乎孝者百行之本人倫之至極也凡在性靈孰不由此若乃奉生盡飬送終盡哀或泣血三年絶漿七日思蓼莪之慕切追顧復之恩深或徳感乾坤誠貫幽顯在於歴代蓋有人矣陳承梁室喪亂風漓化薄及迹隱閻閭無聞視聴今之採綴以備闕云殷不害字長卿陳郡長平人也祖任齊豫章王行參軍父髙明梁尚書中兵郎不害性至孝居父憂過禮由是少知名家世儉約居甚貧窶有弟五人皆㓜弱不害事老母飬小弟勤劇無所不至士大夫以篤行稱之年十七仕梁廷尉平不害長於政事兼飾以儒術名法有輕重不便者輒上書言之多見納用大同五年遷鎮西府記室參軍尋以本官兼東宫通事舍人是時朝廷政事多委東宫不害與舍人庾肩吾直日奏事梁武帝嘗謂肩吾曰卿是文學之士吏事非卿所長何不使殷不害來邪其見知如此簡文又以不害善事親賜其母蔡氏錦裙襦氊席被褥單複畢備七年除東宫歩兵校尉太清初遷平北府諮議參軍舍人如故侯景之亂不害從簡文入䑓及䑓城陷簡文在中書省景帶甲將兵入朝陛見過謁簡文景兵士皆羌胡雜種衝突左右甚不遜侍衞者莫不驚恐辟易唯不害與中庻子徐摛侍側不動及簡文為景所幽遣人請不害與居處景許之不害供侍益謹簡文夜夢吞一塊土意甚不悦以告不害不害曰昔晉文公出奔野人遺之塊卒反晉國陛下此夢事符是乎簡文曰若天有徴冀斯言不妄梁元帝立以不害為中書郎兼廷尉卿因將家屬西上江陵之陷也不害先於别所督戰失母所在於時甚寒氷雪交下老弱凍死者填满溝壍不害行哭道路逺近尋求無所不至遇見死人溝水中即投身而下扶捧閲視舉體凍濕水漿不入口號泣不輟聲如是者七日始得母屍不害凴屍而哭每舉音輒氣絶行路無不為之流涕即於江陵權殯與王裒庾信俱入長安自是蔬食布衣枯槁骨立見者莫不哀之太建七年自周還朝其年詔除司農卿尋遷光禄大夫八年加明威將軍晉陵太守在郡感疾詔以光禄大夫徴還飬疾後主即位加給事中初不害之還也周留其長子僧首因居闗中禎明三年京城陷僧首來迎不害道病卒時年八十五不佞字季卿不害弟也少立名節居父喪以至孝稱好讀書尤長吏術仕梁起家為尚書中兵郎甚有能稱梁元帝承制授戎昭將軍武陵王諮議參軍承聖初遷武康令時兵荒饑饉百姓流移不佞廵撫招集繦負而至者以千數㑹江陵陷而母卒道路隔絶乆不得奔赴四載之中晝夜號泣居處飲食常為居喪之禮高祖受禪起為戎昭將軍除婁令至是第四兄不齊始之江陵迎母喪柩歸𦵏不佞居處之節如始聞問若此者又三年身自負土手植松栢每嵗時伏臘必三日不食世祖即位除尚書左民郎不就後為始興王諮議參軍兼尚書右丞遷東宫通事舍人及世祖崩廢帝嗣位高宗為太傅録尚書輔政甚為朝望所歸不佞素以名節自立又受委東宫乃與僕射到仲舉中書舍人劉師知尚書右丞王暹等謀矯詔出高宗衆人猶豫未敢先發不佞乃馳詣相府靣宣勑令相王還第及事發仲舉等皆伏誅高宗雅重不佞特赦之免其官而已高宗即位以為軍師始興王諮議參軍加招逺將軍尋除大匠卿未拜加員外散騎常侍又兼尚書右丞俄遷通直散騎常侍右丞如故太建五年卒時年五十六詔贈祕書監第三兄不疑次不占次不齊竝早亡不佞最小事第二寡嫂張氏甚謹所得禄俸不入私室長子梵童官至尚書金部郎謝貞字元正陳郡陽夏人晉太傅安九世孫也祖綏梁著作佐郎太子舍人父藺正員外郎兼散騎常侍貞幼聰敏有至性祖母阮氏先苦風眩每發便一二日不能飲食貞時年七嵗祖母不食貞亦不食徃徃如是親族莫不奇之母王氏授貞論語孝經讀訖便誦八嵗嘗為春日閑居五言詩從舅尚書王筠奇其有佳致謂所親曰此兒方可大成至如風定花猶落乃追歩恵連矣由是名軰知之年十三畧通五經大㫖尤善左氏𫝊工草隷蟲篆十四丁父艱號頓於地絶而復蘓者數矣初父藺居母阮氏憂不食泣血而卒家人賓客懼貞復然從父洽族兄暠乃共徃華嚴寺請長爪禪師為貞説法仍謂貞曰孝子既無兄弟極須自愛若憂毁滅性誰飬毋邪自後少進饘粥太清之亂親屬散亡貞於江陵陷沒暠逃難番禺貞毋出家於宣明寺及高祖受禪暠還鄉里供飬貞母將二十年太建五年貞乃還朝除智武府外兵參軍事俄遷尚書駕部郎中尋遷侍郎及始興王叔陵為揚州刺史引祠部侍郎阮卓為記室辟貞為主簿貞不得已乃行尋遷府録事參軍領丹陽丞貞度叔陵將有異志因與卓自踈於王毎有宴遊輒辭以疾未嘗參預叔陵雅欽重之弗之罪也俄而高宗崩叔陵肆逆府僚多相連逮唯貞與卓獨不坐後主仍詔貞入掌中宫管記遷南平王友加招逺將軍掌記室事府長史汝南周確新除都官尚書請貞為讓表後主覽而奇之嘗因宴席問確曰卿表自製邪確對曰臣表謝貞所作後主因勑舍人施文慶曰謝貞在王處未有禄秩可賜米百石至徳三年以母憂去職頃之勑起還府仍加招逺將軍掌記室貞累啓固辭勑報曰省啓具懐雖知哀煢在疚而官俟得才禮有權奪可便力疾還府也貞哀毁羸瘠終不能之官舍時尚書右丞徐祚尚書左丞沈客卿俱來候貞見其形體骨立祚等愴然歎息徐喻之曰弟年事已衰禮有恒制小宜引割自全貞因更感慟氣絶良乆二人涕泣不能自勝憫黙而出祚謂客卿曰信哉孝門有孝子客卿曰謝公家𫝊至孝士大夫誰不仰止此恐不能起如何吏部尚書呉興姚察與貞友善及貞病篤察徃省之問以後事貞曰孤子舋禍所集將隨灰壤族子凱等粗自成立已有疏付之此固不足仰塵厚徳即日迷喘時不可移便為永訣弱兒年甫六嵗名靖字依仁情累所不能忘敢以為託耳是夜卒勑賻米一百斛布三十匹後主問察曰謝貞有何親屬察因啓曰貞有一子年六嵗即有勑長給衣糧初貞之病亟也遺疏告族子凱曰吾少罹酷罰十四傾外蔭十六鍾太清之禍流離絶國二十餘載號天蹐地遂同有感得還侍奉守先人墳墓於吾之分足矣不悟朝廷採拾空薄累致清階縱其殞絶無所酬報今在憂棘晷漏將盡歛手而歸何所多念氣絶之後若直棄之草野依僧家屍陁林法是吾所願正恐過為獨異耳可用薄板周身載以露車覆以葦茨坎山而埋之又吾終尠兄弟無他子孫靖年㓜少未閑人事但可三月施小牀設香水盡卿兄弟相厚之情即除之無益之事勿為也初貞在周甞侍趙王讀王即周武帝之愛弟也厚相禮遇王嘗聞左右説貞毎獨處必晝夜涕泣因私使訪問知貞母年老逺在江南乃謂貞曰寡人若出居藩當遣侍讀還家供飬後數年王果出因辭見靣奏曰謝貞至孝而母老臣願放還帝奇王仁愛而遣之因隨聘使杜子暉還國所有集值兵亂多不存司馬暠字文昇河内温人也高祖晉侍中光禄勲柔之以南頓王孫紹齊文獻王攸之後父子産梁尚書水部侍郎岳陽太守即梁武帝之外兄也暠㓜聰警有至性年十二丁内艱孺慕過禮水漿不入口殆經一旬每至號慟必致悶絶内外親戚皆懼其不勝喪父子産毎曉喻之逼進饘粥然毁瘠骨立服闋以姻戚子弟預入問訊梁武帝見暠羸瘦歎息良乆謂其父子産曰昨見羅兒靣顔顦顇使人惻然便是不墜家風為有子矣羅兒即暠小字也釋褐太學博士累遷正員郎丁父艱哀毁逾甚廬于墓側一日之内唯進薄麥粥一升墓在新林連接山阜舊多猛獸暠結廬數載犲狼絶迹常有兩鳩棲宿廬所馴狎異常新林至今猶𫝊之承聖中除太子庻子江陵陷隨例入闗而梁室屠戮太子瘞殯失所暠以宫臣乃抗表周朝求還江陵改𦵏辭甚酸切周朝優詔答曰昔主父從戮孔車有長者之風彭越就誅欒布得陪臣之禮庻子鄉國已改猶懐送徃之情始驗忠貞方知臣道即勑荆州以禮安厝太建八年自周還朝高宗特降殊禮賞錫有加除宜都王諮議參軍事徙安徳宫長秋卿通直散騎常侍太中大夫司州大中正卒于官有集十卷子延義字希忠少沉敏好學江陵之陷隨父入闗丁母憂喪過于禮及暠還都延義乃躬負靈櫬晝伏宵行冐履冰霜手足皆皸瘃及至都以中風冷遂致攣廢數年方愈稍遷鄱陽王録事參軍沅陵王友司徒從事中郎張昭字徳明呉郡呉人也幼有孝性色飬甚謹禮無違者父熯常患消渇嗜鮮魚昭乃身自結網捕魚以供朝夕弟乾字𤣥明聰敏博學亦有至性及父卒兄弟竝不衣綿帛不食鹽醋日唯食一升麥屑粥而已每一感慟必致嘔血隣里聞其哭聲皆為之涕泣父服未終母陸氏又亡兄弟遂六年哀毁形容骨立親友見者莫識焉家貧未得大𦵏遂布衣蔬食十有餘年杜門不出屏絶人事時衡陽王伯信臨郡舉乾孝㢘固辭不就兄弟竝因毁成疾昭失一眼乾亦中冷苦癖年竝未五十終于家子􅏷俱絶高宗世有太原王知𤣥者僑居于㑹稽剡縣居家以孝聞及丁父憂哀毁而卒高宗嘉之詔改其所居清苦里為孝家里史臣曰人倫之徳莫大於孝是以報本反始盡性窮神孝乎惟孝不可不朂矣故記云塞乎天地盛哉陳書卷三十二陳書卷三十二考證殷不害𫝊祖任齊豫章王行參軍任南史作汪陳書卷三十二考證
