body:
  text: 陳書卷五唐散騎常侍姚思㢘撰本紀第五宣帝高宗孝宣皇帝諱頊字紹世小字師利始興昭烈王第二子也梁大通二年七月辛酉生有赤光滿堂室少寛大多智畧及長羙容儀身長八尺三寸手􅂷過膝有勇力善騎射高祖平侯景鎮京口梁元帝徴高祖子姪入侍高祖遣高宗赴江陵累官為直閣將軍中書侍郎時有馬軍主李總與高祖有舊每同遊處高宗嘗夜被酒張燈而寐總適出尋返乃見高宗身是大龍總便驚駭走避他室及江陵陷高宗遷于闗右永定元年遥襲封始興郡王邑二千戸三年世祖嗣位改封安成王天嘉三年自周還授侍中中書監中衛將軍置佐史尋授使持節都督揚南徐東揚南豫北江五州諸軍事揚州刺史進號驃騎將軍餘如故四年加開府儀同三司六年遷司空天康元年授尚書令餘竝如故廢帝即位拜司徒進號驃騎大將軍錄尚書都督中外諸軍事給班劍三十人光大二年正月進位太傅領司徒加殊禮劍履上殿增邑并前三千戸餘竝如故十一月甲寅慈訓太后令廢帝為臨海王以高宗入纂太建元年春正月甲午即皇帝位于太極前殿詔曰夫聖人受命王者中興竝由懿徳方作元后高祖武皇帝揖拜堯圖經綸禹跡配天之業光辰象而利貞格地之功侔川岳而長遠世祖文皇帝體上聖之姿當下武之運築宫示儉所務唯徳定鼎初基厥謀斯在朕以寡薄才非聖賢夙荷前䂓方𫝊景祚雖復親承訓誨志守藩維咏季子之高風思城陽之遠託自元儲紹國正位君臨無道非幾佇聞刑措豈圖王室不造頻謀亂階天歩艱難將頃寳歴仰惟嘉命爰集朕躬我心貞確堅誓蒼昊而羣辟啓請相諠渭橋文母尊嚴懸心長樂對揚璽紱非止殷湯之三辭履渉春冬何但代王之五讓今便肅奉天䇿欽承介圭若據滄溟踰增兢業思所以雲行雨施品物咸亨當與黔黎普同斯慶可改光大三年為太建元年大赦天下在位文武賜位一階孝悌力田及為父後者賜爵一級異等殊才竝加䇿序鰥寡孤獨不能自存者人賜榖五斛復太皇太后尊號曰皇太后立妃栁氏為皇后世子叔寳為皇太子皇子南中郎將江州刺史康樂侯叔陵為始興王奉昭烈王祀乙未輿駕謁太廟丁酉分命大使廵行四方觀省風俗征南大將軍開府儀同三司新除中撫大將軍章昭達進號車騎大將軍新除中軍大將軍開府儀同三司南徐州刺史淳于量為征北大將軍鎮北將軍開府儀同三司南徐州刺史新除鎮西將軍郢州刺史黄法􅉤進號征西大將軍新除安南將軍開府儀同三司湘州刺史吳明徹進號鎮南將軍鎮東將軍揚州刺史鄱陽王伯山進號中衞將軍尚書僕射沈欽為尚書左僕射度支尚書王勱為尚書右僕射謢軍將軍沈恪為鎮南將軍廣州刺史辛丑輿駕親祀南郊壬寅以皇子建安侯叔英為宣恵將軍東揚州刺史改封豫章王豐城侯叔堅改封長沙王癸卯以明威將軍周𢎞正為特進戊午輿駕親祀太廟二月庚午皇后謁太廟辛未皇太子謁太廟乙亥輿駕親耕籍田夏五月甲午齊遣使來聘丁巳以吏部尚書領大著作徐陵為尚書右僕射太子詹事駙馬都尉沈君理為吏部尚書秋七月辛夘皇太子納妃沈氏王公已下賜帛各有差丁酉以平東將軍吳郡太守晉安王伯恭為中䕶軍進號安南將軍九月甲辰以新除中護軍晉安王伯恭為中領軍冬十月新除左衞將軍歐陽紇據廣州舉兵反辛未遣車騎將軍開府儀同三司章昭達率衆討之壬午輿駕親祀太廟二年春正月乙酉以征西大將軍開府儀同三司郢州刺史黄法􅉤為中權大將軍丙午輿駕親祀太廟二月癸未儀同章昭達擒歐陽紇送都斬于建康市廣州平三月丙申皇太后崩丙午曲赦廣衡二州丁未大赦天下又詔自討周廸華皎已來兵交之所有死亾者竝命收歛并給棺槥送還本鄉瘡痍未瘳者各給醫藥夏四月乙夘臨海王伯宗薨戊寅皇太后袝葬萬安陵閏月戊申輿駕謁太廟己酉太白晝見五月乙夘儀同黄法􅉤獻瑞璧一壬午齊遣使來弔六月戊子新羅國遣使獻方物辛夘大雨雹乙巳分遣大使廵行州郡省理寃屈戊申車騎將軍開府儀同三司章昭達進號車騎大將軍安南將軍廣州刺史沈恪進號鎮南將軍秋八月甲申詔曰懐遠以徳抑惟恒典去戎即華民之本志頃年江介繈負相随崎嘔歸化亭候不絶宜加䘏養答其誠心維是荒境自投有在都邑及諸州鎮不問遠近竝蠲課役若克平舊土反我侵地皆許還鄉一無拘限州郡縣長明加甄别良田廢村随便安處若輙有課訂即以擾民論又詔曰民惟邦本著在典謨治國愛民抑又通訓朕聼朝晏罷日昃劬勞方流恵澤覃被億兆有梁之季政刑廢缺條綱弛紊僣盗荐興役賦征徭尤為煩刻大陳御㝢拯兹餘弊滅扈戡黎弗遑創改年代彌流將及成俗如弗解張物無與厝夕惕疚懐有同首疾思從卑菲約已濟民雖府帑未充君孰與足便可刪革去其泰甚冀永為定准令簡而易從自今維作田值水旱未收即列在所言上折除軍士年登六十悉許放還巧手於役死亡及與老疾不勞訂補其籍有巧隠并王公百司輙受民為程蔭解還本屬開恩聴首在職治事之身須通相檢示有失不推當局任罪令長代換具條解舎户數付度後人戸有增進即加擢賞若致減散依事准結有能墾起荒田不問頃畆少多依舊蠲稅戊子太白晝見九月乙丑以散騎常侍鎮東將軍吳興太守杜稜為特進護軍將軍冬十月乙酉輿駕親祀太廟十一月辛酉高麗國遣使獻方物十二月癸巳夜西北有雷聲三年春正月癸丑以尚書右僕射領大著作徐陵為尚書僕射辛酉輿駕親祀南郊辛未親祀北郊二月辛巳輿駕親祀明堂丁酉親耕籍田三月丁丑大赦天下自天康元年訖太建元年逋餘軍糧祿秩夏調未入者悉原之又詔犯逆子弟支屬逃亡異境者悉聴歸首見縶繫者量可散釋其有居宅竝追還夏四月壬辰齊遣使來聘五月戊申太白晝見辛亥遼東新羅丹丹天竺盤盤等國竝遣使獻方物六月丁亥江陰王蕭季卿以罪免甲辰封東中郎將長沙王府諮議參軍蕭彞為江陰王秋八月辛丑皇太子親釋奠于太學二傅祭酒以下可賚帛各有差九月癸酉太白晝見冬十月甲申輿駕親祀太廟乙酉周遣使來聘己亥丹丹國遣使獻方物十二月壬辰車騎大將軍司空章昭達薨四年春正月丙午以雲麾將軍江州刺史始興王叔陵為湘州刺史進號平南將軍東中郎將吳郡太守長沙王叔堅為宣毅將軍江州刺史尚書僕射領大著作徐陵為尚書左僕射中書監王勱為尚書右僕射庚申以丹陽尹衡陽王伯信為信威將軍中護軍庚午輿駕親祀太廟二月乙酉立皇子叔卿為建安王授東中郎將東揚州刺史三月壬子以散騎常侍孫瑒為安西將軍荆州刺史乙丑扶南林邑國竝遣使來獻方物夏四月戊子以中權大將軍開府儀同三司黄法􅉤為征南大將軍南豫州刺史五月癸夘尚書右僕射王勱卒六月辛巳侍中鎮右將軍右光祿大夫杜稜卒秋八月辛未周遣使來聘丁丑景雲見戊寅詔曰國之大事受脤興戎師出以律禀䇿於廟所以乂安九有克成七徳自頃掃滌羣穢廓清諸夏乃貔貅之戮力亦帷幄之運籌雖左袵已戡干戈載戢呼韓來謁亭鄣無警但不教民戰是謂棄之仁必有勇無忘武備磻溪之𫝊韜訣榖城之授神符文叔懸制戎規孟徳頗言兵略朕既慙暗合良皆披覽兼昔經督戎備嘗行陣齊以七歩肅之三鼓得自胸襟指掌可述今竝條制凡十三科宜即班宣以為永准乙未詔停督湘江二州逋租無錫等十五縣流民竝蠲其繇賦秋九月庚子朔日有蝕之辛亥大赦天下又詔曰舉善從諫在上之明規進賢謁言為臣之令範朕以寡徳嗣守寳圖雖世襲隆平治非寧一辨方分職旰食早衣傍闕爭臣下無貢士何其闕爾鮮能抗直豈余獨運匪薦讜言置鼓公車罕論得失施石象魏莫陳可否朱雲摧檻良所不逢禽息觸楹又為難值至如衣褐以見擔簦以逰或耆艾絶倫或妙年異等干時而不偶左右莫之譽黑貂改弊黄金且殫終身滯淹可為太息又貴為百辟賤有十品工拙竝騖勸沮莫分街謡徒擁廷議斯闕寔朕之弗明而時無獻替永言至治何乃爽歟外可通示文武凡厥在位風化乖殊朝政紕蠧正色直辭有犯無隠兼各舉所知随才明試其莅政㢘穢在職能否分别矢言俟兹黜陟丙寅以故太尉徐度儀同杜稜儀同程靈洗配食髙祖廟庭故車騎將軍章昭達配食世祖廟庭冬十月乙酉輿駕親祀太廟戊戌以鎮南將軍廣州刺史沈恪為領軍將軍十月己亥夜地震閏月辛未詔曰姑孰饒曠荆河斯擬博望闗畿天限嚴峻龍山南指牛渚北臨對熊繹之餘城邇全琮之故壘良疇美柘畦畎相望連宇高薨阡陌如繡自梁末兵災凋殘畧盡比雖務優寛猶未克復咫尺封畿宜須殷阜且衆將部下多寄上下軍民雜俗極為蠧耗自今有罷任之徒許分留部下其已在江外亦令迎還悉徃南州津裏安置有無交貨不責市估萊荒墾闢亦停租稅臺遣征監一人共刺史津主分明檢押給地賦田各立頓舎十二月壬寅甘露降樂遊苑甲辰輿駕幸樂遊苑採甘露宴羣臣丁夘詔曰梁氏之季兵火荐臻承華焚蕩頓無遺構寳命維新迄將二紀頻事戎旅未遑修繕今工役差閑椽楹有擬來歲開肇創築東宫可權置起部尚書將作大匠用主監作五年春正月癸酉以征北大將軍開府儀同三司南徐州刺史淳于量為中權大將軍宣恵將軍豫章王叔英為南徐州刺史進號平北將軍吏部尚書駙馬都尉沈君理為尚書右僕射領吏部辛巳輿駕親祀南郊甲午輿駕親祀太廟二月辛丑輿駕親祀明堂乙夘夜有白氣如虹自北方貫北斗紫宫三月壬午分命衆軍北伐以鎮前將軍開府儀同三司吳明徹都督征討諸軍事丙戌西衡州獻馬生角己丑皇孫𦙍生内外文武賜帛各有差為父後者爵一級北討大都督吳明徹統衆十萬發自白下夏四月癸夘前巴州刺史魯廣達克齊大峴城辛亥吳明徹克秦州水柵庚申齊遣兵十萬援歴陽儀同黄法􅉤破之辛酉齊軍救秦州吳明徹又破之癸亥詔北伐衆軍所殺齊兵竝令埋掩甲子南譙太守徐槾克石梁城五月己巳石梁城降癸酉陽平郡城降甲戌徐槾克廬江郡城丙子黄法􅉤克歴陽城己夘北高唐郡城降辛巳詔征南大將軍開府儀同三司南豫州刺史黄法􅉤徙鎮歴陽齊改縣為郡者竝復之乙酉南齊昌太守黄詠克齊昌外城丙戍廬陵内史任忠軍次東闗克其東西二城進克蘄城戊子又克譙郡城秦州城降癸巳𤓰歩胡墅二城降六月庚子郢州刺史李綜克灄口城乙巳任忠克合州外城庚戍淮陽沭陽郡竝棄城走癸丑景雲見豫章内史程文季克涇州城乙卯宣毅司馬湛陁克新蔡城癸卯周遣使來聘黄法􅉤克合州城吳明徹師次仁州甲子克其州城是月治明堂秋七月乙丑鎮前將軍開府儀同三司吳明徹進號征北大將軍戊辰齊遣衆二萬援齊昌西陽太守周炅破之己巳吳明徹軍至峽口克其北岸城南岸守者棄城走周炅克巴州城淮北絳城及榖陽士民竝誅其渠帥以城降丙戌吳明徹克壽陽外城八月乙未山陽城降壬寅盱眙城降戊申罷南齊昌郡壬子戎昭將軍徐敬辯克海安城青州東海城降戊午平固侯陳敬泰等克晉州城九月甲子陽平城降壬申高唐太守沈善度克馬頭城甲戍齊安城降丙子左衞將軍樊毅克廣陵楚子城癸未尚書右僕射領吏部駙馬都尉沈君理卒丁亥前鄱陽内史魯天念克黄城小城齊軍退保大城戊子割南兖州之盱眙郡屬譙州壬辰晦夜明黄城大城降冬十月甲午郭黙城降戊戌以中書令王瑒為吏部尚書己亥以特進領國子祭酒周𢎞正為尚書右僕射乙巳吳明徹克壽陽城斬王琳𫝊首京師梟于朱雀航丁未齊兵萬人至潁口