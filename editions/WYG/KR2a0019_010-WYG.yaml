body:
  text: 陳書卷十唐散騎常侍姚思廉撰列傳第四周鐡虎程靈洗子文季周鐡虎不知何許人也梁世南渡語音傖重膂力過人便馬槊事梁河東王蕭譽以勇敢聞譽板為府中兵參軍譽為廣州刺史以鐡虎為興寧令譽遷湘州又為臨蒸令侯景之亂元帝於荆州遣世子方等代譽且以兵臨之譽拒戰大捷方等死鐡虎功最譽委遇甚重及王僧辯討譽於陣獲鐡虎僧辯命烹之鐡虎呼曰侯景未滅奈何殺壯士僧辯竒其言乃宥之還其麾下及侯景西上鐡虎從僧辯克任約獲宋子仙每戰皆有功元帝承制授仁威將軍潼州刺史封沌陽縣子邑三百戸又從僧辯克定京邑降謝答仁平陸納於湘州承聖二年以前後戰功進爵為侯増邑并前五百戸仍為散騎常侍領信義太守將軍如故髙祖誅僧辯鐡虎率所部降因復其本職徐嗣徽引齊宼渡江鐡虎於板橋浦破其水軍盡獲甲仗船舸又攻歴陽襲齊寇歩營竝皆克捷嗣徽平紹泰二年遷散騎常侍嚴威將軍太子左衞率尋隨周文育於南江拒蕭勃恒為前軍文育又命鐡虎偏軍於苦竹灘襲勃前軍歐陽頠又隨文育西征王琳於沌口敗績鐡虎與文育侯安都竝為琳所擒琳引見諸將與之語唯鐡虎辭氣不屈故琳盡宥文育之徒獨鐡虎見害時年四十九髙祖聞之下詔曰天地之寳所貴曰生形魄之徒所重唯命至如捐生立節効命酬恩追逺懷昔信宜加等散騎常侍嚴威將軍太子左衛率潼州刺史領信義太守沌陽縣開國侯鐡虎器局沉厚風力勇壯北討南征竭忠盡力推鋒江夏致陷凶徒神氣彌雄肆言無撓豈直溫序見害方其理鬚龎徳臨危猶能瞋目忠貞如此惻愴兼深可贈侍中䕶軍將軍青冀二州刺史加封一千戸并給鼓吹一部侯如故天嘉五年世祖又詔曰漢室功臣形寫宮觀魏朝猛將名配宗祧功烈所以長存世代因之不朽故侍中䕶軍將軍青冀二州刺史沌陽縣開國侯鐡虎誠節鯁亮力用雄敢王業初基行間累及垂翅賊壘正色寇庭古之遺烈有識同壯隕身不屈雖隆榮等營魂易逺言追嘉惜宜仰陪壖寢恭頒饗奠可配食髙祖廟庭子瑜嗣時有盱眙馬明字世朗梁世事鄱陽嗣王蕭範侯景之亂據廬江之東界拒賊臨城栅元帝授散騎常侍平北將軍北兖州刺史領廬江太守荆州陷没歸于髙祖紹泰中復官位封西華縣侯邑二千戸亦隨文育西征王琳於沌口軍敗明力戰死之贈使持節征西將軍郢州刺史程靈洗字𤣥滌新安海寧人也少以勇力聞歩行日二百餘里便騎善游梁末海寧黟歙等縣及鄱陽宣城郡界多盜賊近縣苦之靈洗素為郷里所畏伏前後守長􅁪使召募少年逐捕刼盜侯景之亂靈洗聚徒據黟歙以拒景景軍據有新安新安太守湘西鄉侯蕭隱奔依靈洗靈洗奉以主盟梁元帝於荆州承制又遣使間道奉表劉神茂自東陽建義拒賊靈洗攻下新安與神茂相應元帝授持節通直散騎常侍都督新安郡諸軍事雲麾將軍譙州刺史資領新安太守封巴丘縣侯邑五百戸神茂為景所破景偏帥呂子榮進攻新安靈洗退保黟歙及景敗子榮退走靈洗復據新安進軍建徳擒賊帥趙桑乾以功授持節散騎常侍都督青冀二州諸軍事青州刺史増邑并前一千戸將軍太守如故仍令靈洗率所部下揚州助王僧辯鎮防遷吳興太守未行僧辯命靈洗從侯瑱西援荆州荆州陷還都髙祖誅僧辯靈洗率所領來援其徒力戰於石頭西門軍不利遣使招諭久之乃降髙祖深義之紹泰元年授使持節信武將軍蘭陵太守常侍如故助防京口及平徐嗣徽靈洗有功除南丹陽太守封遂安縣侯増邑并前一千五百戸仍鎮采石隨周文育西討王琳於沌口敗績為琳所拘明年與侯安都等逃歸兼丹陽尹出為髙唐太原二郡太守仍鎮南陵遷太子左衛率髙祖崩王琳前軍東下靈洗於南陵破之虜其兵士并獲青龍十餘乘以功授持節都督南豫州緣江諸軍事信武將軍南豫州刺史侯瑱等敗王琳于栅口靈洗乗勝逐北據有魯山徵為衞士將軍餘如故天嘉四年周迪重寇臨川以靈洗為都督自鄱陽别道擊之迪又走山谷間五年遷中䕶軍常侍如故出為使持節都督郢巴武三州諸軍事宣毅將軍郢州刺史廢帝即位進號雲麾將軍華晈之反也遣使招誘靈洗靈洗斬晈使以狀聞朝廷深嘉其忠増其守備給鼓吹一部因推心待之使其子文季領水軍助防是時周遣其將長胡公拓跋定率歩騎二萬助晈攻圍靈洗靈洗嬰城固守及晈退乃出軍躡定定不獲濟江以其衆降因進攻周沔州克之擒其刺史裴寛以功進號安西將軍改封重安縣公増邑并前二千戸靈洗性嚴急御下甚苛刻士卒有小罪必以軍法誅之造次之間便加捶撻而號令分明與士卒同甘苦衆亦以此依附性好播植躬勤耕稼至於水陸所宜刈穫早晚雖老農不能及也伎妾無游手竝督之紡績至於散用貲財亦弗儉吝光大二年卒於州時年五十五贈鎮西將軍開府儀同三司諡曰忠壯太建四年詔配享髙祖廟庭子文季嗣文季字少卿幼習騎射多幹略果決有父風弱冠從靈洗征討必前登陷陣靈洗與周文育侯安都等敗於沌口為王琳所執髙祖召陷賊諸將子弟厚遇之文季最有禮容深為髙祖所賞永定中累遷通直散騎侍郎句容令世祖嗣位除宣惠始興王府限内中直兵參軍是時王為揚州刺史鎮冶城府中軍事悉以委之天嘉二年除貞毅將軍新安太守仍隨侯安都東討留異異黨向文政據有新安文季率精甲三百輕往攻之文政遣其兄子瓚來拒文季與戰大破瓚軍文政乃降三年始興王伯茂出鎮東州復以文季為鎮東府中兵參軍帶剡令四年陳寳應與留異連結又遣兵隨周迪更出臨川世祖遣信義太守余孝頃自海道襲晉安文季為之前軍所向克捷陳寳應平文季戰功居多還轉府諮議參軍領中直兵出為臨海太守尋乘金翅助父鎮郢城華晈平靈洗及文季竝有扞禦之功及靈洗卒文季盡領其衆起為超武將軍仍助防郢州文季性至孝雖軍旅奪禮而毁瘠甚至太建二年為豫章内史將軍如故服闋襲封重安縣公隨都督章昭達率軍往荆州征蕭巋巋與周軍多造舟艦置于青泥水中時水長漂疾昭達乃遣文季共錢道戢輕舟襲之盡焚其舟艦昭達因蕭巋等兵稍怠又遣文季夜入其外城殺傷甚衆既而周兵大出巴陵内史雷道勤拒戰死之文季僅以身免以功加通直散騎常侍安遠將軍増邑五百戸五年都督吳明徹北討秦郡秦郡前江浦通塗水齊人並下大柱為杙栅水中乃前遣文季領驍勇拔開其栅明徹率大軍自後而至攻秦郡克之又别遣文季圍涇州屠其城進攻盱眙拔之仍隨明徹圍壽陽文季臨事謹急御下嚴整前後所克城壘率皆迮水為堰土木之功動踰數萬每置陣役人文季必先諸將夜則早起迄暮不休軍中莫不服其勤幹每戰恒為前鋒齊軍深憚之謂爲程虎以功除散騎常侍明威將軍増邑五百戸又帶新安内史進號武毅將軍八年為持節都督譙州諸軍事安遠將軍譙州刺史其年又督北徐仁州諸軍事北徐州刺史餘並如故九年又隨明徹北討於呂梁作堰事見明徹傳十年春敗績為周所囚仍授開府儀同三司十一年自周逃歸至渦陽為邊吏所執還送長安死于獄中後主是時既與周絶不之知也至徳元年後主始知之追贈散騎常侍尋又詔曰故散騎常侍前重安縣開國公文季纂承門緒克荷家聲早歳出軍雖非元帥啓行為最致果有聞而覆喪車徒允從黜削但靈洗之立功捍禦久而見思文季之埋魂異域有足可憫言念勞舊傷兹廢絶宜存廟食無使餒而可降封重安縣侯邑一千戸以子饗襲封史臣曰程靈洗父子竝御下嚴苛治兵整肅然與衆同其勞苦匪私財利士多依焉故臨戎克辦矣陳書卷十陳書卷十考證程靈洗傳其徒力戰於石頭西徒南史作夜程靈洗子文季以子饗襲封饗南史作響陳書卷十考證
