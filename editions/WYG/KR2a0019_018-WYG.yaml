  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0019_WYG_018-1a, image: WYG0260/WYG0260-0656a.png}
body:
  text: 陳書卷十八唐散騎常侍姚思㢘撰列𫝊第十二沈衆袁泌劉仲威陸山才王質韋載族弟翽沈衆字仲師吳興武康人也祖約梁特進父旋梁給事黄門侍郎衆好學頗有文才起家梁鎮衞南平王法曹參軍太子舎人是時梁武帝制千字詩衆為之注解與陳郡謝景同時召見于文徳殿帝令衆為竹賦賦成奏之帝手勅答曰卿文體翩翩可謂無忝爾祖當陽公蕭大心為郢州刺史以衆為限内記室叅軍尋除鎮南湘東王記室參軍遷太子中舎人兼散騎常侍聘魏還遷驃騎廬陵王諮議叅軍舎人如故侯景之亂衆表於梁武帝稱家代所𨽻故義部曲竝在吳興求還召募以討賊梁武許之及景圍臺城衆率宗族及義附五千餘人入援京邑頓於小航對賊東府置陣軍容甚整景深憚之梁武於城内追授衆為太子右衛率京城䧟衆降於景景平西上荆州元帝以為太子中庶子夲州大中正尋遷司徒左長史江陵陥為西魏所虜尋而逃還敬帝承制授御史中丞紹泰元年除侍中遷左民尚書髙祖受命遷中書令中正如故髙祖以衆州里知名甚敬重之賞賜優渥超於時軰衆性吝嗇内治産業財帛以億計無所分遺其自奉養甚薄毎于朝㑹之中衣裳破裂或躬提冠屨永定二年兼起部尚書監起太極殿恆服布袍芒屩以麻繩為帶又擕乾魚蔬菜飯獨噉之朝士共誚其所為衆性狷急於是忿恨遂歴詆公卿非毁朝廷髙祖大怒以衆素有令望不欲顯誅之後因其休假還武康遂於吳中賜死時年五十六袁泌字文洋左光祿大夫敬之弟也清正有幹局容體魁岸志行修謹釋褐貟外散騎侍郎歴諸王府佐侯景之亂泌欲求為將是時泌兄君正為吳郡太守梁簡文板泌為東宫領直令往吳中召募士卒及景圍臺城泌率所領赴援京城陷退保東陽景使兵追之乃自會稽東嶺出湓城依於鄱陽嗣王蕭範範卒泌乃降景景平王僧辯表泌為富春太守兼丹陽尹貞陽侯僣位以泌為侍中奉使於齊高祖受禪王琳據有上流泌自齊從梁永嘉王蕭莊逹琳所及莊僣立以泌為侍中丞相長史天嘉二年泌與琳輔莊至於柵口琳軍敗衆皆奔散唯泌獨乘輕舟送莊逹於北境屬莊於御史中丞劉仲威令共入齊然後拜辭而歸詣闕請罪文帝深義之尋授寧遠始興王府法曹參軍轉諮議參軍除通直散騎常侍兼侍中領豫州大中正聘於周使還授散騎常侍御史中丞其中正如故高宗入輔以泌為雲旗將軍司徒左長史光大元年卒年五十八臨終戒其子蔓華曰吾於朝廷素無功績瞑目之後斂手足旋𦵏無得輙受贈諡其子述泌遺意表請之朝廷不許贈金紫光禄大夫諡曰質劉仲威南陽湼陽人也祖虯齊世以國子博士徵不就父之遴荆州治中從事史仲威少有志氣頗渉文史梁承聖中為中書侍郎蕭莊偽署御史中丞随莊入齊終於鄴中仲威從弟廣徳亦好學負才任氣父之享梁安西湘東王長史南郡太守廣徳承聖中以軍功官至給事黄門侍郎湘東太守荆州陷後依於王琳琳平文帝以廣徳為寧逺始興王府限外記室參軍仍領其舊兵尋為太尉侯瑱湘州府司馬歴樂山豫章二郡太守新安内史光大中假節員外散騎常侍雲旗將軍河東太守太建元年卒於郡時年四十三贈左衛將軍陸山才字孔章吳郡吳人也祖翁寳梁尚書水部郎父泛散騎常侍山才少倜儻好尚文史范陽張續續弟綰竝欽重之起家王國常侍遷外兵參軍尋以父疾東歸侍養承聖元年王僧辯授山才儀同府西曹掾髙祖誅僧辯山才奔會稽依張彪彪敗乃歸髙祖紹泰中都督周文育出鎮南豫州不知書疏乃以山才為長史政事悉以委之文育南討剋蕭勃擒歐陽頠計畫多出山才及文育西征王琳留山才監江州事乃鎮豫章文育與侯安都於沌口敗績余孝頃自新林來宼豫章山才收合餘衆依於周廸擒余孝頃李孝欽等遣山才自都陽之樂安嶺東道送於京師除中書侍郎復由樂安嶺綏撫南川諸郡文育重鎮豫章金口山才復為貞威將軍鎮南長史豫章太守文育為熊曇朗所害曇朗囚山才等送於王琳未至而侯安都敗琳將常衆愛於宫亭湖由是山才獲反除貞威將軍新安太守為王琳未平留鎮富陽以捍東道入為貟外散騎常侍遷宣恵始興王長史行東揚州事侯安都討留異山才率王府之衆從焉異平除明威將軍東陽太守入為鎮東始興王長史帶會稽郡丞行東揚州事未拜改授散騎常侍兼度支尚書满歲為真髙宗南征周廸以山才為軍司廸平復職余孝頃自海道襲晉安山才又以本官之會稽指授方畧還朝坐侍宴與蔡景歴言語過差為有司所奏免官尋授散騎常侍遷雲旗將軍西陽武昌二郡太守天康元年卒時年五十八贈右衛將軍諡曰簡子王質字子貞右光祿大夫通之弟也少慷慨渉獵書史梁世以武帝甥封甲口亭侯補國子周易生射䇿髙第起家祕書郎太子舎人尚書殿中郎遭母憂居喪以孝聞服闋除太子洗馬東宫領直累遷中舎人庶子太清元年除假節寧遠將軍領東宫兵從貞陽侯北伐及貞陽敗績質脱身逃還侯景於壽陽構逆質又領舟師随衆軍拒之景軍濟江質便退走尋領歩騎頓於宣陽門外景軍至京師質不戰而潰乃翦髮為桑門潜匿人間及栁仲禮等會援京邑軍據南岸質又收合餘衆從之京城䧟後西奔荆州元帝承制以質為右長史帶河東太守俄遷侍中尋出為持節都督吳州諸軍事寧遠將軍吳州刺史領鄱陽内史荆州陷侯瑱鎮于湓城與質不協遣偏將羊亮代質且以兵臨之質率所部度信安嶺依于留異文帝鎮會稽以兵助質令鎮信安縣永定二年髙祖命質率所部踰嶺出豫章随都督周文育以討王琳質與琳素善或譛云於軍中潜信交通髙祖命周文育殺質文育啟請救之獲免尋授散騎常侍晉陵太守文帝嗣位徴守五兵尚書髙宗為揚州刺史以質為仁威將軍驃騎府長史天嘉二年除晉安太守髙宗輔政以為司徒左長史將軍如故坐公事免官尋為通直散騎常侍遷太府卿都官尚書太建二年卒時年六十贈本官諡曰安子韋載字徳基京兆杜陵人也祖叡梁開府儀同三司永昌嚴公父政梁黄門侍郎載少聰慧篤志好學年十二随叔父稜見沛國劉顯顯問漢書十事載随問應答曾無疑滯及長博渉文史沉敏有噐局起家梁邵陵王法曹參軍遷太子舎人尚書三公郎侯景之亂元帝承制以為中書侍郎尋為建威將軍尋陽太守随都督王僧辯東討侯景是時僧辯軍於湓城而魯悉逹樊俊等各擁兵保境觀望成敗元帝以載為假節都督太原髙唐新蔡三郡諸軍事髙唐太守仍銜命喻悉達等令出軍討景及大軍東下載率三郡兵自焦湖出柵口與僧辨會於梁山景平除冠軍將軍琅邪太守尋奉使往東陽晉安招撫留異陳寳應等仍授信武將軍義興太守髙祖誅王僧辯乃遣周文育輕兵襲載未至而載先覺乃嬰城自守文育攻之甚急載所屬縣卒竝髙祖舊兵多善用弩載收得數十人繫以長鏁命所親監之使射文育軍約曰十發不兩中者則死每發輙中所中皆斃文育軍稍却因於城外據水立柵相持數旬髙祖聞文育軍不利乃自將征之尅其水柵仍遣載族弟翽賫書喻載以誅王僧辯意并奉梁景帝敕敕載觧兵載得書乃以衆降于髙祖髙祖厚加撫慰即以其族弟翽監義興郡所部將帥竝隨才任使引載恒置左右與之謀議徐嗣徽任約等引齊軍濟江據石頭城髙祖問計於載載曰齊軍若分兵先據三吳之路畧地東境則時事去矣今可急於淮南即侯景故壘築城以通東道轉輸别命輕兵絶其糧運使進無所虜退無所資則齊將之首旬日可致髙祖從其計永定元年除和戎將軍通直散騎常侍二年進號輕車將軍尋加散騎常侍太子右衛率將軍如故天嘉元年以疾去官載有田十餘頃在江乘縣之白山至是遂築室而居屏絶人事吉凶慶弔無所往來不入籬門者㡬十載太建中卒於家時年五十八載族弟翽字子羽少有志操祖愛梁輔國將軍父乾向汝隂太守翽弱冠喪父哀毁甚至養母撫孤兄弟子以仁孝著稱髙祖為南徐州刺史召為征北參軍尋監義興郡永定元年授貞毅將軍歩兵校尉遷驍騎將軍領朱衣直閣驍騎之職舊領營兵兼統宿衛自梁代已來其任愈重出則羽儀清道入則與二衛通直臨軒則升殿俠侍翽素有名望每大事恒令俠侍左右時人榮之號曰俠御將軍尋出為宣城太守天嘉二年預平王琳之功封清源縣侯邑二百户太建中卒官贈明霍羅三州刺史子宏字徳禮有文學歴官至永嘉王府諮議參軍陳亡入隋史臣曰昔鄧禹基於文學杜預出自儒雅卒致軍功名著前代晉氏䘮亂播遷江左頋榮郗鑒之軰温嶠謝𤣥之倫莫非巾褐書生縉紳素譽抗敵以衛社稷立勲而升台鼎自斯以降代有其人但梁室沸騰懦夫立志既身逢際㑹見仗於時主美矣陳書卷十八
