body:
  text: 陳書卷十九唐散騎常侍姚思廉撰列傳第十三沈烱虞荔弟寄馬樞沈烱字初明吳興武康人也祖瑀梁尋陽太守父續王府記室參軍烱少有雋才為當時所重釋褐王國常侍遷為尚書左民侍郎出為吳令侯景之難吳郡太守袁君正入援京師以烱監郡京城陷景將宋子仙據吳興遣使召烱委以書記之任烱固辭以疾子仙怒命斬之烱解衣將就戮礙於路間桑樹乃更牽往他所或遽救之僅而獲免子仙愛其才終逼之令掌書記及子仙為王僧辯所敗僧辯素聞其名於軍中購得之酬所獲者鐡錢十萬自是羽檄軍書皆出於烱及簡文遇害四方岳牧皆上表於江陵勸進僧辯令烱製表其文甚工當時莫有逮者高祖南下與僧辯會於白茅灣登壇設盟烱為其文及侯景東奔至吳郡獲烱妻虞氏子行簡竝殺之烱弟擕其母逃而獲免侯景平梁元帝愍其妻子嬰戮特封原鄉縣侯邑五百户僧辯為司徒以烱為從事中郎梁元帝徴為給事黄門侍郎領尚書左丞荆州䧟為西魏所虜魏人甚禮之授烱儀同三司烱以母老在東恒思歸國恐魏人愛其文才而留之恒閉門却掃無所交遊時有文章随即棄毁不令流布嘗獨行經漢武通天臺為表奏之陳已思歸之意其辭曰臣聞喬山雖掩鼎湖之靈可祠有魯既荒大庭之迹無泯伏惟陛下降徳猗蘭纂靈豐谷漢道既登神仙可望射之罘於海浦禮日觀而稱功横中流於汾河指柏梁而髙宴何其樂也豈不然歟既而運屬上仙道窮晏駕甲帳珠簾一朝零落茂陵玉椀宛出人間陵雲故基共原田而膴膴别風餘趾對陵阜而茫茫覊旅縲臣能不落淚昔承明既厭嚴助東歸駟馬可乗長卿西返恭聞故實竊有愚心黍稷非馨敢忘徼福奏訖其夜烱夢見有宫禁之所兵衛甚嚴烱便以情事陳訴聞有人言甚不惜放卿還幾時可至少日便與王克等竝獲東歸紹泰二年至都除司農卿遷御史中丞髙祖受禪加通直散騎常侍中丞如故以母老表請歸養詔不許文帝嗣位又表曰臣嬰生不幸弱冠而孤母子零丁兄弟相長謹身為養仕不擇官宦成梁朝命存亂世冐危履險自死輕生妻息誅夷昆季冥滅餘臣母子得逄興運臣母妾劉今年八十有一臣叔母妾丘七十有五臣門弟姪故自無人妾丘兒孫又乆亡泯兩家侍養餘臣一人前帝知臣之孤煢養臣以州里不欲使頓居草萊又復矜臣温清所以一年之内再三休沐臣之屢披丹欵頻冐宸鑒非欲茍違朝廷遠離畿輦一者以年將六十湯火居心每跪讀家書前懼後喜温枕扇席無復成童二者職居彝憲邦之司直若自虧身體何問國章前徳綢繆始許哀放内侍近臣多悉此㫖正以選賢與能廣求明哲趦趄荏苒未始取才而上𤣥降戾奄至今日徳音在耳墳土遽乾悠悠昊天哀此罔極兼臣私心煎切彌廹近時慺慺之祈轉忘塵觸伏惟陛下睿哲聰明嗣興下武刑于四海𢎞此孝治寸管求天仰歸帷扆有感必應實望聖明特乞霈然申其私禮則王者之徳覃及無方矧彼翔沉孰非涵養詔答曰省表具懐卿譽馳咸雒清深宛沛日者理切倚閭言歸異域復牽時役遂乖侍養雖周生之思毎欲棄官戴禮垂文得遺從政前朝光宅四海劬勞萬幾以卿才為獨歩職居專席方深委任屢屈情禮朕嗣奉洪基思𢎞景業顧兹寡薄兼纒哀疚實賴賢哲同致雍熙豈便釋簡南闈解紱東路當令馮親入舎荀母從官用覩朝榮不虧家禮尋勅所由相迎尊累使卿公私得所竝無廢也初髙祖嘗稱烱宜居王佐軍國大政多預謀謨文帝又重其才用欲寵貴之㑹王琳入宼大雷留異擁據東境帝欲使烱因是立功乃解中丞加明威將軍遣還鄉里收合徒衆以疾卒于吳中時年五十九文帝聞之即日舉哀并遣弔祭贈侍中諡曰恭子有集二十卷行於世虞荔字山披會稽餘姚人也祖權梁廷尉卿永嘉太守父檢平北始興王諮議參軍荔幼聰敏有志操年九歲随從伯闡候太常陸倕倕問五經凡有十事荔随問輙應無有遺失倕甚異之又嘗詣徵士何𦙍時太守衡陽王亦造焉𦙍言之於王王欲見荔荔辭曰未有板刺無容拜謁王以荔有髙尚之志雅相欽重還郡即辟為主簿荔又辭以年小不就及長美風儀博覽墳籍善屬文釋褐梁西中郎行參軍尋署法曹外兵叅軍兼丹陽詔獄正梁武帝於城西置士林館荔乃製碑奏上帝命勒之于館仍用荔為士林學士尋為司文郎遷通直散騎侍郎兼中書舎人時左右之任多參權軸内外機務互有帶掌唯荔與顧協淡然靖退居于西省但以文史見知當時號為清白尋領大著作及侯景之亂荔率親屬入臺除鎮西諮議參軍舎人如故臺城䧟逃歸鄉里侯景平元帝徴為中書侍郎貞陽侯授揚州别駕竝不就張彪之據會稽也荔時在焉及文帝平彪高祖遺荔書曰喪亂已來賢哲凋散君才用有美聲聞許洛當今朝廷維新廣求英雋豈可棲遲東土獨善其身今令兄子將接出都想必副朝廷虚遲也文帝又與書曰君東南有美聲譽洽聞自應翰飛京許共康時弊而削迹丘園保兹獨善豈使稱空谷之望耶必願便爾俶装且為出都之計唯遲披覯在於兹日廹切之不得已乃應命至都髙祖崩文帝嗣位除太子中庶子仍侍太子讀書尋領大著作東揚揚州二州大中正庶子如故初荔母随荔入臺卒於臺内尋而城䧟情禮不申由是終身蔬食布衣不聼音樂雖任遇隆重而居止儉素淡然無營文帝深器之常引在左右朝夕顧訪荔性沉宻少言論凡所獻替莫有見其際者故不列于後焉時荔第二弟寄寓於閩中依陳寳應荔每言之輙流涕文帝哀而謂曰我亦有弟在遠此情甚切他人豈知乃勅寳應求寄寳應終不遣荔因以感疾帝數徃臨視令荔將家口入省荔以禁中非私居之所乞停城外文帝不許乃令住於蘭臺乘輿再三臨問手勅中使相望於道又以荔蔬食積乆非羸疾所堪乃勅曰能敦布素乃當為高卿年事已多氣力稍減方欲仗委良須克壯今給􅀸魚肉不得固從所執也荔終不從天嘉二年卒時年五十九文帝甚傷惜之贈侍中諡曰徳子及喪柩還鄉里上親出臨送當時榮之子世基世南竝少知名寄字次安少聰敏年數嵗客有造其父者遇寄於門因嘲之曰郎君姓虞必當無智寄應聲答曰文字不辯豈得非愚客大慙入謂其父曰此子非常人文舉之對不是過也及長好學善屬文性沖静有棲遁之志弱冠舉秀才對策髙第起家梁宣城王國左常侍大同中常驟雨殿前往往有雜色寳珠梁武觀之甚有喜色寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清㧞卿家之士龍也將如何擢用寄聞之歎曰羙盛徳之形容以申撃壤之情耳吾豈買名求仕者乎乃閉門稱疾唯以書籍自娛岳陽王為會稽太守引寄為行叅軍遷記室叅軍領郡五官掾又轉中記室掾如故在職簡略煩苛務存大體曹局之内終日寂然侯景之亂寄随兄荔入臺除鎮南湘東王諮議叅軍加貞威將軍京城陥遁還鄉里及張彪往臨川彊寄俱行寄與彪將鄭諱同舟而載瑋嘗忤彪意乃刼寄奔於晉安時陳寳應據有閩中得寄甚喜高祖平侯景寄勸令自結寳應從之乃遣使歸誠承聖元年除和戎將軍中書侍郎寳應愛其才託以道阻不遣每欲引寄為僚屬委以文翰寄固辭獲免及寳應結婚留異潛有逆謀寄微知其意言説之際每陳逆順之理微以諷諫寳應輙引説他事以拒之又嘗令左右誦漢書臥而聼之至蒯通説韓信曰相君之背貴不可言寳應蹶然起曰可謂智士寄正色曰覆酈驕韓未足稱智豈若班彪王命識所歸乎寄知寳應不可諫慮禍及已乃為居士服以拒絶之常居東山寺偽稱脚疾不復起寳應以為假託使燒寄所臥室寄安臥不動親近將扶寄出寄曰吾命有所懸避欲安往所縱火者旋自救之寳應自此方信及留異稱兵寶應資其部曲寄乃因書極諌曰東山虞寄致書於明將軍使君節下寄流離世故飄寓貴鄉將軍待以上賔之禮申以國士之眷意氣所感何日忘之而寄沉痼彌留愒陰將盡常恐卒填溝壑涓塵莫報是以敢布腹心胃陳丹欵願將軍留須臾之慮少思察之則暝目之日所懐畢矣夫安危之兆禍福之機匪獨天時亦由人事失之毫釐差以千里是以明智之士據重位而不傾執大節而不失豈惑於浮辭哉將軍文武魚資英威不世徃因多難杖劒興師援旗誓衆抗威千里豈不以四郊多壘共謀王室匡時報主寧國庇民乎此所以五尺童子皆願荷㦸而隨將軍者也及高祖武皇肇基草昧初濟艱難于時天下沸騰民無定主豺狼當道鯨鯤横擊海内業業未知所從將軍運動微之鑒折從衡之辯策名委質自託宗盟此將軍妙寞遠圖發于衷誠者也及主上繼業欽明睿聖選賢與能羣臣輯睦結將軍以維城之重崇將軍以裂土之封豈非宏謨廟略推赤心於物也屢申明詔欵篤殷勤君臣之分定矣骨肉之恩深矣不意將軍惑於邪説遽生異計寄所以疾首痛心泣盡而繼之以血萬全之策竊為將軍惜之寄雖疾侵耄及言無足採千慮一得請陳愚筭願將軍少戢雷霆賖其晷刻使得盡狂瞽之説披肝膽之誠則雖死之日由生之年也自天厭梁徳多難荐臻寰宇分崩英雄互起不可勝紀人人自以為得之然夷凶翦亂拯溺扶危四海樂推三靈眷命揖讓而居南面者陳氏也豈非歴數有在惟天所授當璧應運其事甚明一也主上承基明徳遠被天綱再張地維重紐夫以王琳之彊侯瑱之力進足以摇蕩中原爭衡天下退足以屈强江外雄長偏隅然或命一旅之師或資一士之説琳則瓦解氷泮投身異域瑱則厥角稽顙委命闕庭斯又天假之威而除其患其事甚明二也今將軍以藩戚之重擁東南之衆盡忠奉上戮力勤王豈不勲高竇融寵過吳芮析圭判野南面稱孤其事甚明三也且聖朝棄瑕忘過寛厚得人改過自新咸加叙擢至於余孝頃潘純陁李孝欽歐陽頠等悉委以心腹任以爪牙胷中豁然曾無纎芥况將軍舋非張繡罪異畢諶當何慮於危亡何失於富貴此又其事甚明四也方今周齊隣睦境外無虞并兵一向匪朝伊夕非劉項競逐之機楚趙連從之勢何得雍容高拱坐論西伯其事甚明五也且留將軍狼顧一隅亟經摧衂聲實虧喪膽氣衰沮高瓖向文政留瑜黄子玉此數人者將軍所知首鼠兩端唯利是視其餘將帥亦可見矣孰能披堅執鋭長驅深入繫馬埋輪奮不顧命以先士卒者乎此又其事甚明六也且將軍之彊孰如侯景將軍之衆孰如王琳武皇滅侯景於前今上摧王琳於後此乃天時非復人力且兵革以後民皆厭亂其孰能棄墳墓捐妻子出萬死不顧之計從將軍於白刃之間乎此又其事甚明七也歴觀前古鑒之徃事子陽季孟傾覆相尋餘善右渠危亡繼及天命可畏山川難恃况將軍欲以數郡之地當天下之兵以諸侯之資拒天子之命彊弱逆順可得侔乎此又其事甚明八也且非我族類其心必異不愛其親豈能及物留將軍身縻國爵子尚王姬猶且棄天屬而弗顧背明君而孤立危急之日豈能同憂共患不背將軍者乎至於師老力屈懼誅利賞必有韓智晉陽之謀張陳井陘之勢此又其事甚明九也且北軍萬里逺鬬鋒不可當將軍自戰其地人多顧後梁安背向為心修旿匹夫之力衆寡不敵將帥不侔師以無名而出事以無機而動以此稱兵未知其利夫以漢朝吳楚晉室穎顒連城數十長㦸百萬拔本塞源自圖家國其有成功者乎此又其事甚明十也為將軍計者莫若不遠而復絶親留氏秦郎快郎随遣入質釋甲偃兵一遵詔㫖且朝廷許以鐡劵之要申以白馬之盟朕弗食言誓之宗社寄聞明者鑒未形智者不再計此成敗之效將軍勿疑吉凶之幾間不容髮方今藩維尚少皇子㓜沖凡預宗枝皆蒙寵樹况以將軍之地將軍之才將軍之名將軍之勢而能克修藩服北面稱臣寧與劉澤同年而語其功業哉豈不身與山河等安名與金石相敝願加三思慮之無忽寄氣力綿微餘陰無幾感恩懐徳不覺狂言鈇鉞之誅甘之如薺寳應覽書大怒或謂寳應曰虞公病勢漸篤言多錯謬寳應意乃小釋亦為寄有民望且優容之及寳應敗走夜至蒲田顧謂其子扞秦曰早從虞公計不至今日扞秦但泣而已寳應既擒凡諸賓客微有交渉者皆伏誅唯寄以先識免禍初沙門慧摽渉獵有才思及寳應起兵作五言詩以送之曰送馬猶臨水離旗稍引風好看今夜月當入紫微宫寳應得之甚悦慧摽賫以示寄寄一覽便止正色無言摽退寄謂所親曰摽公既以此始必以此終後竟坐是誅文帝尋勅都督章昭逹以理發遣令寄還朝及至即日引見謂寄曰管寧無恙其慰勞之懐若此頃之文帝謂到仲舉曰衡陽王既出閣雖未置府僚然湏得一人旦夕遊處兼掌書記宜求宿士有行業者仲舉未知所對文帝曰吾自得之乃手勅用寄寄入謝文帝曰所以蹔屈􅀸遊藩者非止以文翰相煩乃令以師表相事也尋兼散騎常侍聘齊寄辭老疾不行除國子博士頃之又表求解職歸鄉里文帝優㫖報答許其東還仍除東揚州别駕寄又以疾辭高宗即位徵授揚州治中及尚書左丞竝不就乃除東中郎建安王諮議加戎昭將軍又辭以疾不任旦夕陪列王於是特令停王府公事其有疑議就以决之但朔望牋修而已太建八年加太中大夫將軍如故十一年卒時年七十寄少篤行造次必於仁厚雖僮豎未嘗加以聲色至於臨危執節則辭氣凛然白刃不憚也自流寓南土與兄荔隔絶因感氣病每得荔書氣輙奔劇危殆者數矣前後所居官未嘗至秩满纔期年數月便自求解退常曰知足不辱吾知足矣及謝病私庭每諸王為州將下車必造門致禮命釋鞭板以几杖侍坐常出遊近寺閭里𫝊相告語老㓜羅列望拜道左或言誓為約者但指寄便不欺其至行所感如此所製文筆遭亂多不存馬樞字要理扶風郿人也祖靈慶齊竟陵王錄事叅軍樞數歲而父母俱喪為其姑所養六歲能誦孝經論語老子及長博極經史尤善佛經及周易老子義梁邵陵王綸為南徐州刺史素聞其名引為學士綸時自講文品經令樞講維摩老子周易同日發題道俗聴者二千人王欲極觀優劣乃謂衆曰與馬學士論議必使屈伏不得空立主客於是數家學者各起問端樞乃依次剖判開其宗㫖然後枝分流别轉變無窮論者拱黙聴受而已綸甚嘉之將引薦於朝廷尋遇侯景之亂綸舉兵援臺乃留書二萬卷以付樞樞肆志尋覽殆將周遍乃喟然嘆曰吾聞貴爵位者以巢由為桎梏愛山林者以伊吕為管庫束名實則芻芥柱下之言翫清虛則糠粃席上之説稽之篤論亦各從其好也然支父有讓王之介嚴子有傲帝之䂓千載羙談所不廢也比求志之士望塗而息豈天之不恵高尚何山林之無聞甚乎乃隠於茅山有終焉之志天嘉元年文帝徴為度支尚書辭不應命時樞親故並居京口每秋冬之際時徃遊焉及鄱陽王為南徐州刺史欽其高尚鄙不能致乃卑辭厚意令使者邀之前後數反樞固辭以疾門人或進曰鄱陽王待以師友非闗爵位市朝之間何妨静黙樞不得已乃行王别築室以處之樞惡其崇麗乃於竹林間自營茅茨而居焉每王公餽餉辭不獲已者率十分受一樞少屬亂離每所居之處盗賊不入依託者常數百家目精洞黄能視闇中物常有白鷰一雙巢其庭樹馴狎櫩廡時集几案春來秋去幾三十年太建十三年卒時年六十撰道覺論二十卷行於世史臣曰沈烱仕於梁室年在知命冀郎署之薄官止邑宰之卑職及下筆盟壇屬辭勸表激揚㫖趣信文人之偉者歟虞荔之獻籌沉宻盡其誠款可謂有益明時矣陳書卷十九陳書卷十九考證馬樞𫝊臣人龍按南史馬樞載隠逸𫝊今本卷載沈烱虞荔馬樞三人而下文史臣論止言沈虞不及馬樞未知何故陳書卷十九考證
