body:
  text: 陳書卷三十四唐散騎常侍姚思亷撰列𫝊第二十八文學杜之偉顔晃江徳藻庾持許亨褚玠岑之敬陸琰弟瑜瑜從父兄玠從父弟琛何之元徐伯陽張正見蔡凝阮卓易曰觀乎人文以化成天下孔子曰煥乎其有文章也自楚漢以降辭人世出洛汭江左其流彌暢莫不思侔造化明竝日月大則憲章典謨禆賛王道小則文理清正申紓性靈至於經禮樂綜人倫通古今述美惡莫尚乎此後主嗣業雅尚文詞傍求學藝煥乎俱集每臣下表疏及獻上賦頌者躬自省覽其有辭工則神筆賞激加其爵位是以搢紳之徒咸知自勵矣若名位文學晃著者别以功迹論今綴杜之偉等學既兼文備于此篇云爾杜之偉字子大吳郡錢塘人也家世儒學以三禮専門父規梁奉朝請與光祿大夫濟陽江革都官尚書㑹稽孔休源友善之偉幼精敏有逸才七嵗受尚書稍習詩禮畧通其學十五遍觀文史及儀禮故事時軰稱其早成僕射徐勉嘗見其文重其有筆力中大同元年梁武帝幸同泰寺捨身勅勉撰定儀注勉以臺閣先無此禮召之偉草具其儀乃啓補東宫學士與學士劉陟等鈔撰羣書各為題目所撰富教政道二篇皆之偉為序及湘隂侯蕭昻為江州刺史以之偉掌記室昻卒廬陵王續代之又手敎招引之偉固辭不應命乃送昻喪柩還京仍侍臨成公讀尋除揚州議曹從事南康嗣王墨曹參軍兼太學限内博士七年梁皇太子釋奠於國學時樂府無孔子顔子登歌詞尚書參議令之偉製其文伶人𫝊習以為故事轉補安前郡陵王田曹參軍又轉刑獄參軍之偉年位甚卑特以彊識俊才頗有名當世吏部尚書張纉深知之以為廊廟器也侯景反之偉逃竄山澤及高祖為丞相素聞其名召補記室參軍遷中書侍郎領大著作高祖受禪除鴻臚卿餘竝如故之偉啓求觧著作曰臣以紹泰元年沗中書侍郎掌國史于今四載臣本庸賤謬蒙盼識思報恩奨不敢廢官皇歴惟新驅馭軒昊記言記事未易其人著作之材更宜選衆御史中丞沈烱尚書左丞徐陵梁前兼大著作虞荔梁前黃門侍郎孔奐或清文贍筆或彊識稽古遷董之任允屬羣才臣無容遽變市朝再妨賢路堯朝皆讓誠不可追陳力就列庶幾知免優勅不許尋轉大匠卿遷太中大夫仍勅撰梁史永定三年卒時年五十二高祖甚悼惜之詔贈通直散騎常侍賻錢五萬布五十匹棺一具克日舉哀之偉為文不尚浮華而温雅博贍所製多遺失存者十七卷顔晃字元明琅邪臨沂人也少孤貧好學有辭采觧褐梁邵陵王兼記室參軍時東宫學士庾信嘗使于府中王使晃接對信輕其尚少曰此府兼記室幾人晃答曰猶當少於宫中學士當時以為善對侯景之亂西奔荆州承聖初除中書侍郎時杜龕為吳興太守専好勇力其所部多輕險少年元帝患之乃使晃管其書翰仍勅龕曰卿年時尚少習讀未晚顔晃文學之士使相毗佐造次之間必宜諮稟及龕誅晃歸世祖世祖委以書記親遇甚篤除宣毅府中錄事兼記室參軍永定二年高祖幸大莊嚴寺其夜甘露降晃獻甘露頌詞義該典高祖甚竒之天嘉初遷員外散騎常侍兼中書舍人掌詔誥三年卒時年五十三詔贈司農卿諡曰貞子并賜墓地晃家世單門傍無戚援而介然脩立為當世所知其表奏詔誥下筆立成便得事理而雅有氣質有集二十卷江徳藻字徳藻濟陽考城人也祖柔之齊尚書倉部郎中父革梁度支尚書光祿大夫徳藻好學善屬文美風儀身長七尺四寸性至孝事親盡禮與異産昆弟居恩惠甚篤起家梁南中郎武陵王行參軍大司馬南平王蕭偉聞其才召為東閣祭酒遷安西湘東王府外兵參軍尋除尚書比部郎以父憂去職服闋之後容貎毁瘠如居喪時除安西武陵王記室不就久之授廬陵王記室參軍除廷尉正尋出為南兖州治中及高祖為司空征北將軍引徳藻為府諮議轉中書侍郎遷雲麾臨海王長史陳臺建拜尚書吏部侍郎高祖受禪授秘書監兼尚書左丞尋以本官兼中書舍人天嘉四年兼散騎常侍與中書郎劉師知使齊著北征道理記三卷還拜太子中庶子領歩兵校尉頃之遷御史中丞坐公事免尋拜振逺將軍通直散騎常侍自求宰縣出補新喻令政尚恩惠頗有異績六年卒於官時年五十七世祖甚悼惜之詔贈散騎常侍所著文筆十五卷子椿亦善屬文歴太子庶子尚書左丞庾持字允徳潁川鄢陵人祖佩玉宋長沙内史父沙彌梁長城令持少孤性至孝居父憂過禮篤志好學尤善書記以才藝聞觧褐梁南平王國左常侍輕車河東王府行參軍兼尚書郎尋而為真出為安吉令遷鎮東邵陵王府限外記室兼建康令天監初世祖與持有舊及世祖為吴興太守以持為郡丞兼掌書翰自是常依文帝文帝剋張彪鎮㑹稽又令持監臨海郡以貪縱失民和為山盗所劫幽執十旬世祖遣劉澄討平之持乃獲免高祖受禪授安東臨川王府諮議參軍天嘉初遷尚書左丞以預長城之功封崇徳縣子邑三百户拜封之日請令史為客受其餉遺世祖怒之因坐免尋為宣惠始興王府諮議參軍除臨安令坐杖殺縣民免封遷為給事黃門侍郎除稜威將軍鹽官令光大元年遷祕書監知國史事又為少府卿領羽林監遷太中大夫領歩兵校尉太建元年卒時年六十二詔贈光祿大夫持善字書每屬辭好為竒字文士亦以此譏之有集十卷許亨字亨道高陽新城人晉徴士詢之六世孫也曽祖珪歴給事中委桂陽太守高尚其志居永興之究山即詢之所隐也祖勇慧齊太子家令冗從僕射父懋梁始平天門二郡守太子中庶子散騎常侍以學藝聞撰毛詩風雅比興義類十五卷述行記四卷亨少𫝊家業孤介有節行博通羣書多識前代舊事名軰皆推許之甚為南陽劉之遴所重每相稱述觧褐梁安東王行參軍兼太學博士尋除平西府記室參軍太清初為征西中記室兼太常丞侯景之亂避地郢州㑹梁邵陵王自東道至引為諮議參軍王僧辯之襲郢州也素聞其名召為儀同從事中郎遷太尉從事中郎與吳興沈烱對掌書記府朝政務一以委焉晉安王承制授給事黄門侍郎亨奉牋辭府僧辯答曰省告承有朝授良為徳舉卿操尚惇深文藝該洽學優而官自致青紫况久羈駿足將成頓轡匡輔虗闇期寄實深既欣遊處用忘勞屈而枳棘栖鵷常以増歎夕郎之選雖為清顯位以才升差自無愧且卿始云知命方騁康衢未有執㦸之疲便深夜行之慨循復來翰殊用憮然古人相思千里命駕素心不昧寧限城闉存顧之深荒慙無已高祖受禪授中散大夫領羽林監遷太中大夫領大著作知梁史事初僧辯之誅也所司收僧辯及其子頠屍於方山同坎埋瘞至是無敢言者亨以故吏抗表請葬之乃與故義徐陵張種孔奐等相率以家財營𦵏凡七柩皆改􅉎焉光大初高宗入輔以亨貞正有古人之風甚相欽重常以師禮事之及到仲舉之謀出高宗也毛喜知其詐高宗問亨亨勸勿奉詔高宗即位拜衞尉卿太建二年卒時年五十四初撰齊書并志五十卷遇亂失亡後撰梁史成者五十八卷梁太清之後所製文筆六卷子善心早知名官至尚書度支侍郎褚玠字溫理河南陽翟人也曾祖炫宋昇明初與謝朏江斆劉俁入侍殿中謂之四友官至侍中吏部尚書諡貞子祖澐梁御史中丞父蒙太子舍人玠九嵗而孤為叔父驃騎從事中郎随所養早有令譽先逹多以才器許之及長羙風儀善占對博學能屬文詞義典實不好􅀈靡起家王府法曹歴轉外兵記室天嘉中兼通直散騎常侍聘齊還為桂陽王友遷太子庶子中書侍郎太建中山隂縣多豪猾前後令皆以􅂍汙免高宗患之謂中書舍人蔡景歴曰稽隂大邑久無良宰卿文士之内試思其人景歴進曰褚玠亷儉有幹用未審堪其選不高宗曰甚善卿言與朕意同乃除戎昭將軍山隂令縣民張次的王休逹等與諸猾吏賄賂通姦全丁大户類多隐没玠乃鎖次的等具狀啓臺高宗手勅慰勞并遣使助玠搜括所出軍民八百餘户時舍人曹義逹為高宗所寵縣民陳信家富於財諂事義逹信父顯文恃勢横暴玠乃遣使執顯文鞭之一百於是吏民股慄莫敢犯者信後因義逹譖玠竟坐免官玠在任嵗餘守祿俸而已去官之日不堪自致因留縣境種蔬菜以自給或嗤玠以非百里之才玠答曰吾委輸課最不後列城除殘去暴姦吏局蹐若謂其不能自潤脂膏則如來命以為不逹從政吾未服也時人以為信然皇太子知玠無還裝手書賜粟米二百斛於是還都太子愛玠文辭令入直殿省十年除電威将軍仁威淮南王長史頃之以本官掌東宫管記十二年遷御史中丞卒於官時年五十二玠剛毅有膽決兼善騎射嘗從司空侯安都於徐州出獵遇有猛虎玠引弓射之再發皆中口入腹俄而虎斃及為御史中丞甚有直䋲之稱自梁末喪亂朝章廢㢮司憲因循守而勿革玠方欲改張大為條例綱維畧舉而編次未訖故不列于後焉及卒太子親製誌銘以表惟舊至徳二年追贈祕書監所製章奏雜文二百餘篇皆切事理由是見重於時子亮有才學官至尚書殿中侍郎岑之敬字思禮南陽棘陽人也父善紆梁世以經學聞官至吳寧令司義郎之敬年五嵗讀孝經每燒香正坐親戚咸加歎異年十六䇿春秋左氏制㫖孝經義擢為高第御史奏曰皇朝多士例止明經若顔閔之流乃應高第梁武帝省其䇿曰何妨我復有顔閔邪因召入面試令之敬升講座勅中書舍人朱异執孝經唱士孝章武帝親自論難之敬剖釋縱横應對如響左右莫不嗟服乃除童子奉車郎賞賜優厚十八預重雲殿法㑹時武帝親行香熟視之敬曰未幾見兮突而弁兮即日除太學限内博士尋為夀光學士司義郎又除武陵王安西府刑獄參軍事太清元年表請試吏除南沙令侯景之亂之敬率所部赴援京師至郡境聞臺城陷乃與衆辭訣歸鄉里承聖二年除晉安王宣惠府中記室參軍是時蕭勃據嶺表勅之敬宣㫖慰喻㑹江陵陷仍留廣州太建初還朝授東宫義省學士太子素聞其名尤降賞接累遷鄱陽王中衞府記室鎮北府中録事參軍南臺治書侍御史征南府諮議參軍之敬始以經業進而博渉文史雅有詞筆不為醇儒性謙謹未嘗以才學矜物接引後進恂恂如也每忌日營齋必躬自洒掃涕泣終日士君子以篤行稱之十一年卒時年六十一太子嗟惜賻贈甚厚有集十卷行於世子徳潤有父風官至中軍吳興王記室陸琰字温玉吏部尚書瓊之從父弟也父令公梁中軍宣城王記室參軍琰幼孤好學有志操州舉秀才觧褐宣惠始興王行參軍累遷法曹外兵參軍直嘉徳殿學士世祖聽覽餘暇頗留心史籍以琰博學善占誦引置左右甞使製刀銘琰援筆即成無所㸃竄世祖嗟賞久之賜衣一龍俄兼通直散騎常侍副琅邪王厚聘齊及至鄴下而厚病卒琰自為使主時年二十餘風神韶亮占對閑敏齊士大夫甚傾心焉還為雲麾新安王主簿遷安成王長史寧逺府記室參軍太建初為武陵王明威府功曹史兼東宫管記丁母憂去官五年卒時年三十四太子甚傷悼之手令舉哀加其賻贈又自製誌銘至徳二年追贈司農卿琰寡嗜慾鮮矜競遊心經籍晏如也其所製文筆多不存本後主求其遺文撰成二卷有弟瑜瑜字幹玉少篤學美詞藻州舉秀才解褐驃騎安成王行參軍轉軍師晉安王外兵參軍東宫學士兄琰時為管記竝以才學娱侍左右時人比之二應太建二年太子釋奠于太學宫臣竝賦詩命瑜為序文甚贍麗遷尚書祠部郎中丁母憂服闋為桂陽王明威將軍功曹史兼東宫管記累遷永陽王文學太子洗馬中舍人瑜幼長讀書晝夜不廢聪敏彊記一覽無遺嘗受莊老於汝南周𢎞正學成實論於僧滔法師竝通大㫖時皇太子好學欲博覽羣書以子集繁多命瑜鈔撰未就而卒時年四十四太子為之流涕手令舉哀官給喪事并親製文遣使弔祭仍與詹事江總書曰管記陸瑜奄然殂化悲傷悼惜此情何已吾生平愛好卿等所悉自以學渉儒雅不逮古人欽賢慕士是情尤篤梁室亂離天下糜沸書史殘􅆙禮樂崩淪晚生後學匪無牆面卓爾出羣斯人而已吾識覽雖局未曾以言議假人至於片善小才特用嗟賞況復洪識竒士此故忘言之地論其博綜子史諳究儒墨經耳無遺觸目成誦一襃一貶一激一揚語𤣥析理披文摘句未嘗不聞者心伏聽者解頥㑹意相得自以為布衣之賞吾監撫之暇事隙之辰頗用譚笑娱情琴樽閒作雅篇豔什迭互鋒起每清風朗月美景良辰對羣山之參差望巨波之滉瀁或翫新花時觀落葉既聽春鳥又聆秋鴈未嘗不促􅂰舉觴連情發藻且代琢磨間以嘲謔俱怡耳目竝留情致自謂百年為速朝露可傷豈謂玉折蘭摧遽從短運為悲為恨當復何言遺迹餘文觸目増泫絶絃投筆恒有酸梗以卿同志聊復敘懐涕之無從言不寫意其見重如此至徳二年追贈光禄卿有集十卷瑜從父兄玠從父弟琛玠字潤玉梁大匠卿晏之子𢎞雅有識度好學能屬文舉秀才對策高第吏部尚書袁樞薦之於世祖超授衡陽王文學直天保殿學士太建初遷長沙王友領記室後主在東宫聞其名徴為管記仍除中舍人管記如故甚見親待尋以疾失明将還鄉里太子觧衣贈玠為之流涕八年卒時年三十七有令舉哀并加賵贈至徳二年追贈少府卿有集十卷琛字潔玉宣毅臨川王長史丘公之子少警俊事後母以孝聞世祖為㑹稽太守琛年十八上善政頌甚有詞采由此知名舉秀才起家為衡陽王主簿兼東宫管記歴豫章王文學領記室司徒主簿直宣明殿學士尋遷尚書三公侍郎兼通直散騎常侍聘齊還為司徒左西掾又掌東宫管記太子愛琛才辯深禮遇之後主嗣位遷給事黄門侍郎中書舍人參掌機密琛性頗踈坐漏洩禁中語詔賜死時年四十二何之元廬江􅈞人也祖僧逹齊南臺治書侍御史父法勝以行業聞之元幼好學有才思居喪過禮為梁司空袁昻所重天監末昻表薦之因得召見觧褐梁太尉臨川王揚州議曹從事史尋轉主簿及昻為丹陽尹辟為丹陽五官掾縂户曹事尋除信義令之元宗人敬容者勢位隆重頻相顧訪之元終不造焉或問其故之元曰昔楚人得寵於觀起有馬者皆亡夫徳薄任隆必近覆敗吾恐不獲其利而招其禍識者以是稱之㑹安西武陵王為益州刺史以之元為安西刑獄參軍侯景之亂武陵王以太尉承制授南梁州長史北巴西太守武陵王自成都舉兵東下之元與蜀中民庶抗表請無行王以為沮衆囚之元于艦中及武陵兵敗之元從邵陵太守劉恭之郡俄而江陵陷劉恭卒王琳召為記室參軍梁敬帝册琳為司空之元除司空府諮議參軍領記室王琳之立蕭莊也署為中書侍郎㑹齊文宣帝薨令之元赴弔還至夀春而王琳敗齊主以為揚州别駕所治即夀春也及衆軍北伐得淮南地湘州刺史始興王叔陵遣功曹史柳咸賫書召之元之元始與朝廷有隙及書至大惶恐讀書至孔璋無罪左車見用之元仰而歎曰辭㫖若此豈欺我哉遂随咸至湘州太建八年除中衞府功曹參軍事尋遷諮議參軍及叔陵誅之元乃屏絶人事鋭精著述以為梁氏肇自武皇終于敬帝其興亡之運盛衰之跡足以垂鍳戒定襃貶究其始終起齊永元元年迄于王琳遇獲七十五年行事草創為三十卷號曰梁典其序曰記事之史其流不一編年之作無若春秋則魯史之書非帝皇之籍也案三皇之簡為三墳五帝之䇿為五典此典義所由生也至乃尚書述唐帝為堯典虞帝為舜典斯又經文明據是以典之為義久矣哉若夫馬史班漢述帝稱紀自兹厥後因相祖習及陳夀所撰名之曰志縂其三國分路揚鑣唯何法盛晉書變帝紀為帝典既云師古在理為優故今之所作稱為梁典梁有天下自中大同以前區㝢寧晏太清以後寇盗交侵首尾而言未為盡美故開此一書分為六意以高祖創基因乎齊末尋宗討本起自永元今以前如干卷為追迹高祖生自布衣長於弊俗知風敎之臧否識民黎之情僞爰逮君臨𢎞斯政術四紀之内實云殷阜今以如干卷為太平世不常夷時無恒治非自我後仍屬横流今以如干卷為敘亂洎高祖晏駕之年太宗幽辱之嵗謳歌獄訟向西陜不向東都不庭之民流逸之士征伐禮樂歸世祖不歸太宗撥亂反正厥庸斯在治定功成其勲有屬今以如干卷為世祖至於四海困窮五徳升替則敬皇紹立仍以禪陳今以如干卷為敬帝驃騎王琳崇立後嗣雖不逹天命然是其忠節今以如干卷為後嗣主至在太宗雖加美諡而大寳之號世所不遵盖以拘於賊景故也承聖紀歴自接太清神筆詔書非宜輒改詳之後論盖有理焉夫事有始終人有業行本末之間頗宜詮敘案臧榮緒稱史無裁斷猶起居注耳由此而言實資詳悉又編年而舉其嵗次者盖取分明而易尋也若夫獫狁孔熾鯁我中原始自一君終為二主事有相渉言成混漫今以未分之前為北魏既分之後高氏所輔為東魏宇文所挾為西魏所以相分别也重以盖彰殊體繁省異文其間損益頗有凡例禎明三年京城陷乃移居常州之晉陵縣隋開皇十三年卒于家徐伯陽字隐忍東海人也祖度之齊南徐州議曹從事史父僧權梁東宫通事舍人領祕書以善書知名伯陽敏而好學善色養進止有節年十五以文筆稱學春秋左氏家有史書所讀者近三千餘卷試䇿高第尚書板補梁河東王國右常侍東宫學士臨川嗣王府墨曹參軍大同中出為候官令甚得民和侯景之亂伯陽浮海南至廣州依於蕭勃勃平還朝仍将家屬之吴郡天嘉二年詔侍晉安王讀尋除司空侯安都府記室參軍事安都素聞其名見之降席為禮甘露降樂遊苑詔賜安都令伯陽為謝表世祖覽而竒之太建初中記室李爽記室張正見左民郎賀徹學士阮卓黃門郎蕭詮三公郎王由禮處士馬樞記室祖孫登北部賀循長史劉删等為文㑹之友後有蔡凝劉助陳暄孔範亦預焉皆一時之士也遊晏賦詩勒成卷軸伯陽為其集序盛𫝊於世及新安王為南徐州刺史除鎮北新安王府中記室參軍兼南徐州别駕帶東海郡丞鄱陽王為江州刺史伯陽嘗奉使造焉王率府僚與伯陽登匡嶺置宴酒酣命筆賦劇韻二十伯陽與祖孫登前成王賜以奴婢雜物及新安王還京除臨海嗣王府限外諮議參軍十一年春皇太子幸太學詔新安王於辟雍發論語題仍命伯陽為辟雍頌甚見嘉賞除鎮右新安王府諮議參軍事十三年聞姊喪發疾而卒時年六十六張正見字見賾清河東武城人也祖盖之魏散騎常侍勃海長樂二郡太守父脩禮魏散騎侍郎歸梁仍拜本職遷懐方太守正見幼好學有清才梁簡文在東宫正見年十三獻頌簡文深贊賞之簡文雅尚學業每自升座説經正見嘗預講筵請決疑義吐納和順進退詳雅四座咸屬目焉太清初射䇿高第除邵陵王國左常侍梁元帝立拜通直散騎侍郎遷彭澤令屬梁季喪亂避地於匡俗山時焦僧度擁衆自保遣使請交正見懼之遜辭延納然以禮法自持僧度亦雅相敬憚高祖受禪詔正見還都除鎮東鄱陽王府墨曹行參軍兼衡陽王府長史歴宜都王限外記室撰史著士帶尋陽郡丞累遷尚書度支郎通直散騎侍郎著士如故太建中卒時年四十九有集十四卷其五言詩尤善大行於世蔡凝字子居濟陽考城人也祖撙梁吏部尚書金紫光祿大夫父彦高梁給事黃門侍郎凝幼聪晤美容止既長博渉經𫝊有文辭尤工草隸天嘉四年釋褐受祕書郎轉廬陵王文學光大元年除太子洗馬司徒主簿太建元年遷太子中舍人以名公子選尚信義公主拜駙馬都尉中書侍郎遷晉陵太守及將之郡更令左右緝治中書廨宇謂賔友曰庶來者無勞不亦可乎尋授寧逺將軍尚書吏部侍郎凝年位未高而才地為時所重常端坐西齋自非素貴名流罕所交接趣時者多譏焉高祖常謂凝曰我欲用義興主壻錢肅為黄門郎卿意何如凝正色對曰帝鄉舊戚恩由聖㫖則無所復問若格以僉議黄散之職故須人門兼美惟陛下裁之高宗黙然而止肅聞而有憾令義興主日譖之於高宗尋免官遷交阯頃之追還後主嗣位授晉安王諮議參軍轉給事黄門侍郎後主嘗置酒㑹羣臣歡甚將移醼於𢎞範宫衆人咸從唯凝與袁憲不行後主曰卿何為者凝對曰長樂尊嚴非酒後所過臣不敢奉詔衆人失色後主曰卿醉矣即令引出他日後主謂吏部尚書蔡徴曰蔡凝負地矜才無所用也尋遷信威晉熙王府長史鬱鬱不得志乃喟然歎曰天道有廢興夫子云樂天知命斯理庶幾可逹因製小室賦以見志甚有辭理陳亡入隋道病卒時年四十七子君知頗知名阮卓陳留尉氏人祖詮梁散騎侍郎父問道梁寧逺岳陽王府記室參軍卓幼而聪敏篤志經籍善談論尤工五言詩性至孝其父随岳陽王出鎮江州遇疾而卒卓時年十五自都奔赴水漿不入口者累日屬侯景之亂道路阻絶卓冐履險艱載喪柩還都在路遇賊卓形容毁瘁號哭自陳賊哀而不殺之仍護送出境及渡彭蠡湖中流忽遇疾風船幾没者數四卓仰天悲號俄而風息人皆以為孝感之至焉世祖即位除輕車鄱陽王府外兵參軍天嘉元年轉雲麾新安王府記室參軍仍随府轉翌右記室帶撰史著士遷鄱陽王中衞府錄事轉晉安王府記室著士如故及平歐陽紇交阯夷獠往往相聚為寇抄卓奏使招慰交阯通日南象郡多金翠珠貝珍怪之産前後使者皆致之唯卓挺身而還衣装無他時論咸服其廉遷衡陽王府中錄事參軍入為尚書祠部郎遷始興王中衞府記室參軍叔陵之誅也後主謂朝臣曰阮卓素不同逆宜加旌異至徳元年入為徳敎殿學士尋兼通直散騎常侍副王話聘隋隋主夙聞卓名乃遣河東薛道衡琅邪顔之推等與卓談醼賦詩賜遺加禮還除招逺將軍南海王府諮議參軍以目疾不之官退居里舍改構亭宇脩山池卉木招致賔友以文酒自娛禎明三年入于隋行至江州追感其父所終因遘疾而卒時年五十九時有武威隂鏗字子堅梁左衞将軍子春之子幼聪慧五嵗能誦詩賦日千言及長博渉史𫝊尤善五言詩為當時所重釋褐梁湘東王法曹參軍天寒鏗嘗與賔友宴飲見行觴者因回酒炙以授之衆坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者天嘉中為始興王府中錄事參軍世祖嘗醼羣臣賦詩徐陵言之於世祖即日召鏗預醼使賦新成安樂宫鏗援筆便就世祖甚歎賞之累遷招逺将軍晉陵太守員外散騎常侍頃之卒有集三卷行於世史臣曰夫文學者盖人倫之所基歟是以君子異乎衆庶昔仲尼之論四科始乎徳行終於文學斯則聖人亦所貴也至於杜之偉之徒值於休運各展才用之偉尤著美焉陳書卷三十四陳書卷三十四考證江徳藻𫝊藻一本作操何之元𫝊之元從邵陵太守劉㳟之郡㳟南史作棻徐伯陽𫝊學士阮卓阮一本作元南史同然以下文觀之阮卓自有𫝊當以此為是張正見傳祖蓋之蓋南史作善陳書卷三十四考證
