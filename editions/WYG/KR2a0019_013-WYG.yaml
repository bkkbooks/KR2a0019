body:
  text: 陳書卷十三唐散騎常侍姚思廉撰列傳第七徐世譜魯悉達周敷荀朗子法尚周炅徐世譜字興宗巴東魚復人也世居荆州為主帥征伐蠻蜒至世譜尤敢勇有膂力善水戰梁元帝之為荆州刺史世譜將領鄉人事焉侯景之亂因預征討累遷至員外散騎常侍尋領水軍從司徒陸法和討景與景戰於赤亭湖時景軍甚盛世譜乃别造樓船拍艦火舫水車以益軍勢將戰又乘大艦居前大敗景軍生擒景將任約景退走因隨王僧辯攻郢州世譜復乘大艦臨其倉門賊將宋子仙據城降以功除使持節信武將軍信州刺史封魚復縣侯邑五百戸仍隨僧辯東下恒為軍鋒又破景將侯子鑒於湖熟侯景平後以功除通直散騎常侍衡州刺史資鎮河東太守增邑并前一千戸西魏來寇荆州世譜鎮馬頭岸據有龍州元帝授侍中使持節都督江南諸軍事鎮南將軍護軍將軍給鼔吹一部江陵陷没世譜東下依侯瑱紹泰元年徵為侍中左衞將軍髙祖之拒王琳其水戰之具悉委世譜世譜性機巧諳解舊法所造器械竝隨機損益玅思出人永定二年遷護軍將軍世祖嗣位加特進進號安右將軍天嘉元年增邑五百戸二年出為使持節散騎常侍都督宣城郡諸軍事安西將軍宣城太守秩中二千石還為安前將軍右光祿大夫尋以疾失明謝病不朝四年卒時年五十五贈本官諡曰桓侯世譜從弟世休隨世譜自梁征討亦有戰功官至員外散騎常侍安遠將軍枳縣侯邑八百戸光大二年𨽻都督淳于量征華晈卒贈通直散騎常侍諡曰壯魯悉逹字志通扶風郿人也祖斐齊通直散騎常侍安遠將軍衡州刺史陽塘侯父益之梁雲麾將軍新蔡義陽二郡太守悉達幼以孝聞起家為梁南平嗣王中兵參軍侯景之亂悉達糾合郷人保新蔡力田蓄榖時兵荒饑饉京都及上川餓死者十八九有得存者皆擕老幼以歸焉悉達分給糧廪其所濟活者甚衆仍於新蔡置頓以居之招集晉熈等五郡盡有其地使其弟廣達領兵隨王僧辯討侯景景平梁元帝授持節仁威將軍散騎常侍北江州刺史敬帝即位王琳據有上流留異余孝頃周迪等所在蜂起悉達撫綏五郡甚得民和士卒皆樂為之用琳授悉達鎮北將軍髙祖亦遣趙知禮授征西將軍江州刺史各送鼓吹女樂悉達兩受之遷延顧望皆不就髙祖遣安西將軍沈泰潛師襲之不能克齊遣行臺慕容紹宗以衆三萬來攻鬱口諸鎮兵甲甚盛悉達與戰敗齊軍紹宗僅以身免王琳欲圖東下以悉達制其中流恐為己患頻遣使招誘悉達终不從琳不得下乃連結於齊共為表裏齊遣清河王髙岳助之相持歳餘會裨將梅天養等懼罪乃引齊軍入城悉達勒麾下數千人濟江而歸髙祖髙祖見之甚喜曰來何遲也悉達對曰臣鎮撫上流願為蕃屏陛下授臣以官恩至厚矣沈泰襲臣威亦深矣然臣所以自歸於陛下者誠以陛下豁達大度同符漢祖故也髙祖嘆曰卿言得之矣授平南將軍散騎常侍北江州刺史封彭澤縣侯世祖即位進號安左將軍悉達雖仗氣任俠不以富貴驕人雅好詞賦招禮才賢與之賞會遷安南將軍吳州刺史遭母憂哀毁過禮因遘疾卒時年三十八贈安左將軍江州刺史諡曰孝侯子覽嗣弟廣達别有傳周敷字仲逺臨川人也為郡豪族敷形貎眇小如不勝衣而膽力勁果超出時軰性豪俠輕財重士郷黨少年任氣者咸歸之侯景之亂郷人周續合徒衆以討賊為名梁内史始興藩王蕭毅以郡讓續續所部内有欲侵掠於毅敷擁護之親率其黨捍衞送至豫章時觀寧侯蕭永長樂侯蕭基豐城侯蕭泰避難流寓聞敷信義皆往依之敷愍其危懼屈體崇敬厚加給䘏送之西上俄而續部下將帥爭權復反殺續以降周廸廸素無簿閥恐失衆心倚敷族望深求交結敷未能自固事迪甚恭迪大憑仗之漸有兵衆迪據臨川之工塘敷鎮臨川故郡侯景平梁元帝授敷使持節通直散騎常侍信武將軍寧州刺史封西豐縣侯邑一千戸髙祖受禪王琳據有上流余孝頃與琳黨李希欽等共圍周迪敷大致人馬以助於迪迪擒孝頃等敷功居多熊曇朗之殺周文育據豫章將兵萬餘人襲敷徑至城下敷與戰大敗之追奔五十餘里曇朗單馬獲免盡收其軍實曇朗走巴山郡收合餘黨敷因與周迪黄法􅉤等進兵圍曇朗屠之王琳平授散騎常侍平西將軍豫章太守是時南江酋帥竝顧戀巢窟私署令長不受召朝廷未遑致討但羈縻之唯敷獨先入朝天嘉二年詣闕進號安西將軍給鼓吹一部賜以女妓一部令還鎮豫章周迪以敷素出已下超致顯貴深不平乃舉兵反遣弟方興以兵襲敷敷與戰大破方興仍率衆從都督吳明徹攻迪破之擒其弟方興并諸渠帥詔以敷為安西將軍臨川太守餘並如故尋徵為使持節都督南豫北江二州諸軍事鎮南將軍南豫州刺史增邑五百戸常侍鼓吹如故五年迪又收合餘衆還襲東興世祖遣都督章昭達征廸敷又從軍至定川縣與迪相對迪紿敷曰吾昔與弟勠力同心宗從匪他豈規相害今願伏罪還朝因弟披露心腑先乞挺身共立盟誓敷許之方登壇為迪所害時年三十五詔曰使持節散騎常侍都督南豫州緣江諸軍事鎮南將軍南豫州刺史西豐縣開國侯敷受任遐征淹時違律虛衿姦詭遂貽喪身但夙著勤誠亟勞戎旅猶深惻愴愍悼于懷可存其茅賦量所賻䘏還葬京邑諡曰脱子智安嗣敷兄彖共敷據本鄉亦授臨川太守荀朗字深明潁川潁隂人也祖延祖梁潁川太守父伯道衛尉卿朗少慷慨有將帥大略起家梁廬陵王行參軍侯景之亂朗招率徒旅據巢湖閒無所屬臺城陷後簡文帝密詔授朗雲麾將軍豫州刺史令與外藩討景景使儀同宋子仙任約等頻往征之朗據山立砦自守子仙不能克時京師大饑百姓皆於江外就食朗更招致部曲解衣推食以相賑贍衆至數萬人侯景敗於巴陵朗出自濡須截景破其後軍王僧辯東討朗遣其將范寳勝及弟曉領兵二千助之侯景平後又别破齊將郭元建於踟蹰山梁承聖二年率部曲萬餘家濟江入宣城郡界立頓梁元帝授朗持節通直散騎常侍安南將軍都督南兖州諸軍事南兖州刺史未行而荆州陷髙祖入輔齊遣蕭軌東方老等來寇據石頭城朗自宣城來赴因與侯安都等大破齊軍永定元年賜爵興寧縣侯邑二千戸以朗兄昻為左衛將軍弟晷為太子右衛率尋遣朗隨世祖拒王琳於南皖髙祖崩宣太后與舎人蔡景歴秘不發喪朗弟曉在都微知之乃謀率其家兵襲臺事覺景歴殺曉仍繫其兄弟世祖即位竝釋之因厚撫慰朗令與侯安都等共拒王琳琳平遷使持節安北將軍散騎常侍都督霍晉合三州諸軍事合州刺史天嘉六年卒時年四十八贈南豫州刺史諡曰壮子法尚嗣法尚少俶儻有文武幹略起家江寧令襲爵興寧縣侯太建五年隨吳明徹北伐尋授通直散騎侍郎除涇令歴梁安城太守禎明中為都督郢巴武三州諸軍事郢州刺史及隋軍濟江法尚降于漢東道元帥秦王入隋歴邵觀綿豐四州刺史巴東燉煌二郡太守周炅字文昭汝南安成人也祖彊齊太子舎人梁州刺史父靈起梁通直散騎常侍廬桂二州刺史保城縣侯炅少豪俠任氣有將帥才梁大同中為通直散騎侍即朱衣直閤太清元年出為弋陽太守侯景之亂元帝承制改授西陽太守封西陵縣伯景遣兄子思穆據守齊安炅率驍勇襲破思穆擒斬之以功授持節髙州刺史是時炅據武昌西陽二郡招聚卒徒甲兵甚盛景將任約來據樊山炅與寧州長史徐文盛擊約斬其部將叱羅子通趙迦婁等因乘勝追之頻克約衆殆盡承聖元年遷使持節都督江定二州諸軍事戎昭將軍江州刺史進爵為侯邑五百戸髙祖踐阼王琳擁據上流炅以州從之及王琳遣其將曹慶等攻周迪仍使炅將兵掎角而進為侯安都所敗擒炅送都世祖釋炅授戎威將軍定州刺史帶西陽武昌二郡太守天嘉二年留異據東陽反世祖召炅還都欲令討異未至而異平炅還本鎮天康元年預平華晈之功授員外散騎常侍太建元年遷持節龍驤將軍通直散騎常侍五年進授使持節西道都督安蘄江衡司定六州諸軍事安州刺史改封龍源縣侯增邑并前一千戸其年隨都督吳明徹北討所向克捷一月之中獲十二城齊遣尚書左丞陸騫以衆二萬出自巴蘄與炅相遇炅留羸弱輜重設疑兵以當之身率精銳由間道邀其後大敗騫軍虜獲器械馬驢不可勝數進攻巴州克之於是江北諸城及榖陽士民並誅渠帥以城降進號和戎將軍散騎常侍増邑并前一千五百戸仍敕追炅入朝初蕭詧定州刺史田龍升以城降詔以為振逺將軍定州刺史封赤亭王及炅入朝龍升以江北六州七鎮叛入于齊齊遣歴陽王髙景安帥師應之於是令炅為江北道大都督總統衆軍以討龍升龍升使弋陽太守田龍琰率衆二萬陣於亭川髙景安於水陵陰山為其聲援龍升引軍别營山谷炅乃分兵各當其軍身率驍勇先擊龍升龍升大敗龍琰望塵而奔並追斬之髙景安遁走盡復江北之地以功増邑并前二千戸進號平北將軍定州刺史持節都督如故仍賜女妓一部太建八年卒官時年六十四贈司州刺史封武昌郡公諡曰壯子法僧嗣官至宣城太守史臣曰彼數子者或驅馳前代或擁據故鄉竝識運知歸因機景附位升列牧爵致通侯羙矣昔張耳陳餘自同於至戚周敷周迪亦誓等暱親尋鋒刃而誅殘斯甚夫胡越矣讎隙因於勢利何其鄙歟陳書卷十三
