body:
  text: 陳書卷二十二唐散騎常侍姚思廉撰列傳第十六陸子隆錢道戢駱牙陸子隆字興世吳郡吳人也祖敞之梁嘉興令父悛封氏令子隆少慷慨有志功名起家東宫直後侯景之亂於鄉里聚徒是時張彪為吳郡太守引為將帥彪徙鎮㑹稽子隆隨之及世祖討彪彪將沈秦吳寶真申縉等皆降而子隆力戰敗績世祖義之使復領其部曲板為中兵參軍歴始豐永興二縣令世祖嗣位子隆領甲仗宿衛尋隨侯安都拒王琳於沌口王琳平授左中郎將天嘉元年封益陽縣子邑三百戸出為高唐郡太守二年除明威將軍廬陵太守時周廸據臨川反東昌縣人修行師應之率兵以攻子隆其鋒甚盛子隆設伏於外仍閉門偃甲示之以弱及行師至腹背撃之行師大敗因乞降子隆許之送于京師四年周廸引陳寶應復出臨川子隆隨都督章昭達討廸廸退走因隨昭達踰東興嶺討陳寶應軍至建安以子隆監郡寶應據建安之湖際以拒官軍子隆與昭達各據一營昭達先與賊戰不利亡其鼓角子隆聞之率兵来救大破賊徒盡獲昭達所亡羽儀甲仗晉安平子隆功最遷假節都督武州諸軍事將軍如故尋改封朝陽縣伯邑五百户廢帝即位進號智武將軍加員外散騎常侍餘如故華皎據湘州反以子隆居其心腹皎深患之頻遣使招誘子隆不從皎因遣兵攻之又不能剋及皎敗於郢州子隆出兵以襲其後因與王師相會授持節通直散騎常侍都督武州諸軍事進爵為侯增邑并前七百户尋遷都督荆信祐三州諸軍事宣毅將軍荆州刺史持節常侍如故是時荆州新置治于公安城池未固子隆修建城郭綏集夷夏甚得民和當時號為稱職三年吏民詣都上表請立碑頌美功績詔許之太建元年進號雲麾將軍二年卒時年四十七贈散騎常侍諡曰威子之武嗣之武年十六領其舊軍隨吳明徹北伐有功官至王府主簿宏農太守仍𨽻明徹明徹於吕梁敗績之武逃歸為人所害時年二十二子隆弟子才亦有幹畧從子隆征討有功除始平太守封始興縣子邑三百户從吳明徹北伐監安州鎮于宿預除中衞始興王諮議參軍遷飊猛將軍信州刺史太建十三年卒時年四十二贈員外散騎常侍錢道戢字子韜吳興長城人也父景深梁漢夀令道戢少以孝行著聞及長頗有幹畧高祖微時以從妹妻焉從平盧子畧於廣州除濵江令高祖輔政遣道戢隨世祖平張彪于會稽以功拜直閣將軍除員外散騎常侍假節東徐州刺史封永安縣侯邑五百户仍領甲卒三千隨侯安都鎮防梁山尋領錢塘餘杭二縣令永定三年隨世祖鎮于南晥口天嘉元年又領剡令鎮于縣之南巖尋為臨海太守鎮巖如故侯安都之討留異也道戢帥軍出松陽以斷其後異平以功拜持節通直散騎常侍輕車將軍都督東西二衡州諸軍事衡州刺史領始興内史光大元年增邑并前七百户高宗即位徵歐陽紇入朝紇疑懼乃舉兵来攻衡州道戢與戰却之及都督章昭達率兵討紇以道戢為歩軍都督由間道斷紇之後紇平除左衞將軍太建二年又隨昭達征蕭巋於江陵道戢别督衆軍與陸子隆焚青泥舟艦仍為昭達前軍攻安蜀城降之以功加散騎常侍仁武將軍增邑并前九百户其年遷仁威將軍吳興太守未行改授使持節都督郢巴武三州諸軍事郢州刺史王師北討道戢與儀同黄法􅉤圍歴陽歴陽城平因以道戢鎮之以功加雲麾將軍增邑并前一千五百户其年十一月遘疾卒時年六十三贈本官諡曰肅子邈嗣駱牙字旗門吳興臨安人也祖秘道梁安成王田曹參軍父裕鄱陽嗣王中兵參軍事牙年十二宗人有善相者云此郎容貌非常必將逺致梁太清末世祖嘗避地臨安牙母陳覩世祖儀表知非常人賓待甚厚及世祖為吳興太守引牙為將帥因從平杜龕張彪等每戰輒先鋒䧟陣勇冠衆軍以功授直閣將軍太平二年以母憂去職世祖鎮㑹稽起為山隂令永定三年除安東府中兵參軍出鎮冶城尋從世祖拒王琳於南皖世祖即位授假節威虜將軍員外散騎常侍封常安縣侯邑五百户尋為臨安令遷越州刺史餘竝如故初牙母之卒也于時饑饉兵荒至是始葬詔贈牙母常安國太夫人諡曰恭遷牙為貞威將軍晉陵太守三年以平周廸之功遷冠軍將軍臨川内史太建三年授安逺將軍衡陽内史未拜徙為桂陽太守八年還朝遷散騎常侍入直殿省十年授豐州刺史餘竝如故至徳二年卒時年五十七贈安逺將軍廣州刺史子義嗣史臣曰陸子隆錢道戢或舉門願從或舊齒樹勲有統領之才充師旅之寄至於受任藩屏功績竝著美矣駱牙識真有奉知世祖天授之徳蓋張良之亞歟牙母智深先覺符柏谷之禮君子知鑒識宏逺其在兹乎陳書卷二十二陳書卷二十二考證錢道戢傳以功拜直閣將軍除員外散騎常侍假節東徐州刺史封永安縣侯邑五百户一本缺將軍至五百户共二十五字駱牙傳南史作駱文牙牙母陳覩世祖儀表知非常人陳各本俱誤陵今從南史陳書卷二十二考證
