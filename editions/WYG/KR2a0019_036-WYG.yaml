body:
  text: 陳書卷三十六唐散騎常侍姚思亷撰列𫝊第三十始興王叔陵新安王伯固始興王叔陵字子嵩高宗之第二子也梁承聖中高宗在江陵為直閣将軍而叔陵生焉江陵陷高宗遷闗右叔陵留于穰城高宗之還也以後主及叔陵為質天嘉三年随後主還朝封康樂侯邑五百户叔陵少機辯狥聲名彊梁無所推屈光大元年除中書侍郎二年出為持節都督江州諸軍事南中郎将江州刺史太建元年封始興郡王奉昭烈王祀進授使持節都督江郢晉三州諸軍事軍師将軍刺史如故叔陵時年十六政自己出僚佐莫預焉性嚴刻部下懾憚諸公子姪及罷縣令長皆逼令事已豫章内史錢法成詣府進謁即配其子季卿将領馬仗季卿慙耻不時至叔陵大怒侵辱法成法成憤怨自縊而死州縣非其部内亦徴攝案治之朝貴及下吏有乖忤者輒誣奏其罪䧟以重辟尋進號雲麾将軍加散騎常侍三年加侍中四年遷都督湘衡桂武四州諸軍事平南将軍湘州刺史侍中使持節如故諸州鎮聞其至皆震恐股慄叔陵日益暴橫征伐夷獠所得皆入已絲毫不以賞賜徴求役使無有紀極夜常不卧燒燭逹曉呼召賔客説民間細事戲謔無所不為性不飲酒唯多置餚胾書夜食噉而已自旦至中方始寝寐其曹局文案非呼不得輒自呈笞罪者皆繫獄動數年不省視瀟湘以南皆逼為左右廛里殆無遺者其中脱有逃竄輒殺其妻子州縣無敢上言高宗弗之知也尋進號鎮南将軍給鼓吹一部遷中衞将軍九年除使持節都督揚徐東揚南豫四州諸軍事揚州刺史侍中将軍鼓吹如故十年至都加扶給油幢車叔陵治在東府事務多闗渉省閣執事之司承意順㫖即諷上進用之微致違忤必抵以大罪重者至殊死道路籍籍皆言其有非常志叔陵脩飾虚名毎入朝常於車中馬上執卷讀書高聲長誦陽陽自若歸坐齋中或自執斧斤為沐猴百戲又好遊冡墓閒遇有塋表主名可知者輒令左右發掘取其石誌古器并骸骨肘脛持為翫弄蔵之庫中府内民間少妻處女微有色貎者竝即逼納十一年丁所生母彭氏憂去職頃之起為中衞将軍使持節都督刺史如故晉世王公貴人多葬梅嶺及彭卒叔陵啓求於梅嶺葬之乃發故太傅謝安舊墓棄去安柩以葬其母初喪之日僞爲哀毁自稱刺血寫湼槃經未及十日乃令庖厨撃鮮日進甘膳又私召左右妻女與之姦合所作尤不軌浸淫上聞高宗譴責御史中丞王政以不舉奏免政官又黜其典籖親事仍加鞭棰高宗素愛叔陵不䋲之以法但責讓而已服闋又為侍中中軍大将軍及高宗不豫太子諸王竝入侍疾高宗崩于宣福殿翌日旦後主哀頓俯伏叔陵以剉藥刀斫後主中項太后馳來救焉叔陵又斫太后數下後主乳媪吳氏時在太后側自後掣其肘後主因得起叔陵仍持後主衣後主自奮得免長沙王叔堅手搤叔陵奪去其刀仍牽就柱以其褶袖縛之時吴媪已扶後主避賊叔堅求後主所在将受命焉叔陵因奮袖得脱突走出雲龍門馳車還東府呼其甲士散金銀以賞賜外召諸王将帥莫有應者唯新安王伯固聞而赴之叔陵聚兵僅千人初欲據城保守俄而右衞将軍蕭摩訶将兵至府西門叔陵事急惶恐乃遣記室韋諒送其鼓吹與摩訶仍謂之曰如其事捷必以公為台鼎摩訶紿報之曰須王心膂節将自來方敢從命叔陵即遣戴温譚騏驎二人詣摩訶所摩訶執以送臺斬於閣道下叔陵自知不濟遂入内沉其妃張氏及寵妾七人于井中叔陵有部下兵先在新林於是率人馬數百自小航渡欲趨新林以舟艦入北行至白楊路為臺軍所邀伯固見兵至旋避入巷叔陵馳騎拔刀追之伯固復還叔陵部下多棄甲潰散摩訶馬客陳智深迎刺叔陵僵斃于地閹豎王飛禽抽刀斫之十數下馬客陳仲華就斬其首送于臺自寅至巳乃定尚書八座奏曰逆賊故侍中中軍大将軍始興王叔陵幼而狼戾長肆貪虐出撫湘南及鎮九水兩藩甿庶掃地無遺蜂目豺聲狎近輕薄不孝不仁阻兵安忍無禮無義唯戮是聞及居偏憂婬樂自恣産子就館日月相接晝伏夜遊恒習姦詭抄掠居民厯發丘墓謝太傅晉朝佐命草創江左斵棺露骸事驚聴視自大行皇帝寝疾翌日未瘳叔陵以貴介之地參侍醫藥外無戚容内懐逆弑大漸之後聖躬號擗遂因匍匐手犯乗輿皇太后奉臨又加鋒刃窮凶極逆曠古未儔賴長沙王叔堅誠孝懇至英果奮發手加挫拉身蔽聖躬叔陵仍奔東城招集兇黨餘毒方熾自害妻孥雖應時梟懸猶未攄憤怨臣等參議請依宋代故事流尸中江汙瀦其室并毁其所生彭氏墳廟還謝氏之塋制曰凶逆梟獍反噬宫闈賴宗廟之靈時從殄滅撫情語事酸憤兼懐朝議有章宜從所奏也叔陵諸子即日竝賜死前衡陽内史彭暠諮議參軍兼記室鄭信中錄事參軍兼記室韋諒典籖俞公喜竝伏誅暠叔陵舅也初随高宗在闗中頗有勤効因藉叔陵将領歴陽衡陽二郡信以便書記有寵謀謨皆預焉諒京兆人梁侍中護軍将軍粲之子也以學業為叔陵所引陳智深以誅叔陵之功為巴陵内史封游安縣子陳仲華為下嶲太守封新夷縣子王飛禽除伏波将軍賜金各有差新安王伯固字牢之世祖之第五子也生而龜胷目通精揚白形状眇小而俊辯善言論天嘉六年立為新安郡王邑二千户廢帝嗣立為使持節都督南琅琊彭城東海三郡諸軍事雲麾将軍彭城琅邪二郡太守尋入為丹陽尹将軍如故太建元年進號智武将軍尹如故秩滿進號翌右将軍尋授使持節都督吴興諸軍事平東将軍吳興太守四年入為侍中翊前将軍遷安前将軍中領軍七年出為使持節散騎常侍都督南徐南豫南北兖四州諸軍事鎮北将軍南徐州刺史伯固性嗜酒而不好積聚所得祿俸用度無節酣醉已後多所乞丐於諸王之中最為貧窶高宗毎矜之特加賞賜伯固雅性輕率好行鞭捶在州不知政事日出田獵或乗眠轝至於草間輒呼民下從遊動至旬日所捕麞鹿多使生致高宗頗知之遣使責讓者數矣十年入朝又為侍中鎮右将軍尋除䕶軍将軍其年為國子祭酒領左驍騎将軍侍中鎮右竝如故伯固頗知𤣥理而堕業無所通至於擿句問難往往有竒意為政嚴苛國學有惰遊不脩習者重加檟檚生徒懼焉由是學業頗進十二年領宗正卿十三年為使持節都督揚南徐東陽南豫四州諸軍事揚州刺史侍中将軍如故後主初在東宫與伯固甚相親狎伯固又善嘲謔高宗每宴集多引之叔陵在江州心害其寵隂求疵瑕将中之以法及叔陵入朝伯固懼罪諂求其意乃共訕毁朝賢歴詆文武雖耆年高位皆靣折之無所畏忌伯固性好射雉叔陵又好開發冡墓出遊野外必與偕行於是情好大叶遂謀不軌伯固侍禁中每有密語必報叔陵及叔陵出奔東府遣使告之伯固單騎馳赴助叔陵指揮知事不捷便欲遁走㑹四門已閉不得出因同趣白楊道臺馬客至為亂兵所殺屍於東昌舘門時年二十八詔曰伯固同兹悖逆殞身途路今依外議意猶弗忍可特許以庶人禮葬又詔曰伯固随同巨逆自絶于天俾無遺育抑有恒典但童孺靡識兼預葭莩寘之甸人良以惻憫及伯固所生王氏可竝特宥為庶人國除史臣曰孔子稱富與貴是人之所欲非其道得之不處也上自帝王至於黎獻莫不嫡庶有差長幼攸序叔陵險躁奔競遂行悖逆轅磔形骸未臻其罪汙瀦居處不足彰過悲哉陳書卷三十六陳書卷三十六考證始興王叔陵𫝊叔陵有部下兵先在新林林南史作安然觀下文云自小航渡欲趨新林自以此為是陳書卷三十六考證
