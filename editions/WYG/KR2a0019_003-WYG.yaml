body:
  text: 陳書卷三唐散騎常侍姚思廉撰本紀第三世祖世祖文皇帝諱蒨字子華始興昭烈王長子也少沉敏有識量美容儀留意經史舉動方雅造次必遵禮法髙祖甚愛之常稱此兒吾宗之英秀也梁太清初夢兩日鬬一大一小大者光滅墜地色正黄其大如斗世祖因三分取一而懐之侯景之亂鄉人多依山湖寇抄世祖獨保家無所犯時亂日甚乃避地臨安及髙祖舉義兵侯景遣使収世祖及衡陽獻王世祖乃密袖小刀冀因入見而害景至便屬吏故其事不行髙祖大軍圍石頭景欲加害者数矣㑹景敗世祖乃得出赴髙祖營起家為呉興太守時宣城刼帥紀機郝仲等各聚衆千餘人侵暴郡境世祖討平之承聖二年授信武將軍監南徐州三年髙祖北征廣陵使世祖為前軍每戰克捷髙祖之將討王僧辯也先召世祖與謀時僧辯女婿杜龕據呉興兵衆甚盛髙祖密令世祖還長城立柵以備龕世祖収兵纔數百人戰備又少龕遣其將杜泰領精兵五千乗虚奄至將士相視失色而世祖言笑自若部分益明於是衆心乃定泰知柵内人少日夜苦攻世祖激厲將士身當矢石相持數旬泰乃退走及髙祖遣周文育率兵討龕世祖與并軍往呉興時龕兵尚衆斷據衝要水歩連陣相結世祖命將軍劉澄蔣元舉率衆攻龕龕軍大敗窘急因請降東揚州刺史張彪起兵圍臨海太守王懐振懐振遣使求救世祖與周文育輕兵往㑹稽以掩彪後彪將沈泰開門納世祖世祖盡收其部曲家累彪至又破走若邪村民斬彪𫝊其首以功授持節都督㑹稽等十郡諸軍事宣毅將軍㑹稽太守山越深險皆不賔附世祖分命討擊悉平之威恵大振髙祖受禪立為臨川郡王邑二千戸拜侍中安東將軍及周文育侯安都敗於沌口髙祖詔世祖入衛軍儲戎備皆以委焉尋命率兵城南晥永定三年六月丙午髙祖崩遺詔徴世祖入纂甲寅至自南晥入居中書省皇后令曰昊天不弔上𤣥降禍大行皇帝奄捐萬國率土哀號普天如喪窮酷煩寃無所迨及諸孤藐爾反國無期須立長主以寧㝢縣侍中安東將軍臨川王蒨體自景皇屬惟猶子建殊功於牧野敷盛業於戡黎納麓時敘之辰負扆乗機之日竝佐時雍是同草創祧祏所繋遐邇宅心宜奉大宗嗣膺寳錄使七廟有奉兆民寧晏未亡人假延餘息嬰此百罹尋繹纒綿興言感絶世祖固讓至于再三羣公卿士固請其日即皇帝位於太極前殿詔曰上天降禍奄集邦家大行皇帝背離萬國率土崩心若喪考妣龍圖寳歴𦕈屬朕躬運鍾擾攘事切機務南靣湏主西讓禮輕今便式膺景命光宅四海可大赦天下罪無輕重悉皆蕩滌逋租宿債吏民愆負可勿復收文武内外量加爵叙孝悌力田為父後者賜爵一級庶祗畏在心公卿畢力勝殘去殺無待百年興言號哽深増慟絶又詔州郡悉停奔赴秋七月丙辰尊皇后為皇太后己未以鎮南將軍開府儀同三司廣州刺史歐陽頠進號征南將軍平南將軍開府儀同三司周廸進號鎮南將軍平南將軍開府儀同三司髙州刺史黄法􅉤進號安南將軍庚申以鎮南大將軍開府儀同三司桂州刺史淳于量進號征南大將軍辛酉以侍中車騎將軍司空侯瑱為太尉鎮西將軍開府儀同三司南豫州刺史侯安都為司空侍中中權將軍開府儀同三司王冲為特進左光禄大夫鎮北將軍南徐州刺史徐度為侍中中撫軍將軍開府儀同三司壬戌以侍中䕶軍將軍徐世譜為特進安右將軍侍中忠武將軍杜稜為領軍將軍乙丑重雲殿災八月癸巳以平北將軍南徐州刺史留異為安南將軍縉州刺史平南將軍北江州刺史魯悉逹進號安左將軍庚戌封皇子伯茂為始興王奉昭烈王後徙封始興嗣王頊為安成王九月辛酉立皇子伯宗為皇太子王公以下賜帛各有差乙亥立妃沈氏為皇后冬十一月乙卯王琳寇大雷詔遣太尉侯瑱司空侯安都儀同徐度率衆以禦之天嘉元年春正月癸丑詔曰朕以寡昧嗣纂洪業哀惸在疚治道弗昭仰惟前徳幽顯遐暢恭已不言庶幾無改雖宏圖懋軌日月方𢎞而清廟廓然聖靈浸逺感尋永往瞻言罔極今四象運周三元告獻華夷胥洎玉帛駿奔思覃遺澤播之億兆其大赦天下改永定四年為天嘉元年鰥寡孤獨不能自存立者賜榖人五斛孝悌力田殊行異等加爵一級甲寅分遣使者宣勞四方辛酉輿駕親祀南郊詔曰朕式饗上𤣥䖍奉牲玉髙禋禮畢誠敬兼𢎞且隂霾浹辰褰霽在日雲物韶朗風景清和慶動人祗忭流庶俗思俾黎元同此多祐可賜民爵一級辛未輿駕親祀北郊日有冠二月辛卯老人星見乙未髙州刺史紀機自軍叛還宣城據郡以應王琳涇令賀當遷討平之丙申太尉侯瑱敗王琳于梁山攻齊兵于博望生擒齊將劉伯球盡收其資儲船艦俘馘以萬計王琳及其主蕭莊奔于齊戊戌詔曰夫五運遞來三靈眷命皇王因之改創殷周所以樂推朕統歴承基丕隆鼎運期理攸屬數祚斯在豈僥倖所至寧卜祝可求故知神器之重必在符命是以逐鹿貽譏斷虵定業亂臣賊子異世同尤王琳識暗挈瓶智慙衛足干紀亂常自貽顛沛而縉紳君子多被縶維雖涇渭合流蘭鮑同肆求之厥理或有脅從今九罭既設八紘斯掩天網恢恢吞舟是漏至如伏波逰説永作漢蕃延夀脫歸終為魏守器改秦虞村通晉楚行藏用捨亦豈有恒宜加寛仁以彰雷作其衣冠士族預在凶黨悉皆原宥將帥戰兵亦同肆𤯝竝隨才銓引庶收力用又詔師旅以來將士死王事者竝加贈諡己亥詔曰日者凶渠肆虐衆軍進討舟艦輸積權倩民丁師出經時役勞日久今氛祲廓清宜有甄被可蠲復丁身夫妻三年於役不幸者復其妻子庚子分遣使者齎璽書宣勞四方乙巳遣太尉侯瑱鎮湓城庚戌以髙祖第六子昌為驃騎將軍湘州牧立為衡陽王三月丙辰詔曰自喪亂以來十有餘載編戸凋亡萬不遺一中原氓庶蓋云無幾頃者冦難仍接筭歛繁多且興師以來千金日費府藏虚竭杼軸歲空近所置軍資木充戎備今元惡克殄八表巳康兵戈靜戢息肩方在思俾餘黎陶此寛賦今歲軍糧通減三分之一尚書申下四方稱朕哀矜之意守宰明加勸課務急農桑庶鼓腹含哺復在茲日蕭莊所署郢州刺史孫瑒舉州内附丁巳江州刺史周廸平南中斬賊率熊曇朗𫝊首京師先是齊軍守魯山城戊午齊軍棄城走詔南豫州刺史程靈洗守之甲子分荆州之天門義陽南平郢州之武􅁜四郡置武州其刺史督沅州領武陵太守治武陵郡其都尉所部六縣為沅州别置通寜郡以刺史領太守治都尉城省舊都尉以安南將軍南兖州刺史新除右衞將軍呉明徹為安西將軍武州刺史偽郢州刺史孫瑒為安南將軍湘州刺史丙子衡陽王昌薨丁丑詔曰蕭莊僞署文武官屬還朝者量加録序夏四月丁亥立皇子伯信為衡陽王奉獻王後乙未以安南將軍荀朗為安北将軍合州刺史五月乙卯改桂陽之汝成縣為廬陽郡分衡州之始興安逺二郡置東衡州六月辛巳改諡皇祖妣景安皇后曰景文皇后壬辰詔曰梁孝元遭離多難靈櫬播越朕昔經北靣有異常倫遣使迎接以次近路江寧既有舊塋宜即安卜車旗禮章悉用梁典依魏葬漢獻帝故事甲午追䇿故始興昭烈王妃曰孝妃丁酉以開府儀同三司徐度為侍中中軍將軍辛丑國哀周忌上臨于太極前殿百僚陪哭赦京師殊死已下是月葬梁元帝於江寧秋七月甲寅詔曰朕以眇身屬當大寳負荷至重憂責實深而庶績未康胥怨猶結佇咨賢艮發於夢想每有一言入聽片善可求何嘗不褒奬抽揚緘書紳帶而傅巖虚往窮谷尚淹蒲幣空陳旌弓不至豈當有乖則哲使草澤遺才将時運澆流今不逮古側食長懐寝興增歎新安太守陸山才有啟薦梁前征西從事中郎蕭䇿梁前尚書中兵郎王暹竝世胄清華羽儀著族或文史足用或孝徳可稱竝宜登之朝序擢以不次王公已下其各進舉賢良申薦淪屈庶衆才必萃大厦可成使棫樸載歌由庚在詠乙卯詔曰自頃喪亂編戸播遷言念餘黎良可哀惕其亡鄉失土逐食流移者今年内隨其適樂來歲不問僑舊悉令著籍同土斷之例丙辰立皇子伯山為鄱陽王八月庚辰老人星見壬午詔曰菽粟之貴重於珠玉自頃冦戎游手者衆民失分地之業士有佩犢之譏朕哀矜黔庶念康弊俗思俾阻饑方存富教麥之為用要切斯甚今九秋在節萬實可収其班宣逺近竝令播種守宰親臨勸課務使及時其有尤貧量給種子癸未世祖臨景陽殿聽訟戊子詔曰汙罇土鼔誠則難追畫卯彫薪或可易革梁氏末運奢麗已甚蒭豢厭於胥史歌鍾列於管庫牛木被朱丹之采車馬飾金玉之珍逐欲澆流遷訛遂逺朕自諸生頗為内足而家敦朴素室靡浮華觀覽時俗常所扼腕今妄假時乗臨馭區極屬當淪季思聞治道菲食卑宫自安儉陋俾兹薄俗獲反淳風維雕鏤淫飾非兵器及國容所須金銀珠玉衣服雜玩悉皆禁斷甲午周將賀若敦率馬歩一萬奄至武陵武州刺史呉明徹不能拒引軍還巴陵丁酉上幸正陽堂閱武九月癸丑彗星見乙卯周將獨孤盛領水軍將趣巴湘與賀若敦水陸俱進太尉侯瑱自尋陽往禦之辛酉遣儀同徐度率衆㑹瑱于巴丘丙子太白晝見丁丑詔侯瑱衆軍進討巴湘十月癸巳侯瑱襲破獨孤盛於楊葉洲盡獲其船艦盛收兵登岸築城以保之丁酉詔司空侯安都率衆㑹侯瑱南討十二月乙未詔曰古者春夏二氣不決重罪盖以陽和布澤天秩是𢎞寛網省刑義符含育前王所以則天象地立法垂訓者也朕屬當澆季思求民瘼哀矜惻隠念甚納隍常欲式遵舊軌用長風化自今孟春訖于夏首罪人大辟事已款者宜且申停己亥周巴陵城主尉遲憲降遣巴州刺史侯安都守之庚子獨孤盛將餘衆自楊葉洲潛遁二年春正月庚戌大赦天下以雲麾將軍晉陵太守杜稜為侍中領軍將軍辛亥以始興王伯茂為宣恵將軍揚州刺史乙卯合州刺史裴景徽奔于齊辛未周湘州城主殷亮降湘州平二月丙戌以太尉侯瑱為車騎將軍湘州刺史庚寅曲赦湘州諸郡三月乙卯太尉車騎將軍湘州刺史侯瑱薨丁丑以鎮東將軍㑹稽太守徐度為鎮南將軍湘州刺史夏四月分荆州之南平宜都羅河東四郡置南荆州鎮河東郡以安西將軍武州刺史呉明徹為南荆州刺史庚寅以安左將軍魯悉逹為安南將軍呉州刺史辛卯老人星見秋七月丙午周將賀若敦自㧞遁歸人畜死者十七八武陵天門南平義陽河東宜都郡悉平九月甲寅詔曰姬業方闡望載渭濵漢歴既融道通圮上若乃摛精辰宿降靈惟岳風雲有感夢寐是求斯固舟楫鹽梅遞相表裏長世建國罔或不然至於銘徳太常從祀清廟以貽厥後來􅂷諸不朽者也前皇經濟區宇裁成品物靈貺式甄光膺寳命雖謩眀濬發幽顯恊從亦文武賢能翼宣王業故大司馬驃騎大將軍瑱故司空文育故平北將軍開府儀同三司僧明故中護軍頴故領軍將軍擬或締構艱難經綸夷險或摧鋒冐刃殉義遺生或宣哲協規綢繆帷幄或披荆汗馬終始勤劬莫不罄誠悉力屯泰以之朕以寡昧嗣膺丕緒永言勲烈思𢎞典訓便可式遵故實載揚盛軌可竝配食髙祖廟庭俾兹大猷永𫝊宗祏丙辰以侍中中權將軍特進左光祿大夫開府儀同三司王沖為丹陽尹丹陽尹沈君理為左民尚書領歩兵校尉冬十月乙巳霍州西山蠻率部落内屬十一月乙卯髙麗國遣使獻方物甲子以武昌國川為竟陵郡以安流民十二月辛巳以安東將軍呉郡太守孫瑒為中䕶軍甲申立始興國廟於京師用王者之禮太子中庶子虞荔御史中丞孔奐以國用不足奏立煮海鹽賦及𣙜酤之科詔並施行先是縉州刺史留異應于王琳等反丙戌詔司空侯安都率衆討之三年春正月庚戌設帷宫於南郊幣告胡公以配天辛亥輿駕親祀南郊詔曰朕負荷寳圖亟回星琯兢兢業業庶㡬治定而徳化不孚俗弊滋甚永言念之無忘日夜陽和布氣昭事上𤣥躬奉牲玉誠兼饗敬思與黎元被斯寛恵可普賜民爵一級其孝悌力田别加一等辛酉輿駕親祀北郊閏二月己酉以百濟王餘眀為撫東大將軍髙句驪王髙湯為寧東將軍江州刺史周迪舉兵應留異襲湓城攻豫章郡並不剋辛亥以南荆州刺史呉明徹為安右將軍甲子改鑄五銖錢三月丙子安成王頊至自周詔授侍中中書監中衛將軍置佐史丁丑以安右將軍呉眀徹為安南將軍江州刺史督衆軍南討甲申大赦天下庚寅司空侯安都破留異於桃支嶺異脱身奔晉安東陽郡平夏四月癸卯曲赦東陽郡乙巳齊遣使來聘六月丙辰以侍中中衛將軍安成王頊為驃騎將軍揚州刺史以㑹稽東陽臨海永嘉新安新寧晉安建安八郡置東揚州以揚州刺史始興王伯茂為鎮東將軍東揚州刺史征北將軍司空南徐州刺史侯安都為侍中征北大將軍秋七月己丑皇太子納妃王氏在位文武賜帛各有差孝悌力田為父後者賜爵二級九月戊辰朔日有食之以侍中都官尚書到仲舉為尚書右僕射丹陽尹丁亥周廸請降詔安成王頊督衆軍以招納之是歳周所立梁王蕭詧死子巋代立四年春正月丙子干陁利國遣使獻方物甲申周迪棄城走閩州刺史陳寳應納之臨川郡平壬辰以平西將軍郢州刺史章昭逹為䕶軍將軍仁武將軍新州刺史華皎進號平南將軍鎮南將軍開府儀同三司髙州刺史黄法􅉤為鎮北大將軍南徐州刺史安西將軍領臨川太守周敷為南豫州刺史中護軍孫瑒為鎮右將軍罷髙州𨽻入江州二月戊戌征南將軍開府儀同三司廣州刺史歐陽頠進號征南大將軍庚戌以侍中司空征北大將軍侯安都為征南大將軍江州刺史庚申以平南將軍華皎為南湘州刺史三月辛未以鎮南將軍開府儀同三司徐度為侍中中軍大將軍辛巳詔贈討周迪將士死王事者夏四月辛丑設無㝵大㑹於太極前殿乙卯以侍中中書監中衛將軍驃騎將軍揚州刺史安成王頊為開府儀同三司五月丁卯安前將軍右光禄大夫徐世譜卒六月癸巳太白晝見司空侯安都賜死七月丁丑以鎮北大將軍開府儀同三司南徐州刺史黄法􅉤為鎮南大將軍江州刺史九月壬戌開府儀同三司廣州刺史歐陽頠薨癸亥曲赦京師辛未周迪復㓂臨川詔䕶軍章昭達率衆討之十一月辛酉章昭達大破周迪悉擒其黨與迪脱身潛竄十二月丙申大赦天下詔䕶軍將軍章昭達進軍建安以討陳寳應信威將軍益州刺史余孝頃督㑹稽東陽臨海永嘉諸軍自東道㑹之癸丑以前安南將軍江州刺史呉眀徹為鎮前將軍五年春正月庚辰以吏部尚書領右軍將軍袁樞為丹陽尹辛巳輿駕親祀北郊乙酉江州湓城火燒死者二百餘人三月丁丑以征南大將軍開府儀同三司桂州刺史淳于量為中撫軍大將軍壬午詔以故䕶軍將軍周鐵虎配食髙祖廟庭夏四月庚子周遣使來聘五月庚午罷南丹陽郡是月周齊並遣使來聘六月丁未夜有白氣兩道出于北斗東南屬地秋七月丁丑詔曰朕以寡昧屬當負重星籥亟改冕旒弗曠不能仰協璿衡用調玉燭傍慰蒼生以安黔首兵無寧歳民乏有年移風之道未𢎞習俗之患猶在致令氓多觸網吏繁筆削獄犴滋章雖由物犯囹圄淹滯亦或有寃念俾納隍載勞負戾加以膚湊不適攝衛有虧比獲㣲痊思覃寛恵可曲赦京師九月城西城冬十一月丁亥以左衛將軍程靈洗為中護軍己丑章昭逹破陳寳應于建安擒寳應留異送京師晉安郡平甲辰以䕶軍將軍章昭達為鎮前將軍開府儀同三司十二月甲子曲赦建安晉安二郡討陳寳應將士死王事者竝給棺槥送還本鄉并復其家瘡痍未瘳者給其醫藥癸未齊遣使來聘六年春正月甲午皇太子加元服王公以下賜帛各有差孝悌力田為父後者賜爵一級鰥寡孤獨不能自存者榖人五斛庚戌以領軍將軍杜稜為翊左將軍丹陽尹丹陽尹袁樞為吏部尚書衛尉卿沈欽為中領軍三月乙未詔侯景以來遭亂移在建安晉安義安郡者並許還本土其被畧為奴婢者釋為良民夏四月甲寅以侍中中書監中衛將軍驃騎將軍開府儀同三司揚州刺史安成王頊為司空辛酉有彗星見周遣使來聘秋七月癸未大風至自西南廣百餘歩激壊靈臺候樓甲申儀賢堂無故自壊丙戌臨川太守駱文牙斬周迪𫝊首京師梟於朱雀航丁酉太白晝見八月丁丑詔曰梁室多故禍亂相尋兵甲紛紜十年不觧不逞之徒虐流生氣無頼之屬暴及徂魂江左肇基王者攸宅金行水位之主木運火徳之君時更四代歲逾二百若其經綸三業縉紳民望忠臣孝子何世無才而零落山丘變移陵谷或皆剪伐莫不侵殘玉杯得於民間漆簡𫝊於世載無復五株之樹罕見千年之表自大祚光啟恭惟揖讓爰暨朕躬聿修祖武雖復旂旗服色猶行把宋之計每車駕巡逰眇瞻河雒之路故喬山之祀蘋藻弗虧驪山之墳松栢恒守唯戚藩舊壟士子故塋掩殣未周樵牧猶衆或親屬流𨽻負土無期子孫冥滅手植何寄漢髙留連於無忌宋祖惆悵於子房丘墓生哀性靈共惻者也朕所以興言永日思慰幽泉維前代王侯自古忠烈墳冡被發絶無後者可檢行修治墓中樹木勿得樵採庶幽顯咸暢稱朕意焉己卯立皇子伯固為新安郡王伯恭為晉安王伯仁為廬陵王伯義為江夏王九月癸未罷豫章郡是月新作大航冬十月辛亥齊遣使來聘十二月乙卯立皇子伯禮為武陵王丁巳以鎮前將軍開府儀同三司章昭逹為鎮南將軍江州刺史鎮南大將軍江州刺史黄法􅉤為中衛大將軍中䕶軍程靈洗為宣毅將軍郢州刺史軍師將軍郢州刺史沈恪為中䕶軍鎮東將軍呉興太守呉明徹為中領軍戊午以東中郎將呉郡太守鄱陽王伯山為平北將軍南徐州刺史癸亥詔曰朕自居民牧之重託在王公之上顧其寡昧鬰于治道加以屢虧聴覽事多壅積寃滯靡申幽枉弗鑒念兹罪戾有甚納隍而恵澤未流愆陽累月今歲序云暮元正向􅒊欲使幽圄之内同被時和可曲赦京師天康元年春二月丙子詔曰朕以寡徳纂承洪緒日昃劬勞思𢎞景業而政道多昧黎庶未康兼疹患淹時亢陽累月百姓何咎寔由朕躬念兹在兹痛如疾首可大赦天下改天嘉七年為天康元年三月己卯以驃騎將軍開府儀同三司揚州刺史司空安成王頊為尚書令夏四月乙卯皇孫至澤生在位文武賜絹帛各有差為父後者賜爵一級癸酉世祖疾甚是日崩于有覺殿遺詔曰朕疾苦彌留遂至不救修短有命夫復何言但王業艱難頻歲軍旅生民多弊無忘愧惕今方隅乃定俗教未𢎞便及大漸以為遺恨社稷任重太子可即君臨王侯將相善相輔翊内外恊和勿違朕意山陵務存儉速大歛竟羣臣三日一臨公除之制率依舊典六月甲子羣臣上諡曰文皇帝廟號世祖丙寅葬永寧陵世祖起自艱難知百姓疾苦國家資用務從儉約常所調歛事不獲已者必咨嗟改色若在諸身主者奏決妙識真偽下不容姦人知自勵矣一夜内刺閨取外事分判者前後相續每雞人伺漏𫝊更籖於殿中乃敕送者必投籖於階石之上令鎗然有聲云吾雖眠亦令驚覺也始終梗槩若此者多焉陳吏部尚書姚察曰世稱繼體守文宗枝承統得失之間盖亦詳矣大抵以奉而勿墜為賢能撓而易之為不肖其有光揚前軌克荷曾構固以少焉世祖自初發跡功庸顯著寜亂靜冦首佐大業及國禍奄臻入承寳祚兢兢業業真若馭朽加以崇尚儒術愛恱文義見善如弗及用人如由已恭儉以御身勤勞以濟物自昔允文允武之君東征西怨之后賔實之迹可為聨類至於杖聰眀用鑒識斯則永平之政前史其論諸陳書卷三陳書卷三考證世祖紀若乃擒精辰宿降靈惟岳擒一本作儲設無㝵大㑹於太極前殿大㑹下南史有捨身二字陳書卷三考證
