body:
  text: 陳書卷十六列傳第十趙知禮蔡景歷劉師知謝岐趙知禮字齊旦天水隴西人也父孝穆梁候官令知禮涉獵文史善隸書高祖之討元景仲也或薦之引為記室參軍知禮為文贍速每占授軍書下筆便就率皆稱旨由是恆侍左右深被委任當時計畫莫不預焉知禮亦多所獻替高祖平侯景軍至白茅灣上表於梁元帝及與王僧辨論述軍事其文並知禮所製侯景平授中書侍郎封始平縣子邑三百戶高祖為司空以為從事中郎高祖入輔遷給事黃門侍郎兼衛尉卿高祖受命遷通直散騎常侍直殿省尋遷散騎常侍守太府卿權知領軍事天嘉元年進爵為伯增邑通前七百戶王琳平授持節督吳州諸軍事明威將軍吳州刺史知禮沈靜有謀謨每軍國大事世祖輒令璽書問之秩滿為明威將軍太子右衛率遷右衛將軍領前軍將軍六年卒時年四十七詔贈侍中諡曰忠子允恭嗣蔡景歷字茂世濟陽考城人也祖點梁尚書左民侍郎父大同輕車嶽陽王記室參軍掌京邑行選景歷少俊爽有孝行家貧好學善尺牘工草隸解褐諸王府佐出為海陽令為政有能名侯景亂梁簡文帝為景所幽景歷與南康嗣王蕭會理謀欲挾簡文出奔事泄見執賊黨王偉保護之獲免因客遊京口侯景平高祖鎮朱方素聞其名以書要之景歷對使人答書筆不停綴文不重改曰蒙降札書曲垂引逮伏覽循回載深欣暢竊以世求名駿行地能致千里時愛奇寶照車遂有徑寸但雲咸斯奏自輟巴渝嵵梓方雕豈盼樗櫪仰惟明將軍使君侯節下英才挺茂雄姿秀拔運屬時艱志匡多難振衡嶽而綏五嶺滌贛源而澄九派帶甲十萬強弩數千誓勤王之師總義夫之力鯨鯢式剪役不踰時氛霧廓清士無血刃雖漢誅祿産舉朝實賴絳侯晉討約峻中外一資陶牧比事論功彼奚足算加以抗威六允服冠蓋通於北門整斾徐方詠歌溢於東道能使邊亭臥鼓行旅露宿巷不拾遺市無異價洋洋乎功德政化曠古未儔諒非膚淺所能殫述是以天下之人向風慕義接踵披襟雜而至矣或帝室英賢貴遊令望齊楚秀異荊吳岐嶷武夫則猛氣紛紜雄心四據陸拔山嶽水斷虯龍六鈞之弓左右馳射萬人之劒短兵交接攻壘若文鴦焚艦如黃蓋百戰百勝貔貅為羣文人則通儒博識英才偉器雕麗暉煥摛掞絢藻子雲不能抗其筆元瑜無以高其記尺翰馳而聊城下清談奮而嬴軍却復有三河辨客改哀樂於須臾六奇謀士斷變反於忽治民如子賤踐境有成折獄如仲由片辭從理直言如毛遂能厲主威銜使若相如不辱君命懷忠抱義感恩徇己誠斷黃金精貫白日海內雄賢牢籠斯備明將軍徹鞍下馬推案止食申爵以榮之築館以安之輕財重氣卑躬厚士盛矣哉盛矣哉抑又聞之戰國將相咸推引賓遊中代嶽牧並盛延僚友濟濟多士所以成將軍之貴但量能校實稱才任使員行方止各盡其宜受委責成誰不畢力至如走賤妄庸人耳秋冬讀書終慙專學刀筆為吏竟闕異等衡門衰素無所聞達薄宦輕資焉能遠大自陽九遘屯天步艱阻同彼貴仕溺於巨寇亟鄰危殆備踐薄冰今王道中興殷憂啓運獲存微命足為幸甚方歡飲啄是謂來蘇然皇鑾未反宛洛蕪曠四壁固三軍之餘長夏無半菽之産遨遊故人聊為借貸屬此樂土洵美忘歸竊服高義暫謁門下明將軍降以顏色二三士友假其餘論菅蒯不𠫓廾折簡賜留欲以雞鶩廁鴛鴻於池沼將移瓦礫參金碧之聲價昔折脅遊秦忽逢盼採簷簦入趙便致留連今雖羇旅方之非匹樊林之賁何用克堪但眇眇畕蘿憑喬松以自聳蠢蠢輕蚋託驂尾而遠騖竊不自涯願備下走且為腹背之毛脫充鳴吠之數增榮改觀為幸已多海不厭深山不讓高敢布心腹惟將軍覽焉高祖得書甚加欽賞仍更賜書報答即日板征北府中記室參軍仍領記室衡陽獻王昌時為吳興郡昌年尚少吳興王之鄉里父老故人尊卑有數高祖恐昌年少接對乖禮乃遣景歷輔之承聖中授通直散騎侍郎還掌府記室高祖將討王僧辨獨與侯安都等數人謀之景歷弗之知也部分既畢召令草檄景歷援筆立成辭義感激事皆稱旨僧辨誅高祖輔政除從事中郎掌記室如故紹泰元年遷給事黃門侍郎兼掌相府記室高祖受禪遷祕書監中書通事舍人掌詔誥永定二年坐妻弟劉淹詐受周寶安餉馬為御史中丞沈炯所劾降為中書侍郎舍人如故三年高祖崩時外有強寇世祖鎮于南皖朝無重臣宣后呼景歷及江大權杜稜定議乃祕不發喪疾召世祖景歷躬共宦者及內人密營斂服時既暑熱須治梓宮恐斤斧之聲或聞于外仍以蠟為祕器文書詔誥依舊宣行世祖即位復為祕書監舍人如故以定策功封新豐縣子邑四百戶纍遷散騎常侍世祖誅侯安都景歷勸成其事天嘉三年以功遷太子左衛率進爵為侯增邑百戶常侍舍人如故六年坐妻兄劉洽依倚景歷權勢前後姦訛並受歐陽武威餉絹百匹免官廢帝即位起為鎮東鄱陽王咨議參軍兼太舟卿華皎反以景歷為武勝將軍吳明徹軍司皎平明徹於軍中輒戮安成內史楊文通又受降人馬仗有不分明景歷又坐不能匡正被收付治久之獲宥起為鎮東鄱陽王咨議參軍高宗即位遷宣惠豫章王長史帶會稽郡守行東揚州府事秩滿遷戎昭將軍宣毅長沙王長史尋陽太守行江州府事以疾辭遂不行入為通直散騎常侍中書通事舍人掌詔誥仍復封邑遷太子左衛率常侍舍人如故太建五年都督吳明徹北伐所向克捷與周將梁士彥戰於呂梁大破之斬獲萬計方欲進圖彭城是時高宗鋭意河南以為指麾可定景歷諫稱師老將驕不宜過窮遠略高宗惡其沮衆大怒猶以朝廷舊臣不深罪責出為宣遠將軍豫章內史未行為飛章所劾以在省之日贓汙狼藉帝令有司按問景歷但承其半於是御史中丞宗元饒奏曰臣聞士之行己忠以事上廉以持身苟違斯道刑茲罔赦謹按宣遠將軍豫章內史新豐縣開國侯景歷因藉多幸豫奉興王皇運權輿頗參締構天嘉之世贓賄狼藉聖恩録用許以更鳴裂壤崇階不遠斯復不能改節自勵以報曲成遂乃專貪汙彰於遠近一則已甚其可再乎宜置刑書以明秋憲臣等參議以見事免景歷所居官下鴻臚削爵土謹奉白簡以聞詔曰可於是徙居會稽及吳明徹敗帝思景歷前言即日追還復以為征南鄱陽王咨議參軍數日遷員外散騎常侍兼御史中丞復本封爵入守度支尚書舊式拜官在午後景歷拜日適值輿駕幸玄武觀在位皆侍宴帝恐景歷不豫特令早拜其見重如此是歲以疾卒官時年六十贈太常卿諡曰敬十三年改葬重贈中領軍禎明元年配享高祖廟庭二年輿駕親幸其宅重贈景歷侍中中撫將軍諡曰忠敬給鼓吹一部並於墓所立碑景歷屬文不尚雕靡而長於事應機敏速為當世所稱有文集三十卷劉師知沛國相人也家世素族祖奚之齊晉安王咨議參軍淮南太守有能政齊武帝手詔頻褒賞父景彥梁尚書左丞司農卿師知好學有當世才博涉書史工文筆善儀體臺閣故事多所詳悉梁世歷王府參軍紹泰初高祖入輔以師知為中書舍人掌詔誥是時兵亂之後禮儀多闕高祖為丞相及加九錫並受禪其儀注並師知所定焉高祖受命仍為舍人性疏簡與物多忤雖位宦不遷而委任甚重其所獻替皆有弘益及高祖崩六日成服朝臣共議大行皇帝靈座俠御人所服衣服吉凶之制博士沈文阿議宜服吉服師知議云既稱成服本備喪禮靈筵服物皆悉縞素今雖無大行俠御官事按梁昭明太子薨成服俠侍之官悉著縗斬唯著鎧不異此即可擬愚謂六日成服俠靈座須服縗絰中書舍人蔡景歷亦云雖不悉準按山陵有凶吉羽儀成服唯凶無吉文武俠御不容獨鳴玉珥貂情禮二三理宜縗斬中書舍人江德藻謝岐等並同師知議文阿重議云檢晉宋山陵儀靈輿梓宮降殿各侍中奏又成服儀稱靈輿梓宮容俠御官及香橙又檢靈輿梓宮進止儀稱直靈俠御吉服在吉鹵簿中又云梓宮俠御縗服在凶鹵簿中是則在殿吉凶兩俠御也時以二議不同乃啓取左丞徐陵決斷陵云梓宮祔山陵靈筵祔宗廟有此分判便驗吉凶按山陵鹵簿吉部位伍中公卿以下導引者爰及武賁鼓吹執蓋奉車並是吉服豈容俠御獨為縗絰邪斷可知矣若言公卿胥吏並服縗苴此與梓宮部伍有何差別若言文物並吉司事者凶豈容社衽絰而奉華蓋縗衣而升玉輅邪同博士議師知又議曰左丞引梓宮祔山陵靈筵祔宗廟必有吉凶二部成服不容上凶博士猶執前斷終是山陵之禮若龍駕啓殯鑾輿兼設吉凶之儀由來本備準之成服愚有未安夫喪禮之制自天子達按王文憲喪服明記云官品第三侍靈人二十官品第四下達士禮侍靈之數並有十人皆白布袴褶著白絹帽內喪女侍數如外而著齊縗或問內外侍靈是同何忽縗服有異答云若依君臣之禮則外侍斬內侍齊頃世多故禮隨事省諸侯以下臣吏蓋微至於侍奉多出義附君臣之節不全縗冠之費實闕所以因其常服止變帽而已婦人侍者皆是卑隸君妾之道既純服章所以備矣皇朝之典猶自不然以此而推是知服斬彼有侍靈則猶俠御既著白帽理無彤服且梁昭明儀注今則見存二文顯證差為成準且禮出人情可得消息凡人有喪既陳筵機繐帷靈屏變其常儀蘆箔草廬即其凶禮堂室之內親賓具來齊斬麻緦差池哭次玄冠不弔莫非素服豈見門生故吏綃縠間趨左姬右薑紅紫相糅況四海遏密率土之情是同三軍縞素為服之制斯一遂使千門旦啓非塗堊於彤闈百僚戾止變服粗於朱韍而耀金在列鳴玉節行求之懷抱固為未愜準以禮經彌無前事豈可成服之儀譬以山陵之禮葬既始終已畢故有吉凶之儀所謂成服本成喪禮百司外內皆變吉容俠御獨不何謂成服若靈無俠御則已有則必應縗服謝岐議曰靈筵祔宗廟梓宮祔山陵實如左丞議但山陵鹵簿備有吉凶從靈輿者儀服無變從梓宮者皆服苴縗爰至士禮悉同此制此自是山陵之儀非關成服今謂梓宮靈扆共在西階稱為成服亦無鹵簿直是爰自胥吏上至王公四海之內必備縗絰案梁昭明太子薨略是成例豈容凡百士庶悉皆服重而侍中至於武衛最是近官反鳴玉紆青與平吉不異左丞既推以山陵事愚意或謂與成服有殊若爾日俠御文武不異維侍靈之人主書宣傳齊幹應勑悉應不改蔡景歷又議云俠御之官本出五百爾日備服居廬仍於本省引上登殿豈應變服貂玉若別攝餘官以充簪珥則爾日便有不成服者山陵自有吉凶二議成服凶而不吉猶依前議同劉舍人德藻又議云愚謂祖葬之辰始終永畢達官有追贈須表恩榮有吉鹵簿恐由此義私家放斆因以成俗上服本變吉為凶理不應猶襲紈綺劉舍人引王衛軍喪儀及檢梁昭明故事此明據已審博士左丞乃各盡事衷既未取證須更詢詳宜咨八座詹事太常中丞孔及中庶諸通袁樞張種周弘正弘讓沈炯孔奐時八座以下並請案羣議斟酌舊儀梁昭明太子喪成服儀注明文見存足為準的成服日侍官理不容猶從吉禮其葬禮分吉自是山陵之時非關成服之日愚謂劉舍人議於事為允陵重答云老病屬纊不能多説古人爭議多成怨府傅玄見尤於晉代王商取陷於漢朝謹自三緘敬同高命若萬一不死猶得展言庶與朝賢更申揚榷文阿猶執所見衆議不能決乃具録二議奏聞從師知議尋遷鴻臚卿舍人如故天嘉元年坐事免初世祖敕師知撰起居注自永定二年秋至天嘉元年冬為十卷起為中書舍人復掌詔誥天康元年世祖不豫師知與尚書僕射到仲舉等入侍醫藥世祖崩預受顧命及高宗為尚書令入輔光大元年師知與仲舉等遣舍人殷不佞矯詔令高宗還東府事覺於北獄賜死謝岐會稽山陰人也父達梁太學博士岐少機警好學見稱於梁世為尚書金部郎山陰令侯景亂岐流寓東陽景平依于張彪彪在吳郡及會稽庶事一以委之彪每征討恆留岐監郡知後事彪敗高祖引岐參預機密以為兼尚書右丞時軍旅屢興糧儲多闕岐所在幹理深被知遇永定元年為給事黃門侍郎中書舍人兼右丞如故天嘉二年卒贈通直散騎常侍岐弟嶠篤學為世通儒史臣曰高祖開基創業剋定禍亂武猛固其立功文翰亦乃展力趙知禮蔡景歷早識攀附預締構之臣焉劉師知博涉多通而暗於機變雖欲存乎節義終陷極刑斯不智矣劉師知傳孔中庶諸通疑
