body:
  text: 陳書卷三十三列傳第二十七儒林沈文阿沈洙戚衮鄭灼張崖陸詡沈德威賀德基全緩張譏顧越沈不害王元規蓋今儒者本因古之六學斯則王教之典籍先聖所以明天道正人倫致治之成法也秦始皇焚書坑儒六學自此缺矣漢武帝立五經博士開置弟子員設科射策勸以官祿其傳業者甚衆焉自兩漢登賢咸資經術魏晉浮蕩儒教淪歇公卿士庶罕通經業矣宋齊之間國學時復開置梁武帝開五館建國學總以五經教授唯國學乃經經各置助教云武帝或紆鑾駕臨幸庠序釋奠先師躬親試胄申之宴語勞之束帛濟濟焉斯蓋一代之盛矣高祖創業開基承前代離亂衣冠殄盡寇賊未寧既日不暇給弗遑勸課世祖以降稍置學官雖博延生徒成業蓋寡今之採綴蓋亦梁之遺儒云沈文阿字國衛吳興武康人也父峻以儒學聞於梁世授桂州刺史不行文阿性剛彊有膂力少習父業研精章句祖舅太史叔明舅王慧興竝通經術而文阿頗傳之又博採先儒異同自為義疏治三禮三傳察孝廉為梁臨川王國侍郎纍遷兼國子助教五經博士梁簡文在東宮引為學士深相禮遇及撰長春義記多使文阿撮異聞以廣之及侯景寇逆簡文別遣文阿招募士卒入援京師城陷與張嵊共保吳興嵊敗文阿竄于山野景素聞其名求之甚急文阿窮迫不知所出登樹自縊遇有所親救之便自投而下折其左臂及景平高祖以文阿州里表為原鄉令監江陰郡紹泰元年入為國子博士尋領步兵校尉兼掌儀禮自太清之亂臺閣故事無有存者文阿父峻梁武世嘗掌朝儀頗有遺藁於是斟酌裁撰禮度皆自之出及高祖受禪文阿輒𠫓廾官還武康高祖大怒發使往誅之時文阿宗人沈恪為郡請使者寬其死即面縛鎖頸致於高祖高祖視而笑曰腐儒復何為者遂赦之高祖崩文阿與尚書左丞徐陵中書舍人劉師知等議大行皇帝靈座俠御衣服之制語在師知傳及世祖即皇帝位剋日謁廟尚書右丞庾持奉詔遣博士議其禮文阿議曰民物推移質文殊軌聖賢因機而立教王公隨時以適宜夫千人無君不散則亂萬乘無主不危則亡當隆周之日公旦叔父呂召爪牙成王在喪禍幾覆國是以既葬便有公冠之儀始殯受麻冕之策斯蓋示天下以有主慮社稷之艱難逮乎末葉縱橫漢承其弊雖文景刑厝而七國連兵或踰月即尊或崩日稱詔此皆有為而為之非無心於禮制也今國諱之日雖抑哀於璽紱之重猶未序於君臣之儀古禮朝廟退坐正寢聽羣臣之政今皇帝拜廟還宜御太極殿以正南面之尊此即周康在朝一二臣衛者也其壤奠之節周禮以玉作贄公侯以圭子男執璧此瑞玉也奠贄既竟又復致享天子以璧王后用琮秦燒經典威儀散滅叔孫通定禮尤失前憲奠贄不圭致享無帛公王同璧鴻臚奏賀若此數事未聞於古後相沿襲至梁行之夫稱觴奉壽家國大慶四廂雅樂歌奏歡欣今君臣吞哀萬民抑割豈同於惟新之禮乎且周康賓稱奉圭無萬壽之獻此則前準明矣三宿三咤上宗曰饗斯蓋祭儐受福寧謂賀酒邪愚以今坐正殿止行薦璧之儀無賀酒之禮謹撰謁廟還升正寢羣臣陪薦儀注如別詔可施行尋遷通直散騎常侍兼國子博士領羽林監仍令於東宮講孝經論語天嘉四年卒時年六十一詔贈廷尉卿文阿所撰儀禮八十餘卷經典大義十八卷並行於世諸儒多傳其學沈洙字弘道吳興武康人也祖休稚梁餘杭令父山卿梁國子博士中散大夫洙少方雅好學不妄交遊治三禮春秋左氏傳精識彊記五經章句諸子史書問無不答解巾梁湘東王國左常侍轉中軍宣城王限內參軍板仁威臨賀王記室參軍遷尚書祠部郎中時年蓋二十餘大同中學者多涉獵文史不為章句而洙獨積思經術吳郡朱虉會稽賀琛甚嘉之及虉琛於士林館講制旨義常使洙為都講侯景之亂洙竄於臨安時世祖在焉親就習業及高祖入輔除國子博士與沈文阿同掌儀禮高祖受禪加員外散騎常侍歷揚州別駕從事史大匠卿有司奏前寧遠將軍建康令沈孝軌門生陳三兒牒稱主人翁靈柩在周主人奉使關內因欲迎喪久而未返此月晦即是再周主人弟息見在此者為至月末除靈內外即吉為待主人還情禮申竟以事咨左丞江德藻德藻議王衛軍云久喪不葬唯主人不變其餘親各終月數而除此蓋引禮文論在家內有事故未得葬者耳孝軌既在異域雖已迎喪還期無指諸弟若遂不除永絶婚嫁此於人情或為未允中原淪陷已後理有事例宜咨沈常侍詳議洙議曰禮有變正又有從宜禮小記云久而不葬者唯主祭喪者不除其餘以麻終月數者除喪則已注云其餘謂傍親如鄭所解衆子皆應不除王衛軍所引此蓋禮之正也但魏氏東關之役既失亡尸柩葬禮無期議以為禮無終身之喪故制使除服晉氏喪亂或死於虜庭無由迎殯江左故復申明其制李胤之祖王華之父竝存亡不測其子制服依時釋縗此竝變禮之宜也孝軌雖因奉使便欲迎喪而戎狄難親還期未剋愚謂宜依東關故事在此國內者竝應釋除縗麻毀靈附祭若喪柩得還別行改葬之禮自天下寇亂西朝傾覆流播絶域情禮莫申若此之徒諒非一二寧可喪期無數而弗除衰服朝庭自應為之限制以義斷恩通訪博識折之禮衷德藻依洙議奏可世祖即位遷通直散騎常侍侍東宮讀尋兼尚書左丞領揚州大中正遷光祿卿侍讀如故廢帝嗣位重為通直散騎常侍兼尚書左丞遷戎昭將軍輕車衡陽王長史行府國事帶琅邪彭城二郡丞梁代舊律測囚之法日一上起自晡鼓盡于二更及比部郎范泉刪定律令以舊法測立時久非人所堪分其刻數日再上廷尉以為新制過輕請集八座丞郎並祭酒孔奐行事沈洙五舍人會尚書省詳議時高宗録尚書集衆議之都官尚書周弘正曰未知獄所測人有幾人款幾人不款須前責取人名及數並其罪目然後更集得廷尉監沈仲由列稱別制已後有壽羽兒一人坐殺壽慧劉磊渴等八人坐偷馬仗家口渡北依法測之限訖不款劉道朔坐犯七改偷依法測立首尾二日而款陳法滿坐被使封藏阿法受錢未及上而款弘正議曰凡小大之獄必應以情正言依準五聽驗其虛實豈可全恣考掠以判刑罪且測人時節本非古制近代已來方有此法起自晡鼓迄于二更豈是常人所能堪忍所以重械之下危墯之上無人不服誣枉者多朝晚二時同等刻數進退而求於事為衷若謂小促前期致實罪不伏如復時節延長則無攴妄款且人之所堪既有彊弱人之立意固亦多途至如貫高榜笞刺爇身無完者戴就熏針竝極困篤不移豈關時刻長短掠測優劣夫與殺不辜寧失不經罪疑惟輕功疑惟重斯則古之聖王垂此明法愚謂依范泉著制於事為允舍人盛權議曰比部范泉新制尚書周弘正明議咸允虞書惟輕之旨殷頌敷正之言竊尋廷尉監沈仲由等列新制以後凡有獄十一人其所測者十人款者唯一愚謂染罪之囚獄官宜明加辨析窮考事理若罪有可疑自宜啓審分判幸無濫測若罪有實驗乃可啓審測立此則枉直有分刑宥斯理范泉今牒述漢律云死罪及除名罪證明白考掠已至而抵隱不服者處當列上杜預注云處當證驗明白之狀列其抵隱之意竊尋舊制深峻百中不款者一新制寬優十中不款者九參會兩文寬猛實異處當列上未見釐革愚謂宜付典法更詳處當列上之文洙議曰夜中測立緩急易欺兼用晝漏於事為允但漏刻賒促今古不同漢書律曆何承天祖沖之耳幾之父子漏經並自關鼓至下鼓自晡鼓至關鼓皆十三刻冬夏四時不異若其日有長短分在中時前後今用梁末改漏下鼓之後分其短長夏至之日各十七刻冬至之日各十二刻伏承命旨刻同勒令檢一日之刻乃同而四時之用不等廷尉今牒以時刻短促到致罪人不款愚意願去夜測之昧從晝漏之明斟酌今古之間參會二漏之義捨秋冬之少刻從夏日之長晷不問寒暑並依今之夏至朝夕上測各十七刻比之古漏則一上多昔四刻即用今漏則冬至多五刻雖冬至之時數刻侵夜正是少日於事非疑庶罪人不以漏短而為捍獄囚無以在夜之而致誣求之鄙意竊謂允合衆議以為宜依范泉前制高宗曰沈長史議得中宜更博議左丞宗元饒議曰竊尋沈議非頓異范正是欲使四時均其刻數兼斟酌其佳以會優劇即同牒請寫還刪定曹詳改前制高宗依事施行洙以太建元年卒時年五十二戚衮字公文吳郡鹽官人也祖顯齊給事中父霸梁臨賀王府中兵參軍衮少聰慧遊學京都受三禮於國子助教劉文紹一二年中大義略備年十九梁武帝勑策孔子正言並周禮禮記義衮對高第仍除揚州祭酒從事史就國子博士宋懷方質儀禮義懷方北人自魏攜儀禮禮記疏祕惜不傳及將亡謂家人曰吾死後戚生若赴便以儀禮禮記義本付之若其不來即宜隨尸而殯其為儒者推許如此尋兼太學博士梁簡文在東宮召衮講論又嘗置宴集玄儒之士先命道學互相質難次令中庶子徐摛馳騁大義間以劇談摛辭辨縱橫難以答抗諸人懾氣皆失次序衮時騁義摛與往復衮精采自若對答如流簡文深加歎賞尋除員外散騎侍郎又遷員外散騎常侍敬帝承制出為江州長史仍隨沈泰鎮南豫州泰之奔齊也逼衮俱行後自鄴下遁還又隨程文季北伐呂梁軍敗衮沒于周久之得歸仍兼國子助教除中衛始興王府録事參軍太建十三年卒時年六十三衮於梁代撰三禮義記值亂亡失禮記義四十卷行於世鄭灼字茂昭東陽信安人也祖惠梁衡陽太守父季徽通直散騎侍郎建安令灼幼而聰敏勵志儒學少受業于皇侃梁中大通五年釋褐奉朝請纍遷員外散騎侍郎給事中安東臨川王府記室參軍轉平西邵陵王府記室簡文在東宮雅愛經術引灼為西省義學士承聖中除通直散騎侍郎兼國子博士尋為威戎將軍兼中書通事舍人高祖世祖之世歷安東臨川鎮北鄱陽二王府咨議參軍纍遷中散大夫以本職兼國子博士未拜太建十三年卒時年六十八灼性精勤尤明三禮少時嘗夢與皇侃遇於途侃謂灼曰鄭郎開口侃因唾灼口中自後義理逾進灼家貧抄義疏以日繼夜筆毫盡每削用之灼常蔬食講授多苦心熱若瓜時輒偃臥以瓜鎮心起便誦讀其篤志如此時有晉陵張崖吳郡陸詡吳興沈德威會稽賀德基俱以禮學自命張崖傳三禮於同郡劉文紹仕梁歷王府中記室天嘉元年為尚書儀曹郎廣沈文阿儀注撰五禮出為丹陽令王府咨議參軍御史中丞宗元饒表薦為國子博士陸詡少習崔靈恩三禮義宗梁世百濟國表求講禮博士詔令詡行還除給事中定陽令天嘉初侍始興王伯茂讀遷尚書祠部郎中沈德威字懷遠少有操行梁太清末遁於天目山築室以居雖處亂離而篤學無倦遂治經業天嘉元年徵出都侍太子講禮傳尋授太學博士轉國子助教每自學還私室以講授道俗受業者數十百人率常如此遷太常丞兼五禮學士尋為尚書儀曹郎後為祠部郎俄丁母憂去職禎明三年入隋官至秦王府主簿年五十五卒賀德基字承業世傳禮學祖文發父淹仕梁俱為祠部郎竝有名當世德基少遊學于京邑積年不歸衣資罄乏又恥服故弊盛冬止衣夾襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂德基曰君方為重器不久貧寒故以此相遺耳德基問嫗姓名不答而去德基於禮記稱為精明居以傳授纍遷尚書祠部郎德基雖不至大官而三世儒學俱為祠部時論美其不墜焉全緩字弘立吳郡錢塘人也幼受易于博士褚仲都篤志研玩得其精微梁太清初歷王國侍郎奉朝請俄轉國子助教兼司義郎專講詩易紹泰元年除尚書水部郎太建中纍遷鎮南始興王府咨議參軍隨府詣湘州以疾卒時年七十四緩治周易老莊時人言玄者咸推之張譏字直言清河武城人也祖僧寶梁散騎侍郎太子洗馬父仲悅梁廬陵王府録事參軍尚書祠部郎中譏幼聰俊有思理年十四通孝經論語篤好玄言受學于汝南周弘正每有新意為先輩推伏梁大同中召補國子正言生梁武帝嘗於文德殿釋乾坤文言譏與陳郡袁憲等預焉勑令論譏諸儒莫敢先出譏乃整容而進咨審循環辭令溫雅梁武帝甚異之賜裙襦絹等仍云表卿稽古之力譏幼喪母有錯綵經帕即母之遺製及有所識家人具以告之每歲時輒對帕哽噎不能自勝及丁父憂居喪過禮服闋召補湘東王國左常侍轉田曹參軍遷士林館學士簡文在東宮出士林館發孝經題譏論議往復甚見嗟賞自是每有講集必遣使召譏及侯景寇逆於圍城之中猶侍哀太子於武德後殿講老莊梁臺陷譏崎嶇避難卒不事景景平歷臨安令高祖受禪除太常丞轉始興王府刑獄參軍天嘉中遷國子助教是時周弘正在國學發周易題弘正第四弟弘直亦在講席譏與弘正論議弘正乃屈弘直危坐厲聲助其申理譏乃正色謂弘直曰今日義集辨正名理雖知兄弟急難四公不得有助弘直曰僕助君師何為不可舉座以為笑樂弘正嘗謂人曰吾每登座見張譏在席使人懍然高宗世歷建安王府記室參軍兼東宮學士轉武陵王限內記室學士如故後主在東宮集官僚置宴時造玉柄麈尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏仍令於溫文殿講莊老高宗幸宮臨聽賜御所服衣一襲後主嗣位領南平王府咨議參軍東宮學士尋遷國子博士學士如故後主嘗幸鍾山開善寺召從臣坐於寺西南松林下勑召譏豎義時索麈尾未至後主勑取松枝手以屬譏曰可代麈尾顧謂羣臣曰此即是張譏後事禎明三年入隋終於長安時年七十六譏性恬靜不求榮利常慕間逸所居宅營山池植花果講周易老莊而教授焉吳郡陸元朗朱孟博一乘寺沙門法才法雲寺沙門慧休至真觀道士姚綏皆傳其業譏所撰周易義三十卷尚書義十五卷毛詩義二十卷孝經義八卷論語義二十卷老子義十一卷莊子內篇義十二卷外篇義二十卷雜篇義十卷玄部通義十二卷又撰遊玄桂林二十四卷後主嘗勑人就其家寫入祕閣子孝則官至始安王記室參軍顧越字思南吳郡鹽官人也所居新坡黃岡世有鄉校由是顧氏多儒學焉越少孤以勤苦自立聰慧有口辨說毛氏詩傍通異義梁太子詹事周捨甚賞之解褐揚州議曹史兼太子左率丞越於義理精明尤善持論與會稽賀文發俱為梁南平王偉所重引為賓客尋補五經博士紹泰元年遷國子博士世祖即位除始興王咨議參軍侍東宮讀世祖以越篤老厚遇之除給事黃門侍郎又領國子博士侍讀如故廢帝嗣立除通直散騎常侍中書舍人華皎之構逆也越在東陽或譖之於高宗言其有異志詔下獄因坐免太建元年卒於家時年七十八時有東陽龔孟舒者亦治毛氏詩善談名理梁武世仕至尋陽郡丞元帝在江州遇之甚重躬師事焉承聖中兼中書舍人天嘉初除員外散騎常侍兼國子助教太中大夫太建中卒沈不害字孝和吳興武康人也祖總齊尚書祠部郎父懿梁邵陵王參軍不害幼孤而修立好學十四召補國子生舉明經纍遷梁太學博士轉廬陵王府刑獄參軍長沙王府咨議帶汝南令天嘉初除衡陽王府中記室參軍兼嘉德殿學士自梁季喪亂至是國學未立不害上書曰臣聞立人建國莫尚於尊儒成俗化民必崇於教學故東膠西序事隆乎三代環林璧水業盛於兩京自淳源既遠澆波已扇物之感人無窮人之逐欲無節是以設訓垂範啓導心靈譬彼染藍類諸琢玉然後人倫以睦卑高有序忠孝之理既明君臣之道攸固執禮自基魯公所以難侮歌樂已細鄭伯於是前亡干戚舞而有苗至泮宮成而淮夷服長想洙泗之風載懷淹稷之盛有國有家莫不尚已梁太清季年數鍾否剝戎狄外侵姦回內奰朝聞鼓鼙夕照烽火洪儒碩學解散甚於坑夷五典九丘湮滅逾乎帷蓋成均自斯墜業瞽宗於是不修褒成之祠弗陳祼享釋菜之禮無稱覔豆頌聲寂莫遂踰一紀後生敦悅不見函杖之儀晚學鑽仰徒深倚席之歎陛下繼曆升統握鏡臨𧜛道洽寰中威加無外濁流已清重氛載廓含生熙阜品庶咸亨宜其弘振禮樂建立庠序式稽古典紆迹儒宮選公卿門子皆入于學助教博士朝夕講肄使擔簦負笈鏘鏘接衽方領矩步濟濟成林如切如磋聞詩聞禮一年可以功倍三冬於是足用故能擢秀雄州揚庭觀國入仕登朝資優學以自輔蒞官從政有經業以治身轖駕列庭青紫拾地古者王世子之貴猶與國子齒降及漢儲茲禮不墜暨乎兩晉斯事彌隆所以見師嚴而道尊者也皇太子天縱生知無待審喻猶宜晦迹俯同專經請業奠爵前師肅若舊典昔闕里之堂莫萊自闢舊宅之內絲竹流音前聖遺烈深以炯戒況復江表無虞海外有截豈得不開闡大猷恢弘至道寧可使玄教儒風弗興聖世盛德大業遂蘊堯年臣末學小生詞無足算輕獻瞽言伏增悚惕詔答曰省表聞之自舊章薥廢微言將絶朕嗣膺寶業念在緝熙而兵革未息軍國草創常恐前王令典一朝泯滅卿才思優洽文理可求弘惜大體殷勤名教付外詳議依事施行又表改定樂章詔使製三朝樂歌八首合二十八曲行之樂府五年除贛令入為尚書儀曹郎遷國子博士領羽林監勑治五禮掌策文諡議太建中除仁武南康嗣王府長史行丹陽郡事轉員外散騎常侍光祿卿尋為戎昭將軍明威武陵王長史行吳興郡事俄入為通直散騎常侍兼尚書左丞十二年卒時年六十三不害治經術善屬文雖博綜墳典而家無卷軸每製文操筆立成曾無尋檢僕射汝南周弘正常稱之曰沈生可謂意聖人乎著治五禮儀一百卷文集十四卷子志道字崇基少知名解褐揚州主簿尋兼文林著士歷安東新蔡王記室參軍禎明三年入隋王元規字正範太原晉陽人也祖道寶齊員外散騎常侍晉安郡守父瑋梁武陵王府中記室參軍元規八歲而孤兄弟三人隨母依舅氏往臨海郡時年十二郡土豪劉瑱者資財巨萬以女妻之元規母以其兄弟幼弱欲結彊援元規泣請曰姻不失親古人所重豈得苟安異壤輒婚非類母感其言而止元規性孝事母甚謹晨昏未嘗離左右梁時山陰縣有暴水流漂居宅元規唯有一小船倉卒引其母妹並孤姪入船元規自執楫棹而去留其男女三人閣於樹杪及水退獲全時人皆稱其至行元規少好學從吳興沈文阿受業十八通春秋左氏孝經論語喪服梁中大通元年詔策春秋舉高第時名儒咸稱賞之起家湘東王國左常侍轉員外散騎侍郎簡文之在東宮引為賓客每令講論甚見優禮除中軍宣城王府記室參軍及侯景寇亂攜家屬還會稽天嘉中除始興王府功曹參軍領國子助教轉鎮東鄱陽王府記室參軍領助教如故後主在東宮引為學士親受禮記左傳喪服等義賞賜優厚遷國子祭酒新安王伯固嘗因入宮適會元規將講乃啓請執經時論以為榮俄除尚書祠部郎自梁代諸儒相傳為左氏學者皆以賈逵服虔之義難駮杜預凡一百八十條元規引證通析無復疑滯每國家議吉凶大禮常參預焉丁母憂去職服闋除鄱陽王府中録事參軍俄轉散騎侍郎遷南平王府限內參軍王為江州元規隨府之鎮四方學徒不遠千里來請道者常數十百人禎明三年入隋為秦王府東閣祭酒年七十四卒於廣陵元規著春秋發題辭及義記十一卷續經典大義十四卷孝經義記兩卷左傳音三卷禮記音兩卷子大業聰敏知名時有吳郡陸慶少好學遍知五經尤明春秋左氏傳節操甚高釋褐梁武陵王國右常侍歷征西府墨曹行參軍除婁令值梁季喪亂乃覃心釋典經論靡不該究天嘉初徵為通直散騎侍郎不就永陽王為吳郡太守聞其名欲與相見慶固辭以疾時宗人陸榮為郡五官掾慶嘗詣焉王乃微服往榮第穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚茲鄱陽晉安王俱以記室徵竝不就乃築室屏居以禪誦為事由是傳經受業者蓋鮮焉史臣曰夫砥身勵行必先經術樹國崇家率由茲道故王政因之而至治人倫得之而攸序若沈文阿之徒各專經授業亦一代之鴻儒焉文阿加復草創禮儀蓋叔孫通之流亞矣
