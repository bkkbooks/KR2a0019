body:
  text: 陳書卷二十七列傳第二十一江總姚察江總字總持濟陽考城人也晉散騎常侍統之十世孫五世祖湛宋左光祿大夫開府儀同三司忠簡公祖蒨梁光祿大夫有名當代父紑本州迎主簿少居父憂以毀卒在梁書孝行傳總七歲而孤依于外氏幼聰敏有至性舅吳平光侯蕭勱名重當時特所鍾愛嘗謂總曰爾操行殊異神采英拔後之知名當出吾右及長篤學有辭采家傳賜書數千卷總晝夜尋讀未嘗輟手年十八解褐宣惠武陵王府法曹參軍中權將軍丹陽尹何敬容開府置佐史並以貴胄充之仍除敬容府主簿遷尚書殿中郎梁武帝撰正言始畢製述懷詩總預同此作帝覽總詩深降嗟賞仍轉侍郎尚書僕射范陽張纘度支尚書琅邪王筠都官尚書南陽劉之遴並高才碩學總時年少有名纘等雅相推重為忘年友會之遴嘗酬總詩其略曰上位居崇禮寺署鄰栖息忌聞曉騶唱每畏晨光赩高談意未窮晤對賞無極探急共遨遊休沐忘退食曷用銷鄙吝枉趾覯顏色下上數千載揚榷吐胸臆其為通人所欽挹如此遷太子洗馬又出為臨安令還為中軍宣城王府限內録事參軍轉太子中舍人及魏國通好勑以總及徐陵攝官報聘總以疾不行侯景寇京都詔以總權兼太常卿守小廟臺城陷總避難崎嶇纍年至會稽郡憩於龍華寺乃製修心賦略序時事其辭曰太清四年秋七月避地于會稽龍華寺此伽藍者余六世祖宋尚書右僕射州陵侯元嘉二十四年之所構也侯之王父晉護軍將軍彪虨昔蒞此邦卜居山陰都陽里貽厥子孫有終焉之志寺域則宅之舊基左江右湖面山背壑東西連跨南北紆縈聊與苦節名僧同銷日用曉修經戒夕覽圖書寢處風雲憑棲水月不意華戎莫辨朝市傾淪以此傷情情可知矣啜泣濡翰豈攄鬱結庶後生君子憫余此概焉嘉南斗之分次肇東越之靈祕表檜風於韓什著鎮山於周記蘊大禹之金書鐫暴秦之在石字太史來而探穴鍾離去而開笥信竹箭之為珍何碔玞之罕值奉盛德之鴻祀寓安禪之古寺實豫章之舊圃成黃金之勝地遂寂默之幽心若鏡中而遠尋面曾阜之超忽邇平湖之迥深山條偃蹇水葉侵淫挂猿朝落飢鼯夜吟果叢藥苑桃蹊橘林梢雲拂日結暗生陰保自然之雅趣鄙人間之荒雜望島嶼之邅回面江源之重沓泛流月之夜迥曳光煙之曉匝風引蜩而嘶譟雨鳴林而修鳥稍狎而知來雲無情而自合爾乃野開靈塔地築禪居喜園迢遰樂樹扶疏經行籍草宴坐臨渠持戒振錫度影甘蔬堅固之林可喻寂滅之場暫如異曲終而悲起非木落而悲始豈降志而辱身不露才而揚己鍾風雨之如晦倦雞鳴之聒耳幸避地而高棲憑調御之遺旨折四辨之微言悟三乘之妙理遣十之繫縛袪五惑之塵滓久遺榮於勢利庶忘纍於妻子感意氣於疇日寄知音於來祀何遠客之可悲知自憐其何已總第九舅蕭勃先據廣州總又自會稽往依焉梁元帝平侯景徵總為明威將軍始興內史以郡秩米八百斛給總行裝會江陵陷遂不行總自此流寓嶺南積歲天嘉四年以中書侍郎徵還朝直侍中省纍遷司徒右長史掌東宮管記給事黃門侍郎領南徐州大中正授太子中庶子通直散騎常侍東宮中正如故遷左民尚書轉太子詹事中正如故以與太子為長夜之飲養良娣陳氏為女太子微行總舍上怒免之尋為侍中領左驍騎將軍復為左民尚書領左軍將軍未拜又以公事免尋起為散騎常侍明烈將軍司徒左長史遷太常卿後主即位除祠部尚書又領左驍騎將軍參掌選事轉散騎常侍吏部尚書尋遷尚書僕射參掌如故至德四年加宣惠將軍量置佐史尋授尚書令給鼓吹一部加扶餘並如故策曰於戲夫文昌政本司會治經韋彪謂之樞機李固方之斗極況其五曹斯綜百揆是諧同冢宰之司專臺閣之任惟爾道業標峻𧜛量弘深勝範清規風流以為準的辭宗學府衣冠以為領袖故能師長六官具瞻允塞明府八座儀形載遠其端朝握揆朕所望焉往欽哉懋建爾徽猷亮采我邦國可不慎歟禎明二年進號中權將軍京城陷入隋為上開府開皇十四年卒於江都時年七十六總嘗自其略曰歷升清顯備位朝列不邀世利不涉權幸嘗撫躬仰天太息曰莊青翟位至丞相無迹可紀趙元叔為上計吏光乎列傳官陳以來未嘗逢迎一物干預一事悠悠風塵流俗之士頗致怨憎榮枯寵辱不以介意太建之世權移羣小諂嫉作威屢被摧黜奈何命也後主昔在東朝留意文藝夙荷昭晉恩紀契闊嗣位之日時寄謬隆儀形天府釐正庶績八法六典無所不統昔晉武帝策荀公曾曰周之冢宰今之尚書令也況復才未半古尸素若茲晉太尉陸玩云以我為三公知天下無人矣軒冕儻來之一物豈是預要乎弱歲歸心釋教年二十餘入鍾山就靈曜寺則法師受菩薩戒暮齒官陳與攝山布上人遊款深悟苦空更復練戒運善於心行慈於物頗知自勵而不能蔬菲尚染塵勞以此負愧平生耳總之自時人謂之實録總篤行義寬和溫裕好學能屬文於五言七言尤善然傷於浮豔故為後主所愛幸多有側篇好事者相傳諷玩于今不絶後主之世總當權宰不持政務但日與後主遊宴後庭共陳暄孔範王瑗瑳等十餘人當時謂之狎客由是國政日頽綱紀不立有言之者輒以罪斥之君臣昏亂以至于滅有文集三十卷並行於世焉長子溢字深源頗有文辭性誕恃勢驕物雖近屬故友不免詆欺歷官著作佐郎太子舍人洗馬中書黃門侍郎太子中庶子入隋為秦王文學第七子漼駙馬都尉祕書郎隋給事郎直祕書省學士姚察字伯審吳興武康人也九世祖信吳太常卿有名江左察幼有至性事親以孝聞六歲誦書萬餘言弱不好弄博奕雜戲初不經心勤苦厲精以夜繼日年十二便能屬文父上開府僧坦垣知名梁武代二宮禮遇優厚每得供賜皆回給察兄弟為遊學之資察並用聚蓄圖書由是聞見日博年十三梁簡文帝時在東宮盛修文義即引於宣猷堂聽講論難為儒者所稱及簡文嗣位尤加禮接起家南海王國左常侍兼司文侍郎除南郡王行參軍兼尚書駕部郎值梁室喪亂於金陵隨二親還鄉里時東土兵荒人飢相食告糴無處察家口既多並採野蔬自給察每崎嶇艱阻求請供養之資糧粒恆得相繼又常以己分減推諸弟妹乃至故舊乏絶者皆相分恤自甘唯藜藿而已在亂離之間篤學不廢元帝於荊州即位父隨朝士例往赴西臺元帝授察原鄉令時邑境蕭條流亡不反察輕其賦役勸以耕種於是戶口殷盛民至今稱焉中書侍郎領著作杜之偉與察深相眷遇表用察佐著作仍撰史永定初拜始興王府功曹參軍尋補嘉德殿學士轉中衛儀同始興王府記室參軍吏部尚書徐陵時領著作復引為史佐及陵讓官致仕等表並請察製焉陵見歎曰吾弗逮也太建初補宣明殿學士除散騎侍郎左通直尋兼通直散騎常侍報聘于周江左耆舊先在關右者咸相傾慕沛國劉臻竊於公館訪漢書疑事十餘條並為剖析皆有經據臻謂所親曰名下定無虛士著西聘道里記所事甚詳使還補東宮學士于時濟陽江總吳國顧野王陸瓊從弟瑜河南褚玠北地傅縡等皆以才學之美晨夕娛侍察每言論製述咸為諸人宗重儲君深加禮異情越羣僚宮內所須方幅手筆皆付察立草又數令共野王遞相策問恆蒙賞激遷尚書祠部侍郎此曹職司郊廟昔魏王肅奏祀天地設宮縣之樂八佾之舞爾後因循不革梁武帝以為事人禮縟事神禮簡古無宮縣之文陳初承用莫有損益高宗欲設備樂付有司立議以梁武帝為非時碩學名儒朝端在位者咸希上旨並即注同察乃博引經籍獨違羣議據梁樂為是當時驚駭莫不慙服僕射徐陵因改同察議其不順時隨俗皆此類也拜宣惠宜都王中録事參軍帶東宮學士歷仁威淮南王平南建安王二府咨議參軍丁內憂去職俄起為戎昭將軍知撰梁史事固辭不免後主纂業勑兼東宮通事舍人將軍知撰史如故又勑專知優册諡議等文筆至德元年除中書侍郎轉太子僕餘並如故初梁季淪沒父僧坦垣入于長安察蔬食布衣不聽音樂至是凶問因聘使到江南時察母韋氏喪制適除後主以察羸瘠慮加毀頓乃密遣中書舍人司馬申就宅發哀仍勑申專加譬抑爾後又遣申宣旨誡喻曰知比哀毀過禮甚用為憂卿迥然一身宗奠是寄毀而滅性聖教所不許宜微自遣割以存禮制憂懷既深故有此及尋以忠毅將軍起兼東宮通事舍人察志在終喪頻有陳讓並抑而不許又推表其略曰臣私門舋禍併罹殃罰偷生晷漏冀申情禮而疹相仍苴穢質非復人流將畢苦苫壤豈期朝恩曲覃被之纓紱尋斯寵服彌見慙靦且宮闥祕奧趨奏便繁寧可以茲荒毀所宜叨預伏願至德孝治矜其理奪使殘魂喘息以遂餘生詔答曰省表具懷卿行業淳深聲譽素顯理徇情禮未膺刀筆但參務承華良所期寄允茲抑奪不得致辭也俄勑知著作郎事服闋除給事黃門侍郎領著作察既纍居憂服兼齋素日久自免憂後因加氣疾後主嘗別召見見察柴瘠過甚為之動容乃謂察曰朝廷惜卿卿宜自惜既蔬菲歲久可停持長齋又遣度支尚書王瑗宣旨重加慰喻令從晚食手勑曰卿羸瘠如此齋菲纍年不宜一飯有乖將攝若從所示甚為佳也察雖奉此勑而猶敦宿誓又詔授祕書監領著作如故乃纍進讓並優答不許察在祕書省大加刪正又奏撰中書表集拜散騎常侍尋授度支尚書旬月遷吏部尚書領著作並如故察既博極墳素尤善人物至於姓氏所起枝葉所分官職姻娶興衰高下舉而論之無所遺失且澄鑒之職時人久以梓匠相許及遷選部雅允朝望初吏部尚書蔡徵移中書令後主方擇其人尚書令江總等咸共薦察勑答曰姚察非唯學藝優博亦是操行清修典選難才今得之矣乃神筆草詔讀以示察察辭讓甚切別日召入論選事察垂涕拜請曰臣東皋賤族身才庸近情忘遠致念絶修途頃來忝竊久知逾分特以東朝攀奉恩紀謬加今日叨濫非由才舉縱陛下特升庸薄其如朝序何臣九世祖信名高往代當時才居選部自後罕有繼蹤臣遭逢成擢沐浴恩造纍致非據每切妨賢臣雖無識頗知審己言行所踐無期榮貴豈意銓衡之重妄委非才且皇明御歷事高昔代羽儀世胄帷幄名臣若授受得宜方為稱職臣夙陶教義必知不可後主曰選衆之舉僉議所歸昔毛玠雅量清恪盧育心平體正王蘊銓量得地山濤舉不失才就卿而求必兼此矣且我與卿雖君臣禮隔情分殊常藻鏡人倫良所期寄亦以無慙則哲也察自居顯要甚勵清潔且廩錫以外一不交通嘗有私門生不敢厚餉止送南布一端花綀一匹察謂之曰吾所衣著止是麻布蒲綀此物於吾無用既欲相發接幸不煩爾此人遜請猶冀受納察勵色驅出因此伏事者莫敢饋遺陳滅入隋開皇九年詔授祕書丞別勑成梁陳二代史又勑於朱華閣長參文帝知察蔬菲別日乃獨召入內殿賜果菜乃指察謂朝臣曰聞姚察學行當今無比我平陳唯得此一人十三年襲封北絳郡公察往歲之聘周也因得與父僧坦垣相見將別之際絶而復蘇至是承襲愈更悲感見者莫不為之歔欷察幼年嘗就鍾山明慶寺尚禪師受菩薩戒及官陳祿俸皆捨寺起造並追為禪師樹碑文甚遒麗及是遇見梁國子祭酒蕭子雲書此寺禪齋詩覽之愴然乃用蕭韻述懷為詠詞又哀切法俗益以此稱之丁後母杜氏喪解職在服制之中有白鳩巢于戶上仁壽二年詔曰前祕書丞北絳郡開國公姚察強學待問博極羣典修身立德白首不渝雖在哀疚宜奪情禮可員外散騎常侍封如故又勑侍晉王昭讀煬帝初在東宮數被召見訪以文籍即位之始詔授太子內舍人餘並如故車駕巡幸恆侍從焉及改易衣冠刪正朝式切問近對察一人而已年七十四大業二年終于東都遺命薄葬務從率儉其略曰吾家世素士自有常法吾意斂以法服並宜用布土周於身又恐汝等不忍行此必不爾須松板薄棺才可周身土周於棺而已葬日止粗車即送厝舊塋北吾在梁世當時年十四就鍾山明慶寺尚禪師受菩薩戒自爾深悟苦空頗知回向矣嘗得留連山寺一去忘歸及仕陳代諸名流遂許與聲價兼時主恩遇宦途遂至通顯自入朝來又蒙恩渥既牽纏人世素志弗從且吾習蔬菲五十餘年既歷歲時循而不失瞑目之後不須立靈置一小牀每日設清水六齋日設齋食果菜任家有無不須別經營也初察願讀一藏經並已究竟將終曾無痛惱但西向坐正念云一切空寂其後身體柔軟顏色如恆兩宮悼惜賵賻甚厚察性至孝有人倫鑒識沖虛謙遜不以所長矜人終日恬靜唯以書記為樂於墳籍無所不覩每有製述多用新奇人所未見咸重富博且專志著書白首不倦手自抄撰無時暫輟尤好研核古今諟正文字精采流贍雖老不衰兼諳識內典所撰寺塔及衆僧文章特為綺密在位多所稱引一善可録無不賞薦若非分相干咸以理遣盡心事上知無不為侍奉機密未嘗泄漏且任遇已隆衣冠攸屬深懷退靜避於聲勢清潔自處資産每虛或有勸營生計笑而不答穆於親屬篤於舊故所得祿賜咸充周恤後主所製文筆卷軸甚多乃別寫一本付察有疑悉令刊定察亦推心奉上事在無隱後主嘗從容謂朝士曰姚察達學洽聞手筆典裁求之於古猶難輩匹在於今世足為師範且訪對甚詳明聽之使人忘倦察每製文筆勑便索本上曰我于姚察文章非唯玩味無已故是一宗匠徐陵名高一代每見察製述尤所推重嘗謂子儉曰姚學士德學無前汝可師之也尚書令江總與察尤篤厚善每有製作必先以簡察然後施用總為詹事時嘗製登宮城五百字詩當時副君及徐陵以下諸名賢並同此作徐公後謂江曰我所和弟五十韻寄弟集內及江編次文章無復察所和本述徐此意謂察曰高才碩學庶光拙文今須公所和五百字用偶徐侯章也察謙遜未付江曰若不得公此製僕詩亦須棄本復乖徐公所寄豈得見令兩失察不獲已乃寫本付之為通人推挹例皆如此所著漢書訓纂三十卷説林十卷西聘玉璽建康三鍾等記各一卷悉窮該博並文集二十卷並行於世察所撰梁陳史雖未畢功隋文帝開皇之時遣內史舍人虞世基索本且進上今在內殿梁陳二史本多是察之所撰其中序論及紀傳有所闕者臨亡之時仍以體例誡約子思廉博訪撰續思廉泣涕奉行思廉在陳為衡陽王府法曹參軍轉會稽王主簿入隋補漢王府行參軍掌記室尋除河間郡司法大業初內史侍郎虞世基奏思廉踵成梁陳二代史自爾以來稍就補續史臣曰江總持清標簡貴加潤以辭采及師長六官雅允朝望史臣先臣稟茲令德光斯百行可以厲風俗可以厚人倫至於九流七略之書名山石室之記汲郡孔堂之書玉箱金板之文莫不窮研旨奧遍探坎井故道冠人師搢紳以為準的既歷職貴顯國典朝章古今疑議後主皆取先臣斷決焉
