body:
  text: 陳書卷三十一列傳第二十五蕭摩訶任忠樊毅弟猛魯廣達蕭摩訶字元胤蘭陵人也祖靚梁右將軍父諒梁始興郡丞摩訶隨父之郡年數歲而父卒其姑夫蔡路養時在南康乃收養之稍長果毅有勇力侯景之亂高祖赴援京師路養起兵拒高祖摩訶時年十三單騎出戰軍中莫有當者及路養敗摩訶歸于侯安都安都遇之甚厚自此常隸安都征討及任約徐嗣徽引齊兵為寇高祖遣安都北拒齊軍於鍾山龍尾及北郊壇安都謂摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見矣及戰安都墜馬被圍摩訶獨騎大呼直衝齊軍齊軍披靡因稍解去安都乃免天嘉初除本縣令以平留異歐陽紇之功纍遷巴山太守太建五年衆軍北伐摩訶隨都督吳明徹濟江攻秦郡時齊遣大將尉破胡等率衆十萬來援其前隊有蒼頭犀角大力之號皆身長八尺膂力絶倫其鋒甚鋭又有西域胡妙於弓矢弦無虛發衆軍尤憚之及將戰明徹謂摩訶曰若殪此胡則彼軍奪氣君有關張之名可斬顏良矣摩訶曰願示其形狀當為公取之明徹乃召降人有識胡者云胡著絳衣樺皮裝弓兩端骨弭明徹遣人覘伺知胡在陳乃自酌酒以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陳前十餘步彀弓未發摩訶遙擲銑鋧正中其額應手而仆齊軍大力十餘人出戰摩訶又斬之於是齊軍退走以功授明毅將軍員外散騎常侍封廉平縣伯邑五百戶尋進爵為侯轉太僕卿餘如故七年又隨明徹進圍宿預擊走齊將王康德以功除晉熙太守九年明徹進軍呂梁與齊人大戰摩訶率七騎先入手奪齊軍大旗齊衆大潰以功授持節武毅將軍譙州刺史及周武帝滅齊遣其將宇文欣率衆爭呂梁戰於龍晦時欣有精騎數千摩訶領十二騎深入周軍縱橫奮擊斬馘甚衆及周遣大將軍王軌來赴結長圍連宀元攴於呂梁下流斷大軍還路摩訶謂明徹曰聞王軌始宀元攴下流其兩頭築城今尚未立公若見遣擊之彼必不敢相拒水路未斷賊勢不堅彼城若立則吾屬且為虜矣明徹乃奮髯曰搴旗陷陳將軍事也長算遠略老夫事也摩訶失色而退一旬之間周兵益至摩訶又請於明徹曰今求戰不得進退無路若潛軍突圍未足為恥願公率步卒乘馬輿徐行摩訶領鐵騎數千驅馳前後必當使公安達京邑明徹曰弟之此計乃良圖也然老夫受脤專征不能戰勝攻取今被圍逼蹙慙置無地且步軍既多吾為總督必須身居其後相率兼行弟馬軍宜須在前不可遲緩摩訶因率馬軍夜發先是周軍長圍既合又於要路下伏數重摩訶選精騎八十率先衝突自後衆騎繼焉比旦達淮南高宗詔徵還授右衛將軍十一年周兵寇壽陽摩訶與樊毅等衆軍赴援無功而還十四年高宗崩始興王叔陵於殿內手刃後主傷而不死叔陵奔東府城時衆心猶預莫有討賊者東宮舍人司馬申啓後主馳召摩訶入見受勑乃率馬步數百先趣東府城西門屯軍叔陵惶遽自城南門而出摩訶勒兵追斬之以功授散騎常侍車騎大將軍封綏遠建郡公邑三千戶叔陵素所蓄聚金帛纍巨萬後主悉以賜之尋改授侍中驃騎大將軍加左光祿大夫舊制三公黃閣聽事置鴟尾後主特賜摩訶開黃閣門施行馬聽事寢堂並置鴟尾仍以其女為皇太子妃會隋總管賀若弼鎮廣陵窺覦江左後主委摩訶備禦之任授南徐州刺史餘並如故禎明三年正月元會徵摩訶還朝賀若弼乘虛濟江襲京口摩訶請兵逆戰後主不許及若弼進軍鍾山摩訶又請曰賀若弼懸軍深入聲援猶遠且其壘未堅人情惶懼出兵掩襲必大克之後主又不許及隋軍大至將出戰後主謂摩訶曰公可為我一決摩訶曰從來行陳為國為身今日之事兼為妻子後主多出金帛頒賞諸軍令中領軍魯廣達陳兵白土岡居衆軍之南偏鎮東大將軍任忠次之護軍將軍樊毅都官尚書孔範次之摩訶軍最居北衆軍南北亘二十里首尾進退各不相知賀若弼初謂未戰將輕騎登山觀望形勢及見衆軍因馳下置陳廣達首率所部進薄弼軍屢却俄而復振更分軍趣北突諸將孔範出戰兵交而走諸將支離陳猶未合騎卒潰散駐之弗止摩訶無所用力焉為隋軍所執及京城陷賀若弼置後主於德教殿令兵衛守摩訶請弼曰今為囚虜命在斯須願得一見舊主死無所恨弼哀而許之摩訶入見後主俯伏號泣仍於舊廚取食而進之辭訣而出守衛者皆不能仰視其年入隋授開府儀同三司尋從漢王諒詣並州同諒作逆伏誅時年七十三摩訶訥於語言恂恂長者至於臨戎對寇志氣奮發所向無前年未弱冠隨侯安都在京口性好射獵無日不畋遊及安都東征西伐戰勝攻取摩訶功實居多子世廉少警俊敢勇有父風性至孝及摩訶凶終服闋後追慕彌切其父時賓故脫有所言及世廉對之哀慟不自勝言者為之歔欷終身不執刀斧時人嘉焉摩訶有騎士陳智深者勇力過人以平叔陵之功為巴陵內史摩訶之戮也其妻子先已籍沒智深收摩訶尸手自殯斂哀感行路君子義之潁川陳禹亦隨摩訶征討聰敏有識量涉獵經史解風角兵書頗能屬文便騎射官至王府咨議任忠字奉誠小名蠻奴汝陰人也少孤微不為鄉黨所齒及長譎詭多計略膂力過人尤善騎射州里少年皆附之梁鄱陽王蕭範為合州刺史聞其名引置左右侯景之亂忠率鄉黨數百人隨晉熙太守梅伯龍討景將王貴顯於壽春每戰却敵會土人胡通聚衆寇抄範命忠與主帥梅思立並軍討平之仍隨範世子嗣率衆入援會京城陷旋戍晉熙侯景平授蕩寇將軍王琳立蕭莊署忠為巴陵太守琳敗還朝遷明毅將軍安湘太守仍隨侯瑱進討巴湘纍遷豫寧太守衡陽內史華皎之舉兵也忠預其謀及皎平高宗以忠先有密啓於朝廷釋而不問太建初隨章昭達討歐陽紇於廣州以功授直閣將軍遷武毅將軍廬陵內史秩滿入為右軍將軍五年衆軍北伐忠將兵出西道擊走齊歷陽王高景安於大峴逐北至東關仍克其東西二城進軍蘄譙並拔之徑襲合肥入其郛進克霍州以功授員外散騎常侍封安復縣侯邑五百戶呂梁之喪師也忠全軍而還尋詔忠都督壽陽新蔡霍州緣淮衆軍進號寧遠將軍霍州刺史入為左衛將軍十一年加北討前軍事進號平北將軍率衆步騎趣秦郡十二年遷使持節散騎常侍都督南豫州諸軍事平南將軍南豫州刺史增邑並前一千五百戶仍率步騎趣歷陽周遣王延貴率衆為援忠大破之生擒延貴後主嗣位進號鎮南將軍給鼓吹一部入為領軍將軍加侍中改封梁信都郡公邑三千戶出為吳興內史加秩中二千石及隋兵濟江忠自吳興入赴屯軍朱雀門後主召蕭摩訶以下於內殿定議忠執議曰兵家稱客主異勢客貴速戰主貴持重宜且益兵堅守宮城遣水軍分向南豫州及京口道斷寇糧運待春水長上江周羅等衆軍必沿流赴援此良計矣衆議不同因遂出戰及敗忠馳入臺見後主言敗狀啓云陛下唯當具舟楫就上流衆軍臣以死奉衛後主信之勑忠出部分忠辭云臣處分訖即當奉迎後主令宮人裝束以待忠久望不至隋將韓擒虎自新林進軍忠乃率數騎往石子岡降之仍引擒虎軍共入南掖門臺城陷其年入長安隋授開府儀同三司卒時年七十七子幼武官至儀同三司時有沈客卿者吳興武康人性便巡忍酷為中書舍人每立異端唯以刻削百姓為事由是自進有施文慶者吳興烏程人起自微賤有吏用後主拔為主書遷中書舍人俄擢為湘州刺史未及之官會隋軍來伐四方州鎮相繼以聞文慶客卿俱掌機密外有表啓皆由其呈奏文慶心悅湘州重鎮冀欲早行遂與客卿共為表𩹉抑而不言後主弗之知也遂以無備至乎敗國實二人之罪隋軍既入並戮之於前闕樊毅字智烈南陽湖陽人也祖方興梁散騎常侍仁威將軍司州刺史魚復縣侯父文熾梁散騎常侍信武將軍益州刺史新蔡縣侯毅纍葉將門少習武善射侯景之亂毅率部曲隨叔父文皎援臺文皎於青溪戰歿毅將宗族子弟赴江陵仍隸王僧辨討河東王蕭譽以功除假節威戎將軍右中郎將代兄俊為梁興太守領三州遊軍隨宜豐侯蕭循討陸納於湘州軍次巴陵營頓未立納潛軍夜至薄營大譟營中將士皆驚擾毅獨與左右數十人當營門力戰斬十餘級擊鼓申命衆乃定焉以功授持節通直散騎常侍貞威將軍封夷道縣伯食邑三百戶尋除天門太守進爵為侯增邑並前一千戶及西魏圍江陵毅率兵赴援會江陵陷為嶽陽王所執久之遁歸高祖受禪毅與弟猛舉兵應王琳琳敗奔齊太尉侯瑱遣使招毅毅率子弟部曲還朝天嘉二年授通直散騎常侍仍隨侯瑱進討巴湘纍遷武州刺史太建初轉豐州刺史封高昌縣侯邑一千戶入為左衛將軍五年衆軍北伐毅率衆攻廣陵楚子城拔之擊走齊軍於潁口齊援滄陵又破之七年進克潼州下邳高柵等六城及呂梁喪師詔以毅為大都督進號平北將軍率衆渡淮對清口築城與周人相抗霖雨城壞毅全軍自拔尋遷中領軍十一年周將梁士彥將兵圍壽陽詔以毅為都督北討前軍事率水軍入焦湖尋授鎮西將軍都督荊郢巴武四州水陸諸軍事十二年進督沔漢諸軍事以公事免十三年徵授中護軍尋遷護軍將軍荊州刺史後主即位進號征西將軍改封逍遙郡公邑三千戶餘並如故入為侍中護軍將軍及隋兵濟江毅謂僕射袁憲曰京口採石俱是要所各須鋭卒數千金翅二百都下江中上下防捍如其不然大事去矣諸將咸從其議會施文慶等寢隋兵消息毅計不行京城陷隨例入關頃之卒猛字智武毅之弟也幼俶儻有幹略既壯便弓馬膽氣過人青溪之戰猛自旦訖暮與虜短兵接殺傷甚衆臺城陷隨兄毅西上京纍戰功為威戎將軍梁安南安侯蕭方矩為湘州刺史以猛為司馬會武陵王蕭紀舉兵自漢江東下方矩遣猛率湘郢之卒隨都督陸法和進軍以拒之時紀已下樓船戰艦據巴江爭峽口相持久之不能決法和揣紀師老卒墯因令猛率驍勇三千輕舸百餘乘衝流直上出其不意鼓譟薄之紀衆倉卒驚駭不及整列皆棄艦登岸赴水死者以千數時紀心膂數百人猶在左右猛將部曲三十餘人蒙楯橫戈直登紀舟瞋目大呼紀侍衛皆披靡相枕藉不敢動猛手擒紀父子三人斬於咨中盡收其船艦器械以功授遊騎將軍封安山縣伯邑一千戶仍進軍撫定梁益蜀境悉平軍還遷持節散騎常侍輕車將軍司州刺史進爵為侯增邑並前二千戶永定元年周文育等敗於沌口為王琳所獲琳乘勝將略南中諸郡遣猛與李孝欽等將兵攻豫章進逼周迪軍敗為迪所執尋遁歸王琳王琳敗還朝天嘉二年授通直散騎常侍永陽太守遷安成王府司馬光大元年授壯武將軍廬陵內史太建初遷武毅將軍始興平南府長史領長沙內史尋隸章昭達西討江陵潛軍入峽焚周軍船艦以功封富川縣侯邑五百戶歷散騎常侍遷使持節都督荊信二州諸軍事宣遠將軍荊州刺史入為左衛將軍後主即位增邑並前一千戶餘並如故至德四年授使持節都督南豫州諸軍事忠武將軍南豫州刺史隋將韓擒虎之濟江也猛在京師第六子巡攝行州事擒虎進軍攻陷之巡及家口並見執時猛與左衛將軍蔣元遜領青龍八十艘為水軍於白下遊奕以禦隋六合兵後主知猛妻子在隋軍懼其有異志欲使任忠代之又重傷其意乃止禎明三年入于隋魯廣達字遍覽吳州刺史悉達之弟也少慷慨志立功名虛心愛士賓客或自遠而至時江表將帥各領部曲動以千數而魯氏尤多釋褐梁邵陵王國右常侍遷平南當陽公府中兵參軍侯景之亂與兄悉達聚衆保新蔡梁元帝承制授假節壯武將軍晉州刺史王僧辨之討侯景也廣達出境候接資奉軍儲僧辨謂沈炯曰魯晉州亦是王師東道主人仍率衆隨僧辨景平加員外散騎常侍餘如故高祖受禪授征遠將軍東海太守尋徙為桂陽太守固辭不拜入為員外散騎常侍除假節信武將軍新蔡太守隨吳明徹討周迪於臨川每戰功居最仍代兄悉達為吳州刺史封中宿縣侯邑五百戶光祿大夫元年授通直散騎常侍都督南豫州諸軍事南豫州刺史華皎稱兵上流詔司空淳于量率衆軍進討軍至夏口皎舟師強盛莫敢進者廣達首率驍勇直衝賊軍戰艦既交廣達憤怒大呼登艦樓奬勵士卒風急艦轉樓搖動廣達足跌墮水沈溺久之因救獲免皎平授持節智武將軍都督巴州諸軍事巴州刺史太建初與儀同章昭達入峽口拓定安蜀等諸州鎮時周氏將圖江左大造舟艦於蜀並運糧青泥廣達與錢道戢等將兵掩襲縱火焚之以功增封并前二千戶仍還本鎮廣達為政簡要推誠任下吏民便之及秩滿皆詣闕表請於是詔留二年五年衆軍北伐略淮南舊地廣達與齊軍會於大峴大破之斬其敷城王張元範虜獲不可勝數進克北徐州乃授都督北徐州諸軍事北徐州刺史尋加散騎常侍入為右衛將軍八年出為北六允州刺史遷晉州刺史十年授使持節都督合霍二州諸軍事進號仁威將軍合州刺史十一年周將梁士彥將兵圍壽春詔遣中領軍樊毅左衛將軍任忠等分部趣陽平秦郡廣達率衆入淮為掎角以擊之周軍攻陷豫霍二州南北六允晉等各自拔諸將並無功盡失淮南之地廣達因免官以侯還第十二年與豫州刺史樊毅率衆北討克郭默城尋授使持節平西將軍都督郢州以上十州諸軍事率舟師四萬治江夏周安州總管元景將兵寇江外廣達命偏師擊走之後主即位入為安左將軍尋授平南將軍南豫州刺史至德二年授安南將軍徵拜侍中又為安左將軍改封綏越郡公封邑如前尋為中領軍及賀若弼進軍鍾山廣達率衆於白土岡南置陳與弼旗鼓相對廣達躬擐甲胄手執桴鼓率勵敢死冒刃而前隋軍退走廣達逐北至營殺傷甚衆如是者數四焉及弼攻敗諸將乘勝至宮城燒北掖門廣達猶督餘兵苦戰不息斬獲數十百人會日暮乃解甲面臺再拜慟哭謂衆曰我身不能救國負罪深矣士卒皆涕泣歔欷於是乃就執禎明三年依例入隋廣達愴本朝淪覆遘疾不治尋以憤慨卒時年五十九尚書令江總撫柩慟哭乃命筆題其棺頭為詩曰黃泉雖抱恨白日自流名悲君感義死不作負恩生總又製廣達墓銘其略曰災流淮海險失金湯時屯運極代革天亡爪牙背義介胄無良獨摽忠勇率禦有方誠貫皎日氣勵嚴霜懷恩感報撫事何忘初隋將韓擒虎之濟江也廣達長子世真在新蔡乃與其弟世雄及所部奔擒虎擒虎遣使致書以招廣達廣達時屯兵京師乃自劾廷尉請罪後主謂之曰世真雖異路中大夫公國之重臣吾所恃賴豈得自同嫌疑之間乎加賜黃金即日還營廣達有隊主楊孝辨時從廣達在軍中力戰陷陳其子亦隨孝辨揮刃殺隋兵十餘人力窮父子俱死史臣曰蕭摩訶氣冠三軍當時良將雖無智略亦一代匹夫之勇矣然口訥心徑恂恂李廣之徒歟任忠雖勇決強斷而心懷反覆誣紿君上自躓其惡鄙矣至於魯廣達全忠守道殉義忘身蓋亦陳代之良臣也
