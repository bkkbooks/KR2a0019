body:
  text: 陳書卷七列傳第一高祖章皇后世祖沈皇后廢帝王皇后高宗柳皇后後主沈皇后張貴妃周禮王者立后六宮三夫人九嬪二十七世婦八十一御妻以聽天下之內治然受命繼體之主非獨外相佐也蓋亦有內德助焉漢魏已來六宮之職因襲增置代不同矣高祖承微接亂光膺天歷以朴素自處故後宮員位多闕世祖天嘉初詔立後宮員數始置貴妃貴嬪貴姬三人以擬古之三夫人又置淑媛淑儀淑容昭華昭容昭儀修華修儀修容九人以擬古之九嬪又置婕妤容華充華承徽烈榮五人謂之五職亞於九嬪又置美人才人良人三職其職無員數號為散位世祖性恭儉而嬪嬙多闕高宗後主內職無所改作令今之所綴略備此篇高祖宣皇后章氏諱要兒吳興烏程人也本姓鈕父景明為章氏所養因改焉景明梁代官至散騎侍郎后母蘇嘗遇道士以小龜遺己光采五色曰三年有徵及期后生而紫光照室因失龜所在少聰慧美容儀手爪長五寸色並紅白每有期功之服則一爪先折高祖先娶同郡錢仲方女早卒後乃聘后后善書計能誦詩及楚辭高祖自廣州南征交址命后與衡陽王昌隨世祖由海道歸于長城侯景之亂高祖下至豫章后為景所囚景平而高祖為長城縣公后拜夫人及高祖踐祚永定元年立為皇后追贈后父景明特進金紫光祿大夫加金章紫綬拜后母蘇安吉縣君二年安吉君卒與后父合葬吳興明年追封后父為廣德縣侯邑五百戶諡曰溫高祖崩后與中書舍人蔡景歷定計祕不發喪召世祖入纂事在蔡景歷及侯安都傳世祖即位尊后為皇太后宮曰慈訓廢帝即位尊后為太皇太后光大二年后下令黜廢帝為臨海王命高宗嗣位太建元年尊后為皇太后二年三月景申崩于紫極殿時年六十五遺令喪事所須並從儉約諸有饋奠不得用牲牢其年四月羣臣上諡曰宣太后祔葬萬安陵后親屬無在朝者唯族兄鈕洽官至中散大夫世祖沈皇后諱妙容吳興武康人也父法梁安前中録事參軍后年十餘歲以梁大同中歸于世祖高祖之討侯景世祖時在吳興景遣使收世祖及后景平乃獲免高祖踐祚永定元年后為臨川王妃世祖即位為皇后追贈后父法深光祿大夫加金章紫綬封建成城縣侯邑五百戶諡曰恭追贈后母高綏安縣君諡曰定廢帝即位尊后為皇太后宮曰安德時高宗與僕射到仲舉舍人劉師知等並受遺輔政師知與仲舉恆居禁中參決衆事而高宗為揚州刺史與左右三百人入居尚書省師知見高宗權重陰忌之乃矯勑謂高宗曰今四方無事王可還東府經理州務高宗將出而咨議毛喜止之曰今若出外便受制於人譬如曹爽願作富家翁不可得也高宗乃稱疾召師知留之與語使毛喜先入言之於后后曰今伯宗年幼政事並委二郎此非我意喜又言於廢帝帝曰此自師知等所為非朕意也喜出以報高宗高宗因囚師知自入見后及帝極陳師知之短仍自草敕請畫以師知付廷尉治罪其夜於獄中賜死自是政無大小盡歸高宗后憂悶計無所出乃密賂宦者蔣裕令誘建安人張安國使據郡反冀因此以圖高宗安國事覺並為高宗所誅時后左右近侍頗知其事后恐連逮黨與並殺之高宗即位以后為文皇后陳亡入隋大業初自長安歸于江南頃之卒后兄欽隨世祖征伐以功至貞威將軍安州刺史世祖即位襲爵建城侯加通直散騎常侍持節會稽等九郡諸軍事明威將軍會稽太守入為侍中左衛將軍衛尉卿光大中為尚書右僕射尋遷左僕射欽素無技能奉己而已高宗即位出為雲麾將軍義興太守秩中二千石太建元年卒時年六十七贈侍中特進翊左將軍諡曰成子觀嗣頗有學識官至御史中丞廢帝王皇后金紫光祿大夫固之女也天嘉元年為皇太子妃廢帝即位立為皇后廢帝為臨海王后為臨海王妃至德中薨后生臨海嗣王至澤至澤以光大元年為皇太子太建元年襲封臨海嗣王尋為宣惠將軍置佐史陳亡入長安高宗柳皇后諱敬言河東解人也曾祖世隆齊侍中司空尚書令貞陽忠武公祖惲有重名於梁代官至祕書監贈侍中中護軍父偃尚梁武帝女長城公主拜駙馬都尉大寶中為鄱陽太守卒官后時年九歲幹理家事有若成人侯景之亂后與弟盼往江陵依梁元帝元帝以長城公主之故待遇甚厚及高宗赴江陵元帝以后配焉承聖二年后生後主於江陵明年江陵陷高宗遷于關右后與後主俱留穰城天嘉二年與後主還朝后為安成王妃高宗即位立為皇后后美姿容身長七尺二寸手垂過膝初高宗居鄉里先娶吳興錢氏女及即位拜為貴妃甚有寵后傾心下之每尚方供奉之物其上者皆推於貴妃而己御其次焉高宗崩始興王叔陵為亂後主賴后與樂安君吳氏救而獲免事在叔陵傳後主即位尊后為皇太后宮曰弘範當是之時新失淮南之地隋師臨江又國遭大喪後主病瘡不能聽政其誅叔陵供大行喪事邊境防守及百司衆務雖假以後主之命實皆決之於后後主瘡愈乃歸政焉陳亡入長安大業十一年薨於東都年八十三葬洛陽之邙山后性謙謹未嘗以宗族為請雖衣食亦無所分遺弟盼太建中尚世祖女富陽公主拜駙馬都尉後主即位以帝舅加散騎常侍盼性愚戇使酒常因醉乘馬入殿門為有司所劾坐免官卒於家贈侍中中護軍后從祖弟莊清警有鑒識太建末為太子洗馬掌東宮管記後主即位稍遷至散騎常侍衛尉卿禎明元年轉右衛將軍兼中書舍人領雍州大中正自盼卒後太后宗屬唯莊為近兼素有名望猶是深被恩遇尋遷度支尚書陳亡入隋為岐州司馬後主沈皇后諱婺華儀同三司望蔡貞憲侯君理女也母即高祖女會稽穆公主主早亡時后尚幼而毀瘠過甚及服畢每至歲時朔望恆獨坐涕泣哀動左右內外咸敬異焉太建三年納為皇太子妃後主即位立為皇后后性端靜寡嗜欲聰敏強記涉獵經史工書翰初後主在東宮而后父君理卒后居憂處於別殿哀毀逾禮後主遇后既薄而張貴妃寵傾後宮後宮之政並歸之后淡然未嘗有所忌怨而居處儉約衣服無錦繡之飾左右近侍才百許人唯尋閲圖史誦佛經為事陳亡與後主俱入長安及後主薨后自為哀辭文甚酸切隋煬帝每所巡幸恆令從駕及煬帝為宇文化及所害后自廣陵過江還鄉里不知所終后無子養孫姬子胤為己子后宗族多有顯官事在君理傳后叔君公自梁元帝敗後常在江陵禎明中與蕭瓛蕭巖率衆叛隋歸朝後主擢為太子詹事君公博學有才辨善談論後主深器之陳亡隋文帝以其叛己命斬于建康後主張貴妃名麗華兵家女也家貧父兄以織席為事後主為太子以選入宮是時龔貴嬪為良娣貴妃年十歲為之給使後主見而説焉因得幸遂有娠生太子深後主即位拜為貴妃性聰惠甚被寵遇後主每引貴妃與賓客遊宴貴妃薦諸宮女預焉後宮等咸德之競言貴妃之善由是愛傾後宮又好厭魅之術假鬼道以惑後主置淫祀於宮中聚諸妖巫使之鼓舞因參訪外事人間有一言一事妃必先知之以白後主由是益重妃內外宗族多被引用及隋軍陷臺城妃與後主俱入于井隋軍出之晉王廣命斬貴妃榜於青溪中橋史臣侍中鄭國公魏徵考覽記書參詳故老云後主初即位以始興王叔陵之亂被傷臥于承香閣下時諸姬並不得進唯張貴妃侍焉而柳太后猶居柏梁殿即皇后之正殿也後主沈皇后素無寵不得侍疾別居求賢殿至德二年乃於光照殿前起臨春結綺望仙三閣閣高數丈並數十間其窗牖壁帶懸楣欄檻之類並以沈檀香木為之又飾以金玉間以珠翠外施珠簾內有寶牀寶帳其服玩之屬瑰奇珍麗近古所未有每微風暫至香聞數里朝日初照光映後庭其下積石為山引水為池植以奇樹雜以花藥後主自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望仙閣並復道交相往來又有王李二美人張薛二淑媛袁昭儀何婕妤江修容等七人並有寵遞代以遊其上以宮人有文學者袁大捨等為女學士後主每引賓客對貴妃等遊宴則使諸貴人及女學士與狎客共賦新詩互相贈答採其尤豔麗者以為曲詞被以新聲選宮女有容色者以千百數令習而哥之分部迭進持以相樂其曲有玉樹後庭花臨春樂等大指所歸皆美張貴妃孔貴嬪之容色也其略曰璧月夜夜滿瓊樹朝朝新而張貴妃髮長七尺鬒黑如漆其光可鑒特聰惠有神采進止間暇容色端麗每瞻視盼睞光采溢目照映左右常於閣上靚葬臨于軒檻宮中遙望飄若神仙才辨強記善候人主顏色是時後主怠於政事百司啓奏並因宦者蔡脫兒李善度進請後主置張貴妃於膝上共決之李蔡所不能記者貴妃並為條疏無所遺脫由是益加寵異冠絶後庭而後宮之家不遵法度有挂於理者但求哀於貴妃貴妃則令李蔡先啓其事而後從容為言之大臣有不從者亦因而譖之所言無不聽於是張孔之勢薰灼四方大臣執政亦從風而靡閹宦便佞之徒內外交結轉相引進賄賂公行賞罰無常綱紀瞀亂矣史臣曰詩表關雎之德易箸乾坤之基然夫婦之際人道之大倫也若夫作儷天則燮贊王化則宣太后有其懿焉
