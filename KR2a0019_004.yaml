body:
  text: 陳書卷四本紀第四廢帝廢帝諱伯宗字奉業小字藥王世祖嫡長子也梁承聖三年五月庚寅生永定二年二月戊辰拜臨川王世子三年世祖嗣位八月庚戌立為皇太子自梁室亂離東宮焚燼太子居于永福省天康元年四月癸酉世祖崩其日太子即皇帝位于太極前殿詔曰上天降禍大行皇帝奄棄萬國攀號靡及五內崩殞朕以寡德嗣膺寶命焭焭在疚懼甚綴旒方賴宰輔匡其不逮可大赦天下又詔內外文武各復其職遠方悉停奔赴五月乙己卯尊皇太后曰太皇太后皇后曰皇太后庚寅以驃騎將軍司空揚州刺史新除尚書令安成王頊為驃騎大將軍進位司徒録尚書都督中外諸軍事丁酉中軍大將軍開府儀同三司徐度進位司空鎮南將軍開府儀同三司江州刺史章昭達為侍中進號征南將軍鎮東將軍東揚州刺史始興王伯茂進號征東將軍開府儀同三司平北將軍南徐州刺史鄱陽王伯山進號鎮北將軍吏部尚書袁樞為尚書左僕射雲麾將軍吳興太守沈欽為尚書右僕射新除中領軍吳明徹為領軍將軍新除中護軍沈恪為護軍將軍平南將軍湘州刺史華皎進號安南將軍散騎常侍御史中丞徐陵為吏部尚書六月辛亥翊右將軍右光祿大夫王通進號安右將軍秋七月丁酉立妃王氏為皇后冬十月庚申輿駕奉祠太廟十一月乙亥周遣使來弔十二月甲子高麗國遣使獻方物光大元年春正月癸酉尚書左僕射袁樞卒乙亥詔曰昔昊天成命降集寶圖二后重光九區咸乂閔余沖薄王道未昭荷茲神器如涉靈海庶親賢並建牧伯惟良天下雍熙緬同刑措今三元改曆萬國充庭清廟無追具僚斯在言瞻寧位觸感崩心思播遺恩俾覃黎獻可大赦天下改天康二年為光大元年孝悌力田賜爵一級己卯以領軍將軍吳明徹為丹陽尹辛卯輿駕親祠南郊二月辛亥宣毅將軍南豫州刺史余孝頃謀反伏誅癸丑以征東將軍開府儀同三司東揚州刺史始興王伯茂為中衛大將軍開府儀同三司黃法為鎮北將軍南徐州刺史鎮北將軍南徐州刺史鄱陽王伯山為鎮東將軍東揚州刺史三月甲午以尚書右僕射沈欽為侍中尚書左僕射夏四月乙卯太白晝見五月癸巳以領軍將軍丹陽尹吳明徹為安南將軍湘州刺史乙未以鎮右將軍杜稜為領軍將軍安南將軍湘州刺史華皎謀反景申以中撫大將軍淳于量為使持節征南大將軍總率舟師以討之六月壬寅以中軍大將軍司空徐度進號車騎將軍總督京邑衆軍步道襲湘州閏月癸巳以雲麾將軍新安王伯固為丹陽尹秋七月戊申立皇子至澤為皇太子賜天下為父後者爵一級王公卿士已下賚帛各有差九月乙巳詔曰逆賊華皎極惡窮凶遂樹立蕭巋謀危社稷棄親即讎人神憤惋王師電邁水陸爭前梟剪之期匪朝伊暮其家口在北里尚方宜從誅戮用明國憲景辰百濟國遣使獻方物是月周將長胡公拓跋定率步騎二萬入郢州與華皎水陸俱進都督淳于量吳明徹等與戰大破之皎單舸奔江陵擒拓跋定俘獲萬餘人馬四千餘匹送京師冬十月辛巳赦湘巴二郡州為皎所詿誤者甲申輿駕親祠太廟十一月己未以護軍將軍沈恪為平西將軍荊州刺史甲子侍中中權將軍開府儀同三司特進左光祿大夫王沖薨十二月庚寅以兼從事中郎孔英哲為奉聖亭侯奉孔子祀二年春正月己亥侍中都督中外諸軍事驃騎大將軍司徒録尚書揚州刺史安成王頊進位太傅領司徒加殊禮劒履上殿侍中征南將軍開府儀同三司江州刺史章昭達進號征南大將軍中撫大將軍新除征南大將軍淳于量為侍中中軍大將軍開府儀同三司安南將軍湘州刺史吳明徹即本號開府儀同三司進號鎮南將軍雲麾將軍郢州刺史程靈洗進號安西將軍庚子詔討華皎軍人死王事者並給棺槥送還本鄉仍復其家甲子罷吳州以鄱陽郡還屬江州侍中司空車騎將軍徐度薨夏四月辛巳太白晝見丁亥割東揚州晉安郡為豐州五月景辰太傅安成王頊獻玉璽一六月丁卯彗星見秋七月景午輿駕親祠太廟戊申新羅國遣使獻方物壬戌立皇弟伯智為永陽王伯謀為桂陽王九月甲辰林邑國遣使獻方物景午狼牙修國遣使獻方物以侍中征南大將軍開府儀同三司江州刺史章昭達為中撫大將軍戊午太白晝見冬十月庚午輿駕親祠太廟十一月景午以前平西將軍荊州刺史沈恪為護軍將軍壬子以鎮北將軍開府儀同三司南徐州刺史黃法為鎮西將軍郢州刺史新除中軍大將軍開府儀同三司淳于量為鎮北將軍南徐州刺史甲寅慈訓太后集羣臣於朝堂令曰中軍儀同鎮北儀同鎮右將軍護軍將軍八座卿士昔梁運季末海內沸騰天下蒼生殆無遺噍高祖武皇帝撥亂反正膺圖御籙重懸三象還補二儀世祖文皇帝克嗣洪基光宣寶業惠養中國綏寧外荒並戰戰兢兢劬勞締構庶幾鼎運方隆殷夏伯宗昔在儲宮本無令問及居崇極遂騁凶淫居處諒暗固不哀戚嬪嬙弗隔就館相仍豈但衣車所納是譏宗正衰絰生子得誚右師七百之祚何憑三千之罪為大且費引金帛令充椒閫內府中藏軍備國儲未盈期稔皆已空竭太傅親承顧託鎮守宮闈遺誥綢繆義深垣屏而欑塗未御翌日無淹仍遣劉師知殷不佞等顯言排斥韓子高小豎輕佻推心委仗陰謀禍亂決起蕭牆元相雖持但除君側又以余孝頃密邇京師便相徵召殃慝之咎凶徒自擒宗社之靈祅氛是滅於是密詔華皎稱兵上流國祚憂惶幾移醜類乃至要招遠近叶力巴湘支黨縱橫寇擾黟歙又別勑歐陽紇等攻逼衡州嶺表紛紜殊淹弦望豈止罪浮於昌邑非唯聲醜於太和但賊豎皆亡祅徒已散日望懲改猶加掩抑而悖禮忘德情性不悛樂禍思亂昏慝無已張安國蕞爾凶狡窮為小盜仍遣使人蔣裕鉤出上京即置行臺分選凶黨賊皎妻呂舂徒為戮納自奚宮官藏諸永巷使其結引親舊規圖戕禍蕩主侯法喜等太傅麾下恆遊府朝啖以深利謀興肘腋適又蕩主孫泰等潛相連結大有交通兵力殊強指期挻亂皇家有慶歷數遐長天誘其衷同然開發此諸文迹今以相示是而可忍誰則不容祖宗基業將懼傾霣豈可復肅恭禋祀臨御兆民式稽故實宜在流放今可特降為臨海郡王送還藩邸太傅安成王固天生德齊聖廣深二后鍾心三靈佇眷自前朝不悆任總邦家威惠相宣刑禮兼設指揮嘯吒湘郢廓清闢地開疆荊益風靡若太戊之承殷歷中都之奉漢家校以功名曾何髣佛且地彰靈璽天表長彗布新除舊禎祥咸顯文皇知子之鑒事甚帝堯傳弟之懷又符太伯今可還申曩志崇立賢君方固宗祧載貞辰象中外宜依舊典奉迎輿駕未亡人不幸屬此殷憂不有崇替容危社稷何以拜祠高寢歸祔武園攬筆口自本然兼懷悲慶是日出居別第太建二年四月薨時年十九帝仁弱無人君之器世祖每慮不堪繼業既居冢嫡廢立事重是以依違積載及疾將大漸召高宗謂曰吾欲遵太伯之事高宗初未達旨後寤乃拜伏涕泣固辭其後宣太后依詔廢帝焉史臣曰臨海雖繼體之重仁厚儒弱混一是非不驚得喪蓋帝摯漢惠之流也世祖知神器之重諒難負荷深鑒堯旨弗傳寶祚焉
