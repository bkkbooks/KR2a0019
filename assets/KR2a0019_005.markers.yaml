  - {type: variant, offset: 9686, length: 0, content: '', WYG: 陳書卷五陳書卷五考證宣帝紀梁大通二年七月辛酉生大通南史作中大通時有馬軍主李總與高宗有舊南史無馬字十月己亥夜地震臣人龍按上文書冬十月乙酉祀太廟戊戍以沈恪為領軍則此不應複書十月若南史作十一月而不書朔以上戊戍證之亦恐有誤分命衆軍北伐南史云是歲諸軍畧地所在尅㨗與下文詳叙者小異壬辰以尚書右僕射王瑒為尚書右僕射下右字衍臣人龍按南史云以尚書右僕射為尚書僕射則知右字之為衍文矣己酉周廣陵義主曹藥率衆入附南史主字上有軍字陳書卷五考證}
