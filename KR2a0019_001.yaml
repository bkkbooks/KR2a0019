body:
  text: 陳書卷一本紀第一高祖上高祖武皇帝諱霸先字興國小字法生吳興長城下若里人漢太丘長陳實之後也世居潁川實玄孫準晉太尉準生匡匡生達永嘉南遷為丞相掾歷太子洗馬出為長城令悅其山水遂家焉嘗謂所親曰此地山川秀麗當有王者興二百年後我子孫必鍾斯運達生康復為丞相掾咸和中土斷故為長城人康生盱眙太守英英生尚書郎公弼公弼生步兵校尉鼎鼎生散騎侍郎高高生懷安令詠詠生安成太守猛猛生太常卿道巨道巨生皇考文讚高祖以梁天監二年癸未歲生少俶儻有大志不治生産既長讀兵書多武藝明達果斷為當時所推服身長七尺五寸日角龍顏垂手過膝嘗遊義興館於許氏夜夢天開數丈有四人朱衣捧日而至令高祖開口納焉及覺腹中猶熱高祖心獨負之大同初新喻侯蕭映為吳興太守甚重高祖嘗目高祖謂僚佐曰此人方將遠大及映為廣州刺史高祖為中直兵參軍隨府之鎮映令高祖招集士馬衆至千人仍命高祖監宋隆郡所部安化二縣元不賓高祖討平之尋監西江督護高要郡守先是武林侯蕭咨為交州刺史以裒刻失衆心土人李賁連結數州豪傑同時反臺遣高州刺史孫冏新州刺史盧子雄將兵擊之冏等不時進皆於廣州伏誅子雄弟子略與冏子姪及其主帥杜天合杜僧明共舉兵執南江督護沈顗進寇廣州晝夜苦攻州中震恐高祖率精兵三千卷甲兼行以救之頻戰屢捷天合中流矢死賊衆大潰僧明遂降梁武帝深歎異焉授直閣將軍封新安子邑三百戶仍遣畫工圖高祖容貌而觀之其年冬蕭映卒明年高祖送喪還都至大庾嶺會有詔高祖為交州司馬領武平太守與刺史楊壜南討高祖益招勇敢器械精利壜喜曰能剋賊者必陳司武也委以經略高祖與衆軍發自番禺是時蕭勃為定州刺史於西江相會勃知軍士憚遠役陰購誘之因詭説壜壜集諸將問計高祖對曰交址叛換罪由宗室遂使僭亂數州彌歷年稔定州復欲昧利目前不顧大計節下奉辭伐罪故當生死以之豈可畏憚宗室輕於國憲今若奪人沮衆何必交州討賊問罪之師即回有所指矣於是勒兵鼓行而進十一年六月軍至交州賁衆數萬於蘇歷江口立城柵以拒官軍壜推高祖為前鋒所向摧陷賁走典徹湖於屈獠界立寨大造船艦充塞湖中衆軍憚之頓湖口不敢進高祖謂諸將曰我師已老將士疲勞歷歲相持恐非良計且孤軍無援入人心腹若一戰不捷豈望生全今藉其屢奔人情未固夷獠烏合易為摧殄正當共出百死決力取之無故停留時事去矣諸將皆默然莫有應者是夜江水暴起七丈注湖中奔流迅激高祖勒所部兵乘流先進衆軍鼓譟俱前賊衆大潰賁竄入屈獠洞中屈獠斬賁傳首京師是歲太清元年也賁兄天寶遁入九真與劫帥李紹隆收餘兵二萬殺德州刺史陳文戒進圍愛州高祖仍率衆討平之除振遠將軍西江督護高要太守督七郡諸軍事二年冬侯景寇京師高祖將率兵赴援廣州刺史元景仲陰有異志將圖高祖高祖知其計與成州刺史王懷明行臺選郎殷外臣等密議戒嚴三年七月集義兵於南海馳檄以討景仲景仲窮蹙縊于閣下高祖迎蕭勃鎮廣州是時臨賀內史歐陽頠監衡州蘭裕蘭京禮扇誘始興等十郡共舉兵攻頠頠請援於勃勃令高祖率衆救之悉擒裕等仍監始興郡十一月高祖遣杜僧明胡穎將二千人頓于嶺上並厚結始興豪傑同謀義舉侯安都張偲等率千餘人來附蕭勃聞之遣鍾休悅説高祖曰侯景驍雄天下無敵前者援軍十萬士馬精強然而莫敢當鋒遂令羯賊得志君以區區之衆將何所之如聞嶺北王侯又皆鼎沸河東桂陽相次屠戮邵陵開建親尋干戈李遷仕託身當陽便奪馬仗以君疏外詎可暗投未若且住始興遙張聲勢保此太山自求多福高祖泣謂休悅曰僕本庸虛蒙國成造往聞侯景渡江即欲赴援遭值元蘭梗我中道今京都覆沒主上蒙塵君辱臣死誰敢愛命君侯體則皇枝任重方嶽不能摧鋒萬里雪此寃痛見遣一軍猶賢乎已乃降後旨使人慨然僕行計決矣憑為披述乃遣使間道往江陵稟承軍期節度時蔡路養起兵據南康勃遣腹心談世遠為曲江令與路養相結同遏義軍大寶元年正月高祖發自始興次大庾嶺路養出軍頓南野依山水立四城以拒高祖高祖與戰大破之路養脫身竄走高祖進頓南康湘東王承制授高祖員外散騎常侍持節明威將軍交州刺史改封南野縣伯六月高祖修崎頭古城徙居焉高州刺史李遷仕據大皋遣主帥杜平虜率千人入贛石魚梁高祖命周文育將兵擊走之遷仕奔寧都承制授高祖通直散騎常侍使持節信威將軍豫州刺史領豫章內史改封長城縣侯尋授散騎常侍使持節都督六郡諸軍事軍師將軍南江州刺史餘如故時寧都人劉藹等資遷仕舟艦兵仗將襲南康高祖遣杜僧明等率二萬人據白口築城以禦之遷仕亦立城以相對二年三月僧明等攻拔其城生擒遷仕送南康高祖斬之承制命高祖進兵定江州仍授江州刺史餘如故六月高祖發自南康南康贛石舊有二十四灘灘多巨石行旅者以為難高祖之發也水暴起數丈三百里間巨石皆沒進軍頓西昌有龍見于水濱高五丈許五采鮮耀軍民觀者數萬人是時承制遣征東將軍王僧辨督衆軍討侯景八月僧辨軍次湓城高祖率杜僧明等衆軍及南川豪帥合三萬人將會焉時西軍乏食高祖先貯軍糧五十萬石至是分三十萬以資之仍頓巴丘會侯景廢簡文帝立豫章嗣王棟高祖遣兼長史沈衮奉表于江陵勸進十一月承制授高祖使持節都督會稽東陽新安臨海永嘉五郡諸軍事平東將軍東揚州刺史領會稽太守豫章內史餘並如故三年正月高祖率甲士三萬人強弩五千張舟艦二千乘發自豫章二月次桑落洲遣中記室參軍江元禮以事表江陵承制加高祖鼓吹一部是時僧辨已發湓城會高祖于白茅灣乃登岸結壇刑牲盟約進軍次蕪湖侯景城主張黑棄城走三月高祖與諸軍進剋姑熟仍次蔡洲侯景登石頭城觀望形勢意甚不悅謂左右曰此軍上有紫氣不易可當乃以翅貯石沈塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接諸將未有所決僧辨遣杜崱問計於高祖高祖曰前柳仲禮數十萬兵隔水而坐韋粲之在青溪竟不渡岸賊乃登高望之表𩹉俱盡肆其凶虐覆我王師今圍石頭須渡北岸諸將若不能當鋒請先往立柵高祖即於石頭城西橫隴築柵衆軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路景率衆萬餘人鐵騎八百餘匹結陳而進高祖曰軍志有之善用兵者如常山之蛇首尾相應今我師既衆賊徒甚寡應分賊兵勢以弱制強何故聚其鋒鋭令必死於我乃命諸將分處置兵賊直衝王僧志僧志小縮高祖遣徐度領弩手二千橫截其後賊乃却高祖與王琳杜龕等以鐵騎悉力乘之賊退據其柵景儀同盧輝略開石頭北門來降蕩主戴冕曹宣等攻拔果林一城衆軍又剋其四城賊復還殊死戰又盡奪所得城柵高祖大怒親率攻之士卒騰柵而入賊復散走景與百餘騎棄矟執刀左右衝陳陳不動景衆大潰逐北至西明門景至闕下不敢入臺遣腹心取其二子而遁高祖率衆出廣陵應接會景將郭元建奔齊高祖納其部曲三千人而還僧辨啓高祖鎮京口五月齊遣辛術圍嚴超達於秦郡高祖命徐度領兵助其固守齊衆七萬填起土山穿地道攻之甚急高祖乃自率萬人解其圍縱兵四面擊齊軍弓弩亂發齊平秦王中流矢死斬首數百級齊人收兵而退高祖振旅南歸遣記室參軍劉本仁獻捷于江陵七月廣陵僑民朱盛張象潛結兵襲齊刺史溫仲雍遣使來告高祖率衆濟江以應之會齊人來聘求割廣陵之地王僧辨許焉仍報高祖高祖於是引軍還南徐州江北人隨軍而南者萬餘口承制授高祖使持節散騎常侍都督南徐州諸軍事征北大將軍開府儀同三司南徐州刺史餘並如故及王僧辨率衆征陸納於湘州承制命高祖代鎮揚州十一月湘東王即位于江陵改大寶三年為承聖元年湘州平高祖旋鎮京口三年三月進高祖位司空餘如故十一月西魏攻陷江陵高祖與王僧辨等進啓江州請晉安王以太宰承制又遣長史謝哲奉箋勸進十二月晉安王至自尋陽入居朝堂給高祖班劒二十人四年五月齊送貞陽侯深明還主社稷王僧辨納之即位改元曰天成以晉安王為皇太子初齊之請納貞陽也高祖以為不可遣使詣僧辨苦爭之往返數四僧辨竟不從高祖居常憤歎密謂所親曰武皇雖磐石之宗遠布四海至於剋雪讎恥寧濟艱難唯孝元而已功業茂盛前代未聞我與王公俱受重寄語未絶音聲猶在耳豈期一旦便有異圖嗣主高祖之孫元皇之子海內屬目天下宅心竟有何辜坐致廢黜遠求夷狄假立非次觀其此情亦可知矣乃密具袍數千領及錦綵金銀以為賞賜之具九月壬寅高祖召徐度侯安都周文育等謀之仍部列將士分賞金帛水陸俱進是夜發南徐州討王僧辨甲辰高祖步軍至石頭前遣男士自城北踰入時僧辨方視事外白有兵俄而兵自內出僧辨遽走與其第三子頠相遇俱出閣左右尚數十人苦戰高祖大兵尋至僧辨衆寡不敵走登城南門樓高祖因風縱火僧辨窮迫乃就擒是夜縊僧辨及頠景午貞陽侯遜位百僚奉晉安王上表勸進十月己酉晉安王即位改承聖四年為紹泰元年壬子詔授高祖侍中大都督中外諸軍事車騎將軍揚南徐二州刺史持節司空班劒鼓吹並如故仍詔高祖甲仗百人出入殿省震州刺史杜龕據吳興與義興太守韋載同舉兵反高祖命周文育率衆攻載于義興龕遣其從弟北叟將兵拒戰北叟敗歸義興辛未高祖表自東討留高州刺史侯安都石州刺史杜稜宿衛臺省甲戌軍至義興景子拔其水柵秦州刺史徐嗣徽據其城以入齊又要南豫州刺史任約共舉兵應龕載齊人資其兵食嗣徽等以京師空虛率精兵五千奄至闕下侯安都領驍勇五百人出戰嗣徽等退據石頭丁丑載及北叟來降高祖撫而釋之以嗣徽寇逼卷甲還都命周文育進討杜龕十一月己卯齊遣兵五千濟渡據姑熟高祖命合州刺史徐度於冶城寺立柵南抵淮渚齊又遣安州刺史翟子崇楚州刺史劉仕榮淮州刺史柳達摩領兵萬人於胡墅渡米粟三萬石馬千匹入于石頭癸未高祖遣侯安都領水軍夜襲胡墅燒齊船千餘艘周鐵武率舟師斷齊運輸擒其北徐州刺史張領州獲運舫米數千石仍遣韋載於大航築城使杜稜據守齊人又於倉門水南立二柵以拒官軍甲辰嗣徽等攻冶城柵高祖領鐵騎精甲出自西明門襲擊之賊衆大潰嗣徽留柳達摩等守城自率親屬腹心往南州採石以迎齊援十二月癸丑高祖遣侯安都領舟師襲嗣徽家口于秦州俘獲數百人官軍連艦塞淮口斷賊水路先是太白自十一月景戌不見乙卯出于東方景辰高祖盡命衆軍分部甲卒對冶城立航渡兵攻其水南二柵柳達摩等渡淮置陳高祖督兵疾戰縱火燒柵煙塵張天賊潰爭舟相排擠溺死者以千數時百姓夾淮觀戰呼聲震天地軍士乘勝無不一當百盡收其船艦賊軍懾氣是日嗣徽約等領齊兵水步萬餘人還據石頭高祖遣兵往江寧據要險以斷賊路賊水步不敢進頓江寧浦口高祖遣侯安都領水軍襲破之嗣徽等乘單舸脫走盡收其軍資器械己未官軍四面攻城自辰訖酉得其東北小城及夜兵不解庚申達摩遣使侯子欽劉仕榮等詣高祖請和高祖許之乃於城門外刑牲盟約其將士部曲一無所問恣其南北辛酉高祖出石頭南門陳兵數萬送齊人歸北者壬戌齊和州長史烏丸遠自南州奔還歷陽江寧令陳嗣黃門侍郎曹朗據姑熟反高祖命侯安都徐度等討平之斬首數千級聚為京觀石頭採石南州悉平收獲馬仗船米不可勝計是月杜龕以城降二年正月癸未誅杜龕于吳興龕從弟北叟司馬沈孝敦並賜死二月庚申高祖遣侯安都周鐵武率舸艦備江州仍頓梁山起柵甲子敕司空有軍旅之事可騎馬出入城內戊辰前寧遠石城公外兵參軍王位於石頭沙際獲玉璽四紐高祖表以送臺三月戊戌齊遣水軍儀同蕭軌厙狄伏連堯難宗東方老侍中裴英起東廣州刺史獨孤辟惡洛州刺史李希光並任約徐嗣徽等率衆十萬出柵口向梁山帳內蕩主黃叢逆擊敗之燒其前軍船艦齊頓軍保蕪湖高祖遣定州刺史沈泰吳郡太守裴忌就侯安都共據梁山以禦之自去冬至是甘露頻降于鍾山梅岡南澗及京口江寧縣境或至三數升大如奕子高祖表以獻臺四月丁巳高祖詣梁山軍巡撫五月甲申齊兵發自蕪湖景申至秣陵故治高祖遣周文育屯方山徐度頓馬牧杜稜頓大航南己亥高祖率宗室王侯及朝臣將帥於大司馬門外白獸闕下刑牲告天以齊人背約發言慷慨涕泗交流同盟皆莫能仰視士卒觀者益奮辛丑齊軍於秣陵故縣跨淮立橋柵引渡兵馬其夜至方山侯安都周文育徐度等各引還京師癸卯齊兵自方山進及兒塘遊騎至臺周文育侯安都頓白土岡旗鼓相望都邑震駭高祖潛撤精卒三千配沈泰渡江襲齊行臺趙彥琛深於瓜步獲舟艦百餘艘陳粟萬斛爾日天子總羽林禁兵頓于長樂寺六月甲辰齊兵潛至鍾山龍尾丁未進至莫府山高祖遣錢明領水軍出江乘要擊齊人糧運盡獲其船米齊軍於是大餒殺馬驢而食之庚戌齊軍踰鍾山高祖衆軍分頓樂遊苑東及覆舟山北斷其衝要壬子齊軍至玄武湖西北莫府山南將據北郊壇衆軍自覆舟東移頓郊壇北與齊人相對其夜大雨震電暴風拔木平地水丈餘齊軍晝夜坐立泥中懸鬲以爨而臺中及潮溝北水退路燥官軍每得番易甲寅少霽高祖命衆軍秣馬蓐食遲明攻之乙卯旦自率帳內麾下出莫府山南吳明徹沈泰等衆軍首尾齊舉縱兵大戰侯安都自白下引兵橫出其後齊師大潰斬獲數千人相蹂藉而死者不可勝計生執徐嗣徽及其弟嗣宗斬之以徇追奔至于臨沂其江乘攝山鍾山等諸軍相次克捷虜蕭軌東方老王敬寶李希光裴英起等將帥凡四十六人其軍士得竄至江者縛荻筏以濟中江而溺流尸至京口翳水彌岸丁巳衆軍出南州燒賊舟艦己未斬劉歸義徐嗣彥傅野豬于建康市是日解嚴庚申蕭軌東方老王敬寶李希光裴英起皆伏誅高祖表解南徐州以授侯安都七月景子詔授高祖中書監司徒揚州刺史進爵為公增邑並前五千戶侍中使持節都督中外諸軍事將軍尚書令班劒鼓吹甲仗並如故並給油幢皂輪車是月侯瑱以江州入附遣侯安都鎮上流定南中諸郡八月癸卯太府卿何敳新州刺史華志各上玉璽一高祖表以送臺詔歸之高祖是日詔高祖食安吉武康二縣合五千戶九月壬寅改年曰太平元年進高祖位丞相録尚書事鎮衛大將軍改刺史為牧進封義興郡公侍中司徒都督班劒鼓吹甲仗皂輪車並如故丁未中散大夫王彭箋稱今月五日平旦於御路見龍迹自大社至象闕亘三四里庚申詔追贈高祖考侍中光祿大夫加金章紫綬封義興郡公諡曰恭十月甲戌敕丞相自今入問訊可施別榻以近扆坐二年正月壬寅天子朝萬國於太極東堂加高祖班劒十人並前三十人餘如故丁未詔贈高祖兄道談散騎常侍使持節平北將軍南六允州刺史長城縣公諡曰昭烈弟休先侍中使持節驃騎將軍南徐州刺史武康縣侯諡曰忠壯食邑各二千戶甲寅遣兼侍中謁者僕射陸繕策拜長城縣夫人章氏為義興國夫人丁卯詔贈高祖祖侍中太常卿諡曰孝追封高祖祖母許氏吳郡嘉興縣君諡曰敬妣張氏義興國太夫人諡曰宣二月庚午蕭勃舉兵自廣州渡嶺頓南康遣其將歐陽頠傅泰及其子孜為前軍至于豫章分屯要險南江州刺史余孝頃起兵應勃高祖命周文育侯安都率衆討平之八月甲午進高祖位太傅加黃鉞劒履上殿入朝不趨贊拜不名並給羽葆鼓吹一部其侍中都督録尚書鎮衛大將軍揚州牧義興郡公班劒甲仗油幢皂輪車並如故景申加高祖前後部羽葆鼓吹是時湘州刺史王琳擁兵不應命高祖遣周文育侯安都率衆討之九月辛丑詔曰肇昔元胎剖判太素氤氳崇建人皇必憑洪宰故賢哲之后牧伯征于四方神武之君大監治乎萬國又有一匡九合渠門之賜以隆戮帶圍溫行宮之寵斯茂時危所以貞固運泰所以光熙斯乃千載同風百王不刊之道也太傅義興公允文允武乃聖乃神固天生德康濟黔首昔在休期早隆朝寄遠踰滄海大極交越皇運不造書契未聞中國其亡兵凶總至哀哀噍類譬彼窮牢悠悠上天莫云斯極否終則泰元輔應期救此將崩援茲已溺乘舟履輂架險浮深經略中途畢殲羣醜洎乎石頭姑熟流髓履腸一朝指撝六合清晏是用光昭下武翼亮中都雪三后之勍讎夷三靈之巨慝堯台禹佐未始能階殷相周師固非云擬重之以屯剝餘象荊楚大崩天地無心乘輿委御五胡荐食競謀諸夏八方跱莫有匡救強臣放命黜我沖人顧影於荼孺之魂甘心於寧卿之辱却桉下髻求哀之路莫從竊鈇逃責容身之地無所公神兵奄至不日清澄惟是孱蒙再膺天録斯又巍巍蕩蕩無德而稱焉加以仗茲忠義屠彼祅逆震部夷氛稽山罷祲番禺蠡澤北鄙西郊殲厥凶徒罄無遺種斯則兆民之命修短所縣率土之基興亡是賴於是刑禮兼訓沿革有章中外成平遐邇寧一用能使陽光合魄曜象呈暉棲閣遊庭抱仁含信宏勳該於厚地大道格于玄天羲農炎昊以來卷領垂衣之世聖人濟物未有如斯者也夫備物典策桓文是膺助理陰陽蕭曹不讓未有功高於𧜛縣而賞薄於伊周凡厥人祇固懷延佇實由公謙撝自牧降損為懷嘉數遲回永言增歎豈可申茲雅尚久廢朝猷宜戒司勳敬升鴻典且重華大聖媯汭惟賢盛德之祀無忘公侯之門必復是以殷嘉亶甫繼后稷之官堯命羲和纂重黎之位況其本枝攸建宜誓山河者乎其進公位相國總百揆封十郡為陳公備九錫之禮加璽紱遠遊冠緑綟綬位在諸侯王上其鎮衛大將軍揚州牧如故策曰大哉乾元資日月以貞觀至哉坤元憑山川以載物故惟天為大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻磎蘊其玉璜堯舜之臣榮河鏤其金版況乎體得一之鴻姿寧陽九之危厄拯橫流於碣石撲燎火於崑岑驅馭於韋彭跨蹍於齊晉神功行而靡用聖道運而無名者乎今將授公典策其敬聽朕命日者昊天不弔鍾亂于我國家網漏吞舟強胡內贔茫茫宇宙惵惵黎元方足圓顱萬不遺一太清否亢橋山之痛已深大寶屯如平陽之禍相繼上宰膺運康救兆民鞠旅於滇池之南揚旌於桂嶺之北懸三光於已墜謐四海於羣飛屠猰窳於中原斫鯨鯢於濛汜蕩寧上國光啓中興此則公之大造於皇家者也既而天未悔禍夷醜荐臻南夏崩騰西京蕩覆羣胡孔熾藉亂乘間推納藩枝盜假神器冢司昏橈旁引寇讎既見貶於桐宮方謀危於漢閣皇運已殆何殊贅旒中國搖然非徒如線公赫然投袂匡救本朝復莒齊都平戎王室朕所以還膺寶歷重履宸居挹建武之風猷歌宣王之雅頌此又公之再造於皇家者也公應務之初登庸惟始三川五嶺莫不窺臨銀洞珠宮所在寧謐孫盧肇釁越貊為災番部阽危勢將淪殄公赤旗所指祅壘洞白羽才撝凶徒粉潰非其神武久喪南藩此又公之功也大同之末邊政不修李賁狂迷竊我交愛敢稱大號驕恣甚於尉他據有連州雄豪熾於梁碩公英雄算電掃風行馳御樓船直跨滄海新昌典徹備履艱難蘇歷嘉寧盡為京觀三山獠洞八角蠻陬逖矣水寓之鄉悠哉火山之國馬援之所不屆陶璜之所未聞莫不懼我王靈爭朝邊候歸賝天府獻狀鴻臚此又公之功也自寇虜陵江宮闈幽辱公枕戈嘗膽提劒拊心氣涌青霄神飛紫闥而番禺連率本自諸夷言得其朋是懷同惡公仗此忠誠乘機勦定執沛令而釁鼓平新野而據鞍此又公之功也世道初艱方隅多難勳門桀黠作亂衡嶷兵切池隍衆兼夷獠公以國盜邊警知無不為恤是同盟誅其醜類莫不魚驚鳥散面縛頭懸南土黔黎重保蘇息此又公之功也長驅嶺嶠夢想京畿緣道酋豪遞為榛梗路養渠率全據大都蓄聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩齊張高輣之所非敵公龍驤虎步嘯吒風雲山靡堅城野無強陳清祅氛於贛石滅沴氣於雩都此又公之功也遷仕凶慝屯據大皋乞活類馬騰之軍流民多杜韜之衆推鋒轉鬬自北徂南頻歲稽誅實惟勍虜公坐揮三略遙制六奇義勇同心貔貅騁力雷奔電擊谷靜山空列郡無犬吠之驚叢祠罷狐鳴之盜此又公之功也王師討虜次屆淪波兵乏兼儲士有飢色公回麾蠡澤積穀巴丘億庾之詠斯豐壺漿之迎是衆軍民轉漕曾無砥柱之難艫舳相望如運敖倉之府犀渠貝胄顧蔑雷霆高艦層樓仰捫霄漢故使三軍勇鋭百戰無前承此兵糧遂殄凶逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜攜用淹戎略公志唯同奬師克在和鵠塞非虞鴻門是會若晉侯之誓白水如蕭王之推赤心屈禮交盟人祗感咽故能使舟師並路遠邇朋心此又公之功也姑熟襟要崤函阻憑寇虜據其關梁大盜負其扃鐍公一校裁撝三雄並奮左賢右角沙潰土崩木甲殪於中原裘赴於江水他他藉藉萬計千羣鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎凶徒猶屯皇邑若夫表𩹉山河金湯嶮固疏龍首以抗殿揃華嶽以為城雜虜憑焉強兵自若公回茲地軸抗此天羅曾不崇朝俾無遺噍軍容甚穆國政方修物重覩於衣冠民還瞻於禮樂楚人滿道爭覩於葉公漢老銜悲俱歡於司隸此又公之功也內難初靜諸侯出關外郡傳烽鮮卑犯塞莫非且渠當戶中貴名王冀馬迾於淮南胡笳動於徐北公舟師步甲亘野橫江殲厥羣羝遂殫封狶莫不絓木而止戎車靡遺遇濘而旋歸驂盡殪此又公之功也公克黜禍難劬勞皇室而孫寧之黨翻啓狄心伊洛之間咸為虜戍雖金陵佳氣石壘天嚴朝暗戎塵夜喧胡鼓公三籌既畫八陳斯張裁舉靈鉢鉟亦抽金僕咸俘醜類悉反高墉異李廣之皆誅同龐元之盡赦此又公之功也任約叛換梟聲不悛戎羯貪婪狼心無改穹廬氈幕抵北闕而為營烏孫天馬指東都而成陳公左甄右落箕張翼舒掃是攙槍驅其獫狁長狄之種埋於國門椎髻之酋烹於軍市投秦坑而盡沸噎滍濉水而不流此又公之功也一相居中自折彝鼎五湖小守妄懷同惡公夙駕兼道衣製杖戈玉斧將揮金鉦且戒祅酋震懾遽請灰釘爇櫬以表其含弘焚書以安其反側此又公之功也賊龕凶橫陵虐具區阻兵安忍憑災怙亂自古蟲言鳥迹渾沌洪荒凡或虔劉未此殘酷公雖宗居汝潁世寓東南育聖誕賢之鄉含章挺生之地眷言桑梓公私憤切卓爾英狀丞規奉算戮此大憝如烹小鮮此又公之功也亂離永久羣盜孔多浙左凶渠連兵構逆豈止千兵五校白雀黃龍而已哉公以中軍無率選是親賢姦寇途窮漼然冰泮刑溏又作唐之所文命動其大威雷門之間句踐行其嚴戮英規聖迹異代同風此又公之功也同姓有扈頑凶不賓憑藉宗盟圖危社稷觀兵匯澤勢震京師驅率南蠻已為東帝公論兵於廟堂之上決勝於樽俎之間寇賈樊滕浮江下瀨一朝揃撲無待甸師萬里澄清非勞新息此又公之功也豫章祅寇依憑山澤繕甲完聚多歷歲時結從連橫爰洎交廣呂嘉既獲吳濞已摐鏦命我還師征其不恪連營盡拔偽黨斯擒曜聖武於匡山回神旌於蠡派此又公之功也自八紘九野瓜剖豆分竊帝偷王連州比縣公武靈已暢文德又宣折簡馳書風猷斯遠至於蒼蒼浴日杳杳無雷北洎丈夫之鄉南踰女子之國莫不屈膝膜拜求吏款關此又公之功也京師禍亂亟積寒暄雙闕低昂九門寥豁寧秦宮之可顧豈魯殿之猶存五都簪辨百僚卿士胡服縵纓咸為戎俗高冠厚履希復華風宋微子麥穟之歌周大夫黍離之歎方之於斯未足為悲矣公求衣昧旦昃食高舂興構宮闈具瞻遐邇郊庠宗稷之典六符十等之章還聞太始之風流重覩永平之遺事此又公之功也公有濟天下之勳重之以明德凝神體道合德符天用百姓以為心隨萬機而成務恥一物非唐虞之民歸含靈於仁壽之域上德不德無為以為夏長春生顯仁藏用忠信為寶風雨弗敷欠仁惠為基牛羊勿踐功成治定樂奏咸雲安上治民禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工商富猗頓之旅是以天無蘊寶地有呈祥潏露卿雲朝團曉映山車澤馬服馭登間既景煥於圖書方葳蕤於史諜高勳踰於象緯積德冠於嵩華固無德而稱者矣朕又聞之前王宰世茂賞尊賢式樹藩長總征羣伯二南崇絶四履遐曠泱泱表海祚土維齊巖巖泰山俾侯于魯抑又勤王反鄭夾輔遷周召伯之命斯隆河陽之禮咸備況復經營宇宙寧唯斷鼇足之功弘濟蒼生非直鑿龍門之嶮而疇庸報德寂爾無聞朕所以垂拱當寧載懷慙悸者也今授公相國以南豫州之陳留南丹陽宣城揚州之吳興東陽新安新寧南徐州之義興江州之鄱陽臨川十郡封公為陳公錫茲青土苴以白茅爰定爾邦用建冢社昔旦奭分陝俱為保師晉鄭諸侯咸作卿士兼其內外禮實攸宜今命使持節兼太尉王通授相國印綬陳公璽紱使持節兼司空王瑒授陳公茅土金獸符第一至第五左竹使符第一至第十左相國秩踰三鉉任總百司位絶朝班禮由事革其以相國總百揆除録尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印策其鎮衛大將軍揚州牧如故又加公九錫其敬聽後命以公禮為楨幹律等銜策四維皆舉八柄有章是用錫公大輅戎輅各一玄牡二駟以公賤寶崇穀疏爵待農室富京坻民知榮辱是用錫公衮冕之服赤舄副焉以公調理陰陽燮諧風雅三靈允降萬國同和是用錫公軒縣之樂六佾之舞以公宣導王猷弘闡風教光景所照鞮象必通是用錫公朱戶以居以公抑揚清濁褒德進賢髦士盈朝幽人虛谷是用錫公納陛以登以公嶷然廊廟為世鎔範折衝四表臨御八荒是用錫公武賁之士三百人以公執茲明罰期在刑措象恭無赦干紀必誅是用錫公斧鉞各一以公英猷遠量跨厲嵩溟包一車書括囊寰宇是用錫公彤弓一彤矢百玈弓十玈矢千以公天經地義貫徹幽明春露秋霜允恭粢盛是用錫公秬鬯一卣圭瓚副焉陳國置丞相已下一遵舊式往欽哉其恭循朕命克相皇天弘建邦家允興洪業以光我高祖之休命十月戊辰進高祖爵為王以揚州之會稽臨海永嘉建安南徐州之晉陵信義江州之尋陽豫章安成廬陵並前為二十郡益封陳國其相國揚州牧鎮衛大將軍並如故又命陳王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲樂舞八佾設鍾簴宮縣王妃王子王女爵命之號陳臺百官一依舊典辛未梁帝禪位于陳詔曰五運更始三正迭代司牧黎庶是屬聖賢用能經緯乾坤彌綸區宇大庇黔首闡揚鴻烈革晦以明積代同軌百王踵武咸由此則梁德湮微禍亂荐發太清云始見困長蛇承聖之季又罹封豕爰至天成重竊神器三光亟沈七廟乏祀含生已泯鼎命斯墜我武元之祚有如綴旒靜惟屯剝夕惕載懷相國陳王有命自天降神惟嶽天地合德晷曜齊明拯社稷之橫流提億兆之塗炭東誅逆叛北殲獯醜威加四海仁漸萬國復張崩樂重興絶禮儒館聿修戎亭虛候大功在舜盛績惟禹巍巍蕩蕩無得而稱來獻白環豈直皇虞之世入貢素雉非止隆周之日固以效珍川陸表瑞煙雲甘露醴泉旦夕凝涌嘉禾朱草孳植郊甸道昭於悠代勳格於皇穹明明上天光華日月革故著於玄象代德彰於圖讖獄訟有歸謳歌爰適天之歷數實有攸在朕雖庸藐暗於古昔永稽崇替為日已久敢忘列代之遺典人祇之至願乎今便遜位別宮敬禪于陳一依唐虞宋齊故事策曰咨爾陳王惟昔上古厥初生民驪連栗陸之前容成大庭之代並結繩寫鳥杳冥慌忽故靡得而詳焉自羲農軒昊之君陶唐有虞之主或垂衣而御四海或無為而子萬姓居之如馭朽索去之如脫敝屣裁遇許由便能捨帝暫逢善卷即以讓王故知玄扈琁璣非關尊貴金根玉輅示表君臨及南觀河渚東沈刻璧精華既竭耄勤已倦則抗首而笑唯賢是與耳我然作歌簡能斯授遺風餘烈昭晰圖書漢魏因循是為故實宋齊授受又弘斯義我高祖應期撫運握樞御宇三后重光祖宗齊聖及時屬陽九封豕荐食西都失馭夷狄交侵乃臮天成輕弄龜鼎惵惵黔首若崩厥角微微皇極將甚綴旒惟王乃聖乃神欽明文思二儀並運四時合序天錫智勇人挺雄傑珠庭日角龍行武步爰初投袂日乃勤王電掃番禺雲撤彭蠡揃其元惡定我京畿及王賀帝弘貿茲冠屨既行伊霍用保沖人震澤稽陰並懷叛逆獯羯醜虜三亂皇都裁命偏師二邦自殄薄伐獫狁六戎盡殪嶺南叛渙湘郢結連賊帥既擒凶渠傳首用能百揆時序四門允穆無思不服無遠不屆上達穹昊下漏深泉蛟魚並見謳歌攸屬況乎長彗橫天已徵布新之兆璧日斯既實表更姓之符是以始創義師紫雲曜彩肇惟尊主黃龍負舟楛矢素翬梯山以至白環玉玦慕德而臻若夫安國字萌本因萬物之志時乘御辨宇良會樂推之心七百無常期皇王非一族昔木德既季而傳祚于我有梁天之歷數允集明哲式遵前典廣詢羣議王公卿尹莫不攸屬敬從人祇之願授帝位于爾躬四海困窮天祿永終王其允執厥中軌儀前式以副溥天之望禋祀上帝時膺大禮永固洪業豈不盛歟又璽書曰君子者自昭明德達人者先天弗違故能進退咸亨動靜元吉朕雖蒙寡庶乎景行何則三才剖判九有區分情性相乖亂離云起是以建彼司牧推乎聖賢授受者任其時來皇王者本非一族人謀是與屈己從萬物之心天意斯歸鞠躬奉百靈之命謳歌所往則攘袂以膺之菁華已竭乃褰裳而去之昔在唐虞鑒于天道舉其黎獻授彼明哲雖復質文殊軌沿革不同歷代因循斯風靡替我大梁所以考庸太室接禮二宮月正元日受終文祖但運不常夷道無恆泰山嶽傾偃河海沸騰電目雷聲之禽鉤爪鋸牙之獸咀齧含生不知紀極二后英聖相仍在天六夷貪狡爭侵中國縣王都帝人懷干紀一民尺土皆非梁地朕以不造幼罹閔凶仰憑衡佐亟移年序周成漢惠邈矣無階惟是童蒙必貽顛蹶若使時無聖哲世靡艱難猶當高蹈於滄洲自求於泰伯者矣惟王應期誕秀開籙握圖性道故其難聞嘉庸已其被物乾行同其燾覆日御比其貞明登承聖於復禹之功樹鞠子於興周之業滅陸渾於伊洛殲驪戎於鎬京大小二震之驍徒東南兩越之勍寇遽行天討無遺神策於是祖述堯舜憲章文武大樂與天地同和大禮與天地同節鼓之以雷霆潤之以風雨仁霑葭葦信及豚魚殷牖斯空夏臺虛設民惟大畜野有同人升平頌平無偏無黨固以雲飛紫蓋水躍黃龍東伐西征暗映川陸榮光曖曖已冒郊廛甘露瀼瀼亟流庭苑車轍馬迹誰不率從蟠水流沙誰不懷德祥圖遠至非唯赤伏之符靈命昭然何止黃星之氣海口河目賢聖之表既彰握旄執鉞君人之狀斯偉且自攝提無紀孟陬殄滅枉矢宵飛天弧曉映久矣夷羊之在牧時哉蛟龍之出泉革運之兆咸徵惟新之符並集朕所以欽若勛華屢回星琯昔者木運斯盡豫高祖受焉今歷去炎精神歸樞紐敬以火德傳于爾陳遠鑒前王近謀羣辟明靈有悅率土同心今遣使持節兼太保侍中尚書左僕射平樂亭侯王通兼太尉司徒左長史王瑒奉皇帝璽綬受終之禮一依唐虞故事王其時陟元后寧育兆民光闡洪猷以承昊天之休命是日梁帝遜于別宮高祖謙讓再三羣臣固請乃許典徹或本作曲徹前有典徹湖亦同皆疑
